const pct=(m,t)=>t?Math.round((m/t)*100):0;
const gradeOf=p=>{
  if(p>=90)return{l:"A+",c:"#16a34a",bg:"#dcfce7"};
  if(p>=80)return{l:"A",c:"#2563eb",bg:"#dbeafe"};
  if(p>=70)return{l:"B+",c:"#7c3aed",bg:"#ede9fe"};
  if(p>=60)return{l:"B",c:"#d97706",bg:"#fef3c7"};
  if(p>=40)return{l:"C",c:"#ea580c",bg:"#ffedd5"};
  return{l:"D",c:"#dc2626",bg:"#fee2e2"};
};
const safeId=s=>s.replace(/[^a-zA-Z0-9]/g,"_");
const studentId=(cls,sec,roll)=>safeId(`${cls}_${sec}_${roll}`);
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>{if(!d)return"—";const[y,m,dy]=d.split("-");return`${dy}/${m}/${y}`;};
const fmtTime=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});};

function useFirestore(collName){
  const[data,setData]=useState({});
  const[loading,setLoading]=useState(true);
  const unsubRef=useRef(null);
  useEffect(()=>{
    const setup=()=>{
      if(!window.__db)return;
      if(unsubRef.current)unsubRef.current();
      unsubRef.current=window.__fbOnSnapshot(window.__fbCollection(window.__db,collName),snap=>{
        const d={};snap.forEach(dc=>{d[dc.id]=dc.data();});setData(d);setLoading(false);
      });
    };
    if(window.__fbReady)setup();
    else window.addEventListener("fbready",setup,{once:true});
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[collName]);
  const set=useCallback(async(id,val)=>{if(!window.__db)return;await window.__fbSetDoc(window.__fbDoc(window.__db,collName,safeId(id)),val);},[collName]);
  const del=useCallback(async(id)=>{if(!window.__db)return;await window.__fbDeleteDoc(window.__fbDoc(window.__db,collName,safeId(id)));},[collName]);
  return{data,loading,set,del};
}

  const s={pri:{background:"#1a2e6c",color:"#fff",border:"none"},ghost:{background:"#f8fafc",color:"#64748b",border:"1.5px solid #e2e8f0"},ok:{background:"#dcfce7",color:"#16a34a",border:"none"},del:{background:"#fee2e2",color:"#dc2626",border:"none"},warn:{background:"#fef3c7",color:"#d97706",border:"none"}};
  return<button onClick={onClick} disabled={disabled} style={{...s[v],padding:"9px 20px",borderRadius:9,fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}}>{children}</button>;
};

  <div onClick={onClick} style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",padding:"18px 20px",borderTop:`3px solid ${color}`,cursor:onClick?"pointer":"default",transition:"transform .15s",}}>
    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1.5}}>{label}</span><span style={{fontSize:20}}>{icon}</span></div>

const Empty=({icon,title,sub})=>(

const Spinner=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60,color:"#64748b",fontSize:13,gap:10}}><div style={{width:20,height:20,border:"2.5px solid #e2e8f0",borderTop:"2.5px solid #1a2e6c",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Syncing with cloud…</div>;
const Inp=({label,value,onChange,type="text",placeholder="",error=""})=>(

const Badge=({label,color,bg})=><span style={{background:bg,color,borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>{label}</span>;

// ── LOGIN ──
function Login({onLogin,usersDB,studentsDB}){
  const[mode,setMode]=useState("choose");
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");
  const[sCls,setsCls]=useState(SCHOOL.classes[0]);const[sSec,setsSec]=useState("A");
  const[sRoll,setSRoll]=useState("");const[sPin,setSPin]=useState("");
  const[regPin,setRegPin]=useState("");const[regConfirm,setRegConfirm]=useState("");
  const[regName,setRegName]=useState("");const[regLoading,setRegLoading]=useState(false);

  const goStaff=()=>{
    const uKey=u.trim().toLowerCase();
    const userData=usersDB.data[uKey]||DEFAULT_USERS[uKey];
    if(userData&&userData.password===p)onLogin({username:uKey,...userData});
    else setErr("Invalid username or password.");
  };
  const goStudent=()=>{
    if(!sRoll||!sPin){setErr("Enter roll number and PIN.");return;}
    const sid=studentId(sCls,sSec,sRoll);
    const existing=studentsDB.data[sid];
    if(!existing){setErr("Not registered. Please register first.");return;}
    if(existing.pin!==sPin){setErr("Incorrect PIN.");return;}
    onLogin({role:"student",cls:sCls,section:sSec,roll:Number(sRoll),name:existing.name||"",sid});
  };
  const goRegister=async()=>{
    setErr("");
    if(!sRoll){setErr("Select your roll number.");return;}
    if(!regPin||regPin.length<4){setErr("PIN must be at least 4 digits.");return;}
    if(regPin!==regConfirm){setErr("PINs do not match.");return;}
    const sid=studentId(sCls,sSec,sRoll);
    setRegLoading(true);
    if(studentsDB.data[sid]){setErr("Already registered. Please login.");setRegLoading(false);return;}
    await studentsDB.set(sid,{cls:sCls,section:sSec,roll:Number(sRoll),pin:regPin,name:regName.trim()||"",nameSet:!!regName.trim(),createdAt:new Date().toISOString()});
    setRegLoading(false);
    onLogin({role:"student",cls:sCls,section:sSec,roll:Number(sRoll),name:regName.trim()||"",sid});
  };
  const rollOpts=Array.from({length:SCHOOL.totalRolls},(_,i)=>({v:String(i+1),l:`Roll No. ${i+1}`}));

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#1a2e6c 0%,#1d4ed8 60%,#b8860b 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fi" style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO} alt="logo" style={{width:80,height:80,objectFit:"contain",marginBottom:10}}/>
          <div style={{fontSize:21,fontWeight:800,color:"#fff"}}>Stepping Stone Inter College</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:4,letterSpacing:1.5}}>GORAKHPUR · WEEKLY TEST TRACKER</div>
        </div>
        {mode==="choose"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <button onClick={()=>setMode("staff")} style={{background:"#fff",borderRadius:16,padding:"22px 24px",border:"none",cursor:"pointer",textAlign:"left",boxShadow:"0 8px 30px rgba(0,0,0,.2)"}}>
              <div style={{fontSize:28,marginBottom:8}}>👩‍🏫</div>
              <div style={{fontSize:16,fontWeight:700,color:"#1a2e6c"}}>Staff Login</div>
              <div style={{fontSize:13,color:"#64748b",marginTop:2}}>Teachers, Admin & Parents</div>
            </button>
            <button onClick={()=>setMode("student")} style={{background:"rgba(255,255,255,.12)",borderRadius:16,padding:"22px 24px",border:"2px solid rgba(255,255,255,.3)",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:28,marginBottom:8}}>👨‍🎓</div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Student Login</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:2}}>View your results and progress</div>
            </button>
          </div>
        )}
        {mode==="staff"&&(
          <div style={{background:"#fff",borderRadius:20,padding:32,boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
            <button onClick={()=>{setMode("choose");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,marginBottom:16}}>← Back</button>
            <div style={{fontSize:18,fontWeight:700,color:"#1a2e6c",marginBottom:4}}>Staff Sign In</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Teachers, Admin & Parents</div>
            <Inp label="Username" value={u} onChange={setU} placeholder="e.g. maths6a"/>
            <Inp label="Password" value={p} onChange={setP} type="password" placeholder="••••••••"/>
            {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
            <button onClick={goStaff} style={{width:"100%",background:"#1a2e6c",color:"#fff",border:"none",borderRadius:10,padding:13,fontSize:14,fontWeight:700,cursor:"pointer"}}>Sign In →</button>
          </div>
        )}
        {mode==="student"&&(
          <div style={{background:"#fff",borderRadius:20,padding:32,boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
            <button onClick={()=>{setMode("choose");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,marginBottom:16}}>← Back</button>
            <div style={{fontSize:18,fontWeight:700,color:"#1a2e6c",marginBottom:4}}>Student Login</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Select your class and enter your PIN</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:10,marginBottom:14}}>
              <div><Lbl c="Class"/><Sel value={sCls} onChange={setsCls} options={SCHOOL.classes}/></div>
              <div><Lbl c="Section"/><Sel value={sSec} onChange={setsSec} options={SCHOOL.sections}/></div>
            </div>
            <div style={{marginBottom:14}}><Lbl c="Roll Number"/><Sel value={sRoll} onChange={setSRoll} options={[{v:"",l:"Select Roll No"},...rollOpts]}/></div>
            <Inp label="PIN" value={sPin} onChange={setSPin} type="password" placeholder="Your PIN"/>
            {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
            <button onClick={goStudent} style={{width:"100%",background:"#1a2e6c",color:"#fff",border:"none",borderRadius:10,padding:13,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12}}>Login →</button>
            <button onClick={()=>{setMode("student-register");setErr("");}} style={{width:"100%",background:"#f8fafc",color:"#64748b",border:"1.5px solid #e2e8f0",borderRadius:10,padding:11,fontSize:13,fontWeight:600,cursor:"pointer"}}>New Student? Register here</button>
          </div>
        )}
        {mode==="student-register"&&(
          <div style={{background:"#fff",borderRadius:20,padding:32,boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
            <button onClick={()=>{setMode("student");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,marginBottom:16}}>← Back</button>
            <div style={{fontSize:18,fontWeight:700,color:"#1a2e6c",marginBottom:4}}>Student Registration</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Register once with your roll number and create a PIN</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:10,marginBottom:14}}>
              <div><Lbl c="Class"/><Sel value={sCls} onChange={setsCls} options={SCHOOL.classes}/></div>
              <div><Lbl c="Section"/><Sel value={sSec} onChange={setsSec} options={SCHOOL.sections}/></div>
            </div>
            <div style={{marginBottom:14}}><Lbl c="Roll Number"/><Sel value={sRoll} onChange={setSRoll} options={[{v:"",l:"Select Roll No"},...rollOpts]}/></div>
            <Inp label="Your Full Name" value={regName} onChange={setRegName} placeholder="Enter your full name"/>
            <Inp label="Create PIN (min 4 digits)" value={regPin} onChange={setRegPin} type="password" placeholder="Choose a PIN"/>
            <Inp label="Confirm PIN" value={regConfirm} onChange={setRegConfirm} type="password" placeholder="Re-enter PIN"/>
            {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
            <button onClick={goRegister} disabled={regLoading} style={{width:"100%",background:"#1a2e6c",color:"#fff",border:"none",borderRadius:10,padding:13,fontSize:14,fontWeight:700,cursor:"pointer"}}>{regLoading?"Registering…":"Register & Login →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MANAGE STUDENTS ──
function ManageStudents({studentsDB}){
  const{data,loading,set}=studentsDB;
  const[cls,setCls]=useState(SCHOOL.classes[0]);
  const[input,setInput]=useState("");
  const[search,setSearch]=useState("");
  const[editIdx,setEditIdx]=useState(null);
  const[editVal,setEditVal]=useState("");
  const students=data[safeId(cls)]?.list||[];
  const filtered=students.filter(s=>s.toLowerCase().includes(search.toLowerCase()));
  const save=async(list)=>await set(cls,{cls,list,updatedAt:new Date().toISOString()});
  const add=async()=>{const name=input.trim();if(!name)return;if(students.includes(name)){setInput("");return;}await save([...students,name]);setInput("");};
  const remove=async(name)=>{if(!window.confirm(`Remove ${name}?`))return;await save(students.filter(s=>s!==name));};
  const saveEdit=async(idx)=>{const name=editVal.trim();if(!name)return;const u=[...students];u[idx]=name;await save(u);setEditIdx(null);setEditVal("");};
  if(loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:22}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:2}}>👨‍🎓 Manage Students</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Add students class by class. Roll numbers assigned automatically.</div>
        <div style={{marginBottom:18}}><Lbl c="Select Class"/><Sel value={cls} onChange={v=>{setCls(v);setEditIdx(null);setSearch("");}} options={SCHOOL.classes}/></div>
        <Lbl c={`Add Student to ${cls}`}/>
        <div style={{display:"flex",gap:10,marginTop:8,marginBottom:6}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Type full name and press Enter…" style={{flex:1,padding:"10px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
          <Btn onClick={add}>+ Add</Btn>
        </div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:16}}>Roll numbers are assigned in the order you add students.</div>
        {students.length>5&&(
          <div style={{marginBottom:16}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search students…" style={{width:"100%",padding:"9px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
          </div>
        )}
        {students.length===0?(
          <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:10,padding:28,textAlign:"center",color:"#94a3b8",fontSize:13}}>No students in {cls} yet.</div>
        ):(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <Lbl c={`${cls} — ${students.length} students${search?" (filtered: "+filtered.length+")":""}`}/>
              <Btn onClick={()=>{if(window.confirm(`Clear all from ${cls}?`))save([]);}} v="del" style={{padding:"4px 12px",fontSize:11}}>Clear All</Btn>
            </div>
            <div style={{border:"1.5px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"grid",gridTemplateColumns:"50px 1fr 80px",background:"#f8fafc",borderBottom:"1.5px solid #e2e8f0",padding:"8px 14px",gap:10}}>
                {["Roll No","Student Name","Actions"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>{h}</div>)}
              </div>
              {filtered.map((s,i)=>{
                const realIdx=students.indexOf(s);
                return(
                  <div key={s} style={{display:"grid",gridTemplateColumns:"50px 1fr 80px",padding:"10px 14px",alignItems:"center",gap:10,borderBottom:i<filtered.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#1a2e6c"}}>{realIdx+1}</div>
                    {editIdx===realIdx?(
                      <><input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(realIdx)} style={{flex:1,padding:"6px 10px",borderRadius:7,border:"1.5px solid #1a2e6c",fontSize:13,outline:"none"}} autoFocus/></>
                    ):(
                      <div style={{fontSize:13,fontWeight:500,color:"#1e293b"}}>{s}</div>
                    )}
                    <div style={{display:"flex",gap:4}}>
                      {editIdx===realIdx?(
                        <><button onClick={()=>saveEdit(realIdx)} style={{background:"#dcfce7",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,color:"#16a34a",fontWeight:700}}>✓</button>
                        <button onClick={()=>setEditIdx(null)} style={{background:"#f1f5f9",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,color:"#64748b"}}>✕</button></>
                      ):(
                        <><button onClick={()=>{setEditIdx(realIdx);setEditVal(s);}} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,padding:"2px 6px"}}>✏️</button>
                        <button onClick={()=>remove(s)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:13,padding:"2px 6px"}}>✕</button></>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Card>
      <Card style={{padding:22}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c",marginBottom:14}}>All Classes Summary</div>
        <div className="grid4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {SCHOOL.classes.map(c=>{const count=(data[safeId(c)]?.list||[]).length;return(
            <div key={c} onClick={()=>{setCls(c);setSearch("");}} style={{background:cls===c?"#eff6ff":"#f8fafc",border:`1.5px solid ${cls===c?"#bfdbfe":"#e2e8f0"}`,borderRadius:10,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{fontSize:11,fontWeight:700,color:cls===c?"#1a2e6c":"#64748b"}}>{c}</div>
              <div style={{fontSize:22,fontWeight:800,color:cls===c?"#1a2e6c":"#94a3b8",fontFamily:"monospace",marginTop:4}}>{count}</div>
              <div style={{fontSize:10,color:"#94a3b8"}}>students</div>
            </div>
          );})}
        </div>
        <div style={{marginTop:14,padding:"10px 14px",background:"#f0fdf4",borderRadius:9,border:"1.5px solid #bbf7d0",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600,color:"#166534"}}>Total Students</span>
          <span style={{fontSize:13,fontWeight:800,color:"#166534",fontFamily:"monospace"}}>{Object.values(data).reduce((a,b)=>a+(b?.list||[]).length,0)}</span>
        </div>
      </Card>
    </div>
  );
}

// ── MANAGE TOPICS ──
function ManageTopics({topicsDB}){
  const{data,loading,set}=topicsDB;
  const[cls,setCls]=useState(SCHOOL.classes[0]);
  const[subj,setSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[input,setInput]=useState("");
  useEffect(()=>setSubj(SCHOOL.subjects[cls][0]),[cls]);
  const key=`${cls}__${subj}`;
  const topics=data[safeId(key)]?.list||[];
  const add=async()=>{const t=input.trim();if(!t)return;const arr=[...new Set([...topics,...t.split(",").map(x=>x.trim()).filter(Boolean)])];await set(key,{key,list:arr});setInput("");};
  const remove=async(t)=>await set(key,{key,list:topics.filter(x=>x!==t)});
  if(loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:22}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:2}}>📝 Manage Topics</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Set topics per class and subject. Separate multiple with commas.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
          <div><Lbl c="Class"/><Sel value={cls} onChange={setCls} options={SCHOOL.classes}/></div>
          <div><Lbl c="Subject"/><Sel value={subj} onChange={setSubj} options={SCHOOL.subjects[cls]||[]}/></div>
        </div>
        <Lbl c={`Topics for ${cls} — ${subj}`}/>
        <div style={{display:"flex",gap:10,marginTop:8,marginBottom:16}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="e.g. Algebra, Geometry, Trigonometry" style={{flex:1,padding:"10px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
          <Btn onClick={add}>+ Add</Btn>
        </div>
        {topics.length===0?(
          <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:10,padding:24,textAlign:"center",color:"#94a3b8",fontSize:13}}>No topics yet. Type above and press Enter.</div>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {topics.map(t=>(
                <div key={t} style={{display:"flex",alignItems:"center",gap:5,background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:99,padding:"5px 6px 5px 13px"}}>
                  <span style={{fontSize:13,color:"#1e40af",fontWeight:600}}>{t}</span>
                  <button onClick={()=>remove(t)} style={{background:"#bfdbfe",border:"none",cursor:"pointer",color:"#1e40af",fontSize:13,lineHeight:1,padding:"2px 6px",borderRadius:"50%",fontWeight:700}}>×</button>
                </div>
              ))}
            </div>
            <Btn onClick={()=>set(key,{key,list:[]})} v="del" style={{padding:"6px 14px",fontSize:12}}>Clear All</Btn>
          </>
        )}
      </Card>
    </div>
  );
}

// ── ATTENDANCE ──
function Attendance({user,attendanceDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const[date,setDate]=useState(today());
  const[status,setStatus]=useState({});
  const[saved,setSaved]=useState(false);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const attKey=`${cls}__${date}`;
  const existing=attendanceDB.data[safeId(attKey)];
  useEffect(()=>{
    if(existing){setStatus(existing.status||{});}
    else{const s={};students.forEach(st=>s[st]="P");setStatus(s);}
  },[attKey,existing?.savedAt]);
  const setS=(s,v)=>setStatus(p=>({...p,[s]:v}));
  const markAll=(v)=>{const s={};students.forEach(st=>s[st]=v);setStatus(s);};
  const handleSave=async()=>{
    await attendanceDB.set(attKey,{cls,date,status,by:user.name,savedAt:new Date().toISOString()});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const present=Object.values(status).filter(v=>v==="P").length;
  const absent=Object.values(status).filter(v=>v==="A").length;
  const late=Object.values(status).filter(v=>v==="L").length;
  if(attendanceDB.loading||studentsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><Lbl c="Class"/><Sel value={cls} onChange={v=>{setCls(v);}} options={aC}/></div>
          <div><Lbl c="Date"/><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/></div>
        </div>
      </Card>
      {students.length===0?<Empty icon="👨‍🎓" title={`No students in ${cls}`} sub="Add students first in Manage Students tab."/>:(
        <>
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>

                      {opt.label}

}

// ── ENTER MARKS ──
function EnterMarks({user,testsDB,topicsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);
  const[subj,setSubj]=useState(aS[0]||"");
  const[week,setWeek]=useState(1);
  const[total,setTotal]=useState(20);
  const[testDate,setTestDate]=useState(today());
  const[selTopics,setSelTopics]=useState([]);
  const[rows,setRows]=useState({});
  const[saved,setSaved]=useState(false);
  useEffect(()=>setSubj(aS[0]||""),[cls]);
  const testKey=`${cls}__${subj}__week${week}`;
  const existing=testsDB.data[safeId(testKey)];
  useEffect(()=>{
    if(existing){setTotal(existing.total);setSelTopics(existing.topics||[]);setRows(existing.rows||{});setTestDate(existing.testDate||today());}
    else{setRows({});setSelTopics([]);setTestDate(today());}
  },[testKey,existing?.at]);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const availableTopics=topicsDB.data[safeId(`${cls}__${subj}`)]?.list||[];
  const toggleTopic=t=>setSelTopics(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const setMark=(s,v)=>setRows(p=>({...p,[s]:v}));
  const handleSave=async()=>{
    await testsDB.set(testKey,{cls,subj,week,total,testDate,topics:selTopics,rows,by:user.name,at:new Date().toISOString()});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const filled=students.filter(s=>rows[s]!==undefined&&rows[s]!=="").length;
  const avg=filled?Math.round(students.filter(s=>rows[s]!==undefined&&rows[s]!=="").reduce((a,s)=>a+pct(Number(rows[s]),total),0)/filled):0;
  const inputRefs=useRef({});
  const handleKeyDown=(e,idx)=>{if(e.key==="Tab"||e.key==="Enter"){e.preventDefault();const next=inputRefs.current[idx+1];if(next)next.focus();}};
  if(testsDB.loading||studentsDB.loading||topicsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:20}}>
        <div className="grid4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
          {[{lbl:"Class",v:cls,opts:aC,fn:v=>setCls(v)},{lbl:"Subject",v:subj,opts:aS,fn:setSubj},
            {lbl:"Week",v:week,opts:Array.from({length:30},(_,i)=>({v:i+1,l:`Week ${i+1}`})),fn:v=>setWeek(Number(v))},
            {lbl:"Total Marks",v:total,opts:[10,15,20,25,30,40,50,100].map(v=>({v,l:`${v} marks`})),fn:v=>setTotal(Number(v))}
          ].map(f=><div key={f.lbl}><Lbl c={f.lbl}/><Sel value={f.v} onChange={f.fn} options={f.opts}/></div>)}
        </div>
        <div style={{marginTop:14}}>
          <Lbl c="Test Date"/>
          <input type="date" value={testDate} onChange={e=>setTestDate(e.target.value)} style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
        </div>
        {existing&&<div style={{marginTop:10,fontSize:11,color:"#64748b"}}>Last saved: {fmtTime(existing.at)} by {existing.by}</div>}
      </Card>
      <Card style={{padding:20}}>
        <Lbl c="Topics Tested"/>
        {availableTopics.length===0?(
          <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:9,padding:"12px 16px",marginTop:8,fontSize:13,color:"#92400e"}}>⚠️ No topics for <strong>{cls} — {subj}</strong>. Go to Manage Topics first.</div>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
              {availableTopics.map(t=><button key={t} onClick={()=>toggleTopic(t)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid",borderColor:selTopics.includes(t)?"#1a2e6c":"#e2e8f0",background:selTopics.includes(t)?"#1a2e6c":"#f8fafc",color:selTopics.includes(t)?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{t}</button>)}
            </div>
            {selTopics.length>0&&<div style={{marginTop:10,fontSize:12,color:"#64748b"}}>Selected: <strong style={{color:"#1a2e6c"}}>{selTopics.join(", ")}</strong></div>}
          </>
        )}
      </Card>
      {students.length===0?<Empty icon="👨‍🎓" title={`No students in ${cls}`} sub="Add students in Manage Students tab first."/>:(
        <>
          <div style={{fontSize:12,color:"#64748b",padding:"0 4px"}}>💡 Press <strong>Tab</strong> or <strong>Enter</strong> after each mark to move to the next student.</div>
          <Card>
            <div className="marks-grid" style={{display:"grid",gridTemplateColumns:"50px 1fr 160px 90px 70px",background:"#f8fafc",borderBottom:"1.5px solid #e2e8f0",padding:"10px 20px",gap:12}}>
              {["Roll",`Student`,`Marks (/${total})`,"Pct","Grade"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1.2}}>{h}</div>)}
            </div>
            {students.map((s,i)=>{
              const m=rows[s];const has=m!==undefined&&m!=="";
              const mNum=Number(m);
              const isOver=has&&mNum>total;
              const p=has&&!isOver?pct(mNum,total):null;
              const g=p!==null?gradeOf(p):null;
              return(
                <div key={s} className="marks-grid" style={{display:"grid",gridTemplateColumns:"50px 1fr 160px 90px 70px",padding:"10px 20px",alignItems:"center",gap:12,borderBottom:i<students.length-1?"1px solid #f1f5f9":"none",background:isOver?"#fff5f5":i%2===0?"#fff":"#fafbfd"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{i+1}</div>
                  <div style={{fontWeight:500,fontSize:13,color:"#1e293b"}}>{s}</div>
                  <div>
                    <input type="number" min={0} max={total*2} value={m??""} placeholder="Enter"
                      ref={el=>inputRefs.current[i]=el}
                      onChange={e=>setMark(s,e.target.value)}
                      onKeyDown={e=>handleKeyDown(e,i)}
                      style={{width:120,padding:"7px 12px",borderRadius:8,border:`1.5px solid ${isOver?"#fca5a5":"#e2e8f0"}`,fontSize:13,fontFamily:"monospace",outline:"none",background:isOver?"#fff5f5":"#f8fafc",textAlign:"center"}}/>
                    {isOver&&<div style={{fontSize:10,color:"#dc2626",marginTop:2}}>⚠ Exceeds {total}</div>}
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:g?.c||"#cbd5e1"}}>{p!==null?p+"%":isOver?"—":"—"}</div>
                  <div>{g?<span style={{background:g.bg,color:g.c,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{g.l}</span>:<span style={{color:"#cbd5e1",fontSize:12}}>—</span>}</div>
                </div>
              );
            })}
          </Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:12,color:"#64748b"}}>{filled}/{students.length} filled{filled>0&&<span style={{color:"#1a2e6c",fontWeight:600,marginLeft:8}}>· Avg: {avg}%</span>}</div>
            <Btn onClick={handleSave} v={saved?"ok":"pri"} style={{padding:"11px 28px",fontSize:14}}>{saved?"✓ Saved to Cloud!":"Save Test Results"}</Btn>
          </div>
        </>
      )}
    </div>
  );
}

// ── CLASS PROGRESS ──
function ClassProgress({user,testsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);
  const[subj,setSubj]=useState(aS[0]||"");
  useEffect(()=>setSubj(aS[0]||""),[cls]);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const rTests=useMemo(()=>Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week),[testsDB.data,cls,subj]);
  const stats=useMemo(()=>students.map(s=>{const sc=rTests.map(t=>({week:t.week,p:pct(Number(t.rows?.[s]??0),t.total),date:t.testDate}));const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:0;return{name:s,sc,avg,trend};}),[students,rTests]);
  const classAvg=useMemo(()=>{const all=stats.flatMap(s=>s.sc.map(x=>x.p));return all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length):null;},[stats]);
  const rolls=Array.from({length:SCHOOL.totalRolls},(_,i)=>i+1);
  const problemTopics=useMemo(()=>{const m={};rTests.forEach(t=>{const fc=rolls.filter(r=>pct(Number(t.rows?.[r]??0),t.total)<50).length;if(fc>=rolls.length*.4)(t.topics||[]).forEach(tp=>{m[tp]=(m[tp]||0)+1;});});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[rTests]);
  const printReport=()=>{
    const w=window.open("","_blank");
    const rows=[...stats].sort((a,b)=>(b.avg??-1)-(a.avg??-1));
    w.document.write(`<html><head><title>Report</title><style>body{font-family:Arial,sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:center}th{background:#1a2e6c;color:#fff}h2{color:#1a2e6c}</style></head><body>`);
    w.document.write(`<h2>Stepping Stone Inter College</h2><p><strong>${cls} — ${subj}</strong> | ${rTests.length} Tests | Class Avg: ${classAvg??'—'}%</p>`);
    w.document.write(`<table><tr><th>Roll</th><th>Student</th>${rTests.map(t=>`<th>Wk ${t.week}<br/><small>${fmtDate(t.testDate)}</small></th>`).join("")}<th>Average</th><th>Trend</th></tr>`);
    rows.forEach((ss,i)=>{w.document.write(`<tr><td>${i+1}</td><td style="text-align:left">${ss.name}</td>${ss.sc.map(sc=>`<td style="color:${gradeOf(sc.p).c}">${sc.p}%</td>`).join("")}<td><strong>${ss.avg??'—'}%</strong></td><td>${ss.trend>5?"↑ Improving":ss.trend<-5?"↓ Declining":"→ Stable"}</td></tr>`);});
    w.document.write(`</table>`);
    if(problemTopics.length){w.document.write(`<h3 style="color:#dc2626">Problem Topics</h3><ul>${problemTopics.map(([t,c])=>`<li>${t} — flagged in ${c} tests</li>`).join("")}</ul>`);}
    w.document.write(`<p style="color:#94a3b8;font-size:12px;margin-top:20px">Generated by Rajvansh Gupta, Director — Stepping Stone Inter College</p></body></html>`);
    w.document.close();w.print();
  };
  if(testsDB.loading||studentsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120}}><Lbl c="Class"/><Sel value={cls} onChange={setCls} options={aC}/></div>
          <div style={{flex:1,minWidth:120}}><Lbl c="Subject"/><Sel value={subj} onChange={setSubj} options={aS}/></div>
          <Btn onClick={printReport} v="ghost" style={{whiteSpace:"nowrap"}}>🖨️ PDF Report</Btn>
        </div>
      </Card>
      {rTests.length===0?<Empty icon="📝" title={`No data for ${cls} · ${subj}`} sub="Enter marks first."/>:(
        <>
          <div className="grid4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
            <StatCard label="Tests Recorded" val={rTests.length} icon="📋" color="#1a2e6c" sub={`Latest: ${fmtDate(rTests[rTests.length-1]?.testDate)||"Week "+rTests[rTests.length-1]?.week}`}/>
            <StatCard label="Class Average" val={classAvg!==null?classAvg+"%":"—"} icon="📊" color={classAvg!==null?gradeOf(classAvg).c:"#64748b"} sub="Across all tests"/>
            <StatCard label="Top Scorer" val={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.avg+"%"||"—"} icon="🏆" color="#d97706" sub={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.name?.split(" ")[0]}/>
            <StatCard label="Problem Topics" val={problemTopics.length} icon="⚠️" color={problemTopics.length>0?"#dc2626":"#16a34a"} sub={problemTopics.length>0?"Need revision":"All clear"}/>
          </div>
          <Card>
            <div style={{padding:"14px 20px",borderBottom:"1.5px solid #e2e8f0",background:"#f8fafc",display:"flex",justifyContent:"space-between"}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c"}}>Performance — {cls} · {subj}</div>
              <div style={{fontSize:11,color:"#64748b"}}>{rTests.length} weeks · {students.length} students</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#f8fafc"}}>
                  <th style={{padding:"8px 12px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Roll</th>
                  <th style={{padding:"10px 20px",textAlign:"left",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",whiteSpace:"nowrap"}}>Student</th>
                  {rTests.map(t=><th key={t.week} style={{padding:"8px 12px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",whiteSpace:"nowrap"}}>W{t.week}<br/><span style={{fontSize:9,fontWeight:400}}>{fmtDate(t.testDate)}</span></th>)}
                  <th style={{padding:"10px 16px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Avg</th>
                  <th style={{padding:"10px 16px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Trend</th>
                </tr></thead>
                <tbody>
                  {[...stats].sort((a,b)=>(b.avg??-1)-(a.avg??-1)).map((ss,i)=>(
                    <tr key={ss.name} style={{borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafbfd"}}>
                      <td style={{padding:"10px 12px",textAlign:"center",fontSize:12,color:"#94a3b8",fontWeight:700}}>{students.indexOf(ss.name)+1}</td>
                      <td style={{padding:"10px 20px",fontWeight:500,fontSize:13,color:"#1e293b",whiteSpace:"nowrap"}}>{ss.name}</td>
                      {ss.sc.map((sc,idx)=>{const g=gradeOf(sc.p);return<td key={idx} style={{padding:"10px 12px",textAlign:"center"}}><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:g.c}}>{sc.p}%</span></td>;})}
                      <td style={{padding:"10px 16px",textAlign:"center"}}>{ss.avg!==null?<GBadge p={ss.avg}/>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
                      <td style={{padding:"10px 16px",textAlign:"center",fontSize:12,fontWeight:700,color:ss.trend>5?"#16a34a":ss.trend<-5?"#dc2626":"#64748b"}}>{ss.trend>5?`↑ +${ss.trend}%`:ss.trend<-5?`↓ ${ss.trend}%`:"→ Stable"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
          {problemTopics.length>0&&(
            <Card style={{padding:20}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c",marginBottom:14}}>⚠️ Problem Topics</div>
              {problemTopics.map(([tp,cnt])=>(
                <div key={tp} style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div><div style={{fontWeight:700,color:"#c2410c",fontSize:14}}>📚 {tp}</div><div style={{fontSize:12,color:"#9a3412",marginTop:2}}>Flagged in {cnt} test{cnt>1?"s":""}</div></div>
                  <span style={{background:"#c2410c",color:"#fff",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:700}}>REVIEW</span>
                </div>
              ))}
            </Card>
          )}
        </>
      )}
    </div>
  );
}

// ── STUDENT REPORT ──
function StudentReport({user,testsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const aS=user.role==="admin"?SCHOOL.sections:(user.sections||SCHOOL.sections);
  const[cls,setCls]=useState(aC[0]);
  const[sec,setSec]=useState(aS[0]);
  const[roll,setRoll]=useState(1);
  const sData=studentsDB.data[studentId(cls,sec,roll)];
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.section===sec&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[roll]??0),t.total),topics:t.topics||[],date:t.testDate}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[cls,sec,roll,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  if(testsDB.loading||studentsDB.loading)return<Spinner/>;
  const rollOpts=Array.from({length:SCHOOL.totalRolls},(_,i)=>({v:i+1,l:`Roll ${i+1}${studentsDB.data[studentId(cls,sec,i+1)]?.name?" — "+studentsDB.data[studentId(cls,sec,i+1)].name:""}`}));
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:100}}><Lbl c="Class"/><Sel value={cls} onChange={v=>{setCls(v);setRoll(1);}} options={aC}/></div>

          <StatCard label="Needs Work" val={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.subj.split(" ")[0]||"—"} icon="📌" color="#dc2626" sub={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.avg+"%"}/>

        </div>

          <div key={s.subj} style={{padding:"16px 20px",borderBottom:i<sd.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:s.avg!==null?10:0,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{s.subj}</div>
                {s.weak.length>0&&<div style={{fontSize:11,color:"#dc2626",marginTop:3}}>⚠ Weak topics: {s.weak.join(", ")}</div>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8"}}>W{sc.week}</div><div style={{fontSize:9,color:"#cbd5e1"}}>{fmtDate(sc.date)}</div><div style={{fontSize:12,fontWeight:700,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
                {s.avg!==null?<GBadge p={s.avg}/>:<span style={{fontSize:12,color:"#cbd5e1"}}>No data</span>}
                {s.trend!==null&&<span style={{fontSize:12,fontWeight:700,color:s.trend>0?"#16a34a":s.trend<-5?"#dc2626":"#64748b"}}>{s.trend>0?`↑+${s.trend}%`:s.trend<-5?`↓${s.trend}%`:"→"}</span>}
              </div>
            </div>
            {s.avg!==null&&<Bar p={s.avg}/>}
          </div>
        ))}
      </Card>
    </div>
  );
}

function ParentView({user,testsDB,studentsDB}){
  const{cls,section,roll}=user;
  const sData=studentsDB.data[studentId(cls,section,roll)];
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.section===section&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[roll]??0),t.total),topics:t.topics||[],date:t.testDate}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[cls,section,roll,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  if(testsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{background:"linear-gradient(135deg,#1a2e6c,#1d4ed8)",borderRadius:16,padding:"28px",color:"#fff"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Parent Portal</div>
        <div style={{fontSize:22,fontWeight:800,marginTop:4}}>{user.name}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:6}}>{sData?.name||`Roll ${roll}`} · {cls} Section {section} · Roll No. {roll}</div>
        {overall!==null&&<div style={{marginTop:16,display:"inline-flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"10px 18px"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:1}}>Overall</div>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:gradeOf(overall).c}}>{overall}%</div>
          <div style={{fontSize:18,fontWeight:700}}>{gradeOf(overall).l}</div>
        </div>}
      </div>
      {sd.filter(s=>s.sc.length>0).length===0?<Empty icon="📋" title="No results yet" sub="Results appear once teachers enter marks."/>:(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {sd.filter(s=>s.sc.length>0).map(s=>(
            <Card key={s.subj} style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div><div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{s.subj}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s.sc.length} test{s.sc.length>1?"s":""}</div></div>
                {s.avg!==null&&<GBadge p={s.avg}/>}
              </div>
              {s.avg!==null&&<div style={{marginBottom:12}}><Bar p={s.avg}/></div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{background:g.bg,borderRadius:8,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:g.c,fontWeight:700}}>Wk {sc.week}</div><div style={{fontSize:14,fontWeight:800,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
              </div>
              {s.weak.length>0&&<div style={{marginTop:12,background:"#fff7ed",borderRadius:8,padding:"8px 12px"}}><div style={{fontSize:11,color:"#c2410c",fontWeight:600}}>Weak topics: {s.weak.join(", ")}</div></div>}
              {s.trend!==null&&<div style={{marginTop:8,fontSize:12,color:"#64748b"}}>Progress: <strong style={{color:s.trend>0?"#16a34a":s.trend<-5?"#dc2626":"#64748b"}}>{s.trend>0?`Improving ↑`:s.trend<-5?`Declining ↓`:"Stable →"}</strong></div>}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

function AccountSettings({user,usersDB,onUpdate}){
  const[name,setName]=useState(user.name);
  const[newPass,setNewPass]=useState("");
  const[confirmPass,setConfirmPass]=useState("");
  const[currentPass,setCurrentPass]=useState("");
  const[saved,setSaved]=useState(false);
  const[err,setErr]=useState("");
  const handleSave=async()=>{
    setErr("");
    if(!currentPass){setErr("Enter current password to confirm.");return;}
    const stored=usersDB.data[user.username]||DEFAULT_USERS[user.username];
    if(stored.password!==currentPass){setErr("Current password is incorrect.");return;}
    if(newPass&&newPass!==confirmPass){setErr("New passwords do not match.");return;}
    if(newPass&&newPass.length<6){setErr("Password must be 6+ characters.");return;}
    const updated={...stored,name:name||stored.name,password:newPass||stored.password};
    await usersDB.set(user.username,updated);
    onUpdate({...user,name:updated.name,password:updated.password});
    setSaved(true);setNewPass("");setConfirmPass("");setCurrentPass("");
    setTimeout(()=>setSaved(false),3000);
  };
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:24}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:4}}>🔐 Account Settings</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>Update your name and password.</div>
        <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:"12px 16px",marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"#0369a1",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Your Account</div>
          <div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{user.username}</div>
          <div style={{fontSize:12,color:"#64748b",textTransform:"capitalize"}}>{user.role} · {user.classes?.join(", ")||"All Classes"}</div>
        </div>
        <Inp label="Display Name" value={name} onChange={setName} placeholder="Your full name"/>
        <Inp label="New Password (leave blank to keep current)" value={newPass} onChange={setNewPass} type="password" placeholder="Min 6 characters"/>
        <Inp label="Confirm New Password" value={confirmPass} onChange={setConfirmPass} type="password" placeholder="Re-enter new password"/>
        <div style={{borderTop:"1.5px solid #f1f5f9",paddingTop:16,marginTop:4}}>
          <Inp label="Current Password (required to save)" value={currentPass} onChange={setCurrentPass} type="password" placeholder="Enter current password"/>
        </div>
        {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
        {saved&&<div style={{fontSize:12,color:"#16a34a",background:"#dcfce7",borderRadius:8,padding:"8px 12px",marginBottom:12}}>✓ Changes saved!</div>}
        <Btn onClick={handleSave} style={{width:"100%",padding:12}}>Save Changes</Btn>
      </Card>
    </div>
  );
}

async function askAI(prompt, maxTokens=800){

      method:"POST",

// ── AI PANEL ──
function AIPanel({testsDB, studentsDB, topicsDB}){
  const[activeAI, setActiveAI]=useState("insights");
  // State for each feature
  const[cls, setCls]=useState(SCHOOL.classes[0]);
  const[subj, setSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[student, setStudent]=useState("");
  const[loading, setLoading]=useState(false);
  const[result, setResult]=useState("");
  const[qCls, setQCls]=useState(SCHOOL.classes[0]);
  const[qSubj, setQSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[qTopics, setQTopics]=useState([]);
  const[qDiff, setQDiff]=useState("Medium");
  const[qCount, setQCount]=useState(10);
  const[msgLang, setMsgLang]=useState("English");

  useEffect(()=>{setSubj(SCHOOL.subjects[cls][0]);setStudent("");},[cls]);
  useEffect(()=>{setQSubj(SCHOOL.subjects[qCls][0]);},[qCls]);

  const students = studentsDB.data[safeId(cls)]?.list||[];
  const qTopicList = topicsDB.data[safeId(`${qCls}__${qSubj}`)]?.list||[];

  // 1. CLASS INSIGHTS
  const genInsights = async()=>{
    setLoading(true);setResult("");
    const rTests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const studentList = studentsDB.data[safeId(cls)]?.list||[];
    if(!rTests.length){setResult("No test data available for this class and subject.");setLoading(false);return;}
    const summary = rTests.map(t=>{
      const scores = studentList.map(s=>({name:s,pct:pct(Number(t.rows?.[s]??0),t.total)}));
      const avg = Math.round(scores.reduce((a,b)=>a+b.pct,0)/scores.length);
      const failing = scores.filter(s=>s.pct<40).map(s=>s.name);
      return `Week ${t.week} (${t.testDate||"—"}): Class avg ${avg}%, Topics: ${t.topics?.join(", ")||"—"}, Failing: ${failing.join(", ")||"None"}`;
    }).join("\n");
    const prompt = `You are an educational analyst for Stepping Stone Inter College, Gorakhpur. Analyze this ${cls} ${subj} test data and give actionable insights for the teacher:\n\n${summary}\n\nProvide:\n1. Overall class performance trend\n2. Topics that need re-teaching\n3. Students who need extra attention (mention names)\n4. Specific recommendations for next week\n\nBe concise, practical and specific. Write in a professional tone suitable for a school teacher.`;
    const res = await askAI(prompt, 600);
    setResult(res);setLoading(false);
  };

  // 2. STUDY PLAN
  const genStudyPlan = async()=>{
    if(!student){setResult("Please select a student.");return;}
    setLoading(true);setResult("");
    const subjects = SCHOOL.subjects[cls]||[];
    const subjectData = subjects.map(subj=>{
      const tests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
      const scores = tests.map(t=>pct(Number(t.rows?.[student]??0),t.total));
      const avg = scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      const weakTopics = [...new Set(tests.filter(t=>pct(Number(t.rows?.[student]??0),t.total)<50).flatMap(t=>t.topics||[]))];
      return{subj,avg,weakTopics,tests:scores.length};
    }).filter(s=>s.tests>0);
    const prompt = `You are a personal academic coach for a student at Stepping Stone Inter College, Gorakhpur.\n\nStudent: ${student}, ${cls}\nPerformance data:\n${subjectData.map(s=>`${s.subj}: Average ${s.avg??0}%${s.weakTopics.length?" | Weak topics: "+s.weakTopics.join(", "):""}`).join("\n")}\n\nCreate a personalised 1-week study plan for this student. Include:\n1. Which subjects need most attention and why\n2. Specific topics to focus on each day (Mon-Sat)\n3. Time allocation suggestions\n4. Motivational note for the student\n\nBe encouraging, specific and realistic. Write directly to the student.`;
    const res = await askAI(prompt, 700);
    setResult(res);setLoading(false);
  };

  // 3. REPORT COMMENTS
  const genComments = async()=>{
    if(!student){setResult("Please select a student.");return;}
    setLoading(true);setResult("");
    const subjects = SCHOOL.subjects[cls]||[];
    const subjectData = subjects.map(subj=>{
      const tests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj);
      const scores = tests.map(t=>pct(Number(t.rows?.[student]??0),t.total));
      const avg = scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      return{subj,avg};
    }).filter(s=>s.avg!==null);
    const overall = subjectData.length?Math.round(subjectData.reduce((a,b)=>a+b.avg,0)/subjectData.length):0;
    const prompt = `Write a professional teacher's remark for a student's report card.\n\nStudent: ${student}, ${cls}\nOverall Average: ${overall}%\nSubject-wise: ${subjectData.map(s=>`${s.subj}: ${s.avg}%`).join(", ")}\n\nWrite:\n1. A formal 2-3 sentence teacher remark for the report card\n2. A separate 1-sentence principal remark\n\nTone: Professional, encouraging, CBSE style. Do not use the word "good" repeatedly.`;
    const res = await askAI(prompt, 400);

  };

  // 4. PARENT MESSAGE

      return{subj,score,week:latest?.week};
    }).filter(s=>s.score!==null);
    const prompt = `Write a WhatsApp message from Stepping Stone Inter College, Gorakhpur to the parent of ${student} (${cls}).\n\nLatest test results:\n${subjectData.map(s=>`${s.subj} (Week ${s.week}): ${s.score}%`).join("\n")}\n\nWrite the message in ${msgLang}. The message should:\n1. Be warm and professional\n2. Mention specific results\n3. Highlight what's going well\n4. Mention one area of improvement\n5. End with encouragement\n6. Be suitable for WhatsApp (use emojis appropriately)\n7. Sign off as "Stepping Stone Inter College"\n\nKeep it concise — under 150 words.`;
    const res = await askAI(prompt, 400);
    setResult(res);setLoading(false);
  };

    const res = await askAI(prompt, 1000);
    setResult(res);setLoading(false);

    {id:"insights",label:"Class Insights",icon:"📊"},
    {id:"studyplan",label:"Study Plan",icon:"📚"},
    {id:"comments",label:"Report Comments",icon:"✍️"},
    {id:"parentmsg",label:"Parent Message",icon:"💬"},
    {id:"qpaper",label:"Question Paper",icon:"📝"},
  ];

  return(

        <div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Powered by Claude AI</div>
          <div style={{fontSize:22,fontWeight:800,marginTop:4}}>🤖 AI Assistant</div>

        <div style={{fontSize:48,opacity:0.3}}>✨</div>

      {/* AI Feature Tabs */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {aiTabs.map(t=>(

      {/* Controls */}

              <div><Lbl c="Subject"/><Sel value={subj} onChange={setSubj} options={SCHOOL.subjects[cls]||[]}/></div>

// ── STUDENT PORTAL ──
function StudentPortal({user,testsDB,studentsDB}){
  const{cls,section,roll}=user;
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.section===section&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[String(roll)]??0),t.total),date:t.testDate}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    return{subj,sc,avg,trend};
  }),[cls,section,roll,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  const sData=studentsDB.data[studentId(cls,section,roll)];
  if(testsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{background:"linear-gradient(135deg,#1a2e6c,#1d4ed8)",borderRadius:16,padding:"28px",color:"#fff"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Student Portal</div>
        <div style={{fontSize:24,fontWeight:800,marginTop:4}}>{sData?.name||`Roll No. ${roll}`}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:6}}>{cls} Section {section} · Roll Number {roll}</div>
        {overall!==null&&(
          <div style={{marginTop:16,display:"inline-flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"10px 18px"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:1}}>Overall Average</div>
            <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:gradeOf(overall).c}}>{overall}%</div>
            <div style={{fontSize:18,fontWeight:700}}>{gradeOf(overall).l}</div>
          </div>
        )}
      </div>
      {sd.filter(s=>s.sc.length>0).length===0?(
        <Empty icon="📋" title="No test results yet" sub="Your results will appear here once your teacher enters marks."/>
      ):(
        <>
          {overall!==null&&(
            <div className="grid3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
              <StatCard label="Overall Average" val={overall+"%"} icon="📊" color={gradeOf(overall).c} sub={gradeOf(overall).l+" Grade"}/>
              <StatCard label="Best Subject" val={[...sd].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.subj.split(" ")[0]||"—"} icon="⭐" color="#d97706" sub={[...sd].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.avg+"%"}/>
              <StatCard label="Needs Work" val={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.subj.split(" ")[0]||"—"} icon="📌" color="#dc2626" sub={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.avg+"%"}/>
            </div>
          )}
          <Card>
            <div style={{padding:"14px 20px",borderBottom:"1.5px solid #e2e8f0",background:"#f8fafc"}}><div style={{fontWeight:700,fontSize:14,color:"#1a2e6c"}}>My Subject-wise Results</div></div>
            {sd.map((s,i)=>(
              <div key={s.subj} style={{padding:"16px 20px",borderBottom:i<sd.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:s.avg!==null?10:0,flexWrap:"wrap",gap:8}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{s.subj}</div>
                  <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                    {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8"}}>W{sc.week}</div><div style={{fontSize:13,fontWeight:700,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
                    {s.avg!==null?<GBadge p={s.avg}/>:<span style={{fontSize:12,color:"#cbd5e1"}}>No results yet</span>}
                    {s.trend!==null&&<span style={{fontSize:12,fontWeight:700,color:s.trend>0?"#16a34a":s.trend<-5?"#dc2626":"#64748b"}}>{s.trend>0?`↑+${s.trend}%`:s.trend<-5?`↓${s.trend}%`:"→"}</span>}
                  </div>
                </div>
                {s.avg!==null&&<Bar p={s.avg}/>}
              </div>
            ))}
          </Card>
        </>
      )}
    </div>
  );
}


// ── STUDENT ACCOUNT ──
function StudentAccount({user,studentsDB,onUpdate}){
  const{cls,section,roll}=user;
  const sid=studentId(cls,section,roll);
  const[name,setName]=useState(user.name||"");
  const[newPin,setNewPin]=useState("");const[confirmPin,setConfirmPin]=useState("");const[currentPin,setCurrentPin]=useState("");
  const[err,setErr]=useState("");const[saved,setSaved]=useState(false);
  const existing=studentsDB.data[sid];
  const nameAlreadySet=existing?.nameSet;
  const handleSave=async()=>{
    setErr("");
    if(!currentPin){setErr("Enter your current PIN.");return;}
    if(currentPin!==existing?.pin){setErr("Current PIN is incorrect.");return;}
    if(newPin&&newPin.length<4){setErr("PIN must be at least 4 digits.");return;}
    if(newPin&&newPin!==confirmPin){setErr("PINs do not match.");return;}
    if(!nameAlreadySet&&!name.trim()){setErr("Please enter your name.");return;}
    const updated={...existing,pin:newPin||existing.pin,name:nameAlreadySet?existing.name:name.trim(),nameSet:true};
    await studentsDB.set(sid,updated);
    onUpdate({...user,name:updated.name});
    setSaved(true);setNewPin("");setConfirmPin("");setCurrentPin("");
    setTimeout(()=>setSaved(false),3000);
  };
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:24}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:4}}>👤 My Account</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>{nameAlreadySet?"Change your PIN below.":"Set your name — you can only set this once."}</div>
        <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:"12px 16px",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{cls} Section {section} · Roll No. {roll}</div>
          {nameAlreadySet&&<div style={{fontSize:13,color:"#64748b",marginTop:2}}>Name: {existing?.name}</div>}
        </div>
        {!nameAlreadySet&&<Inp label="Your Full Name (set once, cannot change later)" value={name} onChange={setName} placeholder="Enter your full name"/>}
        <Inp label="New PIN (leave blank to keep current)" value={newPin} onChange={setNewPin} type="password" placeholder="Min 4 digits"/>
        <Inp label="Confirm New PIN" value={confirmPin} onChange={setConfirmPin} type="password" placeholder="Re-enter PIN"/>
        <div style={{borderTop:"1.5px solid #f1f5f9",paddingTop:16,marginTop:4}}>
          <Inp label="Current PIN (required to save)" value={currentPin} onChange={setCurrentPin} type="password" placeholder="Your current PIN"/>
        </div>
        {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
        {saved&&<div style={{fontSize:12,color:"#16a34a",background:"#dcfce7",borderRadius:8,padding:"8px 12px",marginBottom:12}}>✓ Saved!</div>}
        <Btn onClick={handleSave} style={{width:"100%",padding:12}}>Save Changes</Btn>
      </Card>
    </div>
  );
}


// ── ROOT APP ──

    {id:"parent",label:"My Child",icon:"👨‍👩‍👦"},
    {id:"account",label:"Account",icon:"🔐"},

    {id:"students",label:"Students",icon:"👨‍🎓"},

    {id:"attendance",label:"Attendance",icon:"✅"},
    {id:"enter",label:"Enter Marks",icon:"✏️"},

    {id:"student",label:"Report",icon:"👤"},

    {id:"ai",label:"AI",icon:"🤖"},
    {id:"account",label:"Account",icon:"🔐"},

      {/* Header */}
      <div style={{background:"#1a2e6c",color:"#fff",padding:"0 20px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"3px solid #2563eb",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO} alt="logo" style={{width:34,height:34,objectFit:"contain"}}/>
          <div>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:-0.3}}>Stepping Stone Inter College</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.45)",letterSpacing:1}}>Weekly Test Tracker</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}} className="hide-mobile">
            <div style={{fontSize:12,fontWeight:600}}>{user.name}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.45)",textTransform:"capitalize"}}>{user.role}</div>
          </div>
          <button onClick={()=>{setUser(null);setTab("dashboard");}} style={{background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>Sign Out</button>
        </div>
      </div>
      {/* Tabs */}
      <div style={{background:"#fff",borderBottom:"1.5px solid #e2e8f0",display:"flex",padding:"0 20px",position:"sticky",top:56,zIndex:99,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 14px",border:"none",background:"none",fontSize:12,fontWeight:600,color:tab===t.id?"#1a2e6c":"#64748b",borderBottom:tab===t.id?"2.5px solid #1a2e6c":"2.5px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all .15s",whiteSpace:"nowrap"}}>
            <span>{t.icon}</span><span className="tab-label">{t.label}</span>
          </button>
        ))}
      </div>
      {/* Content */}
      <div style={{maxWidth:1060,margin:"24px auto",padding:"0 16px 0"}}>
        {tab==="dashboard"&&isStaff&&<Dashboard user={user} testsDB={testsDB} studentsDB={studentsDB} attendanceDB={attendanceDB} setTab={setTab}/>}
        {tab==="students"&&isStaff&&<ManageStudents studentsDB={studentsDB}/>}
        {tab==="topics"&&isStaff&&<ManageTopics topicsDB={topicsDB}/>}
        {tab==="attendance"&&isStaff&&<Attendance user={user} attendanceDB={attendanceDB} studentsDB={studentsDB}/>}
        {tab==="enter"&&isStaff&&<EnterMarks user={user} testsDB={testsDB} topicsDB={topicsDB} studentsDB={studentsDB}/>}
        {tab==="class"&&isStaff&&<ClassProgress user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="student"&&isStaff&&<StudentReport user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="admin"&&isAdmin&&<AdminPanel testsDB={testsDB} studentsDB={studentsDB} usersDB={usersDB}/>}
        {tab==="parent"&&isParent&&<ParentView user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="account"&&isStaff&&<AccountSettings user={user} usersDB={usersDB} onUpdate={handleUpdateUser}/>}
        {tab==="ai"&&isStaff&&<AIPanel testsDB={testsDB} studentsDB={studentsDB} topicsDB={topicsDB}/>}
        {tab==="myresults"&&isStudent&&<StudentPortal user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="myaccount"&&isStudent&&<StudentAccount user={user} studentsDB={studentsDB} onUpdate={handleUpdateUser}/>}

      <div style={{borderTop:"1px solid #e2e8f0",marginTop:40,padding:"18px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexWrap:"wrap",gap:12}}>

            <div style={{fontSize:10,color:"#cbd5e1",marginTop:1}}>Weekly Test Tracker</div>

        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"#94a3b8"}}>Designed & Built by</div>

          <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5}}>Director, Stepping Stone</div>
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
