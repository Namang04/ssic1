{subj:"hist",s:"A",t:"mcq",c:"The Making of a Global World",d:"e",m:1,q:`Corn Laws were abolished in Britain (1846) to:`,o:["A) Promote corn exports","B) Allow cheap food imports to feed industrial workers","C) Protect farmers","D) Fund railways"],r:"B",a:`Abolition allowed cheap imported grain to <b>feed the growing industrial workforce</b>.`},
{subj:"hist",s:"A",t:"mcq",c:"The Making of a Global World",d:"m",m:1,q:`The Great Depression began with:`,o:["A) World War I","B) Wall Street Crash (October 1929)","C) Collapse of British pound","D) US drought"],r:"B",a:`<b>Wall Street Crash, October 1929</b>. US stock markets collapsed, banks failed, unemployment soared.`},
{subj:"hist",s:"A",t:"mcq",c:"The Making of a Global World",d:"m",m:1,q:`Bretton Woods Conference (1944) created:`,o:["A) UN and NATO","B) IMF and World Bank","C) WTO and GATT","D) ILO and UNESCO"],r:"B",a:`<b>IMF</b> (manage exchange rates) and <b>World Bank</b> (finance post-war reconstruction).`},
{subj:"hist",s:"A",t:"ar",c:"The Making of a Global World",d:"m",m:1,q:`<b>Assertion:</b> European countries colonised Asia and Africa for raw materials and markets.<br><b>Reason:</b> Industrial production exceeded domestic demand ‚Äî colonies provided raw materials and markets.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains the economic logic of colonialism. Answer: <b>A</b>`},
{subj:"hist",s:"C",t:"sa",c:"The Making of a Global World",d:"m",m:3,q:`How did the Great Depression affect India?`,o:[],r:"",a:`(i) <b>Agricultural prices collapsed:</b> India exported jute, cotton, wheat ‚Äî prices fell sharply, devastating farmers.<br>(ii) <b>Revenue demands unchanged:</b> British didn't reduce revenue despite falling incomes. Rural distress fuelled Civil Disobedience Movement (1930).<br>(iii) <b>Trade declined:</b> Indian exports fell sharply; import duties on Indian goods in Britain increased.`},
{subj:"hist",s:"D",t:"la",c:"The Making of a Global World",d:"h",m:5,q:`Explain the pre-WWI global economy (1870‚Äì1914) and how WWI disrupted it.`,o:[],r:"",a:`<b>Pre-WWI economy:</b><br>(i) Trade: Britain at centre ‚Äî raw materials from colonies; manufactured goods back. Food from Americas/Australia fed European workers.<br>(ii) Capital: Britain invested ¬£4 billion overseas by 1914.<br>(iii) Labour migration: 50 million Europeans migrated to Americas/Australia (1820‚Äì1914). Indentured labour from India/China to Caribbean, Mauritius, Fiji.<br>(iv) Gold Standard: Currencies tied to gold ‚Äî exchange rate stability.<br><br><b>WWI disruption:</b> Trade routes disrupted; production shifted to war; Britain borrowed heavily from USA ‚Äî shifted from lender to debtor; colonies mobilised; Gold Standard broke down ‚Üí stage set for Great Depression.`},
{subj:"hist",s:"A",t:"mcq",c:"The Age of Industrialisation",d:"e",m:1,q:`First textile mills in India were set up in:`,o:["A) Calcutta (1850s)","B) Bombay (1850s)","C) Madras (1860s)","D) Ahmedabad (1860s)"],r:"B",a:`First cotton textile mills: <b>Bombay, 1850s</b>, by Parsi and Marwari merchants.`},
{subj:"hist",s:"A",t:"mcq",c:"The Age of Industrialisation",d:"m",m:1,q:`The Spinning Jenny (Hargreaves, 1764) was significant because:`,o:["A) Wove cloth automatically","B) Allowed one spindle to spin multiple threads simultaneously","C) Used steam power","D) Wove silk"],r:"B",a:`Spinning Jenny allowed a single worker to spin <b>multiple threads simultaneously</b> ‚Äî dramatically increasing productivity.`},
{subj:"hist",s:"A",t:"mcq",c:"The Age of Industrialisation",d:"m",m:1,q:`Indian textile industry faced British competition because:`,o:["A) Indian weavers lacked skill","B) Manchester cloth was cheaper (machine-made, no import duty)","C) Indians preferred foreign cloth","D) British cloth was better quality"],r:"B",a:`British cloth: machine-made (cheaper) + entered India <b>duty-free</b> after colonial government removed import duties.`},
{subj:"hist",s:"A",t:"ar",c:"The Age of Industrialisation",d:"m",m:1,q:`<b>Assertion:</b> Much of early 19th century Britain's output was made in homes and small workshops, not factories.<br><b>Reason:</b> Industrialisation did not immediately destroy traditional crafts ‚Äî many expanded alongside factories.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Handlooms, tailors, shoemakers actually increased in numbers as cities grew. Answer: <b>A</b>`},
{subj:"hist",s:"C",t:"sa",c:"The Age of Industrialisation",d:"m",m:3,q:`Effects of industrialisation on Indian weavers and artisans?`,o:[],r:"",a:`(i) <b>Decline of exports:</b> India exported fine cottons (Dacca muslin) worldwide ‚Äî British machine cloth drove Indian exports out of all markets.<br>(ii) <b>Indian market flooded:</b> Cheap British cloth flooded India ‚Äî thousands of weavers in Bengal, Madras, Surat lost livelihoods.<br>(iii) <b>Adaptation:</b> Some survived using cheaper Chinese silk, new designs, goods for railways. Others became agricultural labourers.`},
{subj:"hist",s:"D",t:"la",c:"The Age of Industrialisation",d:"h",m:5,q:`Conditions of workers in early industrial Britain. Why did workers resist new technology?`,o:[],r:"",a:`<b>Conditions:</b> 14‚Äì16 hour days, very low wages; dangerous factories; child labour; seasonal unemployment; overcrowded slums with disease (cholera, typhus); trade unions illegal until 1824.<br><br><b>Why workers resisted technology:</b><br>(i) Machines replaced skilled workers ‚Äî Luddites (1811‚Äì16) smashed machinery destroying craft livelihoods.<br>(ii) Feared machines would drive down wages and create unemployment.<br>(iii) Craftsmen had spent years mastering trades ‚Äî machines made their skills worthless overnight.`},
{subj:"hist",s:"A",t:"mcq",c:"Print Culture and the Modern World",d:"e",m:1,q:`The printing press was developed by:`,o:["A) Johannes Gutenberg (1440s)","B) William Caxton (1476)","C) Martin Luther (1517)","D) James Watt"],r:"A",a:`<b>Johannes Gutenberg</b>, 1440s, Mainz, Germany ‚Äî first mechanical printing press with movable type.`},
{subj:"hist",s:"A",t:"mcq",c:"Print Culture and the Modern World",d:"m",m:1,q:`First printing press in India was set up by:`,o:["A) British East India Company","B) Portuguese missionaries in Goa (1556)","C) Mughal Emperor Akbar","D) Indian reformers in Calcutta"],r:"B",a:`<b>Portuguese missionaries in Goa, 1556</b> ‚Äî for printing religious texts.`},
{subj:"hist",s:"A",t:"mcq",c:"Print Culture and the Modern World",d:"m",m:1,q:`Which Indian reformers used print to spread ideas?`,o:["A) Ram Mohan Roy","B) Bankim Chandra Chattopadhyay","C) Bal Gangadhar Tilak","D) All of the above"],r:"D",a:`All three used print: Roy for debates, Bankim for nationalist novels, Tilak's Kesari newspaper for nationalist ideas.`},
{subj:"hist",s:"A",t:"ar",c:"Print Culture and the Modern World",d:"m",m:1,q:`<b>Assertion:</b> The Protestant Reformation was greatly aided by the printing press.<br><b>Reason:</b> Luther's 95 Theses were printed and distributed widely, spreading ideas faster than the Church could suppress.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. 95 Theses reached all of Germany within 2 weeks via print. Answer: <b>A</b>`},
{subj:"hist",s:"C",t:"sa",c:"Print Culture and the Modern World",d:"m",m:3,q:`How did print culture contribute to nationalism in India?`,o:[],r:"",a:`(i) <b>Spread of ideas:</b> Newspapers like Kesari, Amrita Bazar Patrika spread nationalist ideas, reported British atrocities, connected Indians across regions.<br>(ii) <b>Vernacular literature:</b> Novels in Bengali, Hindi, Tamil created shared cultural identity ‚Äî a "reading public" transcending local boundaries.<br>(iii) <b>Reform movements:</b> Print spread ideas of Ram Mohan Roy, Periyar ‚Äî challenging caste and colonial authority.`},
{subj:"hist",s:"D",t:"la",c:"Print Culture and the Modern World",d:"h",m:5,q:`How did the printing press transform European society (15th‚Äì17th centuries)?`,o:[],r:"",a:`<b>Religious impact:</b> Luther's 95 Theses (1517) spread across Europe in 2 months; Bible translated into vernaculars ‚Äî people read without priests, undermining Church authority; Protestant Reformation.<br><br><b>Literacy:</b> Cheaper books ‚Üí rising literacy; vernacular printing made reading accessible to ordinary people; a "reading public" emerged.<br><br><b>Ideas (Enlightenment):</b> Philosophers (Voltaire, Rousseau) spread ideas through cheap pamphlets; French Revolution preceded by flood of printed political literature; print created "imagined communities" (Benedict Anderson) ‚Äî people connected through shared reading.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"e",m:1,q:`Non-renewable resources are those which:`,o:["A) Can be replenished quickly","B) Cannot be replenished at the rate they are consumed","C) Are only biotic","D) Belong to individuals"],r:"B",a:`<b>Non-renewable resources</b> (coal, petroleum, minerals) take millions of years to form ‚Äî cannot be replenished at the rate consumed.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"e",m:1,q:`Black soil (Regur) is most suitable for:`,o:["A) Rice and wheat","B) Cotton","C) Tea and coffee","D) Jute"],r:"B",a:`<b>Black soil</b> is ideal for <b>cotton</b> ‚Äî highly moisture retentive, found in Deccan Plateau (Maharashtra, MP, Gujarat).`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"m",m:1,q:`The most widespread and important soil of India is:`,o:["A) Black soil","B) Red and yellow soil","C) Alluvial soil","D) Laterite soil"],r:"C",a:`<b>Alluvial soil</b> ‚Äî covers entire Indo-Gangetic Plain, coastal plains, river deltas. Extremely fertile. Supports most of India's food grain production.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"m",m:1,q:`Laterite soil is mainly found in:`,o:["A) Punjab-Haryana Plains","B) Kerala, Karnataka, eastern Ghats","C) Deccan Plateau","D) West Bengal"],r:"B",a:`<b>Laterite soil</b> ‚Üí <b>Kerala, Karnataka, eastern Ghats</b>. Forms in high temperature, heavy rainfall through leaching. Used for cashew, tea, coffee.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"m",m:1,q:`Agenda 21 was signed at:`,o:["A) Johannesburg 2002","B) Rio de Janeiro Earth Summit 1992","C) Kyoto 1997","D) Paris 2015"],r:"B",a:`<b>Agenda 21</b> was signed at the <b>Rio de Janeiro Earth Summit, June 1992</b> ‚Äî aimed at achieving global sustainable development.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"h",m:1,q:`Which is NOT a cause of land degradation in India?`,o:["A) Deforestation","B) Overgrazing","C) Afforestation","D) Mining and quarrying"],r:"C",a:`<b>Afforestation</b> (planting trees) PREVENTS land degradation. Deforestation, overgrazing, and mining all cause degradation.`},
{subj:"geo",s:"A",t:"ar",c:"Resources and Development",d:"m",m:1,q:`<b>Assertion:</b> Soil erosion is serious in Chambal ravines and Shiwalik hills.<br><b>Reason:</b> Deforestation, overgrazing, and poor land management expose soil to wind and water erosion.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Deforestation removes protective cover ‚Äî R explains the cause. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Resources and Development",d:"m",m:3,q:`What is resource conservation? Explain the need with three points.`,o:[],r:"",a:`<b>Resource conservation</b> = using resources carefully to ensure availability for future generations.<br>(i) <b>Finite nature:</b> Non-renewable resources cannot be replaced once exhausted.<br>(ii) <b>Environmental degradation:</b> Over-exploitation causes erosion, deforestation, water depletion ‚Äî degrading quality for future use.<br>(iii) <b>Equitable distribution:</b> Without conservation, rich nations consume far more, depriving poorer populations.`},
{subj:"geo",s:"D",t:"la",c:"Resources and Development",d:"h",m:5,q:`(a) Types of soils in India. (b) Causes and conservation measures for soil erosion.`,o:[],r:"",a:`<b>(a) Soil types:</b><br>1. <b>Alluvial:</b> Indo-Gangetic plain; extremely fertile; Khadar (new) and Bhangar (old); rich in potash, lime.<br>2. <b>Black (Regur):</b> Deccan plateau; ideal for cotton; moisture-retentive; self-ploughing.<br>3. <b>Red and Yellow:</b> Eastern/southern Deccan, Odisha; poor in nitrogen, humus.<br>4. <b>Laterite:</b> Karnataka, Kerala, eastern Ghats; formed by intense leaching; cashew, tea, coffee.<br>5. <b>Arid:</b> Western Rajasthan; sandy, poor humus.<br>6. <b>Forest:</b> Mountain regions; loamy in valleys, coarse on upper slopes.<br><br><b>(b) Causes of erosion:</b> Deforestation; overgrazing; wind (arid areas); water runoff (gully erosion ‚Äî Chambal).<br><b>Conservation:</b> Afforestation; shelter belts; strip cropping; terrace farming on slopes; bunding and check dams.`},
{subj:"geo",s:"B",t:"sb",c:"Resources and Development",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Agenda 21</b><br><br><i>"Agenda 21 aims at achieving global sustainable development through global co-operation on common interests, mutual needs and shared responsibilities."</i><br><br>(i) Main aim of Agenda 21? [1]<br>(ii) What is sustainable development? [1]<br>(iii) How can India achieve these goals while meeting development needs? [2]</div>`,o:[],r:"",a:`(i) <b>Global sustainable development</b> ‚Äî combating environmental damage, poverty, disease through global cooperation.<br>(ii) Meeting present needs without compromising future generations' ability to meet their own needs.<br>(iii) India can: (1) Use renewable energy (solar, wind) for new power. (2) Resource-efficient technologies in agriculture and industry. (3) Enforce environmental laws while allowing responsible industrialisation.`},
{subj:"geo",s:"A",t:"mcq",c:"Forest and Wildlife Resources",d:"e",m:1,q:`Which is a biodiversity hotspot in India?`,o:["A) Thar Desert","B) Western Ghats","C) Gangetic Plains","D) Deccan Plateau"],r:"B",a:`<b>Western Ghats</b> ‚Äî one of world's biodiversity hotspots with high levels of endemic species.`},
{subj:"geo",s:"A",t:"mcq",c:"Forest and Wildlife Resources",d:"m",m:1,q:`Chipko Movement started in:`,o:["A) Rajasthan","B) Kerala","C) Uttarakhand (Chamoli district)","D) Maharashtra"],r:"C",a:`<b>Chipko Movement: 1973, Chamoli, Uttarakhand</b>. Villagers (especially women) hugged trees to prevent felling.`},
{subj:"geo",s:"A",t:"mcq",c:"Forest and Wildlife Resources",d:"m",m:1,q:`Reserved forests are:`,o:["A) All activities permitted","B) Most strictly protected ‚Äî no rights to local people","C) Under community management","D) For commercial timber"],r:"B",a:`<b>Reserved forests</b> ‚Äî most strictly protected (half of forest area). No rights for local people. Grazing, hunting, timber all prohibited.`},
{subj:"geo",s:"A",t:"ar",c:"Forest and Wildlife Resources",d:"m",m:1,q:`<b>Assertion:</b> Community conservation is often more effective than government protection alone.<br><b>Reason:</b> Local communities have traditional knowledge and direct stake in protecting resources.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Bishnoi community, Chipko, joint forest management prove this. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Forest and Wildlife Resources",d:"m",m:3,q:`Major threats to forests and wildlife in India?`,o:[],r:"",a:`(i) <b>Deforestation:</b> Clearing for agriculture, industry, dams, urbanisation. River valley projects submerge large forest areas.<br>(ii) <b>Overexploitation:</b> Commercial timber, mining, fuelwood collection, overgrazing degrade forests and destroy wildlife habitat.<br>(iii) <b>Poaching and habitat fragmentation:</b> Roads and settlements break wildlife corridors. Poaching for ivory, tiger skins, rhino horns continues despite protection.`},
{subj:"geo",s:"A",t:"mcq",c:"Water Resources",d:"e",m:1,q:`Freshwater is approximately what percentage of Earth's total water?`,o:["A) 97%","B) 71%","C) 2.5%","D) 10%"],r:"C",a:`Only <b>2.5%</b> of Earth's water is freshwater. Most is locked in glaciers ‚Äî only 0.3% available as surface freshwater.`},
{subj:"geo",s:"A",t:"mcq",c:"Water Resources",d:"e",m:1,q:`The Salal Hydroelectric Project is on:`,o:["A) Ganga","B) Chenab","C) Sutlej","D) Yamuna"],r:"B",a:`<b>Salal Project</b> is on the <b>Chenab river</b>, Jammu & Kashmir.`},
{subj:"geo",s:"A",t:"mcq",c:"Water Resources",d:"m",m:1,q:`Rainwater harvesting is important because:`,o:["A) India has excess rainfall all year","B) India has seasonal and regional variation in rainfall ‚Äî harvesting conserves monsoon water","C) It is constitutionally mandated","D) Rivers are polluted"],r:"B",a:`India receives most rainfall in 3‚Äì4 monsoon months. <b>Rainwater harvesting</b> conserves this water for dry months.`},
{subj:"geo",s:"A",t:"ar",c:"Water Resources",d:"m",m:1,q:`<b>Assertion:</b> Large dams in India have faced opposition from local communities.<br><b>Reason:</b> Large dams cause displacement, submergence of land and forests, and disruption of ecosystems.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Narmada Bachao Andolan opposed Sardar Sarovar for exactly these reasons. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Water Resources",d:"m",m:3,q:`Why is conservation of water resources necessary in India?`,o:[],r:"",a:`(i) <b>Growing demand:</b> Increasing population, agriculture, and industry create huge demand exceeding natural replenishment.<br>(ii) <b>Groundwater over-exploitation:</b> In Punjab, Haryana, Rajasthan, water tables falling 1‚Äì3m per year ‚Äî threatening agriculture and drinking water.<br>(iii) <b>Pollution:</b> Industrial effluents, sewage, agricultural chemicals pollute rivers and groundwater ‚Äî reducing usable water.`},
{subj:"geo",s:"D",t:"la",c:"Water Resources",d:"h",m:5,q:`(a) Multipurpose river valley projects ‚Äî advantages and disadvantages. (b) Water scarcity and solutions.`,o:[],r:"",a:`<b>(a) Multipurpose projects</b> (Bhakra Nangal, Hirakud, Nagarjunasagar, Sardar Sarovar):<br>Advantages: Irrigation; hydropower; flood control; drinking water; employment.<br>Disadvantages: Displacement (Sardar Sarovar displaced 200,000+); submergence of fertile land/forests; disruption of aquatic ecosystems; sedimentation; interstate water conflicts (Cauvery, Krishna).<br><br><b>(b) Water scarcity:</b> Demand exceeds supply ‚Äî over-extraction, pollution, population growth.<br>Solutions: Rainwater harvesting (johads, baolis, rooftop); efficient irrigation (drip/sprinkler); wastewater recycling; groundwater recharge; public awareness.`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"e",m:1,q:`India is the largest producer and consumer of:`,o:["A) Rice","B) Wheat","C) Sugarcane","D) Pulses"],r:"D",a:`India is world's <b>largest producer and consumer of pulses</b>.`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"e",m:1,q:`Jute is mainly grown in:`,o:["A) Punjab","B) West Bengal and Bihar","C) Rajasthan","D) Andhra Pradesh"],r:"B",a:`<b>Jute</b>: mainly <b>West Bengal, Bihar, Assam</b> ‚Äî high temperature, heavy rainfall, humid climate.`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"m",m:1,q:`The Green Revolution primarily involved:`,o:["A) Growing green vegetables","B) HYV seeds, irrigation, fertilisers increasing wheat/rice production","C) Organic farming","D) Tea and coffee expansion"],r:"B",a:`<b>Green Revolution (1960s‚Äì70s):</b> HYV seeds, chemical fertilisers, pesticides, assured irrigation dramatically increased wheat and rice production.`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"m",m:1,q:`Jute is known as the "Golden Fibre" because:`,o:["A) It is golden in colour and has high economic value","B) It is used to make gold jewellery","C) India exports it for gold","D) It grows in golden soil"],r:"A",a:`<b>Jute = "Golden Fibre"</b> ‚Äî golden shiny colour and high economic value. India is the world's largest jute producer.`},
{subj:"geo",s:"A",t:"ar",c:"Agriculture",d:"m",m:1,q:`<b>Assertion:</b> India is moving towards commercialisation of agriculture.<br><b>Reason:</b> Farmers are increasingly growing cash crops for sale in markets rather than for subsistence.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R illustrates the shift from subsistence to commercial farming. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Agriculture",d:"m",m:3,q:`Importance of agriculture in the Indian economy?`,o:[],r:"",a:`(i) <b>Employment:</b> 55‚Äì60% of workforce employed in agriculture ‚Äî primary livelihood for rural India.<br>(ii) <b>GDP contribution:</b> ~18‚Äì20% of GDP (declining relative to services/industry).<br>(iii) <b>Food security:</b> India feeds 1.4 billion ‚Äî self-sufficient in food grains since Green Revolution (1970s).<br>(iv) <b>Raw material and exports:</b> Agro-based industries (textiles, jute, sugar, tea); export earnings from tea, rice, spices.`},
{subj:"geo",s:"D",t:"la",c:"Agriculture",d:"h",m:5,q:`Describe geographical conditions, production, and distribution of rice, wheat, and cotton in India.`,o:[],r:"",a:`<b>Rice:</b> Conditions: High temp (25¬∞C+), heavy rainfall/irrigation; alluvial soil. States: West Bengal, UP, Punjab, AP, Tamil Nadu.<br><b>Wheat:</b> Conditions: Cool moist during growth (10‚Äì15¬∞C), warm dry at harvest; level fertile land. States: UP, Punjab, Haryana, MP. Indo-Gangetic Plain = "granary of India."<br><b>Cotton:</b> Conditions: High temp, low humidity, bright sunshine, 6‚Äì8 frost-free months; black soil ideal. States: Maharashtra, Gujarat, Telangana, AP, Punjab. Called "White Gold" ‚Äî backbone of textile industry.`},
{subj:"geo",s:"A",t:"mcq",c:"Minerals and Energy Resources",d:"e",m:1,q:`India's largest producer of iron ore:`,o:["A) Jharkhand","B) Odisha","C) Chhattisgarh","D) Karnataka"],r:"B",a:`<b>Odisha</b> ‚Äî largest iron ore producer. Major mines: Badampahar, Kiriburu, Daitari.`},
{subj:"geo",s:"A",t:"mcq",c:"Minerals and Energy Resources",d:"e",m:1,q:`Most important energy source in India:`,o:["A) Nuclear","B) Coal","C) Solar","D) Hydroelectricity"],r:"B",a:`<b>Coal</b> ‚Äî ~55% of India's energy production. Major fields: Jharkhand, Odisha, MP, West Bengal.`},
{subj:"geo",s:"A",t:"mcq",c:"Minerals and Energy Resources",d:"m",m:1,q:`Gondwana coal fields account for approximately what % of India's coal reserves?`,o:["A) 50%","B) 75%","C) 98%","D) 60%"],r:"C",a:`<b>Gondwana coal fields = ~98%</b> of India's total coal reserves.`},
{subj:"geo",s:"A",t:"ar",c:"Minerals and Energy Resources",d:"m",m:1,q:`<b>Assertion:</b> India is developing nuclear energy as an alternative to fossil fuels.<br><b>Reason:</b> India has limited petroleum but significant thorium deposits.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. India has thorium-rich beach sands (Kerala). Nuclear plants: Tarapur, Rawatbhata, Kaiga, Kudankulam. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Minerals and Energy Resources",d:"m",m:3,q:`Why conserve minerals? Three measures.`,o:[],r:"",a:`<b>Need:</b> Minerals are non-renewable ‚Äî exhaustion possible within decades at current rates.<br>(i) <b>Recycling:</b> Metals (iron, aluminium, copper) can be recycled multiple times ‚Äî reduces mining need.<br>(ii) <b>Efficient use:</b> Reduce wastage; use substitutes (optical fibre instead of copper).<br>(iii) <b>Sustainable extraction:</b> Scientific mining; rehabilitate mined areas; avoid extracting low-grade ores wastefully.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"e",m:1,q:`"Manchester of India" is:`,o:["A) Mumbai","B) Ahmedabad","C) Surat","D) Coimbatore"],r:"B",a:`<b>Ahmedabad</b> ‚Äî large concentration of cotton textile mills.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"m",m:1,q:`Chhotanagpur Plateau is India's industrial heartland because:`,o:["A) Good climate","B) Concentration of coal, iron ore, manganese, mica","C) Cheap labour","D) Good port connectivity"],r:"B",a:`<b>Chhotanagpur Plateau</b> ‚Äî concentrated deposits of coal, iron ore, manganese, mica, bauxite ‚Äî key raw materials for heavy industry.`},
{subj:"geo",s:"A",t:"ar",c:"Manufacturing Industries",d:"m",m:1,q:`<b>Assertion:</b> Steel is the backbone of modern industrial development.<br><b>Reason:</b> Steel is used in construction, transport, machinery, defence ‚Äî essential for industrial growth.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains why steel is called backbone of industry. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Manufacturing Industries",d:"m",m:3,q:`Factors leading to decentralisation of cotton textile industry in India.`,o:[],r:"",a:`(i) <b>Power availability:</b> Electricity now available across India ‚Äî freed industries from coalfield locations.<br>(ii) <b>Raw material:</b> Cotton grown in Maharashtra, Gujarat, Punjab-Haryana ‚Äî mills moved closer to raw material.<br>(iii) <b>Labour:</b> Cheaper labour in smaller cities. Mumbai labour expensive with frequent disputes ‚Äî mills moved to Coimbatore, Tirupur, Surat.`},
{subj:"geo",s:"D",t:"la",c:"Manufacturing Industries",d:"h",m:5,q:`(a) Iron and steel industry ‚Äî importance, distribution, problems. (b) How can industries reduce pollution?`,o:[],r:"",a:`<b>(a) Iron and Steel:</b><br>Importance: "Backbone of modern industry" ‚Äî construction, railways, ships, machinery, defence.<br>Distribution: Chhotanagpur region. Plants: Jamshedpur (TISCO, 1907), Durgapur, Bhilai, Rourkela, Bokaro, Visakhapatnam.<br>Problems: High production cost; dependence on imported coking coal; low productivity; outdated technology; environmental regulations.<br><br><b>(b) Pollution reduction:</b> Effluent Treatment Plants; electrostatic precipitators; water recycling; renewable energy; proper solid waste disposal.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"e",m:1,q:`NH44, the longest highway in India, connects:`,o:["A) Mumbai to Kolkata","B) Srinagar to Kanyakumari","C) Delhi to Mumbai","D) Kolkata to Chennai"],r:"B",a:`<b>NH44: Srinagar to Kanyakumari</b> (~3,745 km) ‚Äî longest highway in India.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"m",m:1,q:`Busiest inland waterway in India:`,o:["A) NW-1 (Ganga ‚Äî Prayagraj to Haldia)","B) NW-2 (Brahmaputra)","C) NW-3 (Kerala coast)","D) All equally busy"],r:"A",a:`<b>NW-1</b> ‚Äî Ganga from Prayagraj to Haldia (1620 km) ‚Äî longest and busiest inland waterway.`},
{subj:"geo",s:"A",t:"ar",c:"Lifelines of National Economy",d:"m",m:1,q:`<b>Assertion:</b> Pipeline transport is becoming increasingly important.<br><b>Reason:</b> Pipelines transport petroleum, gas, slurry cheaply and continuously with minimal environmental impact.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. HBJ pipeline (gas), ONGC pipelines (petroleum) ‚Äî cheap, safe, low environmental impact. Answer: <b>A</b>`},
{subj:"geo",s:"C",t:"sa",c:"Lifelines of National Economy",d:"m",m:3,q:`Importance of road transport in India and major types of roads?`,o:[],r:"",a:`<b>Importance:</b> Door-to-door service; 85% passenger traffic and 70% freight by road; connects villages not served by rail/air.<br><b>Types:</b> (i) National Highways (NH) ‚Äî NHAI, connect major cities; NH44 longest. (ii) State Highways (SH) ‚Äî State PWD, capitals to district HQs. (iii) District Roads ‚Äî districts to talukas. (iv) Village Roads (PMGSY) ‚Äî connect rural areas.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"e",m:1,q:`The key example of successful power sharing in the textbook is:`,o:["A) India","B) Sri Lanka","C) Belgium","D) USA"],r:"C",a:`<b>Belgium</b> ‚Äî devised creative power-sharing model despite Dutch/French linguistic tensions, avoiding civil war.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"e",m:1,q:`Horizontal division of power refers to:`,o:["A) Power between Centre and states","B) Power among different organs at same level (legislature, executive, judiciary)","C) Federal division","D) Community power sharing"],r:"B",a:`<b>Horizontal:</b> Legislature makes laws, Executive implements, Judiciary adjudicates ‚Äî each checks the others.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"m",m:1,q:`Majoritarianism in Sri Lanka refers to:`,o:["A) Rule by Tamils","B) Policy giving preference to Sinhala majority in language, government jobs, education","C) Equal rights for all communities","D) Federal autonomy for Tamils"],r:"B",a:`Sinhala as sole official language (1956), preference for Sinhalese in government jobs ‚Äî alienated Tamils ‚Üí civil war.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"m",m:1,q:`Reserved constituencies for SC/ST in Parliament is an example of:`,o:["A) Three-tier government","B) Power sharing among social groups","C) Supreme Court checking Parliament","D) States having own police"],r:"B",a:`<b>Power sharing among social groups</b> ‚Äî giving historically marginalised communities guaranteed representation.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"m",m:1,q:`Belgium's Cabinet must have:`,o:["A) More Dutch-speaking ministers","B) More French-speaking ministers","C) Equal numbers of Dutch and French-speaking ministers","D) Only French-speaking ministers"],r:"C",a:`Belgian Cabinet must have <b>equal numbers of Dutch and French-speaking ministers</b> regardless of population proportion.`},
{subj:"civ",s:"A",t:"ar",c:"Power Sharing",d:"m",m:1,q:`<b>Assertion:</b> Power sharing is the very spirit of democracy.<br><b>Reason:</b> Democracy involves sharing power with those who are affected by its exercise.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Power sharing fundamental to democracy ‚Äî R explains the democratic principle. Answer: <b>A</b>`},
{subj:"civ",s:"C",t:"sa",c:"Power Sharing",d:"m",m:3,q:`Describe the Belgian model of power sharing.`,o:[],r:"",a:`Belgium (Dutch-speaking 59%, French-speaking 40%, German-speaking 1%):<br>(i) <b>Equal cabinet representation:</b> Equal Dutch and French ministers regardless of population proportion.<br>(ii) <b>State governments:</b> Many powers given to Flemish and Walloon regional governments.<br>(iii) <b>Community government:</b> Separate elected government for each linguistic community ‚Äî cultural, educational, language matters.<br>(iv) <b>Brussels:</b> Equal representation for both groups in the capital.<br><b>Success:</b> Belgium remained united; became leader in European integration.`},
{subj:"civ",s:"D",t:"la",c:"Power Sharing",d:"h",m:5,q:`Explain the different forms of power sharing in modern democracies with examples.`,o:[],r:"",a:`<b>1. Horizontal (among organs at same level):</b> Legislature (makes laws), Executive (implements), Judiciary (adjudicates) ‚Äî each checks the others. Example: Supreme Court of India can strike down Parliament's laws.<br><br><b>2. Vertical / Federal (among levels of government):</b> Power between national and state/local governments. Example: India ‚Äî Union, State, Local bodies have specific constitutionally defined powers.<br><br><b>3. Among social groups:</b> Representation for different communities. Example: Reserved constituencies for SC/ST in India; community governments in Belgium.<br><br><b>4. Among political parties, pressure groups:</b> No permanent monopoly ‚Äî parties compete, coalitions share power, pressure groups influence policy.`},
{subj:"civ",s:"B",t:"sb",c:"Power Sharing",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Belgium's Arrangement</b><br><br><i>"Belgium worked out an arrangement under which equal numbers of ministers were to be from Dutch and French speaking communities. No single community can make decisions unilaterally. Many powers have been given to state governments of the two regions. Brussels has a separate government in which both communities have equal representation."</i><br><br>(i) What problem was Belgium solving? [1]<br>(ii) Name the type of power sharing shown. [1]<br>(iii) How does this contrast with Sri Lanka's approach? [2]</div>`,o:[],r:"",a:`(i) Belgium was solving <b>linguistic and regional tension</b> between Dutch-speaking Flemish majority and French-speaking Walloon minority.<br>(ii) <b>Power sharing among social/community groups</b> AND vertical power sharing (devolution to regions).<br>(iii) Belgium sacrificed strict majoritarianism ‚Äî gave minority equal cabinet representation. <b>Sri Lanka</b> adopted majoritarianism (Sinhala-only language, job preference for Sinhalese) ‚Üí alienated Tamils ‚Üí 30-year civil war (1983‚Äì2009).`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"e",m:1,q:`Which is NOT a feature of a federal system?`,o:["A) Two or more levels of government","B) Each level has its own jurisdiction","C) Central government can override all state decisions","D) Courts interpret the constitution"],r:"C",a:`Central government <b>cannot override states on all matters</b> in a federation ‚Äî each level has constitutionally defined authority.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"e",m:1,q:`The Union List in India contains subjects on which:`,o:["A) Only states legislate","B) Both Centre and States legislate","C) Only Parliament legislates","D) Left to state discretion"],r:"C",a:`<b>Union List</b> ‚Äî defence, foreign affairs, banking, communications ‚Äî <b>only Parliament</b> can make laws.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"m",m:1,q:`"Holding together" federalism describes:`,o:["A) Small countries dividing to form a federation","B) A large country dividing power to accommodate diversity","C) Independent states voluntarily forming a federation","D) States with equal representation in legislature"],r:"B",a:`<b>"Holding together":</b> Large country divides power ‚Äî India, Spain, Belgium. <b>"Coming together":</b> Independent states unite ‚Äî USA, Australia.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"m",m:1,q:`73rd and 74th Amendments (1992) established:`,o:["A) Fundamental Rights","B) Emergency provisions","C) Panchayati Raj ‚Äî third tier of government","D) Reservation for SC/ST"],r:"C",a:`<b>73rd Amendment</b> (Panchayats) and <b>74th Amendment</b> (Municipalities) 1992 ‚Äî constitutionally established the third tier of government.`},
{subj:"civ",s:"A",t:"ar",c:"Federalism",d:"m",m:1,q:`<b>Assertion:</b> India is described as a "Union of States" not a "Federation of States."<br><b>Reason:</b> Indian federation was created by the Constitution ‚Äî states have no right to secede.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. India's federation was created top-down by Constitution, not bottom-up. States cannot secede. Answer: <b>A</b>`},
{subj:"civ",s:"C",t:"sa",c:"Federalism",d:"m",m:3,q:`How has decentralisation strengthened democracy in India?`,o:[],r:"",a:`(i) <b>Grassroots participation:</b> 3 million elected representatives at local level ‚Äî more people participate in governance than ever before.<br>(ii) <b>Reservation for marginalised:</b> 1/3 seats reserved for women; seats for SC/ST ‚Äî previously excluded groups now guaranteed representation.<br>(iii) <b>Local accountability:</b> Local bodies handle roads, water, schools, sanitation ‚Äî people can directly hold local representatives accountable.`},
{subj:"civ",s:"D",t:"la",c:"Federalism",d:"h",m:5,q:`Key features of federalism in India and constitutional distribution of power.`,o:[],r:"",a:`<b>Key features:</b><br>(i) Constitutional provisions ‚Äî Supreme Court resolves ambiguity.<br>(ii) Three Lists: Union List (97 subjects ‚Äî Parliament only), State List (66 subjects ‚Äî State legislatures only), Concurrent List (47 subjects ‚Äî both; Central law prevails in conflict).<br>(iii) Residuary powers with Parliament.<br>(iv) Linguistic states ‚Äî reorganised 1956.<br>(v) Language policy ‚Äî Hindi official; 22 scheduled languages protected.<br>(vi) Centre-state relations more centralised than USA ‚Äî Governors appointed by Centre; President's Rule possible.<br><b>Assessment:</b> Asymmetric federalism designed for extraordinary diversity.`},
{subj:"civ",s:"A",t:"mcq",c:"Gender, Religion and Caste",d:"e",m:1,q:`Sexual division of labour refers to:`,o:["A) Division of labour between countries","B) Social arrangement where most domestic work is done by women","C) Division of factory workers by gender","D) Legal restrictions on women working"],r:"B",a:`<b>Sexual division of labour:</b> Social arrangement where most domestic work (cooking, cleaning, childcare) is done by women ‚Äî due to social norms, not biology.`},
{subj:"civ",s:"A",t:"mcq",c:"Gender, Religion and Caste",d:"e",m:1,q:`The feminist movement demands:`,o:["A) Women should rule the country","B) Equal political, social, and economic rights for women","C) Opposition to men","D) Traditional gender roles"],r:"B",a:`<b>Feminist movement:</b> Equal legal status, opportunities, and political rights for women ‚Äî equal pay, representation, freedom from discrimination.`},
{subj:"civ",s:"A",t:"mcq",c:"Gender, Religion and Caste",d:"m",m:1,q:`Communalism in politics means:`,o:["A) Community development programs","B) Using religious identity to mobilise politics, portraying other religions as enemies","C) Representing all religions in government","D) Secularism"],r:"B",a:`<b>Communalism:</b> Using religious identity for political mobilisation ‚Äî portraying other communities as enemies. Leads to discrimination, riots, undermines democracy.`},
{subj:"civ",s:"A",t:"ar",c:"Gender, Religion and Caste",d:"m",m:1,q:`<b>Assertion:</b> Caste has not disappeared from Indian politics.<br><b>Reason:</b> Voters often prefer candidates from their own caste; parties choose candidates based on voters' caste composition.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Caste-based voting and ticket distribution remain common. Answer: <b>A</b>`},
{subj:"civ",s:"C",t:"sa",c:"Gender, Religion and Caste",d:"m",m:3,q:`India's approach to secularism ‚Äî how does it differ from Western secularism?`,o:[],r:"",a:`(i) <b>No official religion:</b> Government doesn't discriminate on basis of religion ‚Äî agrees with Western secularism.<br>(ii) <b>Positive engagement:</b> Indian state can intervene in religion for equality ‚Äî banning untouchability, allowing Dalit entry to temples, reforming personal laws. Western secularism strictly separates state and religion.<br>(iii) <b>Minority protection:</b> Articles 29‚Äì30 protect minority cultural and educational rights. Western secularism often treats everyone equally without positive minority protection.`},
{subj:"civ",s:"D",t:"la",c:"Gender, Religion and Caste",d:"h",m:5,q:`Women's political representation in India ‚Äî current situation, obstacles, and changes needed.`,o:[],r:"",a:`<b>Current situation:</b> Women are 50% of population but only ~14‚Äì15% of Lok Sabha members (2024). Below world average (~27%).<br><b>Local success:</b> 73rd/74th Amendments ‚Äî 1/3 of Panchayat seats reserved. ~1 million women elected locally. Many states have 50% reservation.<br><br><b>Obstacles:</b><br>(i) Social norms ‚Äî women's "place" seen as home.<br>(ii) Financial constraints ‚Äî elections require money, women have less access.<br>(iii) Violence and intimidation in political campaigning.<br>(iv) Party biases ‚Äî reluctant to give tickets, consider women less electable.<br>(v) "Proxy" representation ‚Äî some elected women act as proxies for husbands.<br><br><b>Changes needed:</b><br>‚Ä¢ Constitution (106th Amendment) Act 2023 ‚Äî 33% reservation in Parliament ‚Äî awaiting delimitation.<br>‚Ä¢ Parties should voluntarily give more tickets to women.<br>‚Ä¢ Strengthen women's education and economic independence.`},
{subj:"civ",s:"A",t:"mcq",c:"Political Parties",d:"e",m:1,q:`Political parties differ from pressure groups because:`,o:["A) More members","B) Contest elections to win power; pressure groups only influence policy","C) Illegal","D) Pressure groups support democracy better"],r:"B",a:`<b>Political parties</b> contest elections and form governments. <b>Pressure groups</b> influence policy without seeking power.`},
{subj:"civ",s:"A",t:"mcq",c:"Political Parties",d:"e",m:1,q:`Which is a national political party in India?`,o:["A) Samajwadi Party","B) Telugu Desam Party","C) Indian National Congress","D) Akali Dal"],r:"C",a:`<b>INC (Indian National Congress)</b> is a national party. SP, TDP, Akali Dal are regional/state parties.`},
{subj:"civ",s:"A",t:"mcq",c:"Political Parties",d:"m",m:1,q:`A party gets national status if it:`,o:["A) Has most Parliament members","B) Gets 6% votes in 4 states + 4 Lok Sabha seats, OR wins 2% Lok Sabha seats from 3 states","C) Has existed for 10 years","D) Has offices in all states"],r:"B",a:`National party status: 6% votes in 4 states + 4 LS seats, OR 2% LS seats from 3 different states.`},
{subj:"civ",s:"A",t:"ar",c:"Political Parties",d:"m",m:1,q:`<b>Assertion:</b> Political parties are essential for democracy.<br><b>Reason:</b> Without parties, all candidates would be independent ‚Äî impossible to form stable government or implement coherent policy.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Parties aggregate interests, form governments, provide opposition. Without them, democratic governance would be chaotic. Answer: <b>A</b>`},
{subj:"civ",s:"C",t:"sa",c:"Political Parties",d:"m",m:3,q:`Challenges faced by political parties in India?`,o:[],r:"",a:`(i) <b>Lack of internal democracy:</b> Power concentrated in few leaders or families (Congress ‚Äî Gandhi family, SP ‚Äî Yadav family). Ordinary members have little say.<br>(ii) <b>Dynastic succession:</b> Positions passed to family members rather than earned by merit ‚Äî discourages capable outsiders.<br>(iii) <b>Money and muscle power:</b> Criminals with wealth given tickets; criminalisation of politics undermines democracy.<br>(iv) <b>Lack of meaningful ideology:</b> Parties shift positions for electoral gain ‚Äî voters cannot predict policy.`},
{subj:"civ",s:"D",t:"la",c:"Political Parties",d:"h",m:5,q:`Functions of political parties in a democracy.`,o:[],r:"",a:`<b>1. Contesting elections:</b> Parties select candidates ‚Äî without parties, voters face hundreds of unknown independents.<br><b>2. Policy formulation:</b> In power, make policies; in opposition, propose alternatives ‚Äî informed debate.<br><b>3. Making/unmaking governments:</b> Form coalitions; parliamentary systems need party majority to sustain government; elections change governments peacefully.<br><b>4. Role of opposition:</b> Criticise policies, demand accountability, offer alternatives to voters.<br><b>5. Mobilising opinion:</b> Mobilise people around issues, shape public opinion.<br><b>6. Recruiting leaders:</b> Primary avenue for political recruitment ‚Äî train future leaders.`},
{subj:"civ",s:"A",t:"mcq",c:"Outcomes of Democracy",d:"e",m:1,q:`Democracy's most important outcome is:`,o:["A) Economic growth","B) Accountable and legitimate government","C) Military strength","D) Cultural unity"],r:"B",a:`Democracy's fundamental outcome: <b>accountable, responsive, legitimate government</b> ‚Äî rulers answerable to citizens.`},
{subj:"civ",s:"A",t:"mcq",c:"Outcomes of Democracy",d:"m",m:1,q:`On economic growth, democracies vs dictatorships:`,o:["A) Democracies always grow faster","B) Dictatorships always grow faster","C) Growth depends on many factors ‚Äî regime type alone doesn't determine it","D) No connection"],r:"C",a:`<b>No clear advantage</b> for either system. Growth depends on policies, institutions, geography ‚Äî not just regime type.`},
{subj:"civ",s:"A",t:"mcq",c:"Outcomes of Democracy",d:"m",m:1,q:`"One person, one vote, one value" expresses:`,o:["A) Economic equality","B) Political equality ‚Äî equal weight to each vote","C) Equal land distribution","D) One language policy"],r:"B",a:`<b>One person, one vote, one value</b> ‚Äî every citizen's vote counts equally regardless of wealth, caste, gender, religion.`},
{subj:"civ",s:"A",t:"ar",c:"Outcomes of Democracy",d:"m",m:1,q:`<b>Assertion:</b> Democracy is better at handling conflicts than other forms.<br><b>Reason:</b> Democracy provides mechanisms (elections, courts, negotiations) for peaceful conflict resolution.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Democracies have lower rates of internal violent conflict ‚Äî legitimate peaceful channels. Answer: <b>A</b>`},
{subj:"civ",s:"C",t:"sa",c:"Outcomes of Democracy",d:"m",m:3,q:`How does democracy promote dignity and freedom of citizens?`,o:[],r:"",a:`(i) <b>Equal dignity regardless of birth:</b> Constitution abolishes untouchability, guarantees freedom from discrimination (Articles 14‚Äì18).<br>(ii) <b>Women's dignity:</b> Equal legal rights ‚Äî voting, property, laws against domestic violence. More women in power in democracies than non-democracies.<br>(iii) <b>Minority rights:</b> Even numerical minorities have protected rights ‚Äî religion, language, culture ‚Äî protected by constitution and courts against majority tyranny.`},
{subj:"civ",s:"D",t:"la",c:"Outcomes of Democracy",d:"h",m:5,q:`Evaluate democracy ‚Äî strengths and limitations.`,o:[],r:"",a:`<b>Strengths:</b><br>(i) <b>Accountability:</b> Elections force rulers to remain accountable. RTI, free press, courts provide additional accountability.<br>(ii) <b>Legitimacy:</b> Democratic decisions accepted even by losers ‚Äî fair process prevents revolution and civil war.<br>(iii) <b>Peaceful power transfer:</b> Governments change without violence.<br>(iv) <b>Handling diversity:</b> Accommodates groups through representation and rights.<br>(v) <b>Long-term stability:</b> Institutions channel grievances peacefully.<br><br><b>Limitations:</b><br>(i) Slow decision-making.<br>(ii) Corruption and criminal politics ‚Äî money corrupts.<br>(iii) Inequalities persist ‚Äî formal equality doesn't create economic equality.<br>(iv) Populism ‚Äî politicians focus on popular over good.<br>(v) Tyranny of majority if not carefully designed.<br><br><b>Conclusion:</b> Best available system ‚Äî as Churchill said: "worst form of government, except all the others."`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"e",m:1,q:`Human Development Index (HDI) is published by:`,o:["A) World Bank","B) IMF","C) UNDP","D) WTO"],r:"C",a:`<b>UNDP</b> publishes HDI in its Human Development Report. Measures health (life expectancy), education (schooling), standard of living (GNI per capita).`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"e",m:1,q:`Per capita income is:`,o:["A) Total income √∑ number of rich people","B) Total national income √∑ total population","C) Total income of top 10% √ó 10","D) GDP √ó population"],r:"B",a:`<b>Per capita income = Total national income √∑ Total population</b>.`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"m",m:1,q:`A limitation of using per capita income as a development measure:`,o:["A) Hard to calculate","B) Ignores income distribution ‚Äî high average may hide severe inequality","C) Only measures government income","D) Includes only agricultural income"],r:"B",a:`Per capita income <b>ignores inequality</b>. A country where a few are very rich and most are poor has the same average as one with equal distribution ‚Äî but very different quality of life.`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"m",m:1,q:`Sustainable development means:`,o:["A) Using all resources quickly for maximum growth","B) Meeting present needs without compromising future generations' ability to meet their needs","C) Development only in sustainable industries","D) 7% GDP growth per year"],r:"B",a:`<b>Sustainable development</b> (Brundtland, 1987): present needs met without compromising future generations.`},
{subj:"eco",s:"A",t:"ar",c:"Development",d:"m",m:1,q:`<b>Assertion:</b> Kerala has higher HDI than Punjab despite Punjab having higher per capita income.<br><b>Reason:</b> HDI measures health and education in addition to income ‚Äî Kerala has better literacy, life expectancy, and healthcare.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Kerala's literacy (94%+), life expectancy (75+ years) drive higher HDI. Answer: <b>A</b>`},
{subj:"eco",s:"C",t:"sa",c:"Development",d:"m",m:3,q:`Why is per capita income inadequate to measure development? What other indicators should be used?`,o:[],r:"",a:`<b>Limitations:</b><br>(i) Ignores distribution ‚Äî high average can hide extreme inequality.<br>(ii) Ignores non-material aspects ‚Äî freedom, security, dignity, clean environment.<br>(iii) Averages mislead ‚Äî small group of very rich pulls up average while most remain poor.<br><b>Better indicators:</b> Literacy rate; life expectancy; infant mortality rate; access to safe water/sanitation; HDI (combines income, health, education).`},
{subj:"eco",s:"D",t:"la",c:"Development",d:"h",m:5,q:`(a) What is development? Its different dimensions. (b) Compare India, China, USA using HDI. (c) Development goals for different groups.`,o:[],r:"",a:`<b>(a) Development dimensions:</b> Economic (income, employment), Social (education, healthcare, gender equality), Political (democracy, rights), Environmental (sustainable resources). Goals are diverse and sometimes conflicting.<br><br><b>(b) Comparison (approx):</b><br>India: HDI ~132, Life exp ~70 yrs, Mean schooling ~6.7 yrs.<br>China: HDI ~79, Life exp ~78 yrs, Mean schooling ~8 yrs.<br>USA: HDI ~21, Life exp ~79 yrs, Mean schooling ~13 yrs.<br><br><b>(c) Development goals by group:</b><br>Landless workers: land, steady employment, fair wages.<br>Women: safety, equal pay, education.<br>Farmers: remunerative prices, irrigation, crop insurance.<br>Youth: quality education, employment, freedom.<br>Goals can conflict ‚Äî industrialists want cheap labour; workers want higher wages.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"e",m:1,q:`The secondary sector:`,o:["A) Includes farming and mining","B) Converts natural products into other forms (manufacturing)","C) Includes banking and IT","D) Is the largest employer in India"],r:"B",a:`<b>Secondary sector</b> = manufacturing, construction ‚Äî converts primary products into other forms. Example: Cotton ‚Üí cloth.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"e",m:1,q:`MGNREGA (2005) guarantees:`,o:["A) 50 days employment per year","B) 100 days wage employment per year to rural households for unskilled manual work","C) Employment in cities","D) Employment to skilled workers only"],r:"B",a:`MGNREGA guarantees <b>100 days of wage employment per year</b> to rural households willing to do unskilled manual work.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"m",m:1,q:`Disguised unemployment means:`,o:["A) People who refuse work","B) More people employed than needed ‚Äî removing some would not reduce output","C) People working illegally","D) Seasonal unemployment"],r:"B",a:`<b>Disguised unemployment:</b> Excess workers such that removing some won't reduce output. Very common in Indian agriculture.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"m",m:1,q:`Which sector employs the most workers in India?`,o:["A) Primary (agriculture)","B) Secondary (industry)","C) Tertiary (services)","D) All three equally"],r:"A",a:`<b>Primary sector (agriculture)</b> employs ~45‚Äì50% of India's workforce despite contributing only ~18% of GDP.`},
{subj:"eco",s:"A",t:"ar",c:"Sectors of the Indian Economy",d:"m",m:1,q:`<b>Assertion:</b> Tertiary sector has become the largest sector in India in terms of GDP.<br><b>Reason:</b> Services like IT, banking, transport, communication now contribute over 50% of India's GDP.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. India's services sector (IT/ITES, banking, telecom) grown fastest since 1990s ‚Äî now ~55% of GDP. Answer: <b>A</b>`},
{subj:"eco",s:"B",t:"sb",c:"Sectors of the Indian Economy",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Organised vs Unorganised Sectors</b><br><br><i>"Workers in the unorganised sector face a lot of problems. Most work is seasonal. There is no job security. Jobs are low-paid and often not regular. There is no provision for overtime, paid leave, holidays, leave due to sickness etc."</i><br><br>(i) Two examples of unorganised sector workers. [1]<br>(ii) One difference between organised and unorganised sectors. [1]<br>(iii) Steps government can take to protect unorganised workers. [2]</div>`,o:[],r:"",a:`(i) Street vendors, construction labourers, domestic workers, agricultural labourers, daily wage workers.<br>(ii) Organised: Registered; job security; regular wages; paid leave; provident fund; governed by labour laws. Unorganised: No registration; no social security; irregular work.<br>(iii) (1) Extend MGNREGA-type employment guarantees. (2) Enforce minimum wage laws. (3) Social security (Ayushman Bharat health insurance, PM-Jeevan Jyoti life insurance). (4) Microfinance credit access for self-employed workers.`},
{subj:"eco",s:"C",t:"sa",c:"Sectors of the Indian Economy",d:"m",m:3,q:`How can the government create more employment in India?`,o:[],r:"",a:`(i) <b>Rural infrastructure:</b> Building roads, canals, dams, electricity creates direct jobs AND increases agricultural productivity. MGNREGA provides guaranteed rural employment.<br>(ii) <b>Labour-intensive industries:</b> Encourage handlooms, food processing, tourism, construction ‚Äî more jobs per unit of investment.<br>(iii) <b>Expanding education and healthcare:</b> Opening schools and hospitals in rural areas creates thousands of teacher, doctor, nurse positions.`},
{subj:"eco",s:"D",t:"la",c:"Sectors of the Indian Economy",d:"h",m:5,q:`Compare three sectors of Indian economy. What shift has occurred and what problems does this create?`,o:[],r:"",a:`<b>Three sectors (approx 2023):</b><br>Primary (Agriculture): GDP ~17‚Äì18%, Employment ~45%<br>Secondary (Industry): GDP ~27‚Äì28%, Employment ~25%<br>Tertiary (Services): GDP ~55%, Employment ~30%<br><br><b>Shift:</b> India skipped typical trajectory (agriculture ‚Üí manufacturing ‚Üí services). Moved directly from agriculture to services ‚Äî secondary sector never employed as high a proportion as in Europe/USA.<br><br><b>Problems:</b><br>(i) Jobless growth in services ‚Äî IT, finance create fewer jobs per rupee than manufacturing.<br>(ii) Agricultural distress ‚Äî 45% workers in agriculture contributing only 18% GDP = very low productivity and income; farm distress, farmer suicides.<br>(iii) Skill mismatch ‚Äî services require skilled workers; most agricultural workers can't move without education/skills.<br>(iv) Regional inequality ‚Äî services concentrated in few cities (Bangalore, Hyderabad, Pune, Mumbai).`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"e",m:1,q:`RBI issues currency notes on behalf of:`,o:["A) State governments","B) Commercial banks","C) Central Government","D) SEBI"],r:"C",a:`RBI issues notes on behalf of <b>Central Government</b>. (‚Çπ1 coin/note issued by Finance Ministry.)`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"e",m:1,q:`Which is a formal source of credit?`,o:["A) Money lenders","B) Friends and relatives","C) Commercial banks","D) Landlords"],r:"C",a:`<b>Commercial banks</b> are formal sources ‚Äî regulated by RBI. Money lenders, friends, landlords are informal ‚Äî unregulated, often charge much higher interest.`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"m",m:1,q:`A "debt trap" occurs when:`,o:["A) Bank refuses a loan","B) Borrower takes multiple loans to repay previous ones, becoming increasingly indebted","C) Interest rates are very low","D) Government takes on too much debt"],r:"B",a:`<b>Debt trap:</b> Borrower takes more loans to repay existing ones ‚Äî often at higher informal rates ‚Äî spiral of increasing debt consuming all assets.`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"m",m:1,q:`Self Help Groups (SHGs) primarily help:`,o:["A) Large businesses","B) Poor, especially rural women, access credit without collateral","C) Government collect taxes","D) Banks reduce NPAs"],r:"B",a:`<b>SHGs</b> (15‚Äì20 members) pool savings and give loans to members. Help rural poor ‚Äî especially women ‚Äî access credit without collateral.`},
{subj:"eco",s:"A",t:"ar",c:"Money and Credit",d:"m",m:1,q:`<b>Assertion:</b> Cheap and affordable credit is crucial for development.<br><b>Reason:</b> Credit enables investment in education, businesses, and agriculture ‚Äî expanding economic activity and creating employment.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Without credit, poor farmers can't buy inputs, small businesses can't grow. Answer: <b>A</b>`},
{subj:"eco",s:"C",t:"sa",c:"Money and Credit",d:"m",m:3,q:`Why must formal credit be expanded? Problems with informal credit?`,o:[],r:"",a:`<b>Need:</b> ~85% of rural credit from informal sources. Informal credit keeps borrowers poor through exploitative rates.<br><b>Problems with informal credit:</b><br>(i) Very high interest ‚Äî 24‚Äì120% per year vs 10‚Äì12% bank loans. Farmers lose land through debt traps.<br>(ii) No transparency ‚Äî no written contracts; terms can change arbitrarily; disputes favour lenders.<br>(iii) Coercion ‚Äî moneylenders demand labour/land as security; bonded labour can result.`},
{subj:"eco",s:"D",t:"la",c:"Money and Credit",d:"h",m:5,q:`(a) What is money and how has it evolved? (b) How do banks play a central role in the economy?`,o:[],r:"",a:`<b>(a) Money and evolution:</b><br>Money = medium of exchange, store of value, unit of account. Without money, barter requires "double coincidence of wants" ‚Äî inefficient.<br>Evolution: Commodity money (grain, cattle, gold) ‚Üí Metal coins ‚Üí Paper currency (notes representing gold) ‚Üí Fiat money (backed by government authority ‚Äî RBI issues in India) ‚Üí Deposits/Digital (cheques, NEFT, UPI).<br>Modern money has value because government authorises it and people trust it.<br><br><b>(b) Banks' role:</b><br>(i) Financial intermediation ‚Äî accept deposits, lend to those who need investment ‚Äî channels savings into productive use.<br>(ii) Credit creation ‚Äî keep fraction as reserve, lend rest ‚Äî money multiplier creates additional purchasing power.<br>(iii) Payment system ‚Äî NEFT, RTGS, SWIFT ‚Äî essential for domestic and international business.<br>(iv) Economic development ‚Äî credit to agriculture, industry, services enables investment and jobs.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"e",m:1,q:`Globalisation means:`,o:["A) Countries becoming more isolated","B) Rapid integration through trade, investment, technology, and people","C) Only integration of developed countries","D) Imposing one culture on others"],r:"B",a:`<b>Globalisation:</b> Rapid integration and interdependence through trade, financial flows, technology, movement of people.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"e",m:1,q:`A multinational corporation (MNC):`,o:["A) Owned by multiple governments","B) Owns or controls production in more than one country","C) Trades internationally but produces only at home","D) A government enterprise"],r:"B",a:`<b>MNC:</b> Owns or controls production in <b>more than one country</b>. Examples: Samsung, Apple, Unilever, Tata.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"m",m:1,q:`India's 1991 liberalisation involved:`,o:["A) More government control","B) Removal of trade barriers, allowing foreign investment, privatisation","C) Closing markets to foreign competition","D) Nationalising more banks"],r:"B",a:`<b>LPG reforms 1991</b>: removed import restrictions, lowered customs duties, allowed FDI/FII, privatised some public sector industries.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"m",m:1,q:`Which body promotes free trade among nations?`,o:["A) World Bank","B) IMF","C) WTO","D) UNICEF"],r:"C",a:`<b>WTO (World Trade Organisation)</b> ‚Äî sets rules for international trade, promotes free trade. India member since 1995.`},
{subj:"eco",s:"A",t:"ar",c:"Globalisation and the Indian Economy",d:"m",m:1,q:`<b>Assertion:</b> Globalisation has not benefited all groups in India equally.<br><b>Reason:</b> Skilled IT workers gained; unskilled workers and small producers face increased competition.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. IT professionals, exporters benefit; small producers (toys, textiles), unorganised workers face competition and insecurity. Answer: <b>A</b>`},
{subj:"eco",s:"B",t:"sb",c:"Globalisation and the Indian Economy",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Impact of MNCs</b><br><br><i>"MNCs set up production where it is close to markets, where skilled and unskilled labour is available, and where other factors of production are available at low cost. Besides, MNCs look for areas where government policies are favourable."</i><br><br>(i) Two reasons why MNCs prefer developing countries like India? [1]<br>(ii) What is outsourcing? Give one example. [1]<br>(iii) Two positive and one negative impact of MNCs on India. [2]</div>`,o:[],r:"",a:`(i) (1) Skilled and unskilled labour available at relatively low cost. (2) Large market (1.4 billion consumers). (3) Favourable government policies (SEZs, tax incentives).<br>(ii) <b>Outsourcing:</b> Hiring another company (often in different country) to do work previously done internally. Example: American companies outsourcing customer service/IT to Indian companies in Bangalore.<br>(iii) Positive: (1) Employment ‚Äî IT/ITES, manufacturing creates millions of jobs. (2) Technology transfer ‚Äî advanced technology and management practices. Negative: MNCs repatriate profits abroad ‚Äî money leaves India. Also, small domestic producers (toys, garments) face competition from cheaper imports, threatening livelihoods.`},
{subj:"eco",s:"C",t:"sa",c:"Globalisation and the Indian Economy",d:"m",m:3,q:`What is fair globalisation? How can it be achieved?`,o:[],r:"",a:`<b>Fair globalisation</b> means benefits of globalisation shared equitably ‚Äî between and within countries ‚Äî rather than captured by rich nations and the wealthy.<br><b>How to achieve:</b><br>(i) <b>Better trade rules:</b> WTO rules reformed to give developing countries fair access to rich country markets, especially in agriculture.<br>(ii) <b>Labour standards:</b> International agreements ensuring MNCs maintain decent working conditions and pay fair wages.<br>(iii) <b>Technology sharing:</b> Rich countries make technology available to developing countries; relax intellectual property restrictions on essential medicines.`},
{subj:"eco",s:"D",t:"la",c:"Globalisation and the Indian Economy",d:"h",m:5,q:`(a) Factors enabling globalisation. (b) Impact on Indian industry ‚Äî positive and negative.`,o:[],r:"",a:`<b>(a) Factors enabling globalisation:</b><br>(i) Technology ‚Äî internet, mobile, container shipping dramatically reduced costs of moving goods and information.<br>(ii) Trade liberalisation ‚Äî WTO-led reduction of tariffs, removal of quotas.<br>(iii) Financial liberalisation ‚Äî capital flows relatively freely across borders.<br>(iv) Policy changes ‚Äî India's 1991 reforms, China's opening 1978, Eastern Europe after 1989.<br><br><b>(b) Impact on Indian industry:</b><br><b>Positive:</b><br>‚Ä¢ IT and ITES boom ‚Äî millions of jobs, foreign exchange earnings.<br>‚Ä¢ Manufacturing ‚Äî Samsung, LG, Honda set up in India ‚Äî employment and technology transfer.<br>‚Ä¢ Consumer choice ‚Äî variety of goods at competitive prices.<br>‚Ä¢ Export growth ‚Äî pharmaceuticals, software, textiles, gems and jewellery.<br><b>Negative:</b><br>‚Ä¢ Small industries suffer ‚Äî toy manufacturers, electronics face competition from cheap Chinese imports.<br>‚Ä¢ Labour insecurity ‚Äî MNCs use flexible contracts; workers face job insecurity and poor conditions.<br>‚Ä¢ Agricultural imports ‚Äî cheap subsidised Western farm products threaten Indian farmers.<br>‚Ä¢ Profit repatriation ‚Äî profits leave India; technology and brand value stay with foreign companies.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"e",m:1,q:`Consumer Protection Act in India was first enacted in:`,o:["A) 1947","B) 1986","C) 1991","D) 2000"],r:"B",a:`<b>Consumer Protection Act 1986</b> (updated by Consumer Protection Act 2019) ‚Äî established consumer rights and three-tier dispute redressal system.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"e",m:1,q:`ISI mark / BIS mark certifies that:`,o:["A) Product is imported","B) Product meets quality and safety standards of Bureau of Indian Standards","C) Product is organic","D) Product is tax-free"],r:"B",a:`<b>ISI/BIS mark</b> certifies product meets Bureau of Indian Standards quality specifications.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"m",m:1,q:`The right to seek compensation for unfair trade practices is:`,o:["A) Right to safety","B) Right to choose","C) Right to redressal","D) Right to be heard"],r:"C",a:`<b>Right to redressal</b> ‚Äî consumers can seek remedy against unfair trade practices, defective goods, or deficient services through consumer courts.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"m",m:1,q:`Under Consumer Protection Act 2019, the National Commission handles cases worth:`,o:["A) Up to ‚Çπ20 lakh","B) ‚Çπ20 lakh to ‚Çπ1 crore","C) Above ‚Çπ10 crore","D) Any amount"],r:"C",a:`District: up to ‚Çπ1 crore; State: ‚Çπ1‚Äì10 crore; <b>National Commission: above ‚Çπ10 crore</b>.`},
{subj:"eco",s:"A",t:"ar",c:"Consumer Rights",d:"m",m:1,q:`<b>Assertion:</b> Consumer awareness is still low in India, especially in rural areas.<br><b>Reason:</b> Many rural consumers are illiterate, unaware of their legal rights, and lack access to consumer courts.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Low literacy and geographical distance from consumer courts make rural consumers vulnerable to exploitation. Answer: <b>A</b>`},
{subj:"eco",s:"C",t:"sa",c:"Consumer Rights",d:"m",m:3,q:`What are the six consumer rights? Explain any three.`,o:[],r:"",a:`Six rights under Consumer Protection Act:<br>(i) <b>Right to Safety:</b> Protection from dangerous goods/services. Example: Electrical appliances must meet safety standards.<br>(ii) <b>Right to Information:</b> Know quality, quantity, ingredients, price of goods. Example: Packaged foods must show ingredients, manufacturing date, MRP.<br>(iii) <b>Right to Choose:</b> Access variety of goods at competitive prices ‚Äî no monopoly.<br>(iv) Right to be Heard: Consumer interests given due consideration.<br>(v) Right to Redressal: Compensation for unfair practices.<br>(vi) Right to Consumer Education: Knowledge to be an informed consumer.`},
{subj:"eco",s:"D",t:"la",c:"Consumer Rights",d:"h",m:5,q:`(a) Consumer Protection Act ‚Äî key provisions. (b) How can consumers protect themselves? (c) Role of consumer organisations.`,o:[],r:"",a:`<b>(a) Consumer Protection Act (2019):</b><br>‚Ä¢ Six consumer rights established.<br>‚Ä¢ Three-tier system: District (up to ‚Çπ1 crore), State (‚Çπ1‚Äì10 crore), National (above ‚Çπ10 crore).<br>‚Ä¢ Consumers can file complaints without a lawyer.<br>‚Ä¢ 2019 Act added e-commerce regulation, product liability, Central Consumer Protection Authority (CCPA).<br>‚Ä¢ Must file within 2 years of deficiency.<br><br><b>(b) Consumer self-protection:</b><br>(i) Check labels ‚Äî manufacturing date, expiry, MRP, ISI/AGMARK marks.<br>(ii) Always demand bills/receipts ‚Äî essential for complaints.<br>(iii) Know 6 consumer rights and complaint process.<br>(iv) Report problems ‚Äî National Consumer Helpline 1800-11-4000.<br>(v) Research before buying ‚Äî compare prices, verify claims.<br><br><b>(c) Consumer organisations:</b><br>‚Ä¢ Educate consumers about rights and safe practices.<br>‚Ä¢ Test and compare products (Consumer Voice, CERC in India).<br>‚Ä¢ File cases in consumer courts on behalf of consumers.<br>‚Ä¢ Lobby government for stronger consumer protection laws.<br>‚Ä¢ Run awareness campaigns (World Consumer Rights Day ‚Äî 15 March).`},
{subj:"eco",s:"B",t:"sb",c:"Consumer Rights",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Quality Marks</b><br><br><i>"For the consumer, it is essential to distinguish between genuine and fake products. The ISI mark and the AGMARK are marks of quality certification. The consumer should check for these marks before buying. These marks ensure that products have been tested and meet required standards."</i><br><br>(i) What does ISI mark certify? Give one example product. [1]<br>(ii) What is AGMARK? For what products? [1]<br>(iii) What consumer rights do quality marks protect? How should a cheated consumer seek redressal? [2]</div>`,o:[],r:"",a:`(i) ISI/BIS mark certifies product meets Bureau of Indian Standards quality and safety specifications. Example: Electrical appliances (wiring, switches), cement, steel, helmets.<br>(ii) <b>AGMARK</b> (Agricultural Marking) certifies quality of agricultural products ‚Äî ghee, honey, wheat flour, edible oils, spices.<br>(iii) Quality marks protect <b>Right to Safety</b> and <b>Right to Information</b>. If cheated: (1) File complaint with seller. (2) Approach District Consumer Disputes Redressal Commission ‚Äî no lawyer needed, nominal fee. (3) Call National Consumer Helpline 1800-11-4000.`},
{subj:"hist",s:"B",t:"sb",c:"The Making of a Global World",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Indentured Labour</b><br><br><i>"Indentured labour was like a new system of slavery. The workers were recruited under a contract that obliged them to work for a period of time ‚Äî usually 5 years ‚Äî on a specific plantation. They worked in mines and on plantations in Caribbean, Mauritius, Fiji, and other places. They were not allowed to leave the plantation without permission."</i><br><br>(i) What was indentured labour? Which countries provided indentured workers? [1]<br>(ii) Why was it called "a new system of slavery"? [1]<br>(iii) What is the connection between indentured labour and the global economy of the 19th century? [2]</div>`,o:[],r:"",a:`(i) Indentured labour = contract system where workers agreed to work for 5 years on a specific plantation. India and China were main sources of indentured workers ‚Äî Caribbean, Mauritius, Fiji, South Africa.<br>(ii) "New slavery" because: workers could not leave without permission; faced harsh punishment; conditions were exploitative despite a contract; no real freedom despite being technically free people.<br>(iii) The expanding global economy needed labour for mines and plantations producing raw materials (sugar, cotton, tea, rubber) for European industries and consumers. As slavery was abolished, indentured labour provided cheap replacement labour ‚Äî filling the demand created by the global trade network.`},
{subj:"hist",s:"B",t:"sb",c:"The Age of Industrialisation",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Workers in Victorian England</b><br><br><i>"For the labour aristocracy, the new factory town represented opportunities for advancement. For the many unskilled workers, it represented a life of toil with uncertain wages. In seasons of boom, employment could be easy to find; in times of depression, entire factories shut and the streets were full of the unemployed."</i><br><br>(i) What does "labour aristocracy" mean? [1]<br>(ii) What was the condition of unskilled workers in industrial England? [1]<br>(iii) Why was factory employment uncertain and seasonal? What problems did this create? [2]</div>`,o:[],r:"",a:`(i) "Labour aristocracy" = skilled workers (carpenters, mechanics, printers) who earned higher wages and had more job security in the industrial economy.<br>(ii) Unskilled workers faced uncertain wages, no job security, and worked in dangerous conditions ‚Äî their livelihoods depended entirely on whether factories were running.<br>(iii) Factory employment was seasonal because demand for goods fluctuated ‚Äî consumer spending varied with harvests, weather, and economic conditions. In "off-seasons," factories closed and workers had no income, no savings, and no safety nets ‚Äî leading to poverty and social unrest. This contributed to support for trade unions and reform movements.`},
{subj:"hist",s:"B",t:"sb",c:"Print Culture and the Modern World",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Vernacular Press in India</b><br><br><i>"By the late 19th century, a strong tradition of radical and nationalist vernacular press had developed all over India. The colonial government was alarmed and in 1878, the Vernacular Press Act was passed modelled on the Irish Press Laws. It provided the government with extensive rights to censor reports and editorials in the vernacular press."</i><br><br>(i) Why did the colonial government pass the Vernacular Press Act? [1]<br>(ii) Name one vernacular newspaper that played a role in the nationalist movement. [1]<br>(iii) How did the vernacular press contribute to national consciousness despite government repression? [2]</div>`,o:[],r:"",a:`(i) The colonial government was alarmed by the <b>nationalist and radical ideas</b> spreading through vernacular language newspapers ‚Äî these were mobilising Indian opinion against British rule, reporting atrocities, and building anti-colonial sentiment.<br>(ii) <b>Kesari</b> (Bal Gangadhar Tilak, in Marathi) or <b>Amrita Bazar Patrika</b> (Bengal) or <b>Al-Hilal</b> (Maulana Azad, Urdu).<br>(iii) Despite censorship, vernacular press: (1) Connected Indians across regions who shared a language ‚Äî created a sense of community. (2) Reported news that English press ignored ‚Äî atrocities, famines, discrimination. (3) Made political ideas accessible to people who didn't read English ‚Äî farmers, artisans, small traders could now be part of the political conversation.`},
{subj:"geo",s:"B",t:"sb",c:"Forest and Wildlife Resources",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Baiga Tribe</b><br><br><i>"The Baiga tribe of Madhya Pradesh traditionally practiced bewar or shifting cultivation. They used forest resources sustainably for generations. When colonial forest laws restricted their access to forests, declaring large areas as Reserved Forests, the Baiga were forced to abandon their traditional way of life and many moved into settled agriculture. They lost their traditional rights and their relationship with the forest."</i><br><br>(i) What is shifting cultivation (bewar)? [1]<br>(ii) How did colonial forest policies affect tribal communities? [1]<br>(iii) Why is community-based forest management important for both forests and tribal communities? [2]</div>`,o:[],r:"",a:`(i) Shifting cultivation (bewar) = cutting and burning a patch of forest, cultivating it for a few seasons, then moving on as soil fertility declines ‚Äî allowing natural regeneration of abandoned areas. Traditional and sustainable when population density is low.<br>(ii) Colonial forest laws: (1) Declared large areas Reserved Forests ‚Äî banned tribal access to wood, fruits, game, and grazing. (2) Forced tribes like Baiga from their traditional livelihoods. (3) Created conflicts between tribal communities and forest officials. Tribes who had managed forests sustainably for generations were treated as criminals.<br>(iii) Community management important because: (1) Tribal communities have deep traditional ecological knowledge and a direct stake in forest health ‚Äî they depend on forests for survival. (2) Government officials lack this local knowledge ‚Äî community management is more effective and sustainable. (3) It restores tribal rights and dignity while protecting forests.`},
{subj:"geo",s:"B",t:"sb",c:"Minerals and Energy Resources",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Mineral Reserves</b><br><br><i>"Minerals are an indispensable part of our lives. Almost everything we use, from a tiny pin to a towering building or a big ship, all are made from minerals. The geological processes of mineral formation are so slow that the rates of replenishment are infinitely small compared to the rate at which humans use these minerals."</i><br><br>(i) What makes minerals a non-renewable resource? [1]<br>(ii) Name two major mineral-producing regions of India. [1]<br>(iii) What are the three methods of mining? State one advantage and one environmental problem of mining. [2]</div>`,o:[],r:"",a:`(i) Minerals are non-renewable because geological processes that form them (pressure, heat, chemical reactions) take millions of years ‚Äî while humans extract and use them in decades or centuries. They cannot be replaced within human timescales.<br>(ii) (1) Chhotanagpur Plateau (Jharkhand, Odisha, West Bengal, Chhattisgarh) ‚Äî iron ore, coal, manganese, mica, bauxite. (2) Rajasthan ‚Äî copper, zinc, lead, sandstone. (3) Kerala and Tamil Nadu beaches ‚Äî monazite (thorium).<br>(iii) Methods: (1) Open cast/surface mining ‚Äî removes overlying earth to expose mineral. (2) Shaft/underground mining ‚Äî vertical shafts. (3) Drilling ‚Äî for petroleum and natural gas. Advantage: Mining provides raw materials for industry, employment, foreign exchange. Environmental problem: Deforestation, soil erosion, groundwater contamination, subsidence of land.`},
{subj:"geo",s:"B",t:"sb",c:"Manufacturing Industries",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Industrial Pollution</b><br><br><i>"Industries are responsible for four types of pollution: air, water, land and noise. The pollutants include: smoke, fumes, gases from factories; effluents from industries; hot water discharged by thermal power plants; fly ash from coal-burning; and solid wastes. These pollutants degrade the natural environment and affect human health."</i><br><br>(i) Name two types of industrial pollution and one industry causing each. [1]<br>(ii) What is thermal pollution? Why is it harmful? [1]<br>(iii) What measures should industries take to control water pollution? [2]</div>`,o:[],r:"",a:`(i) (1) <b>Air pollution</b> ‚Äî caused by chemical industries, cement plants, thermal power stations (releasing SO‚ÇÇ, NO‚Çì, particulates). (2) <b>Water pollution</b> ‚Äî caused by textile dyeing, paper/pulp mills, tanneries (discharging chemicals, dyes, acids into rivers).<br>(ii) Thermal pollution = hot water discharged by thermal power plants into rivers/lakes. Harmful because: reduces dissolved oxygen in water ‚Üí kills fish and aquatic organisms; disrupts aquatic ecosystems and biological processes.<br>(iii) Industry water pollution control: (1) Mandatory Effluent Treatment Plants (ETPs) ‚Äî treat industrial wastewater before discharge. (2) Zero Liquid Discharge (ZLD) policy ‚Äî recycle all wastewater within the plant. (3) Settling ponds ‚Äî allow suspended particles to settle before release. (4) Bioremediation ‚Äî use microorganisms to break down pollutants. (5) Regular monitoring by Pollution Control Boards.`},
