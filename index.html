{subj:"bio",s:"B",t:"vsa",c:"Management of Natural Resources",d:"m",m:2,q:`What is rainwater harvesting? Give two traditional methods used in India.`,o:[],r:"",a:`<b>Rainwater harvesting:</b> The collection and storage of rainwater for later use, preventing runoff and replenishing groundwater.<br><b>Traditional methods in India:</b><br>(1) <b>Baolis (stepwells)</b> ‚Äî Rajasthan ‚Äî large stepped wells to collect rainwater.<br>(2) <b>Khadins and Johads</b> ‚Äî Rajasthan ‚Äî earthen embankments to retain rainwater in fields.<br>(3) <b>Kuls</b> ‚Äî Himachal Pradesh ‚Äî channels diverting glacial meltwater to fields.`},
{subj:"bio",s:"B",t:"vsa",c:"Management of Natural Resources",d:"m",m:2,q:`What do you understand by water pollution? Name two major sources of water pollution in India.`,o:[],r:"",a:`<b>Water pollution:</b> Contamination of water bodies (rivers, lakes, groundwater) with harmful substances that make it unfit for use.<br><b>Major sources in India:</b><br>(1) <b>Industrial effluents</b> ‚Äî factories discharge chemicals, heavy metals, dyes into rivers.<br>(2) <b>Sewage and agricultural runoff</b> ‚Äî untreated sewage and fertiliser/pesticide runoff from farms.`},
{subj:"bio",s:"C",t:"sa",c:"Management of Natural Resources",d:"m",m:3,q:`What are the advantages and disadvantages of building large dams? Discuss with examples.`,o:[],r:"",a:`<b>Advantages:</b><br>(i) Generation of hydroelectric power ‚Äî clean, renewable energy.<br>(ii) Irrigation ‚Äî ensures water supply for agriculture during dry seasons.<br>(iii) Flood control ‚Äî reduces downstream flooding.<br>(iv) Drinking water supply to cities.<br><b>Disadvantages:</b><br>(i) Displacement of large populations ‚Äî Narmada dam displaced over 200,000 people.<br>(ii) Loss of fertile agricultural land and forests under the reservoir.<br>(iii) Disruption of river ecosystems ‚Äî fish migration blocked, river flow altered.<br>(iv) Sedimentation reduces dam life. Risk of dam failure.`},
{subj:"bio",s:"C",t:"sa",c:"Management of Natural Resources",d:"m",m:3,q:`What is the role of local communities in conservation of forests? Give examples of community forest management.`,o:[],r:"",a:`Local communities have traditionally managed and conserved forests sustainably. Examples:<br><b>(i) Chipko Movement</b> (Uttarakhand, 1973) ‚Äî villagers embraced trees to prevent felling. Led to ban on felling in Himalayan forests.<br><b>(ii) Bishnoi community</b> (Rajasthan) ‚Äî have protected trees and animals for centuries as part of their religious belief.<br><b>(iii) Joint Forest Management (JFM)</b> ‚Äî government initiative where local communities partner with forest departments to protect and manage forests, sharing benefits.<br><b>(iv) Sacred groves (Orans/Dev vans)</b> ‚Äî community-protected patches of forests around temples or sacred sites.`},
{subj:"bio",s:"C",t:"sa",c:"Management of Natural Resources",d:"h",m:3,q:`The Rio de Janeiro Earth Summit (1992) and Johannesburg summit (2002) discussed sustainable development. What were the key agreements and why is international cooperation needed for environmental protection?`,o:[],r:"",a:`<b>Rio Earth Summit 1992:</b> Produced Agenda 21 (action plan for sustainable development), Convention on Biological Diversity, Framework Convention on Climate Change. Emphasised that development must be sustainable.<br><b>Johannesburg 2002:</b> Reaffirmed Agenda 21, focused on poverty, sanitation, biodiversity, and energy access.<br><b>Why international cooperation is needed:</b><br>(i) Environmental problems like ozone depletion, climate change, ocean pollution don't respect national borders.<br>(ii) Rich countries have consumed most resources historically ‚Äî shared responsibility.<br>(iii) Biodiversity loss, deforestation affect global climate.<br>(iv) No single country can solve global environmental problems alone ‚Äî collective action is essential.`},
{subj:"bio",s:"D",t:"la",c:"Management of Natural Resources",d:"h",m:5,q:`(a) Explain the importance of water as a natural resource. What are the major threats to freshwater resources? (b) Describe any four traditional water harvesting methods used in India. (c) What is the role of forests in the water cycle?`,o:[],r:"",a:`<b>(a) Importance of water:</b> Water is essential for all biological processes ‚Äî photosynthesis, digestion, transport of nutrients, regulation of body temperature. Freshwater (only 2.5% of total water) is essential for drinking, agriculture, industry.<br><b>Threats:</b> (i) Over-extraction of groundwater. (ii) Pollution from sewage, industrial effluents, agricultural runoff. (iii) Climate change reducing glacial and snowmelt water. (iv) Wasteful irrigation practices.<br><b>(b) Traditional water harvesting:</b><br>(i) <b>Khadins (Rajasthan)</b> ‚Äî earthen embankments on sloping land collect runoff.<br>(ii) <b>Johads (Rajasthan)</b> ‚Äî semi-circular bunds to harvest rainwater.<br>(iii) <b>Baolis/Stepwells</b> ‚Äî deep stepped wells, used across arid India.<br>(iv) <b>Kuls (Himachal Pradesh)</b> ‚Äî diversion channels from glaciers/streams.<br>(v) <b>Roof-top rainwater harvesting</b> ‚Äî urban areas, stored in underground tanks.<br><b>(c) Forests and water cycle:</b> Tree roots absorb rainwater and prevent runoff. Transpiration adds water vapour to atmosphere ‚Üí rainfall. Forest canopy reduces impact of rain ‚Üí prevents soil erosion. Forests recharge groundwater by allowing slow percolation. Deforestation disrupts water cycle ‚Üí reduced rainfall, floods, droughts.`},
{subj:"bio",s:"E",t:"cs",c:"Management of Natural Resources",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî River Ganga</b><br><br>The Ganga river, sacred to millions, flows 2525 km across India. Studies show high levels of coliform bacteria, industrial chemicals, and dissolved solids in many stretches. The Ganga Action Plan was launched in 1985 but has had limited success.<br><br><b>(i)</b> What does the presence of coliform bacteria indicate? <span class="cm">[1 mark]</span><br><b>(ii)</b> Name two major pollutants entering the Ganga. <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Why has the Ganga Action Plan had limited success? Suggest two improvements. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is BOD (Biological Oxygen Demand) and why is it important for measuring water pollution? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> Presence of coliform bacteria indicates <b>faecal/sewage contamination</b> ‚Äî water is unsafe for drinking.<br><b>(ii)</b> (1) Untreated sewage from cities. (2) Industrial effluents (chemicals, heavy metals). (3) Agricultural runoff with fertilisers and pesticides. (4) Religious offerings, cremation ash.<br><b>(iii)(a)</b> Limited success because: (1) Implementation was slow ‚Äî sewage treatment plants not built at required pace. (2) Illegal industrial discharge continues. Improvements: (1) Strict enforcement with heavy penalties for polluters. (2) Upgrade and maintain sewage treatment plants in all cities along the river.<br><b>(iii)(b) BOD (Biological Oxygen Demand):</b> Amount of dissolved oxygen needed by microorganisms to decompose organic matter in a water sample. High BOD = high organic pollution = water is highly polluted (oxygen depleted). Used as a standard measure of water quality/pollution level. Clean water has BOD < 1 mg/L; severely polluted water > 5 mg/L.`},
{subj:"bio",s:"E",t:"cs",c:"Management of Natural Resources",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Narmada Bachao Andolan</b><br><br>The Sardar Sarovar Dam on the Narmada river displaced over 200,000 people, mostly tribal and rural communities. Activists led by Medha Patkar argued that the benefits (electricity and irrigation) mainly went to rich farmers and cities while the poor bore the costs.<br><br><b>(i)</b> Name one benefit and one adverse effect of the Sardar Sarovar Dam. <span class="cm">[1 mark]</span><br><b>(ii)</b> What is the Narmada Bachao Andolan (NBA)? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Why do large dams cause conflict between different stakeholders? Explain with this example. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What are small dams and check dams? How are they better than large dams for water management? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Benefit:</b> Irrigation for Gujarat's farms / hydroelectric power. <b>Adverse effect:</b> Displacement of 200,000+ people, loss of forests and agricultural land.<br><b>(ii)</b> The Narmada Bachao Andolan is a social movement led by Medha Patkar that opposes large dams on the Narmada river, demanding rehabilitation of displaced people and environment protection.<br><b>(iii)(a)</b> Conflicts: City dwellers want electricity and water. Farmers downstream want irrigation. But tribal/rural communities are displaced without adequate compensation. Environment suffers (forests, biodiversity lost). The costs and benefits are not shared equally ‚Äî poor communities bear the burden while wealthy groups gain.<br><b>(iii)(b) Small/check dams:</b> Low-cost earthen or stone structures built across streams to slow water flow and recharge groundwater. Better because: (1) No displacement of communities. (2) Lower cost and easier to build and maintain. (3) Benefit local communities directly. (4) Recharge groundwater. Traditional example: Johads in Rajasthan revived dried-up rivers.`},
{subj:"phy",s:"A",t:"mcq",c:"Light ‚Äì Reflection and Refraction",d:"m",m:1,q:`If a ray of light falls on a plane mirror at 35¬∞ to the mirror surface, the angle of reflection is:`,o:["A) 35¬∞","B) 55¬∞","C) 70¬∞","D) 90¬∞"],r:"B",a:`Angle to surface = 35¬∞, so angle of incidence = 90¬∞‚àí35¬∞ = <b>55¬∞</b>. Angle of reflection = 55¬∞.`},
{subj:"phy",s:"A",t:"mcq",c:"Light ‚Äì Reflection and Refraction",d:"m",m:1,q:`A virtual image cannot be obtained on a screen because:`,o:["A) It is too small","B) Rays appear to diverge from it but don't actually meet","C) It has no colour","D) It is always erect"],r:"B",a:`A virtual image is formed where reflected/refracted rays appear to diverge from but do <b>not actually converge</b>. Since light does not actually pass through the image point, it cannot be projected on a screen.`},
{subj:"phy",s:"A",t:"mcq",c:"Light ‚Äì Reflection and Refraction",d:"h",m:1,q:`An object is placed 12 cm in front of a concave lens of focal length 8 cm. Image distance is:`,o:["A) ‚Äì4.8 cm","B) +4.8 cm","C) ‚Äì24 cm","D) +24 cm"],r:"A",a:`1/v ‚Äì 1/u = 1/f ‚Üí 1/v = 1/(‚àí8) + 1/(‚àí12) = ‚àí3/24 ‚àí 2/24 = ‚àí5/24. v = <b>‚àí4.8 cm</b> (virtual, same side as object).`},
{subj:"phy",s:"C",t:"sa",c:"Light ‚Äì Reflection and Refraction",d:"h",m:3,q:`(a) State the sign convention for mirrors. (b) A concave mirror has f = 20 cm. An object is placed 60 cm in front. Find image position, nature and magnification.`,o:[],r:"",a:`<b>(a) Sign convention (New Cartesian):</b> All distances measured from pole. Distances in direction of incident light = positive. Against incident light = negative. Heights above principal axis = positive.<br><b>(b)</b> u = ‚àí60 cm, f = ‚àí20 cm.<br>1/v = 1/f ‚àí 1/u = 1/(‚àí20) ‚àí 1/(‚àí60) = ‚àí3/60 + 1/60 = ‚àí2/60. v = <b>‚àí30 cm</b>.<br>m = ‚àív/u = ‚àí(‚àí30)/(‚àí60) = <b>‚àí0.5</b>.<br>Image: Real, inverted, diminished, at 30 cm in front of mirror.`},
{subj:"phy",s:"D",t:"la",c:"Light ‚Äì Reflection and Refraction",d:"h",m:5,q:`(a) Draw ray diagrams for image formation by a convex lens for all positions of object. (b) State the lens formula and derive magnification. (c) A lens forms a real, inverted image 3√ó the size of object. Object is 20 cm from lens. Find focal length.`,o:[],r:"",a:`<b>(a) Convex lens ray diagrams:</b><br>Object beyond 2F ‚Üí Real, inverted, diminished (between F and 2F on other side).<br>Object at 2F ‚Üí Real, inverted, same size (at 2F other side).<br>Object between F and 2F ‚Üí Real, inverted, magnified (beyond 2F other side).<br>Object at F ‚Üí Image at infinity.<br>Object between F and lens ‚Üí Virtual, erect, magnified (same side as object).<br><b>(b) Lens formula:</b> 1/v ‚àí 1/u = 1/f. Magnification m = v/u = h'/ h.<br><b>(c)</b> m = ‚àí3 (real, inverted). v/u = ‚àí3. u = ‚àí20 cm ‚Üí v = 60 cm.<br>1/f = 1/60 ‚àí 1/(‚àí20) = 1/60 + 1/20 = 1/60 + 3/60 = 4/60. f = <b>15 cm</b>.`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"m",m:1,q:`The unit of electric charge is:`,o:["A) Ampere","B) Volt","C) Coulomb","D) Watt"],r:"C",a:`SI unit of electric charge is <b>Coulomb (C)</b>. 1 Coulomb = charge on 6.25 √ó 10¬π‚Å∏ electrons.`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"m",m:1,q:`Two resistors 4Œ© and 6Œ© are connected in series to a 20V battery. Voltage across 4Œ© resistor is:`,o:["A) 8V","B) 12V","C) 10V","D) 20V"],r:"A",a:`Total R = 10Œ©. I = 20/10 = 2A. V across 4Œ© = 2√ó4 = <b>8V</b>.`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"h",m:1,q:`The heating effect of electric current is used in:`,o:["A) Electric motor","B) Electric generator","C) Electric iron","D) Battery charger"],r:"C",a:`<b>Electric iron</b> uses the heating effect (Joule heating: H = I¬≤Rt). Motor and generator use the magnetic effect.`},
{subj:"phy",s:"B",t:"vsa",c:"Electricity",d:"m",m:2,q:`Derive the expression for electrical energy consumed. A 60W bulb is used for 6 hours daily. Calculate monthly (30 days) units consumed and cost at ‚Çπ5 per unit.`,o:[],r:"",a:`<b>Energy = Power √ó Time = V √ó I √ó t (joules)</b> or in kWh: E = P(kW) √ó t(h).<br>E = 0.06 √ó 6 √ó 30 = <b>10.8 kWh = 10.8 units</b>.<br>Cost = 10.8 √ó 5 = <b>‚Çπ54</b>`},
{subj:"phy",s:"C",t:"sa",c:"Electricity",d:"h",m:3,q:`(a) State and explain Joule's law of heating. (b) An electric kettle has a coil of resistance 100Œ©. It draws 5A current. Find heat produced in 5 minutes in joules and calories.`,o:[],r:"",a:`<b>(a) Joule's Law:</b> Heat produced in a conductor is directly proportional to: (i) square of current (H ‚àù I¬≤), (ii) resistance (H ‚àù R), (iii) time (H ‚àù t).<br>Formula: H = I¬≤Rt (in Joules).<br><b>(b)</b> H = I¬≤Rt = 5¬≤ √ó 100 √ó (5√ó60) = 25 √ó 100 √ó 300 = <b>750,000 J = 7.5 √ó 10‚Åµ J</b>.<br>In calories: H = 750000/4.2 = <b>178,571 cal ‚âà 1.79 √ó 10‚Åµ cal</b>`},
{subj:"phy",s:"D",t:"la",c:"Electricity",d:"h",m:5,q:`(a) What is electric potential and potential difference? (b) Draw V-I graphs for (i) ohmic conductor (ii) non-ohmic device. (c) An electric circuit has a battery of 12V, three resistors R‚ÇÅ=2Œ©, R‚ÇÇ=3Œ©, R‚ÇÉ=6Œ© all in parallel. Find: total current, current through each, power dissipated.`,o:[],r:"",a:`<b>(a) Electric potential:</b> Work done per unit charge to bring a positive charge from infinity to that point. Unit: Volt. <b>Potential difference:</b> Work done per unit charge to move charge between two points. V = W/Q.<br><b>(b)</b> Ohmic: straight line through origin. Non-ohmic (e.g. diode): curved line.<br><b>(c)</b> All connected to 12V. I‚ÇÅ=12/2=6A, I‚ÇÇ=12/3=4A, I‚ÇÉ=12/6=2A. Total I = 12A.<br>1/R_eq = 1/2+1/3+1/6 = 1. R_eq = 1Œ©. Check: I = 12/1 = 12A ‚úì<br>P = V¬≤/R_eq = 144/1 = <b>144W</b>. OR P = V√óI_total = 12√ó12 = 144W.`},
{subj:"phy",s:"A",t:"mcq",c:"Human Eye and Colourful World",d:"m",m:1,q:`The least distance of distinct vision for a normal eye is:`,o:["A) 25 cm","B) Infinity","C) 10 cm","D) 50 cm"],r:"A",a:`The <b>near point</b> (least distance of distinct vision) for a normal human eye is <b>25 cm</b>.`},
{subj:"phy",s:"A",t:"mcq",c:"Human Eye and Colourful World",d:"h",m:1,q:`A person's near point is 50 cm. Power of lens needed to read at 25 cm:`,o:["A) +2D","B) ‚àí2D","C) +4D","D) ‚àí4D"],r:"A",a:`Lens must form virtual image at near point (50cm) from object at 25cm. 1/f = 1/v‚àí1/u = 1/(‚àí50)‚àí1/(‚àí25) = ‚àí1/50+2/50 = 1/50. P = +2D. Answer: <b>+2D</b>`},
{subj:"phy",s:"C",t:"sa",c:"Human Eye and Colourful World",d:"m",m:3,q:`(a) What is presbyopia? How is it corrected? (b) An elderly person can see neither near nor far clearly. What type of lens should be used?`,o:[],r:"",a:`<b>(a) Presbyopia</b> is the gradual loss of near vision with age, caused by weakening of ciliary muscles and hardening of eye lens. The near point recedes (moves farther). Common in people over 40.<br><b>Correction:</b> Convex (converging) lenses for reading. Many people with presbyopia also develop myopia ‚Äî they need <b>bifocal lenses</b> (upper half concave for distance, lower half convex for near).<br><b>(b)</b> Since the person cannot see both near and far clearly, they need <b>bifocal lenses</b> (or separate glasses for near and far vision).`},
{subj:"phy",s:"D",t:"la",c:"Human Eye and Colourful World",d:"h",m:5,q:`(a) Explain how a rainbow is formed. (b) Why does light disperse when it passes through a glass prism? (c) What is the Tyndall effect? Give two examples.`,o:[],r:"",a:`<b>(a) Rainbow:</b> Sunlight enters raindrops (refraction + dispersion), reflects off back of drop (internal reflection), then refracts again as it exits. Violet bends most, red least. Observer sees red on outside, violet on inside of arc. A secondary rainbow (fainter) can form with double internal reflection ‚Äî colour order reversed.<br><b>(b) Dispersion through prism:</b> White light is a mixture of wavelengths. Each wavelength has a slightly different refractive index in glass (violet has highest n, red lowest). When white light enters prism, different wavelengths bend by different amounts ‚Üí spread out into spectrum (VIBGYOR).<br><b>(c) Tyndall effect:</b> Scattering of light by colloidal particles or fine suspended particles, making the beam visible as a cone.<br>Examples: (1) Beam of sunlight visible through forest canopy/dusty room ‚Äî dust particles scatter light. (2) Vehicle headlights visible as beams in foggy conditions. (3) Blue sky (Rayleigh scattering ‚Äî special case).`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`A current-carrying solenoid behaves like a:`,o:["A) Permanent magnet","B) Bar magnet","C) Electromagnet","D) Both B and C"],r:"D",a:`A current-carrying solenoid produces a magnetic field similar to a bar magnet, but since it's powered by electricity it is technically an <b>electromagnet</b>. It behaves like a bar magnet.`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`The working of an electric bell is based on:`,o:["A) Permanent magnet","B) Heating effect of current","C) Electromagnet","D) Chemical effect"],r:"C",a:`An electric bell uses an <b>electromagnet</b> that repeatedly attracts and releases a striker (armature) against the bell.`},
{subj:"phy",s:"B",t:"vsa",c:"Magnetic Effects of Electric Current",d:"m",m:2,q:`State Fleming's Right-hand rule. When is it used?`,o:[],r:"",a:`<b>Fleming's Right-hand rule (dynamo rule):</b> Stretch thumb, forefinger, and middle finger of right hand mutually perpendicular. If <b>forefinger</b> points in direction of magnetic field and <b>thumb</b> in direction of motion of conductor, then <b>middle finger</b> gives direction of induced current.<br><b>Used for:</b> Electric generators (electromagnetic induction) to find direction of induced current.`},
{subj:"phy",s:"C",t:"sa",c:"Magnetic Effects of Electric Current",d:"m",m:3,q:`(a) State Faraday's laws of electromagnetic induction. (b) An AC generator produces current that reverses direction 100 times per second. What is the frequency of the AC?`,o:[],r:"",a:`<b>(a) Faraday's Laws:</b><br>1st Law: Whenever there is a change in magnetic flux linked with a coil, an EMF is induced in it.<br>2nd Law: The magnitude of induced EMF is directly proportional to the rate of change of magnetic flux.<br>e = ‚àídŒ¶/dt (negative sign = Lenz's Law: induced current opposes change causing it).<br><b>(b)</b> If current reverses 100 times/second, that means 50 complete cycles/second (each cycle has 2 reversals).<br>Frequency = <b>50 Hz</b> (standard AC frequency in India).`},
{subj:"phy",s:"D",t:"la",c:"Magnetic Effects of Electric Current",d:"h",m:5,q:`(a) What is an electromagnet? Describe its construction and uses. (b) Explain the principle and working of a DC motor with a labelled diagram. (c) What is the difference between AC and DC current?`,o:[],r:"",a:`<b>(a) Electromagnet:</b> A temporary magnet made by winding a coil of insulated wire around a soft iron core and passing electric current through it. When current flows ‚Üí strong magnetic field ‚Üí iron becomes magnetised. When current stops ‚Üí magnetism disappears.<br>Uses: Electric bells, cranes for lifting scrap iron, MRI machines, circuit breakers, relays.<br><b>(b) DC Motor principle:</b> A current-carrying coil in a magnetic field experiences a force (Fleming's Left-hand rule). This force creates a torque that rotates the coil.<br>Working: Battery ‚Üí brushes ‚Üí split ring commutator ‚Üí coil ‚Üí current flows. Magnetic force on two arms of coil acts in opposite directions ‚Üí coil rotates. Commutator reverses current every half turn ‚Üí continuous rotation.<br><b>(c) AC vs DC:</b><br>AC (Alternating Current): Direction reverses periodically (50 Hz in India). Used for transmission over long distances. DC (Direct Current): Flows in one direction. Used in batteries, electronics. AC can be stepped up/down with transformers; DC cannot.`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"m",m:1,q:`The number of covalent bonds in a molecule of ethane (C‚ÇÇH‚ÇÜ) is:`,o:["A) 5","B) 6","C) 7","D) 8"],r:"C",a:`Ethane: C-C bond (1) + 3 C-H bonds on each carbon (3+3=6) = <b>7 covalent bonds</b>.`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"m",m:1,q:`Homologous series of alkanes have the general formula:`,o:["A) C‚ÇôH‚ÇÇ‚Çô","B) C‚ÇôH‚ÇÇ‚Çô‚Çä‚ÇÇ","C) C‚ÇôH‚ÇÇ‚Çô‚Çã‚ÇÇ","D) C‚ÇôH‚Çô"],r:"B",a:`Alkanes (saturated hydrocarbons) have general formula <b>C‚ÇôH‚ÇÇ‚Çô‚Çä‚ÇÇ</b>. e.g. CH‚ÇÑ (n=1), C‚ÇÇH‚ÇÜ (n=2).`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"m",m:1,q:`Which of the following is an unsaturated hydrocarbon?`,o:["A) Methane","B) Ethane","C) Propane","D) Ethylene (Ethene)"],r:"D",a:`<b>Ethylene (CH‚ÇÇ=CH‚ÇÇ)</b> has a double bond ‚Üí unsaturated. Methane, ethane, propane are saturated (only single bonds).`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"h",m:1,q:`When ethanol undergoes oxidation with alkaline KMnO‚ÇÑ, the product is:`,o:["A) Ethane","B) Ethanoic acid","C) Acetaldehyde","D) Methanol"],r:"B",a:`Ethanol + [O] ‚Üí <b>Ethanoic acid (CH‚ÇÉCOOH)</b>. Oxidising agents: alkaline KMnO‚ÇÑ or acidified K‚ÇÇCr‚ÇÇO‚Çá.`},
{subj:"chem",s:"B",t:"vsa",c:"Carbon and its Compounds",d:"m",m:2,q:`What is isomerism? Give an example with structural formulae.`,o:[],r:"",a:`<b>Isomerism:</b> The phenomenon where two or more compounds have the same molecular formula but different structural formulae, and hence different properties.<br><b>Example:</b> Butane (C‚ÇÑH‚ÇÅ‚ÇÄ):<br>n-Butane: CH‚ÇÉ-CH‚ÇÇ-CH‚ÇÇ-CH‚ÇÉ (straight chain)<br>Isobutane: CH‚ÇÉ-CH(CH‚ÇÉ)-CH‚ÇÉ (branched chain)`},
{subj:"chem",s:"C",t:"sa",c:"Carbon and its Compounds",d:"m",m:3,q:`(a) What is a homologous series? (b) Write structural formulae of the first four members of the alkanol (alcohol) series. (c) State two characteristics of a homologous series.`,o:[],r:"",a:`<b>(a) Homologous series:</b> A family of organic compounds with the same functional group and similar chemical properties, where successive members differ by ‚ÄìCH‚ÇÇ‚Äì (14 mass units).<br><b>(b) First four alkanols:</b><br>Methanol: CH‚ÇÉOH<br>Ethanol: C‚ÇÇH‚ÇÖOH (CH‚ÇÉCH‚ÇÇOH)<br>Propanol: C‚ÇÉH‚ÇáOH (CH‚ÇÉCH‚ÇÇCH‚ÇÇOH)<br>Butanol: C‚ÇÑH‚ÇâOH<br><b>(c) Characteristics:</b><br>(i) Same general formula and functional group.<br>(ii) Successive members differ by CH‚ÇÇ (mass = 14u).<br>(iii) Physical properties (melting point, boiling point) change gradually. Chemical properties are similar.`},
{subj:"chem",s:"D",t:"la",c:"Carbon and its Compounds",d:"h",m:5,q:`(a) What is covalent bonding? How does it differ from ionic bonding? (b) Draw the electron dot structures of (i) CO‚ÇÇ (ii) C‚ÇÇH‚ÇÇ (iii) CH‚ÇÑ. (c) Explain why carbon forms millions of compounds. Name two special properties of carbon.`,o:[],r:"",a:`<b>(a) Covalent bonding:</b> Formed by sharing of electron pairs between atoms. Both atoms contribute electrons to the shared pair. Formed between non-metals.<br>Difference from ionic: Ionic bonds involve complete transfer of electrons (metal to non-metal); high melting points; conduct electricity when dissolved/molten. Covalent compounds have lower melting points; generally poor conductors.<br><b>(b) Electron dot structures:</b><br>CO‚ÇÇ: O::C::O (each O shares 2 pairs with C ‚Äî double bonds). C‚ÇÇH‚ÇÇ: H:C:::C:H (triple bond between carbons). CH‚ÇÑ: H atoms around C, each sharing 1 pair.<br><b>(c) Why carbon forms millions of compounds:</b><br>(i) <b>Catenation:</b> Carbon can form stable covalent bonds with other carbon atoms ‚Üí long chains, branched chains, rings.<br>(ii) <b>Tetravalency:</b> Carbon has 4 valence electrons ‚Üí can form 4 covalent bonds with same or different atoms ‚Üí enormous variety. Combined with catenation and ability to form double/triple bonds with C, N, O ‚Üí millions of organic compounds.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"m",m:1,q:`What happens when sodium is added to water?`,o:["A) No reaction","B) Sodium dissolves quietly","C) Vigorous reaction producing H‚ÇÇ and NaOH","D) Sodium burns"],r:"C",a:`2Na + 2H‚ÇÇO ‚Üí 2NaOH + H‚ÇÇ‚Üë (very vigorous, exothermic). Na floats, moves around, may catch fire due to heat produced.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"m",m:1,q:`An ore is:`,o:["A) Any mineral containing a metal","B) A mineral from which metal can be profitably extracted","C) Pure metal found in earth","D) An alloy of metals"],r:"B",a:`An <b>ore</b> is a naturally occurring mineral from which a metal can be extracted <b>profitably</b>. All ores are minerals but not all minerals are ores.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"h",m:1,q:`Which metal is liquid at room temperature?`,o:["A) Sodium","B) Mercury","C) Lead","D) Zinc"],r:"B",a:`<b>Mercury (Hg)</b> is the only metal that is liquid at room temperature (melting point = ‚àí38.8¬∞C).`},
{subj:"chem",s:"B",t:"vsa",c:"Metals and Non-metals",d:"m",m:2,q:`What is an alloy? Give two examples with their composition and uses.`,o:[],r:"",a:`An <b>alloy</b> is a homogeneous mixture of two or more metals (or metal + non-metal) that has better properties than the individual metals.<br><b>Examples:</b><br>(1) <b>Brass</b> = Cu (70%) + Zn (30%) ‚Äî harder than copper, used in utensils, hardware.<br>(2) <b>Bronze</b> = Cu + Sn ‚Äî used in statues, coins.<br>(3) <b>Stainless steel</b> = Fe + C + Cr + Ni ‚Äî does not rust, used in cutlery.`},
{subj:"chem",s:"C",t:"sa",c:"Metals and Non-metals",d:"m",m:3,q:`Explain the extraction of metals of medium reactivity (e.g. zinc) from their ores. What is roasting and calcination?`,o:[],r:"",a:`Metals of medium reactivity (Zn, Fe, Pb) are extracted by <b>reduction with carbon (smelting)</b>.<br><b>Steps for Zinc extraction:</b><br>(1) <b>Mining:</b> Zinc blende ore (ZnS) is mined.<br>(2) <b>Roasting:</b> Heating ore in air ‚Üí ZnS + O‚ÇÇ ‚Üí ZnO + SO‚ÇÇ (sulphide ore ‚Üí oxide)<br>(3) <b>Reduction:</b> ZnO + C ‚Üí Zn + CO‚ÇÇ (at high temperature, carbon reduces oxide to metal)<br><b>Roasting vs Calcination:</b><br>Roasting: Heating sulphide ore in excess air ‚Üí converts to oxide. Calcination: Heating carbonate ore in limited air ‚Üí metal oxide + CO‚ÇÇ (e.g. ZnCO‚ÇÉ ‚Üí ZnO + CO‚ÇÇ)`},
{subj:"chem",s:"D",t:"la",c:"Metals and Non-metals",d:"h",m:5,q:`(a) Explain the corrosion of iron (rusting). Write the chemical equation. (b) What methods are used to prevent rusting? (c) What is galvanisation?`,o:[],r:"",a:`<b>(a) Rusting:</b> Iron reacts with oxygen and water (moisture) to form hydrated iron(III) oxide (rust).<br>4Fe + 3O‚ÇÇ + xH‚ÇÇO ‚Üí 2Fe‚ÇÇO‚ÇÉ¬∑xH‚ÇÇO (rust ‚Äî reddish brown flaky layer)<br>Conditions needed: Both O‚ÇÇ and H‚ÇÇO are required. Salt water accelerates rusting (electrolyte).<br><b>(b) Prevention of rusting:</b><br>(i) Painting/varnishing ‚Äî prevents contact with O‚ÇÇ and moisture<br>(ii) Oiling/greasing ‚Äî machines and tools<br>(iii) Galvanisation ‚Äî coating with zinc<br>(iv) Tinning ‚Äî coating with tin<br>(v) Alloying ‚Äî stainless steel (Cr and Ni prevent rusting)<br>(vi) Electroplating ‚Äî coating with non-corrosive metal (Cr, Ni)<br>(vii) Sacrificial protection ‚Äî more reactive metal (Mg, Zn) corrodes preferentially<br><b>(c) Galvanisation:</b> Process of coating iron/steel with a thin layer of zinc. Zinc acts as a sacrificial metal ‚Äî it corrodes preferentially, protecting the iron underneath. Done by dipping in molten zinc or electroplating.`},
{subj:"chem",s:"E",t:"cs",c:"Metals and Non-metals",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Iron Bridge Maintenance</b><br><br>An old iron bridge was found to have significant rusting on the lower parts that remain submerged in river water. The upper parts (in open air) showed less rust. Engineers proposed two solutions: (1) Annual painting (2) Galvanisation.<br><br><b>(i)</b> Write the chemical formula of rust. <span class="cm">[1 mark]</span><br><b>(ii)</b> Why does the submerged part rust more? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Compare galvanisation and painting as methods of rust prevention. Which is better for a bridge and why? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is electroplating? How is it different from galvanisation? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> Fe‚ÇÇO‚ÇÉ¬∑xH‚ÇÇO (hydrated iron oxide)<br><b>(ii)</b> River water acts as an <b>electrolyte</b> (contains dissolved salts and O‚ÇÇ), accelerating the electrochemical corrosion process. More moisture + dissolved salts = faster rusting.<br><b>(iii)(a)</b> Painting: cheap but needs renewal every year; paint can chip/peel. Galvanisation: zinc coating lasts much longer (zinc corrodes preferentially even after scratches); more expensive initially but more durable. <b>Galvanisation is better for a bridge</b> ‚Äî longer lasting, zinc provides sacrificial protection even if scratched.<br><b>(iii)(b) Electroplating:</b> Depositing a thin metal layer on an object using electrolysis. Object = cathode, plating metal = anode, salt solution = electrolyte. <b>Difference:</b> Galvanisation specifically uses zinc by hot-dipping; electroplating can use any metal (Cr, Ni, Au, Ag) and is more precise/uniform.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"m",m:1,q:`When silver nitrate solution is mixed with sodium chloride solution, a white precipitate is formed. This is a:`,o:["A) Combination reaction","B) Decomposition reaction","C) Double displacement reaction","D) Displacement reaction"],r:"C",a:`AgNO‚ÇÉ + NaCl ‚Üí AgCl‚Üì + NaNO‚ÇÉ. Two compounds exchange ions ‚Üí <b>double displacement (precipitation) reaction</b>.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"m",m:1,q:`Photosynthesis is an example of:`,o:["A) Exothermic reaction","B) Endothermic reaction","C) Oxidation reaction","D) Decomposition reaction"],r:"B",a:`Photosynthesis absorbs light energy to produce glucose ‚Üí it is an <b>endothermic reaction</b>. (Also a combination/synthesis reaction, but the energy aspect makes it endothermic.)`},
{subj:"chem",s:"B",t:"vsa",c:"Chemical Reactions and Equations",d:"m",m:2,q:`What is a displacement reaction? How is it different from a double displacement reaction? Give one example of each.`,o:[],r:"",a:`<b>Displacement:</b> A more reactive element displaces a less reactive element from its compound. One reactant replaces part of another.<br>Example: Fe + CuSO‚ÇÑ ‚Üí FeSO‚ÇÑ + Cu (iron displaces copper)<br><b>Double displacement:</b> Two compounds exchange their ions to form two new compounds.<br>Example: NaCl + AgNO‚ÇÉ ‚Üí AgCl‚Üì + NaNO‚ÇÉ`},
{subj:"chem",s:"C",t:"sa",c:"Chemical Reactions and Equations",d:"h",m:3,q:`What is a redox reaction? With reference to the reaction 2PbO + C ‚Üí 2Pb + CO‚ÇÇ, identify which substance is oxidised and which is reduced. What are oxidising and reducing agents here?`,o:[],r:"",a:`A <b>redox reaction</b> involves simultaneous oxidation (loss of electrons/gain of oxygen) and reduction (gain of electrons/loss of oxygen).<br><b>2PbO + C ‚Üí 2Pb + CO‚ÇÇ</b><br><b>PbO is reduced:</b> PbO loses oxygen ‚Üí Pb (oxygen removed from PbO = reduction).<br><b>C is oxidised:</b> C gains oxygen ‚Üí CO‚ÇÇ (oxidation).<br><b>Oxidising agent:</b> PbO (it provides oxygen = causes oxidation of carbon) ‚Üí itself gets reduced.<br><b>Reducing agent:</b> C (it removes oxygen from PbO = causes reduction of lead oxide) ‚Üí itself gets oxidised.`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"m",m:1,q:`Which of the following salts is formed by strong acid + weak base?`,o:["A) NaCl","B) Na‚ÇÇCO‚ÇÉ","C) NH‚ÇÑCl","D) CH‚ÇÉCOONa"],r:"C",a:`NH‚ÇÑCl = strong acid (HCl) + weak base (NH‚ÇÑOH). Its solution is <b>acidic (pH < 7)</b>.`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"m",m:1,q:`Plaster of Paris on mixing with water:`,o:["A) Remains soft indefinitely","B) Hardens due to formation of gypsum","C) Dissolves in water","D) Releases CO‚ÇÇ"],r:"B",a:`CaSO‚ÇÑ¬∑¬ΩH‚ÇÇO + 1¬ΩH‚ÇÇO ‚Üí CaSO‚ÇÑ¬∑2H‚ÇÇO (gypsum). The setting = <b>hardening due to reformation of gypsum</b> crystals.`},
{subj:"chem",s:"B",t:"vsa",c:"Acids, Bases and Salts",d:"m",m:2,q:`Name the acid present in (a) vinegar (b) tamarind (c) nettle sting (d) gastric juice. Give their chemical names/formulae.`,o:[],r:"",a:`(a) Vinegar: <b>Acetic/Ethanoic acid (CH‚ÇÉCOOH)</b><br>(b) Tamarind: <b>Tartaric acid</b><br>(c) Nettle sting: <b>Methanoic/Formic acid (HCOOH)</b><br>(d) Gastric juice: <b>Hydrochloric acid (HCl)</b>`},
{subj:"chem",s:"C",t:"sa",c:"Acids, Bases and Salts",d:"m",m:3,q:`Explain with the help of activity how you can prepare sodium chloride by neutralisation. Why does the solution turn from blue to colourless in the activity? What is salt hydrolysis?`,o:[],r:"",a:`<b>Preparation of NaCl:</b><br>Take NaOH solution in a beaker with 2 drops of phenolphthalein indicator (turns pink). Add HCl drop by drop with stirring. The pink colour fades as NaOH is neutralised: NaOH + HCl ‚Üí NaCl + H‚ÇÇO. When the colour completely disappears ‚Üí exact neutralisation point (neutral solution). Evaporate solution ‚Üí NaCl crystals obtained.<br><b>Why turns colourless:</b> Phenolphthalein is pink in basic medium. As acid neutralises the base, solution becomes neutral (pH=7) ‚Üí indicator turns colourless.<br><b>Salt hydrolysis:</b> When a salt dissolves in water, ions may react with water molecules. E.g. NH‚ÇÑCl ‚Üí NH‚ÇÑ‚Å∫ + Cl‚Åª. NH‚ÇÑ‚Å∫ + H‚ÇÇO ‚áå NH‚ÇÑOH + H‚Å∫ ‚Üí acidic solution (pH<7).`},
{subj:"chem",s:"E",t:"cs",c:"Acids, Bases and Salts",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Soil pH and Crop Yield</b><br><br>A farmer noticed that her wheat crop was not growing well despite adequate water and sunlight. A soil test revealed the soil pH was 4.5 (strongly acidic). The agriculture officer recommended adding slaked lime to the soil.<br><br><b>(i)</b> What is the chemical name and formula of slaked lime? <span class="cm">[1 mark]</span><br><b>(ii)</b> Why does acidic soil affect crop growth? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Write the reaction between slaked lime and soil acid (HCl as model). Why does this improve the soil? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> If the soil is alkaline (pH 9), which substance should be added? Write the neutralisation reaction. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Slaked lime = Calcium hydroxide, Ca(OH)‚ÇÇ</b><br><b>(ii)</b> Most crops grow best in slightly acidic to neutral soil (pH 6‚Äì7). Very acidic soil (pH 4.5) inhibits nutrient availability, damages root cells, and disrupts microbial activity ‚Üí poor nutrient uptake ‚Üí stunted growth.<br><b>(iii)(a)</b> Ca(OH)‚ÇÇ + 2HCl ‚Üí CaCl‚ÇÇ + 2H‚ÇÇO. Adding slaked lime raises soil pH towards neutral ‚Üí better nutrient solubility ‚Üí improved crop growth. Also adds calcium to soil.<br><b>(iii)(b)</b> Add <b>organic matter/compost</b> or <b>sulphur</b> to acidify alkaline soil. S + O‚ÇÇ ‚Üí SO‚ÇÇ ‚Üí H‚ÇÇSO‚ÇÑ (dilute). Or: add gypsum (CaSO‚ÇÑ¬∑2H‚ÇÇO). General: acid + base ‚Üí salt + water.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`The functional unit of the kidney is:`,o:["A) Neuron","B) Nephron","C) Alveolus","D) Villus"],r:"B",a:`The <b>nephron</b> is the structural and functional unit of the kidney. Each kidney contains about 1 million nephrons.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`The process of breakdown of glucose in the presence of oxygen is called:`,o:["A) Anaerobic respiration","B) Fermentation","C) Aerobic respiration","D) Photosynthesis"],r:"C",a:`<b>Aerobic respiration:</b> C‚ÇÜH‚ÇÅ‚ÇÇO‚ÇÜ + 6O‚ÇÇ ‚Üí 6CO‚ÇÇ + 6H‚ÇÇO + 38 ATP. Complete oxidation of glucose.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`In which organ does maximum absorption of digested food take place?`,o:["A) Stomach","B) Large intestine","C) Small intestine","D) Oesophagus"],r:"C",a:`The <b>small intestine</b> is the primary site of absorption ‚Äî villi and microvilli enormously increase the absorptive surface area.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"h",m:1,q:`What would happen if the alveoli of lungs did not have a rich blood supply?`,o:["A) Breathing rate would increase","B) Gas exchange would not occur efficiently","C) More oxygen would be absorbed","D) Carbon dioxide would increase in blood"],r:"B",a:`Alveoli are surrounded by dense capillary networks for gaseous exchange. Without rich blood supply, <b>efficient O‚ÇÇ/CO‚ÇÇ exchange would not occur</b> ‚Äî the large surface area of alveoli would be wasted.`},
{subj:"bio",s:"B",t:"vsa",c:"Life Processes",d:"m",m:2,q:`What are stomata? What is their role in plant gas exchange?`,o:[],r:"",a:`<b>Stomata</b> are tiny pores found mainly on the underside of leaves, surrounded by two guard cells.<br><b>Role in gas exchange:</b><br>‚Ä¢ CO‚ÇÇ diffuses in through stomata for photosynthesis.<br>‚Ä¢ O‚ÇÇ (photosynthesis product) diffuses out.<br>‚Ä¢ O‚ÇÇ diffuses in for respiration; CO‚ÇÇ diffuses out.<br>‚Ä¢ Water vapour exits during <b>transpiration</b>.<br>Guard cells control opening and closing of stomata.`},
{subj:"bio",s:"B",t:"vsa",c:"Life Processes",d:"m",m:2,q:`Explain why arteries have thick, elastic walls but veins have thin walls with valves.`,o:[],r:"",a:`<b>Arteries:</b> Carry blood <b>from the heart</b> under high pressure. Thick, muscular, elastic walls can withstand and regulate high pressure. No valves needed (pressure keeps blood moving forward).<br><b>Veins:</b> Carry blood <b>to the heart</b> under low pressure. Thin walls sufficient. <b>Valves</b> prevent backflow of blood (gravity would cause blood to flow away from heart in limbs).`},
{subj:"bio",s:"C",t:"sa",c:"Life Processes",d:"h",m:3,q:`Draw a labelled diagram of the human respiratory system. Explain the mechanism of breathing (inspiration and expiration).`,o:[],r:"",a:`<b>Diagram labels:</b> Nostrils, nasal cavity, pharynx, larynx, trachea, bronchi, bronchioles, alveoli, lungs, diaphragm, ribs.<br><b>Inspiration (breathing in):</b><br>Diaphragm contracts (flattens down), external intercostal muscles contract (ribs move up and out). Thoracic volume increases ‚Üí air pressure inside lungs decreases below atmospheric ‚Üí air rushes in.<br><b>Expiration (breathing out):</b><br>Diaphragm relaxes (moves up), intercostal muscles relax (ribs move down and in). Thoracic volume decreases ‚Üí pressure inside increases above atmospheric ‚Üí air is pushed out.`},
{subj:"bio",s:"D",t:"la",c:"Life Processes",d:"h",m:5,q:`(a) Draw and explain the structure of the human heart with a labelled diagram. (b) Trace the path of a red blood cell from the right atrium to the left ventricle. (c) What is blood pressure? What is the normal range?`,o:[],r:"",a:`<b>(a) Human heart:</b> 4-chambered muscle. Labels: Right atrium (receives deoxygenated blood from body via vena cava), Right ventricle (pumps to lungs via pulmonary artery), Left atrium (receives oxygenated blood from lungs via pulmonary veins), Left ventricle (pumps to body via aorta). Valves: Tricuspid (right), Bicuspid/Mitral (left), Semilunar valves in arteries.<br><b>(b) Path of RBC:</b><br>Right atrium ‚Üí tricuspid valve ‚Üí right ventricle ‚Üí semilunar valve ‚Üí pulmonary artery ‚Üí lungs (O‚ÇÇ absorbed, CO‚ÇÇ released) ‚Üí pulmonary vein ‚Üí left atrium ‚Üí bicuspid valve ‚Üí left ventricle.<br><b>(c) Blood pressure:</b> Force exerted by blood on artery walls per unit area. Measured in mmHg with sphygmomanometer.<br>Normal: <b>120/80 mmHg</b> (systolic/diastolic). Hypertension: >140/90. Hypotension: <90/60.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"m",m:1,q:`Which gland is called the "master gland"?`,o:["A) Thyroid","B) Adrenal","C) Pituitary","D) Pancreas"],r:"C",a:`The <b>pituitary gland</b> is called the master gland because it secretes hormones that control other endocrine glands (e.g. TSH controls thyroid, FSH/LH control gonads).`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"m",m:1,q:`The hormone responsible for "fight or flight" response is:`,o:["A) Insulin","B) Thyroxine","C) Adrenaline","D) Oestrogen"],r:"C",a:`<b>Adrenaline</b> (epinephrine) ‚Äî secreted by adrenal medulla in response to stress/danger. Increases heart rate, blood glucose, and blood flow to muscles.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"m",m:1,q:`The growth of a plant shoot towards light is called:`,o:["A) Geotropism","B) Phototropism","C) Thigmotropism","D) Hydrotropism"],r:"B",a:`<b>Phototropism</b> ‚Äî movement/growth in response to light. Shoot tip grows towards light (positive phototropism). Caused by unequal distribution of auxin.`},
{subj:"bio",s:"B",t:"vsa",c:"Control and Coordination",d:"m",m:2,q:`What is diabetes mellitus? Which hormone is deficient? How is it managed?`,o:[],r:"",a:`<b>Diabetes mellitus</b> is a metabolic disorder characterised by high blood glucose levels (hyperglycaemia).<br><b>Cause:</b> Deficiency of insulin (Type 1) OR cells become resistant to insulin (Type 2).<br><b>Management:</b> Type 1: Daily insulin injections. Type 2: Diet control, exercise, oral medications (metformin). Both: Regular blood glucose monitoring, avoid sugary foods.`},
{subj:"bio",s:"C",t:"sa",c:"Control and Coordination",d:"m",m:3,q:`Explain with examples different types of plant movements: phototropism, geotropism, and thigmotropism.`,o:[],r:"",a:`<b>Phototropism:</b> Growth movement in response to light. Caused by unequal distribution of auxin. Shoot tip: positive phototropism (bends towards light). Root tip: negative phototropism (grows away from light).<br><b>Geotropism:</b> Growth movement in response to gravity. Root: positive geotropism (grows downward/towards gravity). Shoot: negative geotropism (grows upward/away from gravity).<br><b>Thigmotropism:</b> Growth movement in response to touch/contact. Tendrils of climbing plants coil around a support when they touch it. Caused by unequal auxin distribution where tendril touches support.`},
{subj:"bio",s:"E",t:"cs",c:"Control and Coordination",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Thyroid Disorder</b><br><br>A 12-year-old child showed poor growth and low mental alertness. A blood test showed low thyroxine levels. The doctor recommended iodised salt and thyroid hormone supplements.<br><br><b>(i)</b> Name the disorder caused by iodine deficiency in the thyroid. <span class="cm">[1 mark]</span><br><b>(ii)</b> What is the role of thyroxine in the body? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Explain how the pituitary gland controls the thyroid gland (feedback mechanism). <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Compare nervous control and hormonal control in humans. Give two differences. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Goitre</b> (in adults). In children: <b>cretinism</b> (stunted growth + intellectual disability).<br><b>(ii) Thyroxine:</b> Regulates basal metabolic rate (BMR), controls growth and development, regulates protein, fat, and carbohydrate metabolism. Essential for normal brain development in children.<br><b>(iii)(a) Feedback mechanism:</b> Pituitary secretes TSH (Thyroid Stimulating Hormone) ‚Üí TSH stimulates thyroid to produce thyroxine. When thyroxine level is adequate ‚Üí it inhibits pituitary from releasing more TSH (negative feedback). When thyroxine is low ‚Üí pituitary releases more TSH ‚Üí more thyroxine produced.<br><b>(iii)(b)</b><br>Nervous: Fast (milliseconds), short-lived, specific pathway (nerve fibre), uses electrical signals.<br>Hormonal: Slow (seconds to hours), long-lasting, travels via blood to target organ, uses chemical signals.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"m",m:1,q:`In Plasmodium (malaria parasite), reproduction occurs by:`,o:["A) Binary fission","B) Budding","C) Multiple fission","D) Fragmentation"],r:"C",a:`Plasmodium reproduces by <b>multiple fission</b> ‚Äî one cell divides into many daughter cells simultaneously. This occurs inside RBCs and liver cells.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"m",m:1,q:`In humans, the embryo gets nutrition from the mother through:`,o:["A) Umbilical cord only","B) Placenta","C) Amnion","D) Yolk sac"],r:"B",a:`The <b>placenta</b> is a special organ that connects the embryo to the mother's uterine wall. Nutrients, oxygen, and antibodies pass from mother to embryo; CO‚ÇÇ and wastes pass back.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"h",m:1,q:`Test tube baby technique involves:`,o:["A) Fertilisation inside uterus","B) In vitro fertilisation followed by implantation","C) Cloning of embryo","D) Surrogate mother carrying another's egg"],r:"B",a:`Test tube baby (IVF ‚Äî In Vitro Fertilisation): egg + sperm are fertilised <b>outside the body</b> (in vitro), then the embryo is implanted in the uterus.`},
{subj:"bio",s:"B",t:"vsa",c:"How do Organisms Reproduce?",d:"m",m:2,q:`What is vegetative propagation? Give three methods with examples.`,o:[],r:"",a:`<b>Vegetative propagation:</b> Asexual reproduction in plants where new plants develop from vegetative parts (root, stem, leaf) of the parent.<br>(1) <b>Stem cutting:</b> Rose, sugarcane ‚Äî cut stem planted in soil develops new plant.<br>(2) <b>Layering:</b> Jasmine ‚Äî stem bent and covered with soil ‚Üí roots form ‚Üí separated.<br>(3) <b>Grafting:</b> Mango, apple ‚Äî shoot of desired variety joined to rooted stock plant.`},
{subj:"bio",s:"C",t:"sa",c:"How do Organisms Reproduce?",d:"m",m:3,q:`Explain the structure of a flower with a labelled diagram. Name the male and female reproductive parts.`,o:[],r:"",a:`<b>Flower parts:</b><br><b>Male parts (Stamen):</b> Anther (contains pollen grains ‚Äî male gametes) + Filament (stalk).<br><b>Female parts (Pistil/Carpel):</b> Stigma (sticky top ‚Äî receives pollen) + Style (tube connecting stigma to ovary) + Ovary (contains ovules with eggs).<br><b>Non-reproductive parts:</b> Sepals (protect bud), Petals (attract pollinators).<br><b>Pollination</b> = transfer of pollen from anther to stigma. <b>Fertilisation</b> = fusion of male gamete (from pollen) with egg in ovule.`},
{subj:"bio",s:"D",t:"la",c:"How do Organisms Reproduce?",d:"h",m:5,q:`(a) Describe the process of reproduction in Amoeba, Hydra, and Spirogyra. (b) What are the advantages of sexual reproduction over asexual reproduction? (c) What is DNA copying? Why is it important?`,o:[],r:"",a:`<b>(a) Reproduction in organisms:</b><br><b>Amoeba:</b> Binary fission ‚Äî nucleus divides (mitosis), then cytoplasm divides ‚Üí two identical daughter Amoebae.<br><b>Hydra:</b> Budding ‚Äî a small outgrowth (bud) forms on the parent's body, grows, and eventually detaches as a new individual.<br><b>Spirogyra:</b> Fragmentation ‚Äî the filament breaks into pieces (fragments), each piece grows into a new organism.<br><b>(b) Advantages of sexual reproduction:</b><br>(i) Creates genetic variation (shuffling of DNA from two parents) ‚Üí offspring can adapt better to changing environments.<br>(ii) Variation provides raw material for natural selection and evolution.<br>(iii) Harmful mutations can be masked by the healthy allele from the other parent.<br><b>(c) DNA copying:</b> Before cell division, the DNA in the nucleus is duplicated (replicated) so each daughter cell gets a complete copy. Importance: (i) Ensures all daughter cells have the same genetic information as the parent. (ii) Allows traits to be inherited. (iii) Occasional errors in copying (mutations) ‚Üí source of variation ‚Üí evolution.`},
{subj:"bio",s:"E",t:"cs",c:"How do Organisms Reproduce?",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Tissue Culture</b><br><br>A flower nursery uses tissue culture to produce thousands of identical orchid plants from a single plant. A small piece of tissue (explant) is placed in a sterile nutrient medium and grows into a callus, which then develops into complete plants.<br><br><b>(i)</b> What type of reproduction is tissue culture? <span class="cm">[1 mark]</span><br><b>(ii)</b> What is the term for producing identical copies of a plant? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> State two advantages and one disadvantage of producing plants through tissue culture. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Explain micropropagation and name two plants in which it is commercially used. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Asexual reproduction / Vegetative propagation</b><br><b>(ii) Cloning</b> (all plants are genetically identical = clones)<br><b>(iii)(a) Advantages:</b> (1) Thousands of plants produced quickly from small tissue sample. (2) Disease-free plants (sterile conditions). (3) Rare/endangered plants can be conserved. <b>Disadvantage:</b> Lack of genetic diversity ‚Äî all plants genetically identical ‚Üí vulnerable to same diseases/pests.<br><b>(iii)(b) Micropropagation:</b> Growing large numbers of plants from tiny plant tissue in sterile nutrient medium. Used commercially for: <b>Orchids, Banana, Potato, Strawberry, Sugarcane</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"m",m:1,q:`The sex of a child is determined by:`,o:["A) The egg of the mother","B) The sperm of the father","C) Both egg and sperm","D) Environmental conditions"],r:"B",a:`Mother's eggs always carry X chromosome. Father's sperm carry either X or Y. If Y-sperm fertilises egg ‚Üí XY (boy). X-sperm ‚Üí XX (girl). Sex is determined by <b>father's sperm</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"m",m:1,q:`In Mendel's dihybrid cross (RRYY √ó rryy), what fraction of F2 offspring show round yellow seeds?`,o:["A) 1/16","B) 9/16","C) 3/16","D) 1/4"],r:"B",a:`Dihybrid F2 ratio = 9:3:3:1. Round yellow (R_Y_) = <b>9/16</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"h",m:1,q:`Which of the following is an example of analogous organs?`,o:["A) Wings of bat and arm of human","B) Wings of butterfly and wings of bird","C) Flipper of whale and arm of human","D) Forelimbs of frog and lizard"],r:"B",a:`<b>Wings of butterfly (insect) and wings of bird</b> ‚Äî same function (flight) but completely different structure and origin = analogous organs. The others are homologous.`},
{subj:"bio",s:"B",t:"vsa",c:"Heredity and Evolution",d:"m",m:2,q:`A colour blind father and a normal carrier mother (X^B X^b) marry. What is the probability that their son is colour blind? Show with a Punnett square.`,o:[],r:"",a:`Father: X^b Y (colour blind). Mother: X^B X^b (carrier).<br>Cross: X^b Y √ó X^B X^b<br>Offspring: X^B X^b (normal female carrier), X^b X^b (colour blind female), X^B Y (normal male), X^b Y (colour blind male)<br>Probability of son being colour blind = 1 out of 2 sons = <b>50%</b>.`},
{subj:"bio",s:"C",t:"sa",c:"Heredity and Evolution",d:"h",m:3,q:`What is evolution? How does natural selection lead to evolution? Give one example.`,o:[],r:"",a:`<b>Evolution:</b> The gradual change in the heritable characteristics of biological populations over successive generations, leading to formation of new species.<br><b>Natural selection and evolution:</b><br>1. In any population, individuals show variation (due to mutations, sexual reproduction).<br>2. More offspring are produced than can survive (Malthusian struggle for existence).<br>3. Individuals with favourable variations survive and reproduce more (survival of the fittest).<br>4. Favourable traits are inherited by offspring.<br>5. Over many generations, these traits become more common ‚Üí population changes ‚Üí new species.<br><b>Example: Industrial Melanism in moths:</b> Before industrial revolution, pale (white) peppered moths were common (camouflaged on light bark). After industrial revolution, tree bark turned black with soot ‚Üí dark moths survived better (better camouflaged) ‚Üí dark moths became more common. Pale moths were selected against by predators.`},
{subj:"bio",s:"D",t:"la",c:"Heredity and Evolution",d:"h",m:5,q:`(a) Explain Mendel's Laws of Heredity (Law of Dominance, Law of Segregation, Law of Independent Assortment). (b) In a monohybrid cross, when Tt plants are crossed: (i) write F1 genotype and phenotype (ii) write F2 genotypic and phenotypic ratios. (c) Why are Mendel's laws not always valid?`,o:[],r:"",a:`<b>(a) Mendel's Laws:</b><br><b>1. Law of Dominance:</b> When two alleles are present, one (dominant) masks the expression of the other (recessive). Only dominant allele shows in phenotype of heterozygote.<br><b>2. Law of Segregation:</b> During gamete formation, allele pairs segregate ‚Äî each gamete receives only one allele. Alleles recombine randomly at fertilisation.<br><b>3. Law of Independent Assortment:</b> Alleles of different genes assort independently of each other during gamete formation (only valid if genes are on different chromosomes).<br><b>(b) Tt √ó Tt (monohybrid):</b><br>F1 (from TT√ótt): All Tt (tall). F1 is not a cross here ‚Äî F1 = Tt from TT√ótt.<br>F2 (from Tt√óTt): Genotypes: 1TT:2Tt:1tt = <b>1:2:1</b>. Phenotypes: 3 tall:1 short = <b>3:1</b>.<br><b>(c) Exceptions:</b><br>(i) Linked genes (on same chromosome) ‚Äî do not assort independently.<br>(ii) Incomplete dominance ‚Äî heterozygote shows intermediate phenotype (e.g. pink flower from red √ó white).<br>(iii) Co-dominance ‚Äî both alleles expressed (e.g. blood group AB).<br>(iv) Polygenic inheritance ‚Äî traits controlled by multiple genes.`},
{subj:"bio",s:"E",t:"cs",c:"Heredity and Evolution",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Gal√°pagos Finches</b><br><br>Darwin observed 13 species of finches in the Gal√°pagos Islands, all descended from a common ancestor. Each species had a differently shaped beak adapted to its food source ‚Äî some had large crushing beaks for seeds, others had narrow beaks for insects, and some had sharp beaks for cactus.<br><br><b>(i)</b> What principle does the diversity of Gal√°pagos finches demonstrate? <span class="cm">[1 mark]</span><br><b>(ii)</b> What is adaptive radiation? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Explain how natural selection could have led to 13 different beak types from one ancestor. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is the difference between microevolution and macroevolution? Give one example of each. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Natural selection / Evolution / Adaptive radiation</b><br><b>(ii) Adaptive radiation:</b> Evolution of multiple species from a single common ancestor, with each adapted to a different ecological niche.<br><b>(iii)(a)</b> Ancestral finches arrived in Gal√°pagos. Different islands had different food sources. Birds with beak variations that matched available food survived better and reproduced more. Over many generations, natural selection favoured different beak shapes in different environments ‚Üí different populations ‚Üí reproductive isolation ‚Üí 13 distinct species.<br><b>(iii)(b) Microevolution:</b> Small genetic changes within a species over short periods. Example: Development of antibiotic resistance in bacteria. <b>Macroevolution:</b> Large-scale evolution leading to new species, genera, or higher taxonomic groups. Example: Evolution of horses from small Eohippus to modern Equus over 50 million years.`},
{subj:"phy",s:"E",t:"cs",c:"Human Eye and Colourful World",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Spectacles Prescription</b><br><br>Rehan is 14 years old and has been squinting at the blackboard. His eye test shows: Right eye -2.5D, Left eye -3.0D. His grandfather also wears glasses but for reading ‚Äî his prescription is +2.0D.<br><br><b>(i)</b> What defect does Rehan have? What type of lens corrects it? <span class="cm">[1 mark]</span><br><b>(ii)</b> What defect does Rehan's grandfather have? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Calculate the focal length of the lens prescribed to Rehan's right eye. What does the negative sign indicate? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> With age, Rehan's grandfather develops difficulty seeing both near and far. What condition is this and what lens is used? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> Rehan has <b>Myopia (short-sightedness)</b>. Corrected by <b>concave (diverging) lens</b>.<br><b>(ii)</b> Grandfather has <b>Hypermetropia (far-sightedness)</b> ‚Äî cannot read/see nearby objects clearly.<br><b>(iii)(a)</b> P = ‚àí2.5D. f = 1/P = 1/(‚àí2.5) = <b>‚àí0.4 m = ‚àí40 cm</b>. <b>Negative sign</b> indicates it is a <b>concave (diverging) lens</b>.<br><b>(iii)(b) Presbyopia</b> ‚Äî loss of near vision with age due to weakening of ciliary muscles and hardening of lens. Corrected by <b>bifocal lenses</b> (upper half concave for distance, lower half convex for near).`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`Domestic electric supply in India is:`,o:["A) 110V AC, 60 Hz","B) 220V DC","C) 220V AC, 50 Hz","D) 440V AC, 50 Hz"],r:"C",a:`Indian domestic supply is <b>220V AC at 50 Hz</b>. The live wire alternates between +311V and -311V (220V is RMS value).`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`The function of a fuse in a circuit is to:`,o:["A) Increase current","B) Prevent voltage fluctuations","C) Break the circuit if current exceeds safe limit","D) Store electrical energy"],r:"C",a:`A fuse wire melts and <b>breaks the circuit</b> if current exceeds the rated value, protecting appliances from damage.`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"h",m:1,q:`An MCB (Miniature Circuit Breaker) works on the principle of:`,o:["A) Heating effect of current","B) Magnetic effect of current","C) Both A and B","D) Chemical effect"],r:"C",a:`MCB uses <b>both</b>: a bimetallic strip (heating effect ‚Äî for overload) AND an electromagnet (magnetic effect ‚Äî for short circuit). More reliable than fuse.`},
{subj:"phy",s:"B",t:"vsa",c:"Human Eye and Colourful World",d:"e",m:2,q:`What is the power of accommodation of the human eye? Why does it decrease with age?`,o:[],r:"",a:`<b>Power of accommodation</b> is the ability of the eye lens to change its focal length (by changing curvature using ciliary muscles) to focus on objects at different distances.<br><b>Decreases with age</b> because ciliary muscles weaken and the eye lens becomes harder and less flexible ‚Üí cannot change shape easily ‚Üí presbyopia.`},
{subj:"phy",s:"B",t:"vsa",c:"Magnetic Effects of Electric Current",d:"e",m:2,q:`What is an electromagnet? Give two differences between a permanent magnet and an electromagnet.`,o:[],r:"",a:`An <b>electromagnet</b> is a temporary magnet made by passing electric current through a coil wound around a soft iron core.<br><b>Differences:</b><br>(1) Permanent magnet retains magnetism always; electromagnet loses magnetism when current is switched off.<br>(2) Strength of electromagnet can be controlled by varying current; permanent magnet strength is fixed.`},
{subj:"chem",s:"B",t:"vsa",c:"Carbon and its Compounds",d:"e",m:2,q:`What is a functional group? Name the functional groups in (i) alcohols (ii) aldehydes (iii) carboxylic acids.`,o:[],r:"",a:`A <b>functional group</b> is an atom or group of atoms that gives a compound its characteristic chemical properties.<br>(i) Alcohols: <b>‚ÄìOH</b> (hydroxyl group)<br>(ii) Aldehydes: <b>‚ÄìCHO</b> (aldehyde group)<br>(iii) Carboxylic acids: <b>‚ÄìCOOH</b> (carboxyl group)`},
{subj:"bio",s:"B",t:"vsa",c:"How do Organisms Reproduce?",d:"e",m:2,q:`What is the difference between self-pollination and cross-pollination? Give one advantage of each.`,o:[],r:"",a:`<b>Self-pollination:</b> Pollen transferred from anther to stigma of the <i>same flower</i> or same plant.<br>Advantage: No dependence on external agents; ensures reproduction even in absence of pollinators.<br><b>Cross-pollination:</b> Pollen transferred to the stigma of a <i>different plant</i> of the same species.<br>Advantage: Creates genetic variation in offspring ‚Üí better adaptation and evolution.`},
{subj:"phy",s:"A",t:"mcq",c:"Light ‚Äì Reflection and Refraction",d:"e",m:1,q:`Which type of mirror is used in headlights of cars?`,o:["A) Plane mirror","B) Concave mirror","C) Convex mirror","D) Cylindrical mirror"],r:"B",a:`<b>Concave mirror</b> is used in headlights ‚Äî it converges light rays into a parallel beam for far illumination.`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"e",m:1,q:`What is the SI unit of electric potential difference?`,o:["A) Ampere","B) Ohm","C) Volt","D) Watt"],r:"C",a:`SI unit of potential difference (voltage) is <b>Volt (V)</b>. 1 Volt = 1 Joule/Coulomb.`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"e",m:1,q:`A compass needle is deflected when placed near a current-carrying wire. This shows:`,o:["A) Electric effect","B) Magnetic effect of current","C) Heating effect","D) Chemical effect"],r:"B",a:`The deflection of a compass needle by current demonstrates the <b>magnetic effect of electric current</b> (discovered by Oersted in 1820).`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"e",m:1,q:`Which of the following is a non-renewable energy source?`,o:["A) Solar energy","B) Wind energy","C) Coal","D) Tidal energy"],r:"C",a:`<b>Coal</b> is a fossil fuel ‚Äî non-renewable (takes millions of years to form, cannot be replenished at the rate of use).`},
{subj:"phy",s:"A",t:"mcq",c:"Human Eye and Colourful World",d:"e",m:1,q:`Which colour of light has the maximum speed in a glass prism?`,o:["A) Violet","B) Blue","C) Green","D) Red"],r:"D",a:`<b>Red</b> light has the lowest refractive index in glass ‚Üí highest speed. Violet has highest n ‚Üí lowest speed. This is why red bends least in a prism.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"e",m:1,q:`Which of the following is an endothermic reaction?`,o:["A) Burning of coal","B) Decomposition of calcium carbonate","C) Rusting of iron","D) Respiration"],r:"B",a:`CaCO‚ÇÉ ‚Üí CaO + CO‚ÇÇ requires <b>heat to be supplied</b> ‚Üí endothermic. All others release energy.`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"e",m:1,q:`Turmeric is used as a natural indicator. What colour does it turn in a basic solution?`,o:["A) Yellow","B) Red","C) Blue","D) Green"],r:"B",a:`Turmeric turns <b>red/brown</b> in basic solutions. It remains yellow in acidic and neutral solutions.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"e",m:1,q:`Which of the following metals is stored in kerosene?`,o:["A) Gold","B) Silver","C) Sodium","D) Iron"],r:"C",a:`<b>Sodium</b> is stored in kerosene oil because it reacts vigorously with oxygen and moisture in air and even with water.`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"e",m:1,q:`The molecular formula of methane is:`,o:["A) CH‚ÇÇ","B) CH‚ÇÑ","C) C‚ÇÇH‚ÇÑ","D) C‚ÇÇH‚ÇÜ"],r:"B",a:`Methane = <b>CH‚ÇÑ</b>. It is the simplest alkane with 1 carbon and 4 hydrogen atoms.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"e",m:1,q:`The green pigment in plants that traps solar energy for photosynthesis is:`,o:["A) Haemoglobin","B) Melanin","C) Chlorophyll","D) Carotene"],r:"C",a:`<b>Chlorophyll</b> is the green pigment found in chloroplasts that absorbs light energy (mainly red and blue wavelengths) for photosynthesis.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"e",m:1,q:`Which part of the brain controls balance and coordination of body movements?`,o:["A) Cerebrum","B) CerebellumC) Medulla","D) Hypothalamus"],r:"B",a:`<b>Cerebellum</b> (hind brain) coordinates voluntary movements, balance, and posture. Cerebrum handles thinking; medulla controls involuntary actions.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"e",m:1,q:`In humans, the fertilised egg implants in the:`,o:["A) Fallopian tube","B) Ovary","C) Uterus","D) Cervix"],r:"C",a:`After fertilisation in the fallopian tube, the zygote travels to the <b>uterus</b> where it implants in the endometrium (uterine wall) and develops into an embryo.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"e",m:1,q:`Which of the following is a primary consumer (herbivore) in a grassland food chain?`,o:["A) Grass","B) Rabbit","C) Fox","D) Eagle"],r:"B",a:`<b>Rabbit</b> eats grass (producer) ‚Üí rabbit is a primary consumer (herbivore). Fox eats rabbit (secondary consumer). Eagle is a tertiary consumer.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"e",m:1,q:`The "Reduce, Reuse, Recycle" principle is aimed at:`,o:["A) Increasing production","B) Sustainable use of resources","C) Faster development","D) Increasing exports"],r:"B",a:`The 3R principle promotes <b>sustainable use of natural resources</b> ‚Äî reducing waste, extending product life, and recovering materials.`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"e",m:1,q:`The physical expression of a gene (observable trait) is called:`,o:["A) Genotype","B) Allele","C) Phenotype","D) Chromosome"],r:"C",a:`<b>Phenotype</b> is the observable characteristic (e.g. tall plant, blue eyes). Genotype is the genetic makeup (e.g. Tt). Allele is a variant form of a gene.`}],
sst:[{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"e",m:1,q:`Who painted "Germania" which became a symbol of the German nation?`,o:["A) Fr√©d√©ric Sorrieu","B) Philip Veit","C) Lorenz Clasen","D) Herder"],r:"B",a:`<b>Philip Veit</b> painted Germania (1848).`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"e",m:1,q:`Which treaty recognised Greece as an independent nation?`,o:["A) Treaty of Vienna","B) Treaty of Constantinople","C) Treaty of Versailles","D) Treaty of Westphalia"],r:"B",a:`<b>Treaty of Constantinople (1832)</b> recognised Greece as an independent nation after its struggle against the Ottoman Empire.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`The Zollverein (1834) was a:`,o:["A) Military alliance","B) Customs union removing trade barriers between German states","C) Political union","D) Religious union"],r:"B",a:`<b>Zollverein</b> was a customs union ‚Äî removed tariff barriers between German states, creating a common market.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`Count Cavour who led Italian unification was:`,o:["A) King of Sardinia-Piedmont","B) Chief Minister of Sardinia-Piedmont","C) Leader of Redshirts","D) Revolutionary from Sicily"],r:"B",a:`Cavour was <b>Chief Minister of Sardinia-Piedmont</b> who used diplomacy to engineer Italian unification.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`The Frankfurt Parliament of 1848 failed because:`,o:["A) It lacked popular support","B) Prussia rejected the crown and kings reasserted authority","C) France invaded Germany","D) Insufficient funds"],r:"B",a:`King of Prussia <b>rejected</b> the crown. Conservative monarchs crushed the liberal nationalist movement.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"h",m:1,q:`"Marianne" was a symbol of:`,o:["A) German nation","B) French Republic","C) Italian unity","D) British Empire"],r:"B",a:`<b>Marianne</b> ‚Äî female allegory of the French Republic. Germania = Germany.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`Romanticism contributed to nationalism by:`,o:["A) Promoting scientific rationalism","B) Collecting folk songs and vernacular culture creating emotional national identity","C) Opposing religion","D) Supporting industrialisation"],r:"B",a:`Romantics collected folk songs, poetry in vernacular languages ‚Äî created emotional cultural identity and shared national spirit.`},
{subj:"hist",s:"A",t:"ar",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`<b>Assertion:</b> After 1815, conservatives tried to suppress liberal and nationalist movements.<br><b>Reason:</b> The Congress of Vienna (1815) restored old monarchies and the conservative order.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both correct. Congress of Vienna restored monarchies ‚Üí conservative order naturally suppressed liberal-nationalist movements. Answer: <b>A</b>`},
{subj:"hist",s:"A",t:"ar",c:"The Rise of Nationalism in Europe",d:"m",m:1,q:`<b>Assertion:</b> Mazzini founded "Young Italy" to promote Italian unification.<br><b>Reason:</b> He believed nations were natural units of humanity and Italy must be unified as a republic.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Mazzini's philosophy led him to found Young Italy (1831) for unification through revolution. Answer: <b>A</b>`},
{subj:"hist",s:"C",t:"sa",c:"The Rise of Nationalism in Europe",d:"m",m:3,q:`How did the Romantic movement contribute to nationalism in Europe? Mention three ways.`,o:[],r:"",a:`(i) <b>Folk culture:</b> Romantics collected folk songs and poetry in vernacular languages ‚Äî argued national spirit lived in common people's culture.<br>(ii) <b>Emotional identity:</b> Art, music, and poetry created emotional cultural identity ‚Äî shared sense of "we" based on common history.<br>(iii) <b>Music as resistance:</b> Composers like Karol Kurpinski used folk tunes to keep nationalist feelings alive under foreign rule (Poland).`},
{subj:"hist",s:"C",t:"sa",c:"The Rise of Nationalism in Europe",d:"m",m:3,q:`Explain the role of Otto von Bismarck in German unification.`,o:[],r:"",a:`Bismarck as Chief Minister of Prussia (from 1862) used "blood and iron":<br>(i) Built up Prussian army; fought three wars ‚Äî Denmark (1864), Austria (1866), France (1870‚Äì71).<br>(ii) Austro-Prussian War made Prussia dominant in German affairs.<br>(iii) Franco-Prussian War united all German states. Wilhelm I proclaimed Kaiser of German Empire at Versailles, January 1871.`},
{subj:"hist",s:"D",t:"la",c:"The Rise of Nationalism in Europe",d:"h",m:5,q:`Describe Italian unification ‚Äî roles of Mazzini, Cavour, and Garibaldi.`,o:[],r:"",a:`<b>Mazzini (Soul):</b> Founded Young Italy (1831); believed Italy should be a democratic republic; inspired a generation of nationalists.<br><b>Cavour (Brain):</b> Chief Minister of Sardinia-Piedmont; used diplomacy ‚Äî allied France against Austria (1859); consolidated northern Italian states.<br><b>Garibaldi (Sword):</b> Led Redshirts to conquer Kingdom of Two Sicilies (1860); his southern campaign met Cavour's northern consolidation.<br><b>Result:</b> Victor Emmanuel II proclaimed King of Italy (1861). Venice joined 1866; Rome 1870.`},
{subj:"hist",s:"B",t:"sb",c:"The Rise of Nationalism in Europe",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Sorrieu's Vision (1848)</b><br><br><i>"Sorrieu visualises a world made up of democratic and social Republics. The peoples of the world are shown as distinct nations, identified through their flags, paying homage to the Statue of Liberty as they march in a long train..."</i><br><br>(i) Who was Sorrieu and what did his prints represent? [1]<br>(ii) What does the Statue of Liberty symbolise here? [1]<br>(iii) How does this reflect the 1848 spirit in Europe? [2]</div>`,o:[],r:"",a:`(i) Fr√©d√©ric Sorrieu was a <b>French artist</b> who in 1848 created prints visualising a utopian world of democratic republics where all peoples live in peace.<br>(ii) The Statue of Liberty symbolises <b>freedom and democracy</b> ‚Äî ideals nationalist movements aspired to.<br>(iii) Reflects 1848's <b>liberal nationalism</b> ‚Äî belief that the world could be reorganised into democratic nation-states. 1848 saw revolutions across Europe against conservative monarchies.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"e",m:1,q:`The Non-Cooperation Movement was launched in:`,o:["A) 1915","B) 1919","C) 1920","D) 1922"],r:"C",a:`<b>Non-Cooperation Movement: 1920</b>. Launched by Gandhi following Jallianwala Bagh and the Khilafat issue. Withdrawn 1922 after Chauri Chaura.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"e",m:1,q:`Jallianwala Bagh massacre took place in:`,o:["A) 1915","B) 1917","C) 1919","D) 1921"],r:"C",a:`<b>13 April 1919</b> (Baisakhi), Amritsar. General Dyer fired on peaceful gathering protesting the Rowlatt Act.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"e",m:1,q:`The Civil Disobedience Movement began with:`,o:["A) Quit India Movement","B) Dandi March (Salt March)","C) Boycott of Simon Commission","D) Chauri Chaura"],r:"B",a:`<b>Dandi March (Salt March), 12 March 1930</b> ‚Äî Gandhi led 240-mile march to Dandi to make salt and break the salt law.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"m",m:1,q:`Non-Cooperation Movement was withdrawn in 1922 because:`,o:["A) British agreed to demands","B) Movement achieved goals","C) Violence at Chauri Chaura ‚Äî mob burnt police station killing 22 policemen","D) Gandhi was arrested"],r:"C",a:`<b>Chauri Chaura incident (February 1922)</b> ‚Äî violent mob burnt a police station. Gandhi insisted on strict non-violence and called off the movement.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"m",m:1,q:`Who composed "Vande Mataram" and in which novel?`,o:["A) Tagore ‚Äî Gitanjali","B) Bankim Chandra Chattopadhyay ‚Äî Anandamath","C) Subramania Bharati ‚Äî Panchali Sabatham","D) Abanindranath Tagore ‚Äî Bharat Mata"],r:"B",a:`<b>Bankim Chandra Chattopadhyay</b> composed "Vande Mataram" in his novel <b>Anandamath</b> (1882).`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"m",m:1,q:`The Rowlatt Act (1919) allowed:`,o:["A) Heavy taxes","B) Detention without trial for 2 years","C) Banning of Indian newspapers","D) Forced military service"],r:"B",a:`Rowlatt Act allowed <b>arrest and detention without trial for up to 2 years</b> ‚Äî a "black law" that outraged all Indians.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"h",m:1,q:`Which community largely did NOT participate in the Civil Disobedience Movement?`,o:["A) Peasants of UP","B) Muslim community (largely)","C) Women","D) Merchants"],r:"B",a:`<b>Muslim community (largely)</b> did not participate fully. After Khilafat ended, many felt Congress was Hindu-dominated.`},
{subj:"hist",s:"A",t:"ar",c:"Nationalism in India",d:"m",m:1,q:`<b>Assertion:</b> Gandhi chose salt as the symbol of Civil Disobedience.<br><b>Reason:</b> Salt was consumed by every Indian regardless of caste, class, or religion ‚Äî tax affected all equally.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Salt was a powerful unifying symbol ‚Äî R explains exactly why. Answer: <b>A</b>`},
{subj:"hist",s:"A",t:"ar",c:"Nationalism in India",d:"m",m:1,q:`<b>Assertion:</b> Women's participation in nationalist movement increased significantly after 1919.<br><b>Reason:</b> Gandhi actively encouraged women to join Non-Cooperation and Civil Disobedience Movements.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Gandhi saw women as natural practitioners of non-violence. Women picketed shops, made salt. Answer: <b>A</b>`},
{subj:"hist",s:"C",t:"sa",c:"Nationalism in India",d:"m",m:3,q:`Why did different social groups participate in the Civil Disobedience Movement?`,o:[],r:"",a:`(i) <b>Rich peasants:</b> Agricultural prices collapsed in Great Depression. Patidars (Gujarat), Jats (UP) couldn't pay revenue ‚Äî demanded reduction.<br>(ii) <b>Poor peasants:</b> Hoped debt would be cancelled and rent reduced.<br>(iii) <b>Business classes:</b> Wanted protection from cheap imports, funded Congress.<br>(iv) <b>Industrial workers:</b> Joined selectively (Nagpur strikes).`},
{subj:"hist",s:"C",t:"sa",c:"Nationalism in India",d:"m",m:3,q:`How did the image of "Bharat Mata" contribute to nationalism in India?`,o:[],r:"",a:`(i) <b>Creation:</b> Bankim Chandra articulated in Anandamath (1882). Abanindranath Tagore painted the iconic image (1905) ‚Äî calm spiritual figure with book, paddy, white cloth, garland.<br>(ii) <b>Emotional appeal:</b> Nation as mother created deep emotional bonds ‚Äî Indians as children of a mother goddess, inspiring sacrifice.<br>(iii) <b>Contestation:</b> Interpreted differently ‚Äî Hindu goddess by some, secular symbol by others ‚Äî showing nationalism meant different things to different groups.`},
{subj:"hist",s:"D",t:"la",c:"Nationalism in India",d:"h",m:5,q:`Explain the Non-Cooperation Movement (1920-22): Why launched? What methods? Why withdrawn?`,o:[],r:"",a:`<b>Launch:</b> Two reasons: (i) Protest against Jallianwala Bagh (1919) and Rowlatt Act. (ii) Support for Khilafat Movement (Muhammad Ali, Shaukat Ali) to preserve the Ottoman Khalifa.<br><br><b>Methods:</b> Surrender of titles; boycott of courts, schools, councils; boycott of foreign goods; use of khadi; setting up national institutions (Jamia Millia, Gujarat Vidyapith).<br><br><b>Spread:</b> Unprecedented Hindu-Muslim unity. Khadi = symbol of nationalism. Foreign cloth bonfires.<br><br><b>Withdrawal (Feb 1922):</b> Chauri Chaura ‚Äî mob burnt police station, killed 22 policemen. Gandhi called off immediately. Controversial ‚Äî Motilal Nehru, C.R. Das felt it was a mistake.`},
{subj:"hist",s:"B",t:"sb",c:"Nationalism in India",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Gandhi on Non-Violence</b><br><br><i>"Non-violence is the greatest force at the disposal of mankind. Non-cooperation with evil is as much a duty as is cooperation with good."</i><br><br>(i) What does "non-cooperation with evil" mean in the Indian context? [1]<br>(ii) Two forms non-cooperation took in 1920-22? [1]<br>(iii) Why did some leaders disagree with Gandhi's 1922 withdrawal? [2]</div>`,o:[],r:"",a:`(i) Refusing to cooperate with <b>British colonial rule</b> ‚Äî an unjust, exploitative system Gandhi saw as evil.<br>(ii) (1) Surrendering government titles (2) Boycotting foreign cloth ‚Äî burning foreign cloth publicly.<br>(iii) Leaders like Motilal Nehru and C.R. Das felt: (1) Movement was at its peak ‚Äî withdrawal would demoralise supporters. (2) One isolated violent incident shouldn't end a nationwide movement.`},
