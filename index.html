{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"e",m:1,q:`Ohm's Law states that (at constant temperature):`,o:["A) V ‚àù R","B) V ‚àù 1/I","C) V ‚àù I","D) I ‚àù R"],r:"C",a:`Ohm's Law: <b>V ‚àù I</b>, i.e., V = IR (at constant temperature).`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"m",m:1,q:`Three resistors of 2Œ©, 3Œ©, 6Œ© connected in parallel. Equivalent resistance:`,o:["A) 11Œ©","B) 1Œ©","C) 2Œ©","D) 3Œ©"],r:"B",a:`1/R = 1/2+1/3+1/6 = 3/6+2/6+1/6 = 6/6 = 1. R = <b>1Œ©</b>`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"m",m:1,q:`Electric power consumed by a device: V=220V, I=5A. Power=`,o:["A) 44W","B) 225W","C) 1100W","D) 44A"],r:"C",a:`P = V√óI = 220√ó5 = <b>1100W</b>`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"m",m:1,q:`A wire of resistance R is stretched to double its length. New resistance:`,o:["A) R/2","B) R/4","C) 2R","D) 4R"],r:"D",a:`R = œÅl/A. When l doubles, A halves (same volume). New R = œÅ(2l)/(A/2) = <b>4R</b>`},
{subj:"phy",s:"A",t:"mcq",c:"Electricity",d:"h",m:1,q:`A 100W bulb is used for 10 hours. Energy consumed in kWh:`,o:["A) 100 kWh","B) 10 kWh","C) 1 kWh","D) 0.1 kWh"],r:"C",a:`E = P√ót = 100W √ó 10h = 1000 Wh = <b>1 kWh</b>`},
{subj:"phy",s:"A",t:"ar",c:"Electricity",d:"m",m:1,q:`<b>Assertion (A):</b> In a series circuit, current through each component is the same.<br><b>Reason (R):</b> In series, there is only one path for current flow.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains A. Answer: <b>A</b>`},
{subj:"phy",s:"A",t:"ar",c:"Electricity",d:"m",m:1,q:`<b>Assertion (A):</b> Household appliances are connected in parallel.<br><b>Reason (R):</b> In parallel connection, each appliance gets the same voltage and can be operated independently.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains A. Answer: <b>A</b>`},
{subj:"phy",s:"B",t:"vsa",c:"Electricity",d:"e",m:2,q:`State Ohm's Law. A resistance of 40Œ© is connected across a 12V battery. Find the current.`,o:[],r:"",a:`<b>Ohm's Law:</b> At constant temperature, current through a conductor is directly proportional to the voltage across it. V = IR.<br>I = V/R = 12/40 = <b>0.3 A</b>`},
{subj:"phy",s:"B",t:"vsa",c:"Electricity",d:"m",m:2,q:`A bulb marked "220V, 100W". Find (i) resistance of filament (ii) current through it.`,o:[],r:"",a:`(i) R = V¬≤/P = (220)¬≤/100 = 48400/100 = <b>484 Œ©</b><br>(ii) I = P/V = 100/220 = <b>5/11 ‚âà 0.45 A</b>`},
{subj:"phy",s:"C",t:"sa",c:"Electricity",d:"m",m:3,q:`Derive the formula for equivalent resistance of three resistors in (i) series (ii) parallel.`,o:[],r:"",a:`<b>(i) Series:</b> Same current I through all. Total V = V‚ÇÅ+V‚ÇÇ+V‚ÇÉ = IR‚ÇÅ+IR‚ÇÇ+IR‚ÇÉ = I(R‚ÇÅ+R‚ÇÇ+R‚ÇÉ).<br>‚à¥ R_s = <b>R‚ÇÅ+R‚ÇÇ+R‚ÇÉ</b><br><b>(ii) Parallel:</b> Same V across all. I = I‚ÇÅ+I‚ÇÇ+I‚ÇÉ = V/R‚ÇÅ+V/R‚ÇÇ+V/R‚ÇÉ = V(1/R‚ÇÅ+1/R‚ÇÇ+1/R‚ÇÉ).<br>‚à¥ <b>1/R_p = 1/R‚ÇÅ+1/R‚ÇÇ+1/R‚ÇÉ</b>`},
{subj:"phy",s:"D",t:"la",c:"Electricity",d:"h",m:5,q:`(a) Define electrical resistivity. On what factors does resistance of a conductor depend? (b) Two resistors 3Œ© and 6Œ© are connected: (i) in series (ii) in parallel to a 9V battery. Find current and power in each case.`,o:[],r:"",a:`<b>(a) Resistivity (œÅ):</b> Resistance of a conductor of unit length and unit cross-sectional area. R = œÅl/A. Unit: Œ©¬∑m.<br>Factors: length (‚àù), cross-section area (inversely ‚àù), material (œÅ), temperature.<br><b>(b)(i) Series:</b> R_s=9Œ©. I=9/9=<b>1A</b>. P=V√óI=9√ó1=<b>9W</b>.<br><b>(b)(ii) Parallel:</b> 1/R_p=1/3+1/6=1/2. R_p=2Œ©. I=9/2=<b>4.5A</b>. P=9√ó4.5=<b>40.5W</b>.`},
{subj:"phy",s:"E",t:"cs",c:"Electricity",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Household Wiring</b><br><br>In Meena's house, the fridge (200W), TV (100W), and AC (1500W) are all connected to the same 220V supply. There is a 10A fuse in the circuit.<br><br><b>(i)</b> What is the total power consumed? <span class="cm">[1 mark]</span><br><b>(ii)</b> What is the total current drawn? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Will the fuse blow? Why? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> If all three run for 5 hours, find units consumed and cost at ‚Çπ6/unit. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> P_total = 200+100+1500 = <b>1800W</b><br><b>(ii)</b> I = P/V = 1800/220 ‚âà <b>8.18A</b><br><b>(iii)(a)</b> The 10A fuse will <b>not blow</b> since 8.18A < 10A. But it is close to the limit ‚Äî adding more appliances could blow it.<br><b>(iii)(b)</b> E = 1800√ó5 = 9000 Wh = <b>9 units</b>. Cost = 9√ó6 = <b>‚Çπ54</b>`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"e",m:1,q:`The rule used to find the direction of force on a current-carrying conductor in a magnetic field is:`,o:["A) Left-hand thumb rule","B) Fleming's Left-hand rule","C) Fleming's Right-hand rule","D) Ampere's rule"],r:"B",a:`<b>Fleming's Left-hand rule</b> gives the direction of force (motor effect).`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`An electric generator works on the principle of:`,o:["A) Magnetic effect of current","B) Heating effect of current","C) Chemical effect","D) Electromagnetic induction"],r:"D",a:`Generator converts mechanical energy to electrical energy using <b>electromagnetic induction</b>.`},
{subj:"phy",s:"A",t:"mcq",c:"Magnetic Effects of Electric Current",d:"m",m:1,q:`The device used to reverse the direction of current in the coil of a DC motor is:`,o:["A) Slip rings","B) Split ring commutator","C) Armature","D) Brushes"],r:"B",a:`<b>Split ring commutator</b> reverses current direction every half rotation in a DC motor.`},
{subj:"phy",s:"B",t:"vsa",c:"Magnetic Effects of Electric Current",d:"e",m:2,q:`State Fleming's Left-hand rule. Name one device that works on this principle.`,o:[],r:"",a:`<b>Fleming's Left-hand rule:</b> Stretch the thumb, forefinger, and middle finger of the left hand mutually perpendicular. If forefinger ‚Üí magnetic field (B), middle finger ‚Üí current (I), then thumb ‚Üí force/motion on conductor.<br><b>Device: Electric motor</b>`},
{subj:"phy",s:"C",t:"sa",c:"Magnetic Effects of Electric Current",d:"m",m:3,q:`Explain the working principle of an AC generator with a labelled diagram. How does it differ from a DC generator?`,o:[],r:"",a:`<b>AC Generator:</b> A coil rotates in a magnetic field. By electromagnetic induction, an EMF is induced. As the coil rotates, the flux changes ‚Üí alternating EMF (AC).<br><b>Components:</b> Armature coil, strong magnets, slip rings, brushes.<br><b>Difference:</b> AC generator uses <b>slip rings</b> (continuous rings) ‚Üí AC output. DC generator uses <b>split ring commutator</b> ‚Üí DC output (current in one direction only).`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"e",m:1,q:`Which of the following is a combination reaction?`,o:["A) CaCO‚ÇÉ ‚Üí CaO + CO‚ÇÇ","B) 2H‚ÇÇO ‚Üí 2H‚ÇÇ + O‚ÇÇ","C) 2Mg + O‚ÇÇ ‚Üí 2MgO","D) Fe + CuSO‚ÇÑ ‚Üí FeSO‚ÇÑ + Cu"],r:"C",a:`<b>2Mg + O‚ÇÇ ‚Üí 2MgO</b> ‚Äî two substances combine to form one product (combination).`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"e",m:1,q:`The reaction CaCO‚ÇÉ ‚Üí CaO + CO‚ÇÇ (on heating) is an example of:`,o:["A) Combination","B) Decomposition","C) Displacement","D) Double displacement"],r:"B",a:`One compound breaks into two products ‚Üí <b>Decomposition reaction</b>.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"m",m:1,q:`Rancidity of food is due to:`,o:["A) Reduction","B) Oxidation","C) Displacement","D) Decomposition"],r:"B",a:`Rancidity occurs when fats/oils are <b>oxidised</b> by atmospheric oxygen, producing foul smell.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"m",m:1,q:`In the reaction Fe + CuSO‚ÇÑ ‚Üí FeSO‚ÇÑ + Cu, iron is:`,o:["A) Oxidised only","B) Reduced only","C) Both oxidised and reduced","D) Neither"],r:"A",a:`Fe loses electrons (oxidised), Cu¬≤‚Å∫ gains electrons (reduced). Iron is <b>oxidised</b>.`},
{subj:"chem",s:"A",t:"mcq",c:"Chemical Reactions and Equations",d:"h",m:1,q:`Which is a redox reaction?`,o:["A) AgNO‚ÇÉ+NaCl‚ÜíAgCl+NaNO‚ÇÉ","B) CaO+H‚ÇÇO‚ÜíCa(OH)‚ÇÇ","C) 2CuO+C‚Üí2Cu+CO‚ÇÇ","D) BaCl‚ÇÇ+H‚ÇÇSO‚ÇÑ‚ÜíBaSO‚ÇÑ+2HCl"],r:"C",a:`In 2CuO+C‚Üí2Cu+CO‚ÇÇ: Cu is reduced (CuO‚ÜíCu), C is oxidised (C‚ÜíCO‚ÇÇ). <b>Redox reaction</b>.`},
{subj:"chem",s:"A",t:"ar",c:"Chemical Reactions and Equations",d:"m",m:1,q:`<b>Assertion (A):</b> Respiration is an exothermic reaction.<br><b>Reason (R):</b> In respiration, glucose is oxidised to release energy.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains why respiration is exothermic. Answer: <b>A</b>`},
{subj:"chem",s:"B",t:"vsa",c:"Chemical Reactions and Equations",d:"e",m:2,q:`Balance the following equation: Fe‚ÇÇO‚ÇÉ + CO ‚Üí Fe + CO‚ÇÇ. State the type of reaction.`,o:[],r:"",a:`<b>Fe‚ÇÇO‚ÇÉ + 3CO ‚Üí 2Fe + 3CO‚ÇÇ</b><br>Type: <b>Redox (oxidation-reduction)</b> ‚Äî Fe¬≥‚Å∫ reduced to Fe, CO oxidised to CO‚ÇÇ. Also a <b>displacement reaction</b>.`},
{subj:"chem",s:"B",t:"vsa",c:"Chemical Reactions and Equations",d:"m",m:2,q:`What is a double displacement reaction? Give one example with equation.`,o:[],r:"",a:`A reaction in which two compounds exchange their ions to form two new compounds.<br><b>Example:</b> Na‚ÇÇSO‚ÇÑ + BaCl‚ÇÇ ‚Üí BaSO‚ÇÑ‚Üì + 2NaCl<br>BaSO‚ÇÑ forms a white precipitate.`},
{subj:"chem",s:"C",t:"sa",c:"Chemical Reactions and Equations",d:"m",m:3,q:`(a) Define oxidation and reduction in terms of oxygen/hydrogen. (b) Identify what is oxidised and reduced in: ZnO + C ‚Üí Zn + CO.`,o:[],r:"",a:`<b>(a) Oxidation:</b> Addition of oxygen OR removal of hydrogen.<br><b>Reduction:</b> Removal of oxygen OR addition of hydrogen.<br><b>(b) ZnO + C ‚Üí Zn + CO</b><br>ZnO loses oxygen ‚Üí <b>ZnO is reduced</b> (Zn formed).<br>C gains oxygen ‚Üí <b>C is oxidised</b> (CO formed).`},
{subj:"chem",s:"D",t:"la",c:"Chemical Reactions and Equations",d:"h",m:5,q:`(a) What are exothermic and endothermic reactions? Give two examples each. (b) Write balanced equations for: (i) burning of magnesium (ii) electrolysis of water (iii) reaction of iron with steam.`,o:[],r:"",a:`<b>(a) Exothermic:</b> Reactions that release heat energy.<br>Examples: (1) C + O‚ÇÇ ‚Üí CO‚ÇÇ + heat (2) CH‚ÇÑ + 2O‚ÇÇ ‚Üí CO‚ÇÇ + 2H‚ÇÇO + heat<br><b>Endothermic:</b> Reactions that absorb heat energy.<br>Examples: (1) CaCO‚ÇÉ ‚Üí CaO + CO‚ÇÇ (needs heat) (2) N‚ÇÇ + O‚ÇÇ ‚Üí 2NO (at very high temp)<br><b>(b) Balanced equations:</b><br>(i) 2Mg + O‚ÇÇ ‚Üí 2MgO (exothermic, bright white flame)<br>(ii) 2H‚ÇÇO ‚Üí 2H‚ÇÇ + O‚ÇÇ (electrolysis, endothermic)<br>(iii) 3Fe + 4H‚ÇÇO ‚Üí Fe‚ÇÉO‚ÇÑ + 4H‚ÇÇ`},
{subj:"chem",s:"E",t:"cs",c:"Chemical Reactions and Equations",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Silver Article Turning Black</b><br><br>Priya's silver necklace turned black after some time. Her chemistry teacher explained that silver reacts with hydrogen sulphide (H‚ÇÇS) in the air to form silver sulphide (Ag‚ÇÇS).<br><br><b>(i)</b> Write the balanced chemical equation for this reaction. <span class="cm">[1 mark]</span><br><b>(ii)</b> What type of reaction is this? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> What is the process of cleaning silver called? Write the reaction. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Give two more examples of oxidation reactions observed in daily life. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> 4Ag + 2H‚ÇÇS + O‚ÇÇ ‚Üí 2Ag‚ÇÇS + 2H‚ÇÇO<br><b>(ii) Oxidation/Corrosion reaction</b><br><b>(iii)(a)</b> The process is called <b>corrosion of silver</b>. To restore: 2Ag‚ÇÇS + 2Al ‚Üí Al‚ÇÇS‚ÇÉ + 4Ag (electrochemical cleaning).<br><b>(iii)(b)</b> (1) Rusting of iron: 4Fe + 3O‚ÇÇ + xH‚ÇÇO ‚Üí 2Fe‚ÇÇO‚ÇÉ¬∑xH‚ÇÇO (2) Rancidity of oils/fats (oxidation by atmospheric O‚ÇÇ)`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"e",m:1,q:`What is the pH of a neutral solution?`,o:["A) 0","B) 7","C) 14","D) 1"],r:"B",a:`A neutral solution has pH = <b>7</b>. Acids: pH < 7. Bases: pH > 7.`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"e",m:1,q:`Which gas is produced when an acid reacts with a metal?`,o:["A) CO‚ÇÇ","B) SO‚ÇÇ","C) H‚ÇÇ","D) O‚ÇÇ"],r:"C",a:`Acid + Metal ‚Üí Salt + <b>H‚ÇÇ</b> (hydrogen gas). E.g. Zn + H‚ÇÇSO‚ÇÑ ‚Üí ZnSO‚ÇÑ + H‚ÇÇ‚Üë`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"m",m:1,q:`Which of the following is a strong acid?`,o:["A) Acetic acid","B) Citric acid","C) Hydrochloric acid","D) Carbonic acid"],r:"C",a:`<b>HCl (hydrochloric acid)</b> is a strong acid ‚Äî completely dissociates in water.`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"m",m:1,q:`The chemical name of baking soda is:`,o:["A) Sodium carbonate","B) Sodium bicarbonate","C) Sodium chloride","D) Sodium hydroxide"],r:"B",a:`Baking soda = <b>Sodium hydrogen carbonate (NaHCO‚ÇÉ)</b>`},
{subj:"chem",s:"A",t:"mcq",c:"Acids, Bases and Salts",d:"h",m:1,q:`Bleaching powder is prepared by:`,o:["A) Cl‚ÇÇ + Ca(OH)‚ÇÇ","B) Cl‚ÇÇ + CaO","C) HCl + Ca(OH)‚ÇÇ","D) SO‚ÇÇ + Ca(OH)‚ÇÇ"],r:"A",a:`Bleaching powder = Ca(OCl)Cl. Made by passing Cl‚ÇÇ over slaked lime: <b>Cl‚ÇÇ + Ca(OH)‚ÇÇ ‚Üí Ca(OCl)Cl + H‚ÇÇO</b>`},
{subj:"chem",s:"A",t:"ar",c:"Acids, Bases and Salts",d:"m",m:1,q:`<b>Assertion (A):</b> Dilute acid should be added to water, not water to acid.<br><b>Reason (R):</b> Dissolving acid in water is highly exothermic. Adding water to acid can cause spattering.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains the safety reason. Answer: <b>A</b>`},
{subj:"chem",s:"B",t:"vsa",c:"Acids, Bases and Salts",d:"e",m:2,q:`What happens when CO‚ÇÇ is passed through lime water? Write equation. What happens if excess CO‚ÇÇ is passed?`,o:[],r:"",a:`<b>CO‚ÇÇ + Ca(OH)‚ÇÇ ‚Üí CaCO‚ÇÉ‚Üì + H‚ÇÇO</b> (lime water turns milky ‚Äî white precipitate of CaCO‚ÇÉ).<br><b>Excess CO‚ÇÇ:</b> CaCO‚ÇÉ + CO‚ÇÇ + H‚ÇÇO ‚Üí Ca(HCO‚ÇÉ)‚ÇÇ (soluble) ‚Üí milkiness disappears.`},
{subj:"chem",s:"B",t:"vsa",c:"Acids, Bases and Salts",d:"m",m:2,q:`What is a neutralisation reaction? Give one example with equation.`,o:[],r:"",a:`A reaction between an acid and a base to form salt and water, releasing heat.<br><b>NaOH + HCl ‚Üí NaCl + H‚ÇÇO</b><br>This reaction is exothermic.`},
{subj:"chem",s:"C",t:"sa",c:"Acids, Bases and Salts",d:"m",m:3,q:`(a) What is the importance of pH in everyday life? Give three examples. (b) What is a pH scale?`,o:[],r:"",a:`<b>(a) Importance of pH:</b><br>(i) <b>Digestive system:</b> Stomach pH 1.5‚Äì2 (acidic, for digestion). Antacids neutralise excess acid.<br>(ii) <b>Tooth decay:</b> Bacteria produce acids (pH < 5.5) that dissolve enamel.<br>(iii) <b>Plants:</b> Most crops grow in pH 6‚Äì7 soil. Soil acidity corrected by adding lime.<br><b>(b) pH scale:</b> Scale of 0‚Äì14 measuring hydrogen ion concentration. pH=0 (most acidic), pH=7 (neutral), pH=14 (most basic).`},
{subj:"chem",s:"D",t:"la",c:"Acids, Bases and Salts",d:"h",m:5,q:`(a) Explain the preparation of washing soda from baking soda. (b) State four properties of washing soda. (c) How is plaster of Paris prepared from gypsum? Write the equation.`,o:[],r:"",a:`<b>(a) Washing Soda from Baking Soda:</b><br>2NaHCO‚ÇÉ ‚Üí Na‚ÇÇCO‚ÇÉ + H‚ÇÇO + CO‚ÇÇ (on heating)<br>Then: Na‚ÇÇCO‚ÇÉ + 10H‚ÇÇO ‚Üí Na‚ÇÇCO‚ÇÉ¬∑10H‚ÇÇO (washing soda, by crystallisation)<br><b>(b) Properties of Washing Soda:</b><br>(i) Alkaline in nature (pH > 7)<br>(ii) Used as cleaning agent (removes grease)<br>(iii) Used in manufacture of glass, soap, paper<br>(iv) Used to remove permanent hardness of water<br><b>(c) Plaster of Paris:</b><br>CaSO‚ÇÑ¬∑2H‚ÇÇO ‚Üí CaSO‚ÇÑ¬∑¬ΩH‚ÇÇO + 1¬ΩH‚ÇÇO (at 373K)<br>Gypsum heated to 373K ‚Üí Plaster of Paris (CaSO‚ÇÑ¬∑¬ΩH‚ÇÇO)`},
{subj:"chem",s:"E",t:"cs",c:"Acids, Bases and Salts",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Ant Bite</b><br><br>When an ant bites, it injects formic acid (methanoic acid) into the skin, causing pain and burning sensation. A doctor advises applying a mild base like baking soda solution on the affected area.<br><br><b>(i)</b> Name the type of reaction that occurs when baking soda is applied. <span class="cm">[1 mark]</span><br><b>(ii)</b> Write the equation for baking soda reacting with formic acid (HCOOH). <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Why does applying toothpaste after ant bite also relieve pain? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What acid is present in nettle sting? How is it treated traditionally? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Neutralisation reaction</b><br><b>(ii)</b> HCOOH + NaHCO‚ÇÉ ‚Üí HCOONa + H‚ÇÇO + CO‚ÇÇ‚Üë<br><b>(iii)(a)</b> Toothpaste is mildly basic (pH ~8‚Äì9). It neutralises the formic acid from ant bite, reducing burning sensation.<br><b>(iii)(b)</b> Nettle sting contains <b>methanoic (formic) acid</b>. Traditionally, rubbing the leaf of dock plant (which grows nearby and is basic) provides relief ‚Äî natural neutralisation.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"e",m:1,q:`Which property of metals allows them to be drawn into wires?`,o:["A) Malleability","B) Ductility","C) Conductivity","D) Sonority"],r:"B",a:`<b>Ductility</b> ‚Äî metals can be drawn into thin wires.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"e",m:1,q:`The most reactive metal among the following is:`,o:["A) Gold","B) Silver","C) Sodium","D) Copper"],r:"C",a:`<b>Sodium</b> is highly reactive ‚Äî it reacts vigorously with water and air.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"m",m:1,q:`Aluminium is resistant to corrosion because:`,o:["A) It is very reactive","B) It forms a protective oxide layer","C) It is a non-metal","D) It does not react with anything"],r:"B",a:`Al forms a thin, tough layer of <b>Al‚ÇÇO‚ÇÉ</b> on its surface that prevents further corrosion.`},
{subj:"chem",s:"A",t:"mcq",c:"Metals and Non-metals",d:"m",m:1,q:`The process of obtaining a metal from its ore is called:`,o:["A) Refining","B) Roasting","C) Smelting","D) Extraction / metallurgy"],r:"D",a:`The general process of obtaining metals from their ores is called <b>metallurgy / extraction of metals</b>.`},
{subj:"chem",s:"B",t:"vsa",c:"Metals and Non-metals",d:"e",m:2,q:`What is thermite reaction? Write the equation.`,o:[],r:"",a:`The thermite reaction is a highly exothermic reaction in which aluminium reduces iron oxide to iron.<br><b>Fe‚ÇÇO‚ÇÉ + 2Al ‚Üí Al‚ÇÇO‚ÇÉ + 2Fe + heat</b><br>Used in welding railway tracks (Goldschmidt process).`},
{subj:"chem",s:"B",t:"vsa",c:"Metals and Non-metals",d:"m",m:2,q:`Distinguish between ionic and covalent compounds (any two points).`,o:[],r:"",a:`<table style="font-size:12px;border-collapse:collapse;width:100%"><tr><th style="border:1px solid #ccc;padding:4px">Ionic Compounds</th><th style="border:1px solid #ccc;padding:4px">Covalent Compounds</th></tr><tr><td style="border:1px solid #ccc;padding:4px">Formed by transfer of electrons</td><td style="border:1px solid #ccc;padding:4px">Formed by sharing of electrons</td></tr><tr><td style="border:1px solid #ccc;padding:4px">High melting/boiling point</td><td style="border:1px solid #ccc;padding:4px">Low melting/boiling point</td></tr></table>`},
{subj:"chem",s:"C",t:"sa",c:"Metals and Non-metals",d:"m",m:3,q:`Explain the reactivity series of metals. Why is it important? Give three uses.`,o:[],r:"",a:`The <b>reactivity series</b> is a list of metals arranged in decreasing order of reactivity: K>Na>Ca>Mg>Al>Zn>Fe>Pb>H>Cu>Ag>Au.<br><b>Importance/Uses:</b><br>(i) Predicts whether a metal can displace another from its salt solution.<br>(ii) Helps choose extraction method (electrolysis for highly reactive, reduction for moderately reactive, heat alone for less reactive).<br>(iii) Explains corrosion (highly reactive metals corrode faster).`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"e",m:1,q:`Carbon shows the property of catenation. This means:`,o:["A) Carbon bonds with oxygen only","B) Carbon can bond with itself to form long chains","C) Carbon is a gas at room temperature","D) Carbon has 4 electrons in outer shell only"],r:"B",a:`<b>Catenation</b> ‚Äî carbon's ability to form bonds with other carbon atoms, making long chains, branched chains, and rings.`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"e",m:1,q:`IUPAC name of CH‚ÇÉ-CH‚ÇÇ-OH is:`,o:["A) Methanol","B) Ethanol","C) Propanol","D) Ethanoic acid"],r:"B",a:`CH‚ÇÉ-CH‚ÇÇ-OH has 2 carbons + OH group = <b>Ethanol</b>`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"m",m:1,q:`Saponification is the process of:`,o:["A) Conversion of alcohol to acid","B) Making soap from fats and NaOH","C) Making alcohol from glucose","D) Oxidation of methane"],r:"B",a:`<b>Saponification</b> ‚Äî hydrolysis of fats/oils with NaOH/KOH to form soap (sodium/potassium salt of fatty acid) + glycerol.`},
{subj:"chem",s:"A",t:"mcq",c:"Carbon and its Compounds",d:"m",m:1,q:`Soaps are ineffective in hard water because:`,o:["A) They are too alkaline","B) They react with Ca¬≤‚Å∫/Mg¬≤‚Å∫ to form scum","C) They are insoluble in water","D) Hard water has low pH"],r:"B",a:`Soap (fatty acid salts) reacts with Ca¬≤‚Å∫/Mg¬≤‚Å∫ in hard water ‚Üí <b>insoluble calcium/magnesium salts (scum)</b>.`},
{subj:"chem",s:"B",t:"vsa",c:"Carbon and its Compounds",d:"e",m:2,q:`What is ethanol? Give two uses. Write its molecular formula.`,o:[],r:"",a:`<b>Ethanol (C‚ÇÇH‚ÇÖOH)</b> ‚Äî an alcohol, colourless liquid with characteristic smell.<br><b>Uses:</b> (1) Solvent in medicines and perfumes. (2) Used as fuel (spirit lamps). Also in alcoholic beverages.`},
{subj:"chem",s:"C",t:"sa",c:"Carbon and its Compounds",d:"m",m:3,q:`Explain the cleansing action of soaps. Why are detergents better than soaps in hard water?`,o:[],r:"",a:`<b>Cleansing action of soap:</b> Soap molecules have a hydrophilic (water-loving) head and a hydrophobic (water-repelling) tail. The hydrophobic ends insert into the grease/oil particles, surrounding them. The hydrophilic ends remain in water, forming micelles. These micelles are washed away with water.<br><b>Detergents in hard water:</b> Detergents contain sulphonate/sulphate groups which do NOT react with Ca¬≤‚Å∫/Mg¬≤‚Å∫ ions ‚Üí no scum formed. Hence detergents work in hard water while soaps form insoluble scum.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"e",m:1,q:`The process by which green plants prepare food using sunlight is:`,o:["A) Respiration","B) Digestion","C) Photosynthesis","D) Transpiration"],r:"C",a:`<b>Photosynthesis:</b> 6CO‚ÇÇ + 6H‚ÇÇO ‚Üí C‚ÇÜH‚ÇÅ‚ÇÇO‚ÇÜ + 6O‚ÇÇ (in presence of sunlight and chlorophyll).`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"e",m:1,q:`The site of photosynthesis in a plant cell is:`,o:["A) Mitochondria","B) Nucleus","C) Chloroplast","D) Ribosome"],r:"C",a:`<b>Chloroplast</b> contains chlorophyll and is the site of photosynthesis.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`The process of breakdown of glucose in the absence of oxygen is called:`,o:["A) Aerobic respiration","B) Anaerobic respiration","C) Fermentation only","D) Photosynthesis"],r:"B",a:`Breakdown of glucose without oxygen = <b>Anaerobic respiration</b>. In yeast it produces ethanol + CO‚ÇÇ; in muscles ‚Üí lactic acid.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`The enzyme pepsin works in the:`,o:["A) Mouth","B) Small intestine","C) Stomach","D) Large intestine"],r:"C",a:`Pepsin is a protease secreted in the <b>stomach</b> (acidic environment, pH 1.5‚Äì2).`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"m",m:1,q:`Blood entering the left atrium of the heart is:`,o:["A) Deoxygenated","B) Oxygenated","C) Mixed","D) No blood enters left atrium"],r:"B",a:`Left atrium receives <b>oxygenated blood</b> from the lungs via pulmonary veins.`},
{subj:"bio",s:"A",t:"mcq",c:"Life Processes",d:"h",m:1,q:`Urea is produced in the body as a waste product of:`,o:["A) Carbohydrate metabolism","B) Lipid metabolism","C) Protein metabolism","D) Nucleic acid metabolism"],r:"C",a:`Urea is formed by the breakdown of <b>amino acids (protein metabolism)</b> in the liver (urea cycle).`},
{subj:"bio",s:"A",t:"ar",c:"Life Processes",d:"m",m:1,q:`<b>Assertion (A):</b> Arteries carry oxygenated blood.<br><b>Reason (R):</b> The pulmonary artery is an exception ‚Äî it carries deoxygenated blood to the lungs.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"B",a:`Both statements are true but R doesn't explain A ‚Äî R actually qualifies/contradicts A. Answer: <b>B</b>`},
{subj:"bio",s:"A",t:"ar",c:"Life Processes",d:"m",m:1,q:`<b>Assertion (A):</b> Kidneys filter blood to remove urea and excess water.<br><b>Reason (R):</b> The functional unit of kidney is nephron.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"B",a:`Both true. But R (nephron is functional unit) doesn't directly explain that kidneys filter urea. Answer: <b>B</b>`},
{subj:"bio",s:"B",t:"vsa",c:"Life Processes",d:"e",m:2,q:`What is photosynthesis? Write the balanced chemical equation.`,o:[],r:"",a:`<b>Photosynthesis</b> is the process by which green plants use sunlight, water, and CO‚ÇÇ to make glucose and release oxygen.<br><b>6CO‚ÇÇ + 6H‚ÇÇO ‚Üí C‚ÇÜH‚ÇÅ‚ÇÇO‚ÇÜ + 6O‚ÇÇ</b> (sunlight + chlorophyll)`},
{subj:"bio",s:"B",t:"vsa",c:"Life Processes",d:"m",m:2,q:`What is the role of HCl in the stomach?`,o:[],r:"",a:`HCl in the stomach:<br>(1) Creates acidic medium (pH 1.5‚Äì2) for <b>pepsin</b> to work.<br>(2) <b>Kills harmful microorganisms</b> that may enter with food.<br>(3) Denatures proteins, making them easier to digest.`},
{subj:"bio",s:"B",t:"vsa",c:"Life Processes",d:"m",m:2,q:`Differentiate between aerobic and anaerobic respiration.`,o:[],r:"",a:`<b>Aerobic:</b> Occurs in presence of O‚ÇÇ. Glucose ‚Üí CO‚ÇÇ + H‚ÇÇO + <b>38 ATP</b>. Complete oxidation.<br><b>Anaerobic:</b> Occurs without O‚ÇÇ. In yeast: glucose ‚Üí ethanol + CO‚ÇÇ + <b>2 ATP</b>. In muscles: glucose ‚Üí lactic acid.`},
{subj:"bio",s:"C",t:"sa",c:"Life Processes",d:"m",m:3,q:`Describe the double circulation of blood in humans. Why is it necessary?`,o:[],r:"",a:`In humans, blood passes through the heart <b>twice</b> in one complete circuit:<br><b>Pulmonary circulation:</b> Right ventricle ‚Üí Pulmonary artery ‚Üí Lungs (for oxygenation) ‚Üí Pulmonary vein ‚Üí Left atrium.<br><b>Systemic circulation:</b> Left ventricle ‚Üí Aorta ‚Üí Body organs ‚Üí Vena cava ‚Üí Right atrium.<br><b>Necessity:</b> Ensures oxygenated and deoxygenated blood are always separate. High pressure maintained for efficient delivery to all organs. Essential for warm-blooded (homeothermic) animals.`},
{subj:"bio",s:"C",t:"sa",c:"Life Processes",d:"m",m:3,q:`Explain the process of urine formation in kidneys.`,o:[],r:"",a:`Urine formation occurs in three stages in the <b>nephron</b>:<br><b>(1) Ultrafiltration (Glomerular filtration):</b> Blood filtered under pressure through glomerulus. Filtrate contains water, glucose, urea, salts (not proteins/cells).<br><b>(2) Selective Reabsorption:</b> Useful substances (glucose, amino acids, water, minerals) reabsorbed back into blood from tubule.<br><b>(3) Tubular Secretion:</b> Additional waste products (creatinine, H‚Å∫ ions) secreted into tubule.<br>Final urine (concentrated urea solution) flows to ureter ‚Üí bladder ‚Üí expelled through urethra.`},
{subj:"bio",s:"D",t:"la",c:"Life Processes",d:"h",m:5,q:`(a) Draw a neat labelled diagram of the human digestive system. (b) Describe the digestion of food in the small intestine. (c) What is the role of villi?`,o:[],r:"",a:`<b>(a) Diagram:</b> Should label: Mouth, Salivary glands, Oesophagus, Stomach, Liver, Pancreas, Small intestine (duodenum, jejunum, ileum), Large intestine, Rectum, Anus.<br><b>(b) Digestion in Small Intestine:</b><br>‚Ä¢ Liver secretes bile (stored in gall bladder) ‚Üí emulsifies fats (breaks large fat globules into small ones for enzyme action).<br>‚Ä¢ Pancreas secretes pancreatic juice: amylase (starch‚Üíglucose), lipase (fats‚Üífatty acids+glycerol), trypsin (proteins‚Üíamino acids).<br>‚Ä¢ Intestinal juice (succus entericus): final digestion of all food types.<br><b>(c) Villi:</b> Finger-like projections on inner wall of small intestine. Increase surface area enormously for absorption. Each villus has blood capillaries and lacteals (for fat absorption).`},
{subj:"bio",s:"E",t:"cs",c:"Life Processes",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Dialysis</b><br><br>Rajan's kidneys stopped functioning. Doctors put him on dialysis, a process where his blood is passed through a machine that filters it like a kidney.<br><br><b>(i)</b> Name the structural and functional unit of the kidney. <span class="cm">[1 mark]</span><br><b>(ii)</b> What waste products are removed by the kidney? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Explain why dialysis is called artificial kidney. How does it work? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is osmoregulation? Why is it important? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Nephron</b><br><b>(ii)</b> Urea, uric acid, creatinine, excess salts, and excess water.<br><b>(iii)(a)</b> A dialysis machine acts as an artificial kidney by filtering blood outside the body. Blood passes through a semipermeable membrane tube surrounded by dialysing fluid. Waste products diffuse out; blood cells and proteins are retained. Cleaned blood returns to body.<br><b>(iii)(b) Osmoregulation</b> is the regulation of water and salt balance in the body. Kidneys control it by adjusting the concentration of urine. Important for maintaining constant internal environment (homeostasis).`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"e",m:1,q:`The functional unit of the nervous system is:`,o:["A) Nephron","B) Neuron","C) Brain","D) Spinal cord"],r:"B",a:`<b>Neuron (nerve cell)</b> is the structural and functional unit of the nervous system.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"e",m:1,q:`A reflex action is controlled by:`,o:["A) Brain","B) Spinal cord","C) Both brain and spinal cord","D) Peripheral nerves only"],r:"B",a:`Simple reflex arcs are coordinated by the <b>spinal cord</b> (not brain) for fast responses.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"m",m:1,q:`Insulin is secreted by:`,o:["A) Thyroid gland","B) Pancreas","C) Adrenal gland","D) Pituitary gland"],r:"B",a:`Insulin is secreted by the <b>beta cells of islets of Langerhans in the pancreas</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Control and Coordination",d:"m",m:1,q:`Iodine deficiency causes:`,o:["A) Diabetes","B) Goitre","C) Dwarfism","D) Gigantism"],r:"B",a:`Iodine deficiency ‚Üí thyroid can't make thyroxine ‚Üí gland enlarges ‚Üí <b>Goitre</b>.`},
{subj:"bio",s:"A",t:"ar",c:"Control and Coordination",d:"m",m:1,q:`<b>Assertion (A):</b> Hormones are called chemical messengers.<br><b>Reason (R):</b> Hormones are secreted by endocrine glands and transported by blood to target organs.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains why hormones are called messengers ‚Äî they carry chemical signals via blood. Answer: <b>A</b>`},
{subj:"bio",s:"B",t:"vsa",c:"Control and Coordination",d:"e",m:2,q:`What is a reflex action? Give two examples.`,o:[],r:"",a:`A <b>reflex action</b> is a sudden, involuntary response to a stimulus that does not involve the brain (controlled by spinal cord).<br><b>Examples:</b> (1) Withdrawing hand from hot object (2) Knee-jerk reflex (3) Blinking when something approaches the eye.`},
{subj:"bio",s:"B",t:"vsa",c:"Control and Coordination",d:"m",m:2,q:`How do auxins control the bending of a plant shoot towards light?`,o:[],r:"",a:`When light falls on one side of the shoot, <b>auxins migrate</b> to the shaded side.<br>Higher auxin concentration on the shaded side ‚Üí cells on shaded side elongate more.<br>This unequal growth causes the shoot to <b>bend towards light</b> (phototropism).`},
{subj:"bio",s:"C",t:"sa",c:"Control and Coordination",d:"m",m:3,q:`Draw a labelled diagram of a neuron. Describe how a nerve impulse is transmitted from one neuron to another.`,o:[],r:"",a:`<b>Diagram should label:</b> Cell body (soma), Nucleus, Dendrites, Axon, Myelin sheath, Node of Ranvier, Axon terminal, Synapse.<br><b>Transmission:</b> Nerve impulse travels along the axon as an electrical signal. At the axon terminal, it triggers release of chemical <b>neurotransmitters</b> (e.g. acetylcholine) into the synapse. These diffuse across the synapse and bind to receptors on the next neuron's dendrites, initiating a new impulse.`},
{subj:"bio",s:"D",t:"la",c:"Control and Coordination",d:"h",m:5,q:`(a) What is the endocrine system? (b) Describe the role of the following hormones: (i) Thyroxine (ii) Insulin and Glucagon (iii) Adrenaline. (c) What is feedback regulation? Give example.`,o:[],r:"",a:`<b>(a) Endocrine system:</b> Network of ductless glands that secrete hormones directly into the bloodstream.<br><b>(b) Hormones:</b><br>(i) <b>Thyroxine (thyroid):</b> Regulates metabolic rate, growth, and development. Requires iodine.<br>(ii) <b>Insulin (pancreas Œ≤-cells):</b> Lowers blood glucose by promoting glucose uptake. <b>Glucagon (Œ±-cells):</b> Raises blood glucose by stimulating glycogen breakdown in liver.<br>(iii) <b>Adrenaline (adrenal medulla):</b> "Fight or flight" hormone ‚Äî increases heart rate, blood flow to muscles, blood glucose for emergency response.<br><b>(c) Feedback regulation:</b> When blood glucose rises ‚Üí pancreas secretes insulin ‚Üí glucose absorbed ‚Üí blood glucose falls ‚Üí insulin secretion stops. This negative feedback maintains homeostasis.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"e",m:1,q:`Which of the following is an example of vegetative propagation?`,o:["A) Seed germination","B) Budding in yeast","C) Growing a new plant from a stem cutting","D) Spore formation"],r:"C",a:`Growing a new plant from a <b>stem cutting</b> is vegetative propagation ‚Äî asexual reproduction in plants.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"e",m:1,q:`The process of fertilisation in humans occurs in:`,o:["A) Uterus","B) Ovary","C) Fallopian tube","D) Cervix"],r:"C",a:`Fertilisation occurs in the <b>fallopian tube (oviduct)</b>. The fertilised egg then implants in the uterus.`},
{subj:"bio",s:"A",t:"mcq",c:"How do Organisms Reproduce?",d:"m",m:1,q:`Which method of contraception prevents fertilisation?`,o:["A) Abortion","B) Condom","C) Copper-T","D) Both B and C"],r:"D",a:`<b>Condom</b> (barrier method) prevents sperm from reaching egg. <b>Copper-T</b> prevents fertilisation/implantation. Both prevent fertilisation.`},
{subj:"bio",s:"A",t:"ar",c:"How do Organisms Reproduce?",d:"m",m:1,q:`<b>Assertion (A):</b> Binary fission in Amoeba results in two identical daughter cells.<br><b>Reason (R):</b> In binary fission, one cell divides into two cells, each receiving a copy of the genetic material.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains why daughter cells are identical. Answer: <b>A</b>`},
{subj:"bio",s:"B",t:"vsa",c:"How do Organisms Reproduce?",d:"e",m:2,q:`What is the difference between sexual and asexual reproduction?`,o:[],r:"",a:`<b>Asexual:</b> One parent, no gametes, offspring genetically identical to parent. Fast, e.g. binary fission, budding.<br><b>Sexual:</b> Two parents, involves gametes (sperm + egg), offspring genetically varied. Slower but increases genetic diversity.`},
{subj:"bio",s:"C",t:"sa",c:"How do Organisms Reproduce?",d:"m",m:3,q:`Describe the process of pollination and fertilisation in flowering plants.`,o:[],r:"",a:`<b>Pollination:</b> Transfer of pollen grains from anther to stigma. Can be self-pollination (same flower) or cross-pollination (different flower/plant). Agents: wind, insects, water, animals.<br><b>Fertilisation:</b> Pollen grain germinates on stigma ‚Üí pollen tube grows through style ‚Üí enters ovule through micropyle ‚Üí male gamete fuses with egg cell ‚Üí <b>zygote</b> (2n). Other male gamete fuses with polar nuclei ‚Üí <b>endosperm</b> (3n). This is <b>double fertilisation</b> (unique to angiosperms).`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"e",m:1,q:`The term "genetics" was coined by:`,o:["A) Darwin","B) Mendel","C) Bateson","D) Morgan"],r:"C",a:`The term "genetics" was coined by <b>William Bateson</b> in 1905. Mendel is called the "Father of Genetics."`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"e",m:1,q:`In a monohybrid cross between TT (tall) and tt (short) plants, the F1 generation is:`,o:["A) All tall (Tt)","B) All short (tt)","C) 3 tall : 1 short","D) 1 tall : 1 short"],r:"A",a:`TT √ó tt ‚Üí all <b>Tt</b> (heterozygous tall) in F1. Tall is dominant.`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"m",m:1,q:`What determines the sex of a human child?`,o:["A) X chromosome of mother","B) Y chromosome of father","C) Both parents equally","D) Environmental factors"],r:"B",a:`Mother gives only X chromosome. Father gives X or Y. If sperm carries <b>Y chromosome</b> ‚Üí boy (XY). X ‚Üí girl (XX).`},
{subj:"bio",s:"A",t:"mcq",c:"Heredity and Evolution",d:"m",m:1,q:`Evolution refers to:`,o:["A) Changes in individual organisms during lifetime","B) Gradual changes in populations over generations","C) Formation of a new species in one generation","D) Only structural changes in organisms"],r:"B",a:`Evolution = <b>gradual changes in populations over many generations</b>, leading to new species.`},
{subj:"bio",s:"A",t:"ar",c:"Heredity and Evolution",d:"m",m:1,q:`<b>Assertion (A):</b> Acquired traits are not inherited.<br><b>Reason (R):</b> Changes in somatic (body) cells are not passed to the next generation through gametes.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains A (Weismann barrier principle). Answer: <b>A</b>`},
{subj:"bio",s:"B",t:"vsa",c:"Heredity and Evolution",d:"e",m:2,q:`State Mendel's Law of Segregation.`,o:[],r:"",a:`Mendel's <b>Law of Segregation:</b> Every individual has two alleles for each character. During gamete formation, the two alleles separate (segregate) so that each gamete carries only one allele. These alleles reunite randomly during fertilisation.`},
{subj:"bio",s:"B",t:"vsa",c:"Heredity and Evolution",d:"m",m:2,q:`What is speciation? Give two factors that can lead to it.`,o:[],r:"",a:`<b>Speciation</b> is the process by which new species arise from existing species, usually through evolution.<br><b>Factors:</b><br>(1) <b>Geographic isolation</b> ‚Äî separation of populations by barriers (mountains, rivers) prevents gene flow.<br>(2) <b>Natural selection</b> ‚Äî different environments favour different traits, causing populations to diverge.`},
{subj:"bio",s:"C",t:"sa",c:"Heredity and Evolution",d:"m",m:3,q:`A tall pea plant (Tt) is crossed with a short pea plant (tt). Show the cross with a Punnett square. What is the ratio of tall to short plants?`,o:[],r:"",a:`<b>Cross: Tt √ó tt</b><br>Gametes of Tt: T, t<br>Gametes of tt: t, t<br><table style="border-collapse:collapse;margin:8px 0"><tr><td style="border:1px solid #ccc;padding:6px;font-weight:bold"></td><td style="border:1px solid #ccc;padding:6px;font-weight:bold">t</td><td style="border:1px solid #ccc;padding:6px;font-weight:bold">t</td></tr><tr><td style="border:1px solid #ccc;padding:6px;font-weight:bold">T</td><td style="border:1px solid #ccc;padding:6px;background:#D1FAE5">Tt</td><td style="border:1px solid #ccc;padding:6px;background:#D1FAE5">Tt</td></tr><tr><td style="border:1px solid #ccc;padding:6px;font-weight:bold">t</td><td style="border:1px solid #ccc;padding:6px;background:#FEE2E2">tt</td><td style="border:1px solid #ccc;padding:6px;background:#FEE2E2">tt</td></tr></table><b>Ratio: 2 tall (Tt) : 2 short (tt) = 1:1</b>`},
{subj:"bio",s:"D",t:"la",c:"Heredity and Evolution",d:"h",m:5,q:`(a) State Darwin's Theory of Natural Selection. (b) What is the difference between analogous and homologous organs? Give examples. (c) What is the significance of fossils in evolution?`,o:[],r:"",a:`<b>(a) Darwin's Natural Selection:</b> (i) Organisms produce more offspring than can survive. (ii) There is natural variation among individuals. (iii) Organisms with favourable variations survive and reproduce more (survival of the fittest). (iv) Favourable traits are inherited by offspring. Over many generations this leads to evolution of new species.<br><b>(b) Homologous organs:</b> Same structure/origin, different functions. Evidence of common ancestry. E.g. forelimbs of humans, whales, bats, frogs ‚Äî same bones (humerus, radius, ulna), different uses.<br><b>Analogous organs:</b> Different structure/origin, same function. Evidence of convergent evolution. E.g. wings of insects and birds.<br><b>(c) Fossils:</b> Preserved remains of organisms from the past. They provide: (i) Evidence of organisms that no longer exist. (ii) Information about the sequence of evolution. (iii) Evidence of relationships between extinct and living organisms. Radiometric dating of fossils helps establish evolutionary timeline.`},
{subj:"bio",s:"E",t:"cs",c:"Heredity and Evolution",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Family Trait</b><br><br>In a family, the father has free ear lobes (Ff) and the mother has attached ear lobes (ff). Free ear lobe (F) is dominant over attached (f).<br><br><b>(i)</b> Write the cross using a Punnett square. <span class="cm">[1 mark]</span><br><b>(ii)</b> What is the probability that their child has free ear lobes? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> If both parents had free ear lobes (Ff √ó Ff), what would be the F1 ratio? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Explain the terms: genotype, phenotype, homozygous, heterozygous. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Ff √ó ff:</b> Gametes: F/f √ó f/f ‚Üí Ff, ff, Ff, ff<br><b>(ii)</b> 2 out of 4 = <b>50% (1/2)</b> chance of free ear lobes (Ff).<br><b>(iii)(a) Ff √ó Ff:</b> FF : Ff : ff = 1:2:1. Phenotype = <b>3 free : 1 attached</b>.<br><b>(iii)(b)</b> <b>Genotype:</b> Genetic makeup (e.g. Ff). <b>Phenotype:</b> Observable trait (e.g. free ear lobe). <b>Homozygous:</b> Both alleles same (FF or ff). <b>Heterozygous:</b> Alleles different (Ff).`},
{subj:"bio",s:"E",t:"cs",c:"Life Processes",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Photosynthesis in a Lab</b><br><br>A student placed an aquatic plant (Hydrilla) in a beaker of water under a bright lamp. She observed bubbles rising from the plant.<br><br><b>(i)</b> What gas is being released? <span class="cm">[1 mark]</span><br><b>(ii)</b> Which molecule is the source of this gas? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Write the balanced equation for photosynthesis and state the role of each raw material. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> How would the rate of bubble production change if: (a) light intensity increased (b) a coloured filter blocked certain wavelengths? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Oxygen (O‚ÇÇ)</b><br><b>(ii) Water (H‚ÇÇO)</b> ‚Äî the oxygen released in photosynthesis comes from the splitting of water molecules (photolysis).<br><b>(iii)(a)</b> 6CO‚ÇÇ + 6H‚ÇÇO ‚Üí C‚ÇÜH‚ÇÅ‚ÇÇO‚ÇÜ + 6O‚ÇÇ<br>CO‚ÇÇ: raw material (carbon source); H‚ÇÇO: hydrogen and oxygen source, used in photolysis; Sunlight: energy source; Chlorophyll: absorbs light energy.<br><b>(iii)(b)</b> (a) More light ‚Üí more photosynthesis ‚Üí more bubbles. (b) Certain wavelengths (red, blue) are absorbed best; green light is reflected. Blocking red/blue reduces rate significantly.`},
{subj:"chem",s:"E",t:"cs",c:"Carbon and its Compounds",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Ethanol and Ethanoic Acid</b><br><br>Divya's chemistry teacher brought two samples ‚Äî one smelled like spirit, another like vinegar. She explained both are carbon compounds used in daily life.<br><br><b>(i)</b> Write the molecular formulae of ethanol and ethanoic acid. <span class="cm">[1 mark]</span><br><b>(ii)</b> What happens when ethanol reacts with sodium? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> How is ethanol converted to ethanoic acid? Name the agent used. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is esterification? Write the equation for the reaction between ethanol and ethanoic acid. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> Ethanol: <b>C‚ÇÇH‚ÇÖOH</b>. Ethanoic acid: <b>CH‚ÇÉCOOH</b>.<br><b>(ii)</b> 2C‚ÇÇH‚ÇÖOH + 2Na ‚Üí 2C‚ÇÇH‚ÇÖONa + H‚ÇÇ‚Üë (hydrogen gas evolved, less vigorous than water+Na).<br><b>(iii)(a)</b> Ethanol + oxidising agent ‚Üí Ethanoic acid. Agent: <b>alkaline KMnO‚ÇÑ or acidified K‚ÇÇCr‚ÇÇO‚Çá</b>. C‚ÇÇH‚ÇÖOH + [O] ‚Üí CH‚ÇÉCOOH + H‚ÇÇO.<br><b>(iii)(b) Esterification:</b> Reaction between acid and alcohol to form ester + water. C‚ÇÇH‚ÇÖOH + CH‚ÇÉCOOH ‚áå CH‚ÇÉCOOC‚ÇÇH‚ÇÖ + H‚ÇÇO (ethyl ethanoate, fruity smell). Catalyst: conc. H‚ÇÇSO‚ÇÑ.`},
{subj:"phy",s:"E",t:"cs",c:"Magnetic Effects of Electric Current",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Electric Motor in Fan</b><br><br>Anjali noticed that the ceiling fan uses electricity and the motor inside converts it to rotation. Her teacher explained it works on the principle of magnetic effect of current.<br><br><b>(i)</b> State the principle on which an electric motor works. <span class="cm">[1 mark]</span><br><b>(ii)</b> Name the rule used to find direction of force on the current-carrying coil. <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Explain the role of the split ring commutator in a DC motor. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What energy conversion takes place in (a) electric motor (b) electric generator? Give one use of each. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i)</b> A current-carrying conductor placed in a magnetic field experiences a force (motor effect / Lorentz force).<br><b>(ii) Fleming's Left-hand rule</b><br><b>(iii)(a)</b> The split ring commutator is a device that reverses the direction of current in the coil every half rotation. This ensures the coil always rotates in the same direction (otherwise it would just oscillate back and forth).<br><b>(iii)(b)</b> (a) Motor: <b>Electrical ‚Üí Mechanical energy</b>. Use: fans, pumps, machines. (b) Generator: <b>Mechanical ‚Üí Electrical energy</b>. Use: power stations, dynamos.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"e",m:1,q:`Which of the following is a renewable source of energy?`,o:["A) Coal","B) Petroleum","C) Solar energy","D) Natural gas"],r:"C",a:`<b>Solar energy</b> is renewable ‚Äî it is continuously replenished by the sun. Coal, petroleum, and natural gas are fossil fuels (non-renewable).`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"e",m:1,q:`The energy released by the sun is due to:`,o:["A) Nuclear fission","B) Nuclear fusion","C) Chemical reactions","D) Combustion"],r:"B",a:`The sun releases energy through <b>nuclear fusion</b> ‚Äî hydrogen nuclei fuse to form helium, releasing enormous energy.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"e",m:1,q:`A good fuel should have:`,o:["A) High calorific value and low ignition temperature","B) Low calorific value and high ignition temperature","C) High calorific value and high ignition temperature","D) Produce more smoke"],r:"A",a:`A good fuel has <b>high calorific value</b> (releases more energy per unit) and <b>low ignition temperature</b> (easy to start).`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`The calorific value of a fuel is expressed in:`,o:["A) kJ/kg","B) kJ/L","C) kJ/mol","D) Joules"],r:"A",a:`Calorific value is expressed in <b>kJ/kg</b> (kilojoules per kilogram).`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`Which gas is the main component of biogas?`,o:["A) Carbon dioxide","B) Hydrogen","C) Methane","D) Propane"],r:"C",a:`<b>Methane (CH‚ÇÑ)</b> is the main component of biogas (~65%). Also contains CO‚ÇÇ, H‚ÇÇS, H‚ÇÇ.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`A solar cell converts:`,o:["A) Heat energy to electrical energy","B) Solar energy to heat energy","C) Solar energy to electrical energy","D) Chemical energy to electrical energy"],r:"C",a:`Solar cells (photovoltaic cells) convert <b>solar (light) energy directly to electrical energy</b> using the photovoltaic effect.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`Ocean thermal energy conversion (OTEC) works on the temperature difference between:`,o:["A) Surface and deep ocean water","B) Ocean and atmosphere","C) Day and night temperatures","D) Tropical and polar oceans"],r:"A",a:`OTEC utilises the temperature difference between warm <b>surface water</b> (~25¬∞C) and cold <b>deep water</b> (~5¬∞C) to run a heat engine.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"h",m:1,q:`Hydrogen is considered a good fuel for the future because:`,o:["A) It is the lightest element","B) It has very high calorific value and burns cleanly","C) It is found in abundance in pure form","D) It is easy to store and transport"],r:"B",a:`Hydrogen has an extremely <b>high calorific value (~150 kJ/g)</b> and burns to produce only water ‚Äî <b>no pollutants</b>. Main challenge is safe storage and production.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`Nuclear fission is the process of:`,o:["A) Combining two light nuclei","B) Splitting a heavy nucleus into lighter nuclei","C) Converting mass to energy only","D) Radioactive decay"],r:"B",a:`<b>Nuclear fission</b> = splitting a heavy nucleus (e.g. U-235) into two lighter nuclei, releasing enormous energy. Used in nuclear power plants.`},
{subj:"phy",s:"A",t:"mcq",c:"Sources of Energy",d:"m",m:1,q:`The device that collects solar energy and converts it to heat is called:`,o:["A) Solar cell","B) Solar cooker","C) Solar panel","D) Solar collector / concentrator"],r:"D",a:`A <b>solar collector/concentrator</b> focuses solar radiation to produce heat. A solar cooker is one application. Solar cell converts to electricity (not heat).`},
{subj:"phy",s:"A",t:"ar",c:"Sources of Energy",d:"m",m:1,q:`<b>Assertion (A):</b> Fossil fuels are causing global warming.<br><b>Reason (R):</b> Burning fossil fuels releases CO‚ÇÇ and other greenhouse gases.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. CO‚ÇÇ from burning fossil fuels is the main cause of the greenhouse effect and global warming. Answer: <b>A</b>`},
{subj:"phy",s:"A",t:"ar",c:"Sources of Energy",d:"m",m:1,q:`<b>Assertion (A):</b> Biogas is a cleaner fuel than wood or coal.<br><b>Reason (R):</b> Biogas burns without producing smoke and leaves no ash.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains A. Biogas combustion is cleaner ‚Äî no particulate matter, no sulphur emissions. Answer: <b>A</b>`},
{subj:"phy",s:"B",t:"vsa",c:"Sources of Energy",d:"e",m:2,q:`What is meant by calorific value of a fuel? Compare calorific values of wood, coal, and LPG.`,o:[],r:"",a:`<b>Calorific value</b> is the amount of heat energy produced per unit mass of fuel when completely burnt. Unit: kJ/kg.<br>Wood ‚âà 17,000 kJ/kg | Coal ‚âà 25,000‚Äì33,000 kJ/kg | LPG ‚âà 55,000 kJ/kg<br>LPG is the best fuel among these.`},
{subj:"phy",s:"B",t:"vsa",c:"Sources of Energy",d:"e",m:2,q:`What is a solar cooker? State two advantages and one limitation.`,o:[],r:"",a:`A <b>solar cooker</b> uses a box with a glass lid and reflecting mirror to trap and concentrate solar heat for cooking.<br><b>Advantages:</b> (1) Free, renewable energy ‚Äî no fuel cost. (2) Does not produce smoke or pollution.<br><b>Limitation:</b> Can only be used on sunny days; cannot cook at night or in cloudy weather.`},
{subj:"phy",s:"B",t:"vsa",c:"Sources of Energy",d:"m",m:2,q:`What is geothermal energy? Name two countries that use it extensively.`,o:[],r:"",a:`<b>Geothermal energy</b> is heat energy obtained from the interior of the earth ‚Äî from hot springs, geysers, or drilling into hot rock layers.<br>Countries: <b>Iceland, New Zealand</b> (also USA, Italy, Kenya).`},
{subj:"phy",s:"B",t:"vsa",c:"Sources of Energy",d:"m",m:2,q:`What is the difference between nuclear fission and nuclear fusion? Which one is used in nuclear power plants?`,o:[],r:"",a:`<b>Fission:</b> Heavy nucleus (U-235) splits into lighter nuclei + energy. Controlled chain reaction possible.<br><b>Fusion:</b> Light nuclei (H) combine to form heavier nucleus + energy. Requires extremely high temperature.<br><b>Nuclear power plants use fission.</b> Fusion is used in hydrogen bombs (not yet controlled for power generation).`},
{subj:"phy",s:"C",t:"sa",c:"Sources of Energy",d:"m",m:3,q:`Explain the working of a biogas plant with a diagram. What are the advantages of using biogas?`,o:[],r:"",a:`<b>Biogas Plant:</b> A dome-shaped underground tank (digester) is filled with organic matter (cow dung + water = slurry). In the absence of oxygen, anaerobic bacteria decompose the organic matter, producing <b>biogas</b> (mainly CH‚ÇÑ + CO‚ÇÇ). Gas collects in the dome above and is piped for use. The leftover slurry is an excellent <b>manure</b>.<br><b>Advantages:</b><br>(i) Clean fuel ‚Äî burns without smoke.<br>(ii) Slurry is rich organic manure ‚Äî returned to fields.<br>(iii) Utilises waste material (dung, crop residue) ‚Äî solves waste disposal problem.<br>(iv) Renewable and available locally in rural areas.`},
{subj:"phy",s:"C",t:"sa",c:"Sources of Energy",d:"m",m:3,q:`What are the environmental consequences of using fossil fuels? Suggest alternatives.`,o:[],r:"",a:`<b>Environmental consequences:</b><br>(i) <b>Air pollution:</b> Burning releases CO‚ÇÇ, SO‚ÇÇ, NO‚Çì, particulates ‚Üí respiratory diseases, acid rain.<br>(ii) <b>Global warming/Climate change:</b> CO‚ÇÇ and other greenhouse gases trap heat ‚Üí temperature rise, glacial melt, sea level rise.<br>(iii) <b>Acid rain:</b> SO‚ÇÇ + H‚ÇÇO ‚Üí H‚ÇÇSO‚ÇÑ, damages buildings, forests, aquatic life.<br>(iv) <b>Non-renewable:</b> Reserves being depleted rapidly.<br><b>Alternatives:</b> Solar energy, wind energy, hydropower, biogas, hydrogen fuel ‚Äî all renewable and cleaner.`},
{subj:"phy",s:"C",t:"sa",c:"Sources of Energy",d:"h",m:3,q:`Explain how wind energy is harnessed. What are the conditions required for wind energy farms? Give two limitations.`,o:[],r:"",a:`<b>Harnessing wind energy:</b> Wind turbines have large blades mounted on a tower. Wind turns the blades, which rotate a generator to produce electricity. Many turbines together form a <b>wind energy farm</b>.<br><b>Conditions required:</b><br>(i) Minimum wind speed of 15 km/h to maintain rotation.<br>(ii) Wind must blow for most of the year ‚Äî coastal areas, open plains, mountain passes.<br><b>Limitations:</b><br>(i) Output depends on wind availability ‚Äî not constant/reliable.<br>(ii) Large land area required for wind farms. Expensive to set up. Can harm bird populations.`},
{subj:"phy",s:"D",t:"la",c:"Sources of Energy",d:"h",m:5,q:`(a) What are the various forms of energy available from the oceans? Explain any two in detail. (b) What is tidal energy and how is it harnessed? (c) Compare renewable and non-renewable energy sources.`,o:[],r:"",a:`<b>(a) Ocean energy forms:</b><br><b>(i) Tidal Energy:</b> Energy from the rise and fall of sea tides (explained below).<br><b>(ii) Wave Energy:</b> Kinetic energy of ocean waves. Devices on coastlines trap wave motion and use it to run generators.<br><b>(iii) Ocean Thermal Energy (OTEC):</b> Uses temperature difference between warm surface water and cold deep water. Warm water evaporates a low-boiling liquid (ammonia), vapour runs turbine, cold water condenses it back.<br><b>(b) Tidal Energy:</b> Tides are caused by gravitational pull of the moon. Water flows in (high tide) and out (low tide). A dam (barrage) is built at a river estuary. During high tide, water flows in through turbines (generating electricity). During low tide, water flows out through turbines. Requires large tidal variation (>5m) ‚Äî e.g. Gulf of Kutch.<br><b>(c) Comparison:</b><br>Renewable: Solar, wind, hydro, biogas, tidal ‚Äî naturally replenished, clean, sustainable. Often have high setup costs but near-zero running costs.<br>Non-renewable: Coal, petroleum, natural gas, nuclear (uranium) ‚Äî limited reserves, cause pollution, cheaper currently but being depleted.`},
{subj:"phy",s:"D",t:"la",c:"Sources of Energy",d:"h",m:5,q:`(a) Explain with a diagram the working of a hydroelectric power plant. (b) What are the social and environmental impacts of large dams? (c) Why are nuclear power plants both beneficial and dangerous?`,o:[],r:"",a:`<b>(a) Hydroelectric Power:</b> A large dam is built across a river. Water stored in the reservoir has high potential energy. Water is allowed to fall from a height through penstocks (large pipes) to turbines below. Falling water turns turbines ‚Üí generators produce electricity. Electricity is transmitted via power lines.<br><b>Advantages:</b> No fuel needed, no pollution, water stored for irrigation.<br><b>(b) Environmental/Social impacts of large dams:</b><br>(i) Displacement of large populations from submerged areas.<br>(ii) Loss of agricultural land and forests under the reservoir.<br>(iii) Disruption of river ecosystems ‚Äî fish migration blocked.<br>(iv) Sedimentation reduces dam life. Risk of dam failure/floods.<br><b>(c) Nuclear power plants:</b><br><b>Benefits:</b> Huge energy from small amount of fuel (1 kg U-235 ‚âà 3 million kg coal equivalent). No CO‚ÇÇ emission.<br><b>Dangers:</b> Radioactive waste is hazardous for thousands of years ‚Äî difficult to dispose safely. Risk of radiation leaks (Chernobyl, Fukushima). Mining of uranium causes environmental damage.`},
{subj:"phy",s:"E",t:"cs",c:"Sources of Energy",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Village Electrification</b><br><br>A remote village has no electricity connection. The government is considering three options: (1) Diesel generator (2) Solar panels (3) Biogas plant from cattle dung.<br><br><b>(i)</b> Which option is most environment-friendly? Give one reason. <span class="cm">[1 mark]</span><br><b>(ii)</b> Name the main component of biogas. <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Compare solar panels and diesel generator on three criteria: cost, pollution, reliability. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What are the by-products of a biogas plant and how are they useful? <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Biogas/Solar</b> ‚Äî they do not release harmful pollutants; solar especially produces no emissions at all.<br><b>(ii) Methane (CH‚ÇÑ)</b><br><b>(iii)(a)</b><br>Solar: High initial cost, zero pollution, reliable only in daytime/sunshine.<br>Diesel: Low initial cost, high pollution (SO‚ÇÇ, CO‚ÇÇ), reliable anytime.<br><b>(iii)(b)</b> By-products: (1) <b>Slurry (spent biomass)</b> ‚Äî excellent organic fertiliser, rich in nitrogen, returned to fields. (2) <b>CO‚ÇÇ</b> ‚Äî small amounts, can be used in plant growth.`},
{subj:"phy",s:"E",t:"cs",c:"Sources of Energy",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Solar Water Heater</b><br><br>Rajesh's family installed a solar water heater on their roof. It has a flat black-painted metal box with a glass top, connected to a water tank. By afternoon, the water in the tank is hot enough for bathing.<br><br><b>(i)</b> What principle does the solar water heater work on? <span class="cm">[1 mark]</span><br><b>(ii)</b> Why is the box painted black? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Compare a solar water heater with a solar cooker in terms of construction and use. <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> What is the difference between a solar cell and a solar panel? Calculate the number of solar cells (each 0.5V, 1W) needed to power a 10W LED lamp. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Greenhouse effect</b> ‚Äî glass traps solar heat inside the box.<br><b>(ii)</b> Black surfaces are good <b>absorbers of heat radiation</b> ‚Äî absorbs maximum solar energy.<br><b>(iii)(a)</b> Solar water heater: flat-plate collector, heats water continuously, for bathing/washing. Solar cooker: reflective box/mirror, heats food directly, for cooking. Both use solar energy but different designs and purposes.<br><b>(iii)(b)</b> Solar cell = single photovoltaic unit; Solar panel = many cells connected. For 10W at ~0.5V: Current needed = 10/0.5 = 20A. Each cell gives 1W at 0.5V = 2A. Cells needed = 20/2 = <b>10 cells in parallel</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"e",m:1,q:`Which of the following is a biodegradable substance?`,o:["A) DDT","B) Plastic","C) Vegetable peels","D) Polythene"],r:"C",a:`<b>Vegetable peels</b> are biodegradable ‚Äî broken down by microorganisms. DDT, plastic, and polythene are non-biodegradable.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"e",m:1,q:`In a food chain, the energy available at each successive trophic level is approximately:`,o:["A) 100%","B) 50%","C) 10%","D) 1%"],r:"C",a:`<b>10% of energy</b> is transferred from one trophic level to the next. 90% is lost as heat, respiration, excretion (10% law ‚Äî Lindemann, 1942).`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"e",m:1,q:`Producers in an ecosystem are:`,o:["A) Animals that eat plants","B) Green plants that make their own food","C) Decomposers that break down dead matter","D) Omnivores"],r:"B",a:`<b>Producers</b> are organisms (mainly green plants) that synthesise organic food from inorganic substances using solar energy.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`The highest concentration of DDT will be found in:`,o:["A) Water","B) Small fish","C) Large fish","D) Fish-eating birds at top of food chain"],r:"D",a:`<b>Biological magnification</b> ‚Äî DDT concentration increases at each trophic level. Highest in organisms at the <b>top of the food chain</b> (fish-eating birds).`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`Ozone layer is present in the:`,o:["A) Troposphere","B) Stratosphere","C) Mesosphere","D) Thermosphere"],r:"B",a:`Ozone (O‚ÇÉ) layer is in the <b>stratosphere</b> (15‚Äì35 km altitude). It absorbs harmful UV radiation from the sun.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`CFCs (chlorofluorocarbons) are mainly responsible for:`,o:["A) Acid rain","B) Global warming","C) Ozone layer depletion","D) Water pollution"],r:"C",a:`CFCs released from refrigerants and aerosols break down ozone molecules in the stratosphere ‚Üí <b>ozone layer depletion</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`A food chain always starts with:`,o:["A) Carnivore","B) Decomposer","C) Producer (green plant)","D) Herbivore"],r:"C",a:`All food chains begin with a <b>producer</b> (green plant) that converts solar energy into chemical energy.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"h",m:1,q:`In a food chain: Grass ‚Üí Grasshopper ‚Üí Frog ‚Üí Snake ‚Üí Hawk. If grass has 10,000 J energy, energy available to hawk is:`,o:["A) 10,000 J","B) 100 J","C) 10 J","D) 1 J"],r:"C",a:`10% law: Grasshopper = 1000J, Frog = 100J, Snake = 10J, Hawk = <b>1J</b>. Wait ‚Äî 4 transfers: 10000 √ó (0.1)‚Å¥ = 0.1J... Actually Hawk is at 5th level: 10000√ó0.1√ó0.1√ó0.1√ó0.1 = 0.1J. But with 3 transfers from grass to hawk: 10000√ó(0.1)¬≥ = <b>10J</b>. Hawk is 4th consumer (5th trophic level).`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`Decomposers in an ecosystem are important because:`,o:["A) They provide food for carnivores","B) They recycle nutrients back into the soil","C) They produce oxygen","D) They reduce biodiversity"],r:"B",a:`Decomposers (bacteria, fungi) break down dead organisms and return nutrients (carbon, nitrogen, minerals) to the soil ‚Äî <b>nutrient recycling</b>.`},
{subj:"bio",s:"A",t:"mcq",c:"Our Environment",d:"m",m:1,q:`The term "ecosystem" was coined by:`,o:["A) Darwin","B) A.G. Tansley","C) Haeckel","D) Lindemann"],r:"B",a:`The term "ecosystem" was coined by <b>Arthur George Tansley</b> in 1935.`},
{subj:"bio",s:"A",t:"ar",c:"Our Environment",d:"m",m:1,q:`<b>Assertion (A):</b> A pond is an example of a natural ecosystem.<br><b>Reason (R):</b> An ecosystem includes both biotic (living) and abiotic (non-living) components.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R defines what makes a pond an ecosystem ‚Äî it has producers, consumers, decomposers AND sunlight, water, soil. Answer: <b>A</b>`},
{subj:"bio",s:"A",t:"ar",c:"Our Environment",d:"m",m:1,q:`<b>Assertion (A):</b> Use of polythene bags should be discouraged.<br><b>Reason (R):</b> Polythene is non-biodegradable and persists in the environment for hundreds of years.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. R explains A. Answer: <b>A</b>`},
{subj:"bio",s:"B",t:"vsa",c:"Our Environment",d:"e",m:2,q:`What is the difference between biodegradable and non-biodegradable waste? Give two examples of each.`,o:[],r:"",a:`<b>Biodegradable:</b> Waste that can be broken down by microorganisms into simpler substances. Examples: vegetable peels, paper, cow dung, food scraps.<br><b>Non-biodegradable:</b> Waste that cannot be broken down by microorganisms ‚Äî persists in environment. Examples: plastic, DDT, glass, polythene, aluminium cans.`},
{subj:"bio",s:"B",t:"vsa",c:"Our Environment",d:"e",m:2,q:`What is a food web? How is it different from a food chain?`,o:[],r:"",a:`A <b>food web</b> is an interconnected network of multiple food chains in an ecosystem, showing the complex feeding relationships.<br><b>Food chain:</b> Single linear sequence (A‚ÜíB‚ÜíC). <b>Food web:</b> Many interconnected chains ‚Äî one organism may be eaten by multiple predators, and one predator may eat many prey. Food web is more realistic.`},
{subj:"bio",s:"B",t:"vsa",c:"Our Environment",d:"m",m:2,q:`What is biological magnification? Why is it a cause for concern?`,o:[],r:"",a:`<b>Biological magnification (biomagnification):</b> The progressive increase in concentration of a non-biodegradable chemical (e.g. DDT, mercury) at each successive trophic level in a food chain.<br><b>Concern:</b> Even small amounts in water become extremely concentrated in top predators (including humans) ‚Üí causes poisoning, reproductive failure, cancer. Classic example: DDT in fish-eating birds caused thinning of eggshells.`},
{subj:"bio",s:"B",t:"vsa",c:"Our Environment",d:"m",m:2,q:`What is ozone and where is it found? Why is its depletion a problem?`,o:[],r:"",a:`<b>Ozone (O‚ÇÉ)</b> is a molecule with 3 oxygen atoms, found in the stratosphere (15‚Äì35 km altitude) ‚Äî the ozone layer.<br><b>Depletion problem:</b> Ozone absorbs harmful UV-B radiation from the sun. Its depletion allows more UV-B to reach Earth ‚Üí increased risk of skin cancer, cataracts, damage to marine ecosystems, reduced crop yields.`},
{subj:"bio",s:"C",t:"sa",c:"Our Environment",d:"m",m:3,q:`Explain the flow of energy in an ecosystem. Why is the number of trophic levels limited to 3‚Äì4?`,o:[],r:"",a:`Energy flows from the <b>sun ‚Üí producers ‚Üí herbivores ‚Üí carnivores</b> in a food chain.<br>At each trophic level, only about <b>10%</b> of energy is transferred to the next level. The rest is lost as:<br>‚Ä¢ Heat during respiration<br>‚Ä¢ Waste products<br>‚Ä¢ Parts not consumed<br><b>Why only 3‚Äì4 levels:</b> By the 4th trophic level, only 0.1% (10‚Åª¬≥) of the original energy remains. This is so little that it cannot support a viable population of organisms. Hence food chains rarely exceed 4‚Äì5 levels.`},
{subj:"bio",s:"C",t:"sa",c:"Our Environment",d:"m",m:3,q:`What is waste management? Differentiate between the "3R" approach and explain how each reduces environmental impact.`,o:[],r:"",a:`<b>Waste management:</b> The process of collecting, treating, and disposing of waste in an environmentally responsible way.<br><b>3R approach:</b><br><b>Reduce:</b> Use fewer resources ‚Äî buy less, use less packaging, turn off lights. Reduces waste generation at source.<br><b>Reuse:</b> Use items again instead of discarding ‚Äî refill bottles, use cloth bags, repair instead of replacing. Reduces waste volume.<br><b>Recycle:</b> Convert waste into new products ‚Äî recycle paper, glass, metals, plastics. Reduces need for raw materials and landfill space.<br>Together these reduce pollution, conserve resources, and decrease energy use.`},
{subj:"bio",s:"D",t:"la",c:"Our Environment",d:"h",m:5,q:`(a) Draw a diagram of a terrestrial food chain with 4 trophic levels. (b) How does energy flow in an ecosystem? (c) What is an ecological pyramid? Describe the pyramid of energy and explain why it is always upright.`,o:[],r:"",a:`<b>(a) Food chain:</b> Grass ‚Üí Grasshopper ‚Üí Frog ‚Üí Snake (‚Üí Hawk)<br><b>(b) Energy flow:</b> Solar energy is captured by producers (photosynthesis). Herbivores eat producers ‚Äî only 10% of energy transferred. Each subsequent consumer gets 10% of previous level. Energy flow is <b>unidirectional</b> (sun‚Üíproducers‚Üíconsumers) ‚Äî it cannot be recycled.<br><b>(c) Ecological pyramid:</b> A graphical representation of the number, biomass, or energy at each trophic level in a food chain. The base represents producers, apex represents top consumers.<br><b>Pyramid of energy:</b> Shows amount of energy at each trophic level. Always <b>upright</b> because energy always decreases at successive levels (10% rule). Energy cannot be recycled ‚Äî it is lost as heat at each level. This is the most fundamental and always-upright pyramid.`},
{subj:"bio",s:"E",t:"cs",c:"Our Environment",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Pesticide in Lake</b><br><br>Scientists found that a lake used for irrigation had 0.003 ppm DDT in water. Small fish had 0.5 ppm, large fish had 2 ppm, and fish-eating birds had 25 ppm DDT in their bodies.<br><br><b>(i)</b> What phenomenon does this data demonstrate? <span class="cm">[1 mark]</span><br><b>(ii)</b> Why did the bird population in the area decline? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> Why is DDT not broken down even after moving up the food chain? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Suggest three measures to prevent such contamination in future. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Biological magnification (biomagnification)</b><br><b>(ii)</b> High DDT concentration caused thinning of eggshells ‚Üí eggs broke before hatching ‚Üí population declined.<br><b>(iii)(a)</b> DDT is <b>non-biodegradable</b> ‚Äî it cannot be broken down by enzymes or microorganisms. It is fat-soluble (lipophilic) and gets stored in fatty tissues of organisms, accumulating over time. Each predator accumulates all the DDT from all prey eaten over its lifetime.<br><b>(iii)(b)</b> (1) Ban use of persistent pesticides like DDT. (2) Use biodegradable pesticides or biological pest control. (3) Treat agricultural runoff before it enters water bodies. (4) Monitor water bodies regularly for chemical contamination.`},
{subj:"bio",s:"E",t:"cs",c:"Our Environment",d:"m",m:4,q:`<div class="csb"><b>üìã Case Study ‚Äî Ozone Hole</b><br><br>Scientists detected a significant thinning of the ozone layer over Antarctica. The main cause identified was the use of CFCs in refrigerators and aerosol sprays.<br><br><b>(i)</b> In which layer of the atmosphere is ozone found? <span class="cm">[1 mark]</span><br><b>(ii)</b> What harm does increased UV radiation cause to living organisms? <span class="cm">[1 mark]</span><br><b>(iii)(a)</b> How do CFCs destroy ozone? What international agreement was made to protect the ozone layer? <span class="cm">[2 marks]</span><br><i>OR</i><br><b>(iii)(b)</b> Explain the difference between the beneficial and harmful effects of ozone. <span class="cm">[2 marks]</span></div>`,o:[],r:"",a:`<b>(i) Stratosphere</b> (15‚Äì35 km altitude)<br><b>(ii)</b> Increased UV-B causes: skin cancer, cataracts, weakened immune system in humans. Damages DNA, reduces crop yields, harms marine phytoplankton.<br><b>(iii)(a)</b> CFCs released in atmosphere reach stratosphere. UV light breaks CFC ‚Üí releases Cl atoms. Each Cl atom acts as catalyst: Cl + O‚ÇÉ ‚Üí ClO + O‚ÇÇ; ClO + O ‚Üí Cl + O‚ÇÇ. One Cl atom can destroy ~100,000 ozone molecules. <b>Montreal Protocol (1987)</b> ‚Äî international treaty to phase out CFC production and use.<br><b>(iii)(b)</b> Beneficial (stratospheric ozone): Absorbs harmful UV-B radiation ‚Äî protects life on Earth. Harmful (tropospheric ozone): Near ground level, ozone is a pollutant ‚Äî irritates lungs, damages plants, forms smog.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"e",m:1,q:`Which of the following is a natural resource?`,o:["A) Mobile phone","B) Fresh water","C) Plastic bag","D) Synthetic fibre"],r:"B",a:`<b>Fresh water</b> is a natural resource ‚Äî it occurs naturally and is essential for all life. The others are man-made.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"e",m:1,q:`The Chipko Movement was related to:`,o:["A) Water conservation","B) Protection of forests","C) Mining rights","D) Air pollution control"],r:"B",a:`The <b>Chipko Movement</b> (1970s, Uttarakhand) was a grassroots movement to protect forests ‚Äî villagers hugged trees to prevent felling.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`Coliform bacteria in water indicates:`,o:["A) High nutrient content","B) Contamination with sewage / faecal matter","C) Acidic water","D) High dissolved oxygen"],r:"B",a:`Coliform bacteria (e.g. E. coli) are indicators of <b>faecal contamination</b> ‚Äî their presence means the water is unsafe for drinking.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`The Ganga Action Plan was initiated to:`,o:["A) Build dams on Ganga","B) Reduce pollution and clean the river Ganga","C) Divert water for irrigation","D) Increase fish production"],r:"B",a:`The <b>Ganga Action Plan (1985)</b> was launched to reduce pollution in the Ganga river by treating sewage and industrial effluents.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`Jhum cultivation is a form of:`,o:["A) Intensive farming","B) Organic farming","C) Slash and burn agriculture","D) Terrace farming"],r:"C",a:`<b>Jhum/Shifting cultivation</b> involves cutting and burning vegetation, growing crops for a few seasons, then moving on. Common in northeastern India.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`Khadin, Baolis, and Johads are examples of:`,o:["A) Traditional irrigation methods","B) Traditional water harvesting systems","C) Dams built by Mughals","D) Types of crops"],r:"B",a:`These are all traditional <b>water harvesting systems</b> from different parts of India ‚Äî used to collect and conserve rainwater.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"h",m:1,q:`The main cause of loss of biodiversity is:`,o:["A) Natural disasters","B) Over-exploitation and habitat destruction by humans","C) Climate change alone","D) Competition between species"],r:"B",a:`The primary cause of biodiversity loss is <b>habitat destruction and over-exploitation</b> by humans ‚Äî deforestation, hunting, pollution, land conversion.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`Which of the following is a step towards sustainable development?`,o:["A) Cutting all forests for agriculture","B) Using fossil fuels extensively","C) Rainwater harvesting","D) Increasing mining activities"],r:"C",a:`<b>Rainwater harvesting</b> conserves a natural resource (water) sustainably. The others deplete or damage natural resources.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`The "3R" approach to waste management stands for:`,o:["A) Reduce, Reuse, Recycle","B) Reduce, Replace, Restore","C) Remove, Reuse, Repair","D) Reclaim, Recycle, Restore"],r:"A",a:`<b>Reduce, Reuse, Recycle</b> ‚Äî the three principles of sustainable waste management.`},
{subj:"bio",s:"A",t:"mcq",c:"Management of Natural Resources",d:"m",m:1,q:`Why is it important to manage natural resources?`,o:["A) To increase their price","B) To ensure their availability for future generations","C) To stop their use completely","D) To increase exports"],r:"B",a:`Sustainable management ensures natural resources are available for <b>future generations</b> (sustainable development concept).`},
{subj:"bio",s:"A",t:"ar",c:"Management of Natural Resources",d:"m",m:1,q:`<b>Assertion (A):</b> Forests are called biodiversity hot spots.<br><b>Reason (R):</b> Forests support a large variety of plants, animals, and microorganisms.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Forests contain enormous biodiversity ‚Äî R explains why they are called hot spots. Answer: <b>A</b>`},
{subj:"bio",s:"A",t:"ar",c:"Management of Natural Resources",d:"m",m:1,q:`<b>Assertion (A):</b> Dams cause displacement of local populations.<br><b>Reason (R):</b> The reservoir behind a dam submerges large areas of land including villages.`,o:["A) Both true; R explains A","B) Both true; R does not explain","C) A true, R false","D) A false, R true"],r:"A",a:`Both true. Large dams (like Sardar Sarovar) have displaced millions of people. R explains why. Answer: <b>A</b>`},
{subj:"bio",s:"B",t:"vsa",c:"Management of Natural Resources",d:"e",m:2,q:`What is sustainable development? Give two examples of sustainable practices.`,o:[],r:"",a:`<b>Sustainable development:</b> Development that meets the needs of the present without compromising the ability of future generations to meet their own needs.<br><b>Examples:</b> (1) Rainwater harvesting ‚Äî conserves water resources. (2) Using solar/wind energy instead of fossil fuels. (3) Organic farming ‚Äî maintains soil health.`},
{subj:"bio",s:"B",t:"vsa",c:"Management of Natural Resources",d:"e",m:2,q:`What is the importance of forests? List any four roles forests play in the environment.`,o:[],r:"",a:`Forests are vital ecological resources:<br>(1) <b>Oxygen production</b> ‚Äî trees absorb CO‚ÇÇ and release O‚ÇÇ.<br>(2) <b>Watershed protection</b> ‚Äî tree roots hold soil, prevent erosion, maintain water cycle.<br>(3) <b>Biodiversity</b> ‚Äî habitat for millions of species.<br>(4) <b>Climate regulation</b> ‚Äî forests regulate rainfall and local temperature.<br>(5) Provide raw materials (wood, medicine, food).`},
