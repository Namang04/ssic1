{subj:"geo",s:"B",t:"sb",c:"Lifelines of National Economy",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Golden Quadrilateral</b><br><br><i>"The National Highways Authority of India (NHAI) is implementing the National Highways Development Project (NHDP). The Golden Quadrilateral super highway connects Delhi‚ÄìMumbai‚ÄìChennai‚ÄìKolkata. This is the most ambitious highway project in India. These highways are being upgraded to 4/6 lanes."</i><br><br>(i) What is the Golden Quadrilateral? Name the four cities it connects. [1]<br>(ii) Why is road transport described as the most important mode in India? [1]<br>(iii) What are the advantages of national highway development for India's economy? [2]</div>`,o:[],r:"",a:`(i) The Golden Quadrilateral is a <b>super highway network</b> connecting India's four major metropolitan cities: <b>Delhi, Mumbai, Chennai, and Kolkata</b>. It is the largest highway project in India (~5,846 km).<br>(ii) Road transport is most important because: provides door-to-door connectivity; 85% of passenger and 70% of freight traffic moves by road; only mode reaching remote villages; flexible and available at any time.<br>(iii) Advantages: (1) Faster movement of goods reduces transportation costs and increases market efficiency. (2) Better connectivity for industries ‚Äî quicker supply chains. (3) Reduces travel time for passengers ‚Äî boosts productivity and tourism. (4) Integration of regional markets ‚Äî facilitates national economic integration. (5) Employment creation in construction, logistics, and associated sectors.`},
{subj:"civ",s:"B",t:"sb",c:"Federalism",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Linguistic States</b><br><br><i>"The reorganisation of States in 1956 created new states on the basis of language. This was based on the idea that people who speak the same language belong together. It was feared that this would lead to the break-up of the country. But these fears proved to be unfounded. Linguistic States actually proved to be more democratic and administrative units."</i><br><br>(i) What principle was used to reorganise states in 1956? [1]<br>(ii) Why were some people worried about linguistic reorganisation? Were their fears justified? [1]<br>(iii) How does language policy in India contribute to national unity? [2]</div>`,o:[],r:"",a:`(i) States were reorganised on the basis of <b>language</b> ‚Äî people speaking the same language were brought together in a single state (e.g. Andhra Pradesh for Telugu-speakers, Kerala for Malayalam-speakers).<br>(ii) People feared linguistic states would lead to breakup of India ‚Äî separatism, demands for independence, weakening of national unity. Fears proved <b>unfounded</b> ‚Äî linguistic states actually created stable, efficient administrative units with better local governance and reduced regional tensions.<br>(iii) Language policy for unity: (1) Hindi as official language of Union; English allowed to continue ‚Äî placated non-Hindi speakers. (2) 22 languages in Eighth Schedule ‚Äî all recognised officially. (3) States can use their own language for official purposes. (4) Three-language formula in schools ‚Äî ensures students know regional language, Hindi, and English. This approach of accommodation rather than imposition has helped maintain national unity.`},
{subj:"civ",s:"B",t:"sb",c:"Gender, Religion and Caste",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Women's Representation</b><br><br><i>"Women in India face a peculiar situation. The Constitution gives them equal rights, but in reality their situation is far from equal. They are often not treated with dignity. They are victims of domestic violence, female foeticide, and gender discrimination in employment. In political representation, their numbers remain pitifully low in Parliament and state assemblies."</i><br><br>(i) Despite equal constitutional rights, why do women face inequality in India? [1]<br>(ii) What is female foeticide and why is it practiced? [1]<br>(iii) What steps has the Indian government taken to improve women's status? Mention two. [2]</div>`,o:[],r:"",a:`(i) Constitutional rights exist on paper but social and cultural norms override them in practice. Deep-rooted patriarchy, low literacy among women, economic dependence on men, and acceptance of gender discrimination means rights are not enforced or exercised equally.<br>(ii) Female foeticide = selective abortion of female foetuses after determining sex through ultrasound. Practiced due to: (1) Dowry system ‚Äî families fear financial burden of daughters. (2) Preference for sons ‚Äî cultural, religious, and economic reasons (sons seen as support in old age). Results in declining sex ratio.<br>(iii) Government steps: (1) <b>PNDT Act (1994)</b> ‚Äî banned sex determination tests to prevent female foeticide. (2) <b>Beti Bachao Beti Padhao</b> scheme ‚Äî promotes education and survival of girls. (3) <b>Maternity Benefit Act</b> ‚Äî paid maternity leave for working women. (4) <b>Domestic Violence Act (2005)</b> ‚Äî legal protection for women against domestic violence.`},
{subj:"civ",s:"B",t:"sb",c:"Political Parties",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Reform of Political Parties</b><br><br><i>"We are aware of the problems in political parties ‚Äî internal undemocracy, dynastic succession, criminalisation, use of money. Various efforts have been made to reform these. The Election Commission has issued orders requiring parties to disclose sources of funds and criminal records of candidates. But these are limited reforms. Deeper reform requires active participation by ordinary citizens."</i><br><br>(i) What is dynastic politics? Give one example from India. [1]<br>(ii) What is the criminalisation of politics? Why does it occur? [1]<br>(iii) How can ordinary citizens help reform political parties? [2]</div>`,o:[],r:"",a:`(i) Dynastic politics = passing party positions and power to family members rather than electing capable leaders through merit. Example: Indian National Congress (Nehru-Gandhi family), Samajwadi Party (Yadav family), NCP (Pawar family).<br>(ii) Criminalisation of politics = people with criminal records getting party tickets and winning elections. Occurs because: (1) Criminals have money to fund expensive elections. (2) They can use money and muscle to win votes. (3) Winning gives them political protection from prosecution.<br>(iii) Citizens can reform political parties by: (1) Refusing to vote for candidates with criminal backgrounds ‚Äî forcing parties to give clean candidates. (2) Joining parties and participating in internal elections ‚Äî pushing for internal democracy. (3) Using RTI to demand transparency in party funding and decision-making. (4) Supporting and funding honest political leaders and movements.`},
{subj:"civ",s:"B",t:"sb",c:"Outcomes of Democracy",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Is Democracy Delivering?</b><br><br><i>"The survey evidence from South Asia shows that most people in these countries prefer democracy over any other form of government. They also feel that their democracy is not working well. The gap between preference for democracy and satisfaction with democracy is high. People want democracy but are disappointed with its outcomes."</i><br><br>(i) What do people in South Asia prefer ‚Äî democracy or other forms of government? [1]<br>(ii) Why might people be dissatisfied with democracy's outcomes despite preferring it? [1]<br>(iii) How can democracies become more responsive to citizens' needs? [2]</div>`,o:[],r:"",a:`(i) Survey evidence shows that <b>most South Asians prefer democracy</b> over any other form of government ‚Äî they value the principle of democratic rule.<br>(ii) People prefer democracy but are dissatisfied because: (1) Elections don't automatically ensure good governance ‚Äî corruption and inefficiency persist. (2) Economic inequalities have not reduced significantly despite political equality. (3) Governments are slow to respond to immediate needs like roads, schools, hospitals. (4) Promises made during elections are not fulfilled.<br>(iii) Making democracies more responsive: (1) Strengthen local self-government ‚Äî bring decision-making closer to citizens. (2) Right to Information (RTI) ‚Äî citizens can access government records and demand accountability. (3) Social audits and citizen participation in monitoring government programmes. (4) Stronger anti-corruption institutions and press freedom. (5) Electoral reforms to reduce money power in politics.`},
{subj:"eco",s:"B",t:"sb",c:"Development",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Development Goals</b><br><br><i>"Different persons can have different developmental goals. A landless rural labourer may want more days of work and better wages; an educated unemployed youth may want good career opportunities; a farmer may want better prices for crops and assured irrigation. These may even be conflicting ‚Äî a builder wants cheap labour while workers want higher wages."</i><br><br>(i) Why do different people have different development goals? [1]<br>(ii) Give one example of conflicting development goals from the source. [1]<br>(iii) How should national development policy balance these different and sometimes conflicting goals? [2]</div>`,o:[],r:"",a:`(i) Different people have different development goals because they occupy different positions in society ‚Äî with different needs, resources, and aspirations. A rich industrialist and a landless labourer have completely different priorities because their material conditions and vulnerabilities are completely different.<br>(ii) <b>Conflicting goal example from source:</b> A builder (employer) wants cheap labour to reduce construction costs and increase profits. Workers want higher wages to improve their standard of living. These two goals directly conflict ‚Äî one person's gain is the other's loss.<br>(iii) Balancing development policy: (1) Minimum wage laws ‚Äî protect workers while allowing businesses to function. (2) Progressive taxation ‚Äî wealthy pay more, funds for public services benefiting the poor. (3) Social safety nets (MGNREGA, PMJAY) ‚Äî protect the most vulnerable. (4) Democratic participation ‚Äî all groups should be represented in policy-making processes. (5) Balance between economic growth and equity ‚Äî GDP growth should be accompanied by reduction in inequality (HDI improvement, not just per capita income).`},
{subj:"eco",s:"B",t:"sb",c:"Money and Credit",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Swarna from Tamil Nadu</b><br><br><i>"Swarna from a village in Tamil Nadu wants to set up a small tailoring business. She needs ‚Çπ30,000 for a sewing machine. She approaches the local bank but is denied a loan because she has no collateral. She then approaches a moneylender who charges 5% per month interest. With 60% annual interest, Swarna struggles to repay and falls into a debt trap."</i><br><br>(i) What is collateral? Why do banks require it? [1]<br>(ii) What is the annual interest rate Swarna pays? Is this justified? [1]<br>(iii) How can Self Help Groups (SHGs) or microfinance help women like Swarna? [2]</div>`,o:[],r:"",a:`(i) Collateral = assets (land, gold, property) pledged by a borrower as security against a loan. If borrower defaults, lender can sell the collateral to recover the loan. Banks require it to <b>reduce their risk</b> of non-repayment.<br>(ii) Annual interest = 5% √ó 12 = <b>60% per year</b>. This is extremely high and unjustified ‚Äî commercial bank loans cost 10‚Äì12% annually. A 60% rate means Swarna pays back far more than she borrowed, making business profitability nearly impossible and trapping her in debt.<br>(iii) SHGs/Microfinance help women like Swarna by: (1) <b>Group collateral:</b> Group members guarantee each other's loans ‚Äî no individual collateral needed. (2) <b>Lower interest rates:</b> SHGs linked to banks access formal credit at much lower rates (typically 15‚Äì20%) than moneylenders. (3) <b>Financial literacy:</b> Members learn savings habits, bookkeeping, and financial management. (4) <b>Empowerment:</b> Pooled savings give women economic independence and bargaining power.`},
{subj:"eco",s:"B",t:"sb",c:"Agriculture",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Organic Farming</b><br><br><i>"The Green Revolution increased production but also increased dependence on chemical fertilisers and pesticides, which degraded soil quality over time. Now there is growing interest in organic farming ‚Äî using natural methods, no chemical fertilisers, crop rotation, and traditional varieties. Sikkim became India's first fully organic state in 2016."</i><br><br>(i) What were the achievements of the Green Revolution? [1]<br>(ii) What problems did the Green Revolution create? [1]<br>(iii) What is organic farming? State two advantages over conventional farming. [2]</div>`,o:[],r:"",a:`(i) Green Revolution achievements: Made India self-sufficient in food grains; dramatic increase in wheat production (Punjab, Haryana) and rice; introduced HYV seeds; reduced dependence on food imports; avoided famine.<br>(ii) Problems created by Green Revolution: (1) Heavy dependence on chemical fertilisers and pesticides ‚Äî soil degradation and water pollution. (2) Groundwater depletion ‚Äî high-yielding varieties require much more water. (3) Regional inequality ‚Äî benefits concentrated in Punjab, Haryana, UP; other regions left behind. (4) Reduction in crop biodiversity ‚Äî traditional varieties disappeared.<br>(iii) Organic farming = agriculture using natural methods ‚Äî compost, green manure, biological pest control, crop rotation ‚Äî without synthetic chemicals. Advantages: (1) <b>Soil health:</b> Maintains long-term soil fertility ‚Äî not depleted by chemicals. (2) <b>Environment:</b> No chemical runoff ‚Äî protects water bodies and biodiversity. (3) <b>Health:</b> No pesticide residues in food. (4) <b>Market premium:</b> Organic products command higher prices.`},
{subj:"geo",s:"D",t:"la",c:"Forest and Wildlife Resources",d:"h",m:5,q:`(a) What is biodiversity? Why is India considered a mega-biodiversity nation? (b) Describe the different categories of existing plants and animal species in India as per their conservation status. (c) What steps has India taken to conserve forests and wildlife?`,o:[],r:"",a:`<b>(a) Biodiversity and India:</b><br>Biodiversity = variety of life forms ‚Äî plants, animals, microorganisms ‚Äî in a given area. India is mega-biodiversity because:<br>‚Ä¢ 8% of global biodiversity in 2.4% of world's land area<br>‚Ä¢ ~47,000 plant species (7% of world), ~90,000 animal species<br>‚Ä¢ Two biodiversity hotspots: Western Ghats and Eastern Himalayas<br>‚Ä¢ Diverse ecosystems: deserts, rainforests, wetlands, coral reefs, mangroves<br><br><b>(b) Conservation status categories (IUCN/Wildlife Protection Act):</b><br>‚Ä¢ <b>Normal:</b> Species not under immediate threat. E.g. cattle, sal trees<br>‚Ä¢ <b>Endangered:</b> Facing extinction if threats continue. E.g. tigers, elephants, Great Indian Bustard, Indian Rhino<br>‚Ä¢ <b>Vulnerable:</b> Moving towards endangered. E.g. blue sheep, Asiatic elephant<br>‚Ä¢ <b>Rare:</b> Small populations found in restricted areas. E.g. Himalayan brown bear, wild Asiatic buffalo<br>‚Ä¢ <b>Extinct:</b> Not found anywhere. E.g. Asiatic Cheetah (India), Pink Headed Duck<br><br><b>(c) Conservation steps:</b><br>‚Ä¢ Wildlife Protection Act 1972 ‚Äî legal protection for wildlife, banned hunting<br>‚Ä¢ Project Tiger (1973) ‚Äî 54 tiger reserves; tiger population grew from 1,827 to 3,167 (2022)<br>‚Ä¢ Project Elephant, Project Rhino, Crocodile Conservation<br>‚Ä¢ 104 National Parks, 543 Wildlife Sanctuaries<br>‚Ä¢ Biosphere Reserves ‚Äî 18 in India<br>‚Ä¢ Community reserves and conservation reserves<br>‚Ä¢ Forest Rights Act 2006 ‚Äî recognises tribal rights over forests`},
{subj:"geo",s:"D",t:"la",c:"Minerals and Energy Resources",d:"h",m:5,q:`(a) Classify minerals on the basis of chemical and physical properties with examples. (b) Describe the distribution of coal in India. (c) Explain the importance of non-conventional energy sources with three examples.`,o:[],r:"",a:`<b>(a) Classification of minerals:</b><br><b>Metallic minerals</b> (contain metals):<br>‚Ä¢ Ferrous (iron content): Iron ore, manganese, nickel, cobalt ‚Äî e.g. Odisha (iron ore), MP (manganese)<br>‚Ä¢ Non-ferrous: Copper, bauxite, lead, zinc, gold ‚Äî e.g. Rajasthan (copper, zinc), Odisha (bauxite)<br><b>Non-metallic minerals</b> (no metal content):<br>‚Ä¢ Mica, limestone, salt, gypsum, sandstone<br>‚Ä¢ Mica: Jharkhand, AP, Rajasthan ‚Äî used in electrical/electronics industry<br>‚Ä¢ Limestone: MP, Rajasthan, Gujarat ‚Äî cement industry<br><b>Energy minerals:</b> Coal, petroleum, natural gas<br><br><b>(b) Coal distribution in India:</b><br>‚Ä¢ India has 4th largest coal reserves (300 billion tonnes estimated)<br>‚Ä¢ <b>Gondwana coalfields (~98% of reserves):</b><br>&nbsp;&nbsp;‚Äî Damodar Valley (Jharkhand-West Bengal): Jharia, Raniganj, Bokaro<br>&nbsp;&nbsp;‚Äî Son-Mahanadi belt: Singrauli (MP), Talcher (Odisha)<br>&nbsp;&nbsp;‚Äî Godavari Valley: Singareni (Telangana)<br>‚Ä¢ <b>Tertiary coal (~2%):</b> Assam, Meghalaya, Nagaland (NE India); Rajasthan<br>‚Ä¢ Major uses: Thermal power, steel, cement<br><br><b>(c) Non-conventional energy sources:</b><br><b>1. Solar energy:</b> India receives 300+ sunny days/year. Solar parks: Bhadla (Rajasthan, 2,245 MW ‚Äî one of world's largest); Pavagada (Karnataka). Solar home lighting in rural areas. JNNSM (Jawaharlal Nehru National Solar Mission) targets 100 GW by 2022 (achieved).<br><b>2. Wind energy:</b> India = 4th largest wind power producer. Wind farms in Tamil Nadu (Nagarcoil, Madurai), Rajasthan, Gujarat, Karnataka. Total installed ~44 GW.<br><b>3. Biogas:</b> From cattle dung and agricultural waste ‚Äî fuel for cooking and electricity in rural areas. National Biogas Programme has installed millions of plants.<br>Advantages: Renewable, clean, reduces import of fossil fuels, creates rural employment.`},
{subj:"geo",s:"D",t:"la",c:"Lifelines of National Economy",d:"h",m:5,q:`(a) Explain the importance of transport and communication for national integration and development. (b) Describe the major types of transport in India ‚Äî road, rail, air, and water. Compare their advantages. (c) What is the role of international trade in India's economy?`,o:[],r:"",a:`<b>(a) Importance of transport and communication:</b><br>‚Ä¢ Connects producers to consumers ‚Äî raw materials to factories, finished goods to markets<br>‚Ä¢ Enables movement of people for work, education, healthcare<br>‚Ä¢ Links remote regions to national mainstream ‚Äî national integration<br>‚Ä¢ Enables trade between states and countries ‚Äî economic growth<br>‚Ä¢ Faster communication reduces transaction costs ‚Äî makes business efficient<br>‚Ä¢ Disaster management ‚Äî quick mobilisation of relief<br><br><b>(b) Major transport modes:</b><br><b>Road:</b> Most important (85% passenger, 70% freight). Door-to-door. National Highways (NHAI) + State Highways + village roads. Golden Quadrilateral (Delhi-Mumbai-Chennai-Kolkata). Advantage: Flexible, reaches remote areas, door-to-door.<br><b>Rail:</b> Backbone of inland transport. 4th largest network globally (67,000 km). Indian Railways = largest employer. Suitable for long-distance heavy freight (coal, iron ore, food grains) and passenger travel. Advantage: Cheap bulk transport, energy-efficient.<br><b>Air:</b> Fastest ‚Äî essential for perishables, urgent goods, remote areas. International trade and tourism. Expensive. Airports: Mumbai, Delhi, Chennai, Kolkata (major international). Advantage: Speed, reaches isolated areas (Lakshadweep, Andaman).<br><b>Water (inland + coastal):</b> Cheapest for bulk cargo. Inland waterways (NW-1: Ganga; NW-2: Brahmaputra). Ports: JNPT Mumbai, Chennai, Kochi, Kolkata. Advantage: Lowest cost per tonne-km, no land acquisition, eco-friendly.<br><br><b>(c) International trade:</b><br>‚Ä¢ India's exports: Software/IT, petroleum products, gems & jewellery, pharmaceuticals, rice, engineering goods<br>‚Ä¢ India's imports: Crude oil (largest), gold, electronics, machinery<br>‚Ä¢ Balance of trade: India typically runs a trade deficit (imports > exports)<br>‚Ä¢ Key trading partners: USA, China, UAE, Germany<br>‚Ä¢ Trade policy: WTO membership; preferential trade agreements (ASEAN, Sri Lanka, Mauritius)<br>‚Ä¢ Significance: Earns foreign exchange, creates employment, technology access, GDP growth`},
{subj:"geo",s:"B",t:"sb",c:"Water Resources",d:"m",m:4,q:`<div class="csb"><b>üìñ Source ‚Äî Ancient Water Conservation</b><br><br><i>"Ancient India had a sophisticated system of water harvesting. Khadins and Johads of Rajasthan, the step wells (baolis) of Gujarat and Rajasthan, tanks in Karnataka and Tamil Nadu (eri system), and bamboo drip irrigation of Meghalaya are examples. These systems worked with the local geography and rainfall patterns, providing water security for centuries."</i><br><br>(i) What is meant by "water harvesting"? [1]<br>(ii) Name two traditional water harvesting systems and the states where they are found. [1]<br>(iii) Why are traditional water harvesting systems being revived today? What are their advantages over large dams? [2]</div>`,o:[],r:"",a:`(i) <b>Water harvesting</b> = collecting and storing rainwater and runoff for later use ‚Äî recharging groundwater, direct use for irrigation and drinking. Prevents water from flowing away as wasted runoff.<br>(ii) (1) <b>Johads</b> (Rajasthan) ‚Äî semi-circular earthen bunds that collect rainwater in small ponds. (2) <b>Eri system</b> (Tamil Nadu) ‚Äî interconnected tanks/ponds that store rainwater for irrigation. (3) <b>Bamboo drip irrigation</b> (Meghalaya) ‚Äî channels water from streams to fields using bamboo pipes.<br>(iii) <b>Why being revived:</b> Groundwater levels falling dangerously in many states; large dams have environmental and social costs; climate change making rainfall more erratic. <b>Advantages over large dams:</b> (1) No displacement of communities. (2) Very low cost ‚Äî built with local materials and labour. (3) Recharge groundwater locally ‚Äî benefits the immediate community. (4) Culturally appropriate ‚Äî communities understand and manage them. (5) Ecologically sustainable ‚Äî work with natural water cycles.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"e",m:1,q:`Which of the following is a public sector steel plant in India?`,o:["A) Tata Steel (Jamshedpur)","B) Bhilai Steel Plant","C) Essar Steel","D) JSW Steel"],r:"B",a:`<b>Bhilai Steel Plant</b> (Chhattisgarh) is a public sector steel plant ‚Äî set up with Soviet help in 1959. Tata Steel and JSW are private sector.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"m",m:1,q:`The sugar industry in India is mostly located in:`,o:["A) Punjab and Haryana","B) UP and Maharashtra","C) Gujarat and Rajasthan","D) Tamil Nadu and Kerala"],r:"B",a:`<b>Uttar Pradesh</b> (largest producer) and <b>Maharashtra</b> together account for ~60% of India's sugar production. UP has the most sugar mills.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"h",m:1,q:`Why did the jute industry decline in India after 1947?`,o:["A) India stopped growing jute","B) Partition ‚Äî most jute mills were in India but most jute fields went to East Pakistan (Bangladesh)","C) Global demand for jute collapsed","D) Government banned jute production"],r:"B",a:`After Partition (1947), the jute-growing areas (Bengal delta) largely went to <b>East Pakistan (now Bangladesh)</b> while most jute mills remained in India (Kolkata area) ‚Äî creating a raw material shortage that severely damaged the industry.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"e",m:1,q:`India's largest port in terms of cargo handled is:`,o:["A) Mumbai Port","B) JNPT (Nhava Sheva), Mumbai","C) Kandla","D) Chennai"],r:"B",a:`<b>JNPT (Jawaharlal Nehru Port Trust)</b> at Nhava Sheva, Mumbai is India's largest container port. Kandla (Deendayal Port) handles the most total cargo by weight.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"m",m:1,q:`The "digital divide" in communications refers to:`,o:["A) Difference between landline and mobile networks","B) Unequal access to digital technology between rich and poor, urban and rural","C) Number of TV channels","D) Distance between internet servers"],r:"B",a:`<b>Digital divide</b> = unequal access to computers, internet, and digital technology between wealthy/poor and urban/rural populations. Rural areas have significantly lower internet penetration than cities.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"h",m:1,q:`Which is the correct ascending order of cost of transport per tonne-km in India?`,o:["A) Air < Road < Rail < Water","B) Water < Rail < Road < Air","C) Rail < Road < Water < Air","D) Road < Rail < Air < Water"],r:"B",a:`<b>Water < Rail < Road < Air</b>. Water (inland/coastal) is cheapest per tonne-km; air is most expensive. This is why coal and iron ore move by rail and ship, perishables by road, and urgent goods by air.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"e",m:1,q:`The Gram Sabha is:`,o:["A) A state-level body","B) The body of all voters in a village ‚Äî the foundation of Panchayati Raj","C) A union-level committee","D) A court for village disputes"],r:"B",a:`<b>Gram Sabha</b> = body of all voters in a village. It is the foundation of the Panchayati Raj system ‚Äî elects Gram Panchayat, approves development plans, monitors spending.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"m",m:1,q:`Panchayati Raj refers to:`,o:["A) System of central government","B) Three-tier local self-government in rural India ‚Äî Gram Panchayat, Panchayat Samiti, Zila Parishad","C) Village courts","D) Revenue collection system"],r:"B",a:`<b>Panchayati Raj</b> = three-tier rural local government: (1) <b>Gram Panchayat</b> (village level), (2) <b>Panchayat Samiti</b> (block level), (3) <b>Zila Parishad</b> (district level). Established by 73rd Amendment 1992.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"m",m:1,q:`Which Amendment gave constitutional status to local governments (Panchayats and Municipalities)?`,o:["A) 42nd Amendment","B) 44th Amendment","C) 73rd and 74th Amendments 1992","D) 86th Amendment"],r:"C",a:`<b>73rd Amendment</b> (Panchayats in rural areas) and <b>74th Amendment</b> (Municipalities in urban areas) ‚Äî both 1992 ‚Äî gave constitutional status to local self-government as the third tier.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"e",m:1,q:`The French Revolution (1789) inspired nationalism because:`,o:["A) France conquered all of Europe","B) It introduced ideas of liberty, equality, and people as sovereign nation","C) It created the Napoleonic Code","D) It abolished the monarchy permanently"],r:"B",a:`The French Revolution introduced revolutionary ideas of <b>liberty, equality, fraternity, and popular sovereignty</b> ‚Äî the idea that the nation (people) should be the source of political power. These ideas inspired nationalists across Europe.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"e",m:1,q:`The Indian National Congress was founded in:`,o:["A) 1857","B) 1885","C) 1905","D) 1920"],r:"B",a:`The <b>Indian National Congress (INC)</b> was founded in <b>1885</b> by A.O. Hume. It became the main organisation of the Indian nationalist movement.`},
{subj:"hist",s:"A",t:"mcq",c:"The Making of a Global World",d:"e",m:1,q:`The word "globalisation" refers to:`,o:["A) Only recent phenomenon of internet trade","B) The integration of economies and societies through cross-border flows of ideas, capital, and goods","C) Only political integration of countries","D) Colonisation of Asia and Africa"],r:"B",a:`Globalisation = <b>integration of economies and societies</b> through cross-border flows. It is not a new phenomenon ‚Äî it existed in ancient trade routes and accelerated in the 19th century before the modern IT-enabled version.`},
{subj:"hist",s:"A",t:"mcq",c:"The Age of Industrialisation",d:"e",m:1,q:`The steam engine was invented by:`,o:["A) James Hargreaves","B) James Watt","C) Richard Arkwright","D) Edmund Cartwright"],r:"B",a:`<b>James Watt</b> improved the steam engine (1769) ‚Äî his version became commercially practical and powered factories, railways, and ships. The spinning jenny was Hargreaves; water frame was Arkwright.`},
{subj:"hist",s:"A",t:"mcq",c:"Print Culture and the Modern World",d:"e",m:1,q:`The first book printed by Gutenberg was:`,o:["A) The Koran","B) The Gutenberg Bible","C) Don Quixote","D) Mahabharata"],r:"B",a:`The first book printed by Gutenberg was the <b>Gutenberg Bible</b> (c.1455) ‚Äî about 180 copies were printed. It became a symbol of the power of the printing press.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"e",m:1,q:`Resources created by human beings are called:`,o:["A) Natural resources","B) Human-made resources","C) Biotic resources","D) Abiotic resources"],r:"B",a:`<b>Human-made resources</b> are created using natural resources by human beings ‚Äî buildings, machinery, roads, technology. Natural resources are gifted by nature.`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"e",m:1,q:`Which of the following is a Rabi crop?`,o:["A) Rice","B) Jowar","C) Wheat","D) Cotton"],r:"C",a:`<b>Wheat</b> is a Rabi (winter) crop ‚Äî sown in October-November, harvested in March-April. Rice, jowar, and cotton are Kharif (summer) crops sown in June-July.`},
{subj:"geo",s:"A",t:"mcq",c:"Water Resources",d:"e",m:1,q:`The Bhakra Nangal Dam is built on which river?`,o:["A) Yamuna","B) Sutlej","C) Beas","D) Chenab"],r:"B",a:`<b>Bhakra Nangal Dam</b> is built on the <b>Sutlej river</b> in Himachal Pradesh. It is India's largest multipurpose river valley project ‚Äî Jawaharlal Nehru called it a "temple of modern India."`},
{subj:"geo",s:"A",t:"mcq",c:"Forest and Wildlife Resources",d:"e",m:1,q:`Project Tiger was launched in India in:`,o:["A) 1950","B) 1960","C) 1973","D) 1985"],r:"C",a:`<b>Project Tiger</b> was launched in <b>1973</b> by the Government of India to protect tigers. Tiger population has grown from about 1,827 (1972) to over 3,000 (2022).`},
{subj:"geo",s:"A",t:"mcq",c:"Minerals and Energy Resources",d:"e",m:1,q:`Mica is mainly found in:`,o:["A) Rajasthan and Andhra Pradesh","B) Odisha and Chhattisgarh","C) Jharkhand, Rajasthan, and Andhra Pradesh","D) Karnataka and Tamil Nadu"],r:"C",a:`<b>Mica</b> is found mainly in <b>Jharkhand, Rajasthan, and Andhra Pradesh</b>. India is the world's largest producer and exporter of mica. Used in electrical and electronics industry.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"e",m:1,q:`The principle of "checks and balances" in government refers to:`,o:["A) Financial auditing","B) Each organ of government checking the powers of others to prevent misuse","C) Police checking citizens","D) Central government checking states"],r:"B",a:`<b>Checks and balances</b> = each organ of government (legislature, executive, judiciary) limits the power of the others. E.g. courts can strike down laws; Parliament can override executive. Prevents any single organ from becoming all-powerful.`},
{subj:"civ",s:"A",t:"mcq",c:"Gender, Religion and Caste",d:"e",m:1,q:`The sex ratio in India (females per 1000 males) has been:`,o:["A) Above 1000 (more women than men)","B) Below 1000 (fewer women than men)","C) Exactly 1000","D) 1050"],r:"B",a:`India's sex ratio has historically been <b>below 1000</b> (fewer women than men) ‚Äî due to son preference, female foeticide, and discrimination. India's 2011 census: 943 females per 1000 males.`},
{subj:"civ",s:"A",t:"mcq",c:"Political Parties",d:"e",m:1,q:`A coalition government is formed when:`,o:["A) One party wins an absolute majority","B) Two or more parties join together to form a government as no single party has majority","C) The President rules directly","D) Military takes power"],r:"B",a:`A <b>coalition government</b> is formed when no single party wins an outright majority ‚Äî two or more parties join together to form a government. Very common in India since 1989 (UPA, NDA coalitions).`},
{subj:"civ",s:"A",t:"mcq",c:"Outcomes of Democracy",d:"e",m:1,q:`The Right to Information (RTI) Act was passed in India in:`,o:["A) 1991","B) 2000","C) 2005","D) 2010"],r:"C",a:`The <b>Right to Information (RTI) Act was passed in 2005</b>. It allows citizens to request information from government offices ‚Äî a powerful tool for accountability and fighting corruption.`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"e",m:1,q:`What is the full form of GDP?`,o:["A) Gross Domestic Product","B) General Development Programme","C) Gross Development Plan","D) General Domestic Policy"],r:"A",a:`<b>GDP = Gross Domestic Product</b> ‚Äî the total value of all goods and services produced within a country's borders in a year. Per capita GDP = GDP √∑ population.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"e",m:1,q:`Which sector includes activities like farming, fishing, and forestry?`,o:["A) Secondary sector","B) Primary sector","C) Tertiary sector","D) Service sector"],r:"B",a:`<b>Primary sector</b> = activities directly using natural resources ‚Äî farming, fishing, mining, forestry, animal husbandry. The first stage in the chain of production.`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"e",m:1,q:`A cheque is:`,o:["A) A type of coin","B) A paper instructing the bank to pay a specified amount from the depositor's account","C) Government-issued currency","D) A type of bank loan"],r:"B",a:`A <b>cheque</b> is a paper (negotiable instrument) that instructs a bank to pay a specified sum from the account holder's account to a named person or bearer. It is a demand deposit in practice.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"e",m:1,q:`FDI stands for:`,o:["A) Foreign Direct Investment","B) Federal Development Index","C) Financial Domestic Initiative","D) Foreign Deposit Insurance"],r:"A",a:`<b>FDI = Foreign Direct Investment</b> ‚Äî investment made by a company or individual in one country into business interests in another country, usually by establishing business operations or acquiring business assets.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"e",m:1,q:`AGMARK is a quality certification for:`,o:["A) Electrical appliances","B) Agricultural products (ghee, honey, wheat flour, edible oils)","C) Medicines","D) Toys and games"],r:"B",a:`<b>AGMARK (Agricultural Marking)</b> certifies quality and grade of agricultural products ‚Äî ghee, honey, wheat flour, edible oils, spices. Ensures purity and standardisation.`},
{subj:"hist",s:"A",t:"mcq",c:"The Rise of Nationalism in Europe",d:"h",m:1,q:`Which of the following statements about the 1848 European revolutions is CORRECT?`,o:["A) All 1848 revolutions succeeded in establishing permanent democracies","B) The revolutions were led by the conservative aristocracy","C) The revolutions failed ultimately but forced some concessions and spread nationalist ideas","D) Only France had a revolution in 1848"],r:"C",a:`1848 revolutions ultimately <b>failed</b> ‚Äî conservative forces reasserted control. However, they forced some concessions (constitutions in some states), spread nationalist ideas, and showed the power of mass mobilisation. They set the stage for later unification movements.`},
{subj:"hist",s:"A",t:"mcq",c:"Nationalism in India",d:"h",m:1,q:`The "Poona Pact" (1932) was a compromise between:`,o:["A) Gandhi and the British government","B) Gandhi (fasting unto death) and Dr. B.R. Ambedkar over separate electorates for Dalits","C) Congress and Muslim League","D) Nehru and Jinnah over partition"],r:"B",a:`The <b>Poona Pact (1932)</b> was between Gandhi and Dr. B.R. Ambedkar. Ambedkar had secured separate electorates for Dalits (Communal Award). Gandhi fasted against this, seeing it as fragmenting the Hindu community. The compromise gave Dalits reserved seats within joint electorates rather than separate ones.`},
{subj:"hist",s:"A",t:"mcq",c:"The Making of a Global World",d:"h",m:1,q:`The "New Deal" implemented by US President Roosevelt after the Great Depression included:`,o:["A) Reducing government spending to balance the budget","B) Massive government investment in public works, regulation of financial sector, social security","C) Increasing tariffs on all imports","D) Returning to the Gold Standard"],r:"B",a:`Roosevelt's <b>New Deal (1933‚Äì39)</b> used Keynesian economics ‚Äî massive government spending on public works (dams, roads, schools) created employment; regulation of banks and financial markets; social security for unemployed and elderly. Showed government could actively manage the economy.`},
{subj:"hist",s:"A",t:"mcq",c:"The Age of Industrialisation",d:"h",m:1,q:`The "putting-out system" in pre-industrial Europe meant:`,o:["A) Workers working in large factories","B) Merchants giving raw materials to rural families to process at home and collecting finished goods","C) Factories outsourcing work to India","D) Government contracts to private firms"],r:"B",a:`The <b>putting-out (proto-industrial) system</b>: merchants supplied raw materials (wool, cotton) to rural families who processed them at home, then collected finished goods. Preceded factory production. Flexible, used family labour, widespread in Europe 17th-18th century.`},
{subj:"hist",s:"A",t:"mcq",c:"Print Culture and the Modern World",d:"h",m:1,q:`The "Tracts" written by social reformers in 19th century India were significant because:`,o:["A) They were luxury items for rich Indians","B) They were cheap printed material that spread reform ideas about caste, widow remarriage, and women's education to a wide audience","C) They replaced newspapers entirely","D) They were only in English"],r:"B",a:`<b>Tracts</b> were cheap printed pamphlets/booklets that spread social reform ideas (against caste discrimination, for widow remarriage, women's education) in vernacular languages to a wide audience including artisans, traders, and farmers ‚Äî not just educated elites.`},
{subj:"geo",s:"A",t:"mcq",c:"Resources and Development",d:"h",m:1,q:`The "Brundtland Commission" (1987) is associated with:`,o:["A) Nuclear disarmament","B) Defining and promoting sustainable development","C) Setting up the WTO","D) International climate negotiations"],r:"B",a:`The <b>Brundtland Commission (World Commission on Environment and Development, 1987)</b> published "Our Common Future" ‚Äî defined sustainable development as "development that meets the needs of the present without compromising the ability of future generations to meet their own needs."`},
{subj:"geo",s:"A",t:"mcq",c:"Agriculture",d:"h",m:1,q:`Which of the following best explains why the Green Revolution created regional inequality in India?`,o:["A) Only southern states participated","B) HYV seeds were only suitable for wheat and rice, and required irrigation ‚Äî benefiting Punjab/Haryana/UP but not rain-fed regions","C) Eastern India refused to adopt new technology","D) Only large farmers could afford tractors"],r:"B",a:`Green Revolution created regional inequality because: HYV seeds initially worked best for <b>wheat and rice</b>; required <b>assured irrigation</b> ‚Äî favoured Punjab, Haryana, western UP which had canal/tube well irrigation. Rain-fed regions (eastern UP, Bihar, Rajasthan, most of south) got little benefit initially.`},
{subj:"geo",s:"A",t:"mcq",c:"Water Resources",d:"h",m:1,q:`Why is the Narmada Bachao Andolan considered a landmark environmental movement?`,o:["A) It stopped all dam construction in India","B) It raised fundamental questions about development ‚Äî who benefits and who bears the costs ‚Äî and highlighted displacement issues","C) It was led by celebrities","D) It was purely an environmental movement with no social dimension"],r:"B",a:`NBA was landmark because it raised fundamental questions: <b>large projects displace the poor (tribal communities) while benefits go to cities and rich farmers</b>. It linked environmental degradation with social justice ‚Äî displacement, loss of livelihoods, cultural heritage submergence. Changed how India thinks about development projects.`},
{subj:"geo",s:"A",t:"mcq",c:"Manufacturing Industries",d:"h",m:1,q:`India's pharmaceutical industry is called the "pharmacy of the world" because:`,o:["A) India invented most medicines","B) India is the world's largest exporter of generic medicines ‚Äî supplying affordable drugs globally including to Africa and developing countries","C) India has the most hospitals","D) Indian doctors are the best"],r:"B",a:`India is the world's largest exporter of <b>generic medicines</b> (off-patent drugs). Supplies ~50% of global vaccine demand, ~40% of generic demand in USA, ~25% of UK medicines. Hyderabad, Ahmedabad, Mumbai are major pharma hubs. Provides affordable medicines to developing countries.`},
{subj:"geo",s:"A",t:"mcq",c:"Lifelines of National Economy",d:"h",m:1,q:`Why does India import more than it exports (trade deficit)?`,o:["A) India exports nothing","B) India imports large quantities of crude oil, gold, and electronics which exceed export earnings","C) India imposes high tariffs on exports","D) India has no competitive products"],r:"B",a:`India's trade deficit is mainly because of large imports of: <b>crude oil</b> (India imports ~85% of petroleum needs), <b>gold</b> (cultural demand), <b>electronic goods</b> (smartphones, components). These exceed India's export earnings from IT, pharmaceuticals, textiles, and engineering goods.`},
{subj:"civ",s:"A",t:"mcq",c:"Power Sharing",d:"h",m:1,q:`Which of the following is the BEST argument for power sharing?`,o:["A) It slows down decision-making","B) It ensures stability and prevents civil conflict by giving all groups a stake in the system","C) It makes government more efficient","D) It is required by international law"],r:"B",a:`The <b>best (prudential) argument</b> for power sharing: it ensures stability by giving all groups ‚Äî majority and minority ‚Äî a stake in the system. When groups feel excluded, they may resort to violence. Sri Lanka shows what happens when majoritarianism excludes minorities ‚Äî 30 years of civil war. Belgium shows how power sharing prevents this.`},
{subj:"civ",s:"A",t:"mcq",c:"Federalism",d:"h",m:1,q:`The Concurrent List in India is significant because:`,o:["A) States have absolute power over these subjects","B) Both Centre and States can legislate on these subjects, but Central law prevails in case of conflict ‚Äî allowing flexibility with national coherence","C) Only Parliament can legislate on these","D) Courts cannot intervene in these matters"],r:"B",a:`Concurrent List (47 subjects: education, forests, trade unions, marriage, adoption) allows <b>both Centre and States to legislate</b>. But if they conflict, Central law prevails. This allows national policy coherence while accommodating state-level variation ‚Äî a key feature of India's flexible federalism.`},
{subj:"civ",s:"A",t:"mcq",c:"Gender, Religion and Caste",d:"h",m:1,q:`The "Mandal Commission" recommendations led to:`,o:["A) Reservation for SC/ST in government jobs","B) 27% reservation for Other Backward Classes (OBCs) in central government jobs and educational institutions","C) Reservation for religious minorities","D) Reservation for women in Parliament"],r:"B",a:`<b>Mandal Commission (1979, implemented 1990)</b> recommended <b>27% reservation for OBCs</b> (Other Backward Classes) in central government jobs and educational institutions. Implementation by VP Singh caused massive protests ("anti-Mandal agitation") but was upheld by Supreme Court with a 50% total reservation cap.`},
{subj:"civ",s:"A",t:"mcq",c:"Political Parties",d:"h",m:1,q:`The "Anti-defection law" in India prevents:`,o:["A) Parties from fielding criminals","B) Elected representatives from switching parties to gain personal benefits (especially ministerial posts)","C) Parties from accepting foreign funding","D) Candidates from spending too much on elections"],r:"B",a:`The <b>Anti-defection law (10th Schedule, 1985)</b> disqualifies elected members who vote against their party's instructions or voluntarily leave their party ‚Äî prevents "aaya rams" (MPs switching parties for money or ministerial posts). Aim: ensure stability and party discipline.`},
{subj:"civ",s:"A",t:"mcq",c:"Outcomes of Democracy",d:"h",m:1,q:`Which of the following is the strongest evidence that democracy produces better outcomes than dictatorship?`,o:["A) Democracies always have higher GDP growth","B) No democracy has ever had a famine ‚Äî famines occur only under authoritarian regimes (Amartya Sen)","C) Democratic countries have no poverty","D) Democracies spend more on military"],r:"B",a:`Amartya Sen's famous argument: <b>no democracy with a free press has ever experienced a famine</b>. Democratic governments are accountable to voters ‚Äî they respond to food shortages to avoid electoral punishment. Authoritarian regimes (Stalin's USSR, Mao's China) had devastating famines because leaders were not accountable for food policy failures.`},
{subj:"eco",s:"A",t:"mcq",c:"Development",d:"h",m:1,q:`The Human Development Report 2023 ranked India approximately:`,o:["A) 21st","B) 50th","C) 132nd","D) 189th"],r:"C",a:`India ranked approximately <b>132nd out of 193 countries</b> in HDI (Human Development Report 2023). This reflects moderate income but still-developing health and education outcomes compared to other nations.`},
{subj:"eco",s:"A",t:"mcq",c:"Sectors of the Indian Economy",d:"h",m:1,q:`Why is India's economic growth described as "jobless growth" in the services sector?`,o:["A) Services sector does not contribute to GDP","B) IT and financial services create high GDP but employ relatively few people ‚Äî most workers remain in low-productivity agriculture","C) Services sector is declining","D) Only government creates jobs in India"],r:"B",a:`<b>Jobless growth:</b> India's IT, financial services, and telecom sectors grow rapidly (contributing 55% of GDP) but employ relatively few (30% of workforce). The majority (45%) remain in agriculture contributing only 18% of GDP ‚Äî a fundamental structural imbalance. Growth happens without commensurate job creation for the mass of workers.`},
{subj:"eco",s:"A",t:"mcq",c:"Money and Credit",d:"h",m:1,q:`When banks give loans, they "create money" because:`,o:["A) Banks print currency notes","B) Banks lend more than their deposits ‚Äî each loan becomes a deposit elsewhere, multiplying the money supply","C) Banks invest in gold","D) RBI gives banks extra money for each loan"],r:"B",a:`<b>Credit/money creation:</b> Banks keep only a fraction (Cash Reserve Ratio, ~4%) of deposits and lend the rest. Each loan is deposited in another bank which lends again. This chain creates a <b>money multiplier effect</b> ‚Äî ‚Çπ100 of deposits can create ‚Çπ1000+ of credit in the economy.`},
{subj:"eco",s:"A",t:"mcq",c:"Globalisation and the Indian Economy",d:"h",m:1,q:`Special Economic Zones (SEZs) in India are areas where:`,o:["A) Only foreigners can invest","B) Companies get tax exemptions, relaxed regulations to attract investment and boost exports","C) Workers have special rights","D) Foreign currency is used"],r:"B",a:`<b>SEZs (Special Economic Zones)</b> are designated areas offering: tax holidays, simplified regulations, world-class infrastructure ‚Äî to attract both domestic and foreign investment and boost exports. India's SEZ Act 2005. Examples: Noida SEZ, SEEPZ Mumbai, Kandla SEZ.`},
{subj:"eco",s:"A",t:"mcq",c:"Consumer Rights",d:"h",m:1,q:`Which of the following is NOT protected under the Consumer Protection Act 2019?`,o:["A) Online purchases from e-commerce platforms","B) Services like banking and insurance","C) Illegal products bought in black markets","D) Medical services"],r:"C",a:`The Consumer Protection Act 2019 covers goods and services including <b>e-commerce, banking, insurance, and medical services</b>. However, it does <b>not cover illegal transactions</b> ‚Äî a buyer of a product from an illegal/unauthorised source cannot claim consumer protection under the Act.`}]

const pct=(m,t)=>t?Math.round((m/t)*100):0;
const gradeOf=p=>{
  if(p>=90)return{l:"A+",c:"#16a34a",bg:"#dcfce7"};
  if(p>=80)return{l:"A",c:"#2563eb",bg:"#dbeafe"};
  if(p>=70)return{l:"B+",c:"#7c3aed",bg:"#ede9fe"};
  if(p>=60)return{l:"B",c:"#d97706",bg:"#fef3c7"};
  if(p>=40)return{l:"C",c:"#ea580c",bg:"#ffedd5"};
  return{l:"D",c:"#dc2626",bg:"#fee2e2"};
};
const safeId=s=>s.replace(/[^a-zA-Z0-9]/g,"_");

const fmtDate=d=>{if(!d)return"‚Äî";const[y,m,dy]=d.split("-");return`${dy}/${m}/${y}`;};
const fmtTime=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});};

function useFirestore(collName){
  const[data,setData]=useState({});
  const[loading,setLoading]=useState(true);
  const unsubRef=useRef(null);
  useEffect(()=>{
    const setup=()=>{
      if(!window.__db)return;
      if(unsubRef.current)unsubRef.current();
      unsubRef.current=window.__fbOnSnapshot(window.__fbCollection(window.__db,collName),snap=>{
        const d={};snap.forEach(dc=>{d[dc.id]=dc.data();});setData(d);setLoading(false);
      });
    };
    if(window.__fbReady)setup();
    else window.addEventListener("fbready",setup,{once:true});
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[collName]);
  const set=useCallback(async(id,val)=>{if(!window.__db)return;await window.__fbSetDoc(window.__fbDoc(window.__db,collName,safeId(id)),val);},[collName]);
  const del=useCallback(async(id)=>{if(!window.__db)return;await window.__fbDeleteDoc(window.__fbDoc(window.__db,collName,safeId(id)));},[collName]);
  return{data,loading,set,del};
}

// ‚îÄ‚îÄ MANAGE TOPICS ‚îÄ‚îÄ
function ManageTopics({topicsDB}){
  const{data,loading,set}=topicsDB;
  const[cls,setCls]=useState(SCHOOL.classes[0]);
  const[subj,setSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[input,setInput]=useState("");
  useEffect(()=>setSubj(SCHOOL.subjects[cls][0]),[cls]);
  const key=`${cls}__${subj}`;
  const topics=data[safeId(key)]?.list||[];
  const add=async()=>{const t=input.trim();if(!t)return;const arr=[...new Set([...topics,...t.split(",").map(x=>x.trim()).filter(Boolean)])];await set(key,{key,list:arr});setInput("");};
  const remove=async(t)=>await set(key,{key,list:topics.filter(x=>x!==t)});
  if(loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:22}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:2}}>üìù Manage Topics</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Set topics per class and subject. Separate multiple with commas.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
          <div><Lbl c="Class"/><Sel value={cls} onChange={setCls} options={SCHOOL.classes}/></div>
          <div><Lbl c="Subject"/><Sel value={subj} onChange={setSubj} options={SCHOOL.subjects[cls]||[]}/></div>
        </div>
        <Lbl c={`Topics for ${cls} ‚Äî ${subj}`}/>
        <div style={{display:"flex",gap:10,marginTop:8,marginBottom:16}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="e.g. Algebra, Geometry, Trigonometry" style={{flex:1,padding:"10px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
          <Btn onClick={add}>+ Add</Btn>
        </div>
        {topics.length===0?(
          <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:10,padding:24,textAlign:"center",color:"#94a3b8",fontSize:13}}>No topics yet. Type above and press Enter.</div>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {topics.map(t=>(
                <div key={t} style={{display:"flex",alignItems:"center",gap:5,background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:99,padding:"5px 6px 5px 13px"}}>
                  <span style={{fontSize:13,color:"#1e40af",fontWeight:600}}>{t}</span>
                  <button onClick={()=>remove(t)} style={{background:"#bfdbfe",border:"none",cursor:"pointer",color:"#1e40af",fontSize:13,lineHeight:1,padding:"2px 6px",borderRadius:"50%",fontWeight:700}}>√ó</button>
                </div>
              ))}
            </div>
            <Btn onClick={()=>set(key,{key,list:[]})} v="del" style={{padding:"6px 14px",fontSize:12}}>Clear All</Btn>
          </>
        )}
      </Card>
    </div>
  );
}

// ‚îÄ‚îÄ ATTENDANCE ‚îÄ‚îÄ
function Attendance({user,attendanceDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const[date,setDate]=useState(today());
  const[status,setStatus]=useState({});
  const[saved,setSaved]=useState(false);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const attKey=`${cls}__${date}`;
  const existing=attendanceDB.data[safeId(attKey)];
  useEffect(()=>{
    if(existing){setStatus(existing.status||{});}
    else{const s={};students.forEach(st=>s[st]="P");setStatus(s);}
  },[attKey,existing?.savedAt]);
  const setS=(s,v)=>setStatus(p=>({...p,[s]:v}));
  const markAll=(v)=>{const s={};students.forEach(st=>s[st]=v);setStatus(s);};
  const handleSave=async()=>{
    await attendanceDB.set(attKey,{cls,date,status,by:user.name,savedAt:new Date().toISOString()});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const present=Object.values(status).filter(v=>v==="P").length;
  const absent=Object.values(status).filter(v=>v==="A").length;
  const late=Object.values(status).filter(v=>v==="L").length;
  if(attendanceDB.loading||studentsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><Lbl c="Class"/><Sel value={cls} onChange={v=>{setCls(v);}} options={aC}/></div>
          <div><Lbl c="Date"/><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/></div>
        </div>
      </Card>
      {students.length===0?<Empty icon="üë®‚Äçüéì" title={`No students in ${cls}`} sub="Add students first in Manage Students tab."/>:(
        <>
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            <div style={{background:"#dcfce7",borderRadius:12,padding:"14px 18px",borderTop:"3px solid #16a34a"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#166534",textTransform:"uppercase",letterSpacing:1}}>Present</div>
              <div style={{fontSize:28,fontWeight:800,color:"#16a34a",fontFamily:"monospace"}}>{present}</div>
            </div>
            <div style={{background:"#fee2e2",borderRadius:12,padding:"14px 18px",borderTop:"3px solid #dc2626"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#991b1b",textTransform:"uppercase",letterSpacing:1}}>Absent</div>
              <div style={{fontSize:28,fontWeight:800,color:"#dc2626",fontFamily:"monospace"}}>{absent}</div>
            </div>
            <div style={{background:"#fef3c7",borderRadius:12,padding:"14px 18px",borderTop:"3px solid #d97706"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1}}>Late</div>
              <div style={{fontSize:28,fontWeight:800,color:"#d97706",fontFamily:"monospace"}}>{late}</div>
            </div>
          </div>
          {/* Quick mark */}
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:13,color:"#64748b",fontWeight:600}}>Mark all:</span>
            <Btn onClick={()=>markAll("P")} v="ok" style={{padding:"6px 16px",fontSize:12}}>‚úì All Present</Btn>
            <Btn onClick={()=>markAll("A")} v="del" style={{padding:"6px 16px",fontSize:12}}>‚úó All Absent</Btn>
          </div>
          <Card>
            <div style={{display:"grid",gridTemplateColumns:"50px 1fr auto",background:"#f8fafc",borderBottom:"1.5px solid #e2e8f0",padding:"10px 20px",gap:12}}>
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Roll</div>
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Student</div>
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Status</div>
            </div>
            {students.map((s,i)=>(
              <div key={s} style={{display:"grid",gridTemplateColumns:"50px 1fr auto",padding:"10px 20px",alignItems:"center",gap:12,borderBottom:i<students.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{i+1}</div>
                <div style={{fontSize:13,fontWeight:500,color:"#1e293b"}}>{s}</div>
                <div style={{display:"flex",gap:6}}>
                  {[{v:"P",label:"P",bg:"#dcfce7",c:"#16a34a",abc:"#bbf7d0"},{v:"A",label:"A",bg:"#fee2e2",c:"#dc2626",abc:"#fca5a5"},{v:"L",label:"L",bg:"#fef3c7",c:"#d97706",abc:"#fde68a"}].map(opt=>(
                    <button key={opt.v} onClick={()=>setS(s,opt.v)} style={{width:32,height:32,borderRadius:8,border:`2px solid ${status[s]===opt.v?opt.c:opt.abc}`,background:status[s]===opt.v?opt.bg:"#fff",color:opt.c,fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .1s"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:12,color:"#64748b"}}>{present}/{students.length} present ¬∑ {fmtDate(date)}{existing&&<span style={{marginLeft:8,color:"#16a34a"}}>¬∑ Last saved: {fmtTime(existing.savedAt)}</span>}</div>
            <Btn onClick={handleSave} v={saved?"ok":"pri"} style={{padding:"11px 28px",fontSize:14}}>{saved?"‚úì Saved!":"Save Attendance"}</Btn>
          </div>
        </>
      )}
    </div>
  );
}

// ‚îÄ‚îÄ ENTER MARKS ‚îÄ‚îÄ
function EnterMarks({user,testsDB,topicsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);
  const[subj,setSubj]=useState(aS[0]||"");
  const[week,setWeek]=useState(1);
  const[total,setTotal]=useState(20);
  const[testDate,setTestDate]=useState(today());
  const[selTopics,setSelTopics]=useState([]);
  const[rows,setRows]=useState({});
  const[saved,setSaved]=useState(false);
  useEffect(()=>{setSubj(aS[0]||"");setEmFilterSec("");},[cls]);
  const testKey=`${cls}__${subj}__week${week}`;
  const existing=testsDB.data[safeId(testKey)];
  useEffect(()=>{
    if(existing){setTotal(existing.total);setSelTopics(existing.topics||[]);setRows(existing.rows||{});setTestDate(existing.testDate||today());}
    else{setRows({});setSelTopics([]);setTestDate(today());}
  },[testKey,existing?.at]);
  const allStudentsEM=studentsDB.data[safeId(cls)]?.list||[];
  const emSections=studentsDB.data[safeId(cls)]?.sections||{};
  const emAvailSecs=["A","B","C","D"];
  const[emFilterSec,setEmFilterSec]=useState("");
  const students=emFilterSec?allStudentsEM.filter(s=>emSections[s]===emFilterSec):allStudentsEM;
  const availableTopics=topicsDB.data[safeId(`${cls}__${subj}`)]?.list||[];
  const toggleTopic=t=>setSelTopics(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const setMark=(s,v)=>setRows(p=>({...p,[s]:v}));
  const handleSave=async()=>{
    await testsDB.set(testKey,{cls,subj,week,total,testDate,topics:selTopics,rows,by:user.name,at:new Date().toISOString()});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const filled=students.filter(s=>rows[s]!==undefined&&rows[s]!=="").length;
  const avg=filled?Math.round(students.filter(s=>rows[s]!==undefined&&rows[s]!=="").reduce((a,s)=>a+pct(Number(rows[s]),total),0)/filled):0;
  const inputRefs=useRef({});
  const handleKeyDown=(e,idx)=>{if(e.key==="Tab"||e.key==="Enter"){e.preventDefault();const next=inputRefs.current[idx+1];if(next)next.focus();}};
  if(testsDB.loading||studentsDB.loading||topicsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:emAvailSecs.length>0?"repeat(5,1fr)":"repeat(4,1fr)",gap:14}}>
          {[{lbl:"Class",v:cls,opts:aC,fn:v=>setCls(v)},{lbl:"Subject",v:subj,opts:aS,fn:setSubj},
            {lbl:"Week",v:week,opts:Array.from({length:30},(_,i)=>({v:i+1,l:`Week ${i+1}`})),fn:v=>setWeek(Number(v))},
            {lbl:"Total Marks",v:total,opts:[10,15,20,25,30,40,50,100].map(v=>({v,l:`${v} marks`})),fn:v=>setTotal(Number(v))}
          ].map(f=><div key={f.lbl}><Lbl c={f.lbl}/><Sel value={f.v} onChange={f.fn} options={f.opts}/></div>)}
          {emAvailSecs.length>0&&<div><Lbl c="Section"/><Sel value={emFilterSec} onChange={setEmFilterSec} options={[{v:"",l:"All"},...emAvailSecs.map(s=>({v:s,l:`Section ${s}`}))]}/></div>}
        </div>
        <div style={{marginTop:14}}>
          <Lbl c="Test Date"/>
          <input type="date" value={testDate} onChange={e=>setTestDate(e.target.value)} style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}}/>
        </div>
        {existing&&<div style={{marginTop:10,fontSize:11,color:"#64748b"}}>Last saved: {fmtTime(existing.at)} by {existing.by}</div>}
      </Card>
      <Card style={{padding:20}}>
        <Lbl c="Topics Tested"/>
        {availableTopics.length===0?(
          <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:9,padding:"12px 16px",marginTop:8,fontSize:13,color:"#92400e"}}>‚öÝÔ∏è No topics for <strong>{cls} ‚Äî {subj}</strong>. Go to Manage Topics first.</div>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
              {availableTopics.map(t=><button key={t} onClick={()=>toggleTopic(t)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid",borderColor:selTopics.includes(t)?"#1a2e6c":"#e2e8f0",background:selTopics.includes(t)?"#1a2e6c":"#f8fafc",color:selTopics.includes(t)?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{t}</button>)}
            </div>
            {selTopics.length>0&&<div style={{marginTop:10,fontSize:12,color:"#64748b"}}>Selected: <strong style={{color:"#1a2e6c"}}>{selTopics.join(", ")}</strong></div>}
          </>
        )}
      </Card>
      {students.length===0?<Empty icon="üë®‚Äçüéì" title={`No students in ${cls}`} sub="Add students in Manage Students tab first."/>:(
        <>
          <div style={{fontSize:12,color:"#64748b",padding:"0 4px"}}>üí° Press <strong>Tab</strong> or <strong>Enter</strong> after each mark to move to the next student.</div>
          <Card>
            <div className="marks-grid" style={{display:"grid",gridTemplateColumns:"50px 1fr 160px 90px 70px",background:"#f8fafc",borderBottom:"1.5px solid #e2e8f0",padding:"10px 20px",gap:12}}>
              {["Roll",`Student`,`Marks (/${total})`,"Pct","Grade"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1.2}}>{h}</div>)}
            </div>
            {students.map((s,i)=>{
              const m=rows[s];const has=m!==undefined&&m!=="";
              const mNum=Number(m);
              const isOver=has&&mNum>total;
              const p=has&&!isOver?pct(mNum,total):null;
              const g=p!==null?gradeOf(p):null;
              return(
                <div key={s} className="marks-grid" style={{display:"grid",gridTemplateColumns:"50px 1fr 160px 90px 70px",padding:"10px 20px",alignItems:"center",gap:12,borderBottom:i<students.length-1?"1px solid #f1f5f9":"none",background:isOver?"#fff5f5":i%2===0?"#fff":"#fafbfd"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{i+1}</div>
                  <div style={{fontWeight:500,fontSize:13,color:"#1e293b"}}>{s}</div>
                  <div>
                    <input type="number" min={0} max={total*2} value={m??""} placeholder="Enter"
                      ref={el=>inputRefs.current[i]=el}

                    {isOver&&<div style={{fontSize:10,color:"#dc2626",marginTop:2}}>‚öÝ Exceeds {total}</div>}
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:g?.c||"#cbd5e1"}}>{p!==null?p+"%":isOver?"‚Äî":"‚Äî"}</div>
                  <div>{g?<span style={{background:g.bg,color:g.c,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{g.l}</span>:<span style={{color:"#cbd5e1",fontSize:12}}>‚Äî</span>}</div>
                </div>
              );
            })}
          </Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:12,color:"#64748b"}}>{filled}/{students.length} filled{filled>0&&<span style={{color:"#1a2e6c",fontWeight:600,marginLeft:8}}>¬∑ Avg: {avg}%</span>}</div>
            <Btn onClick={handleSave} v={saved?"ok":"pri"} style={{padding:"11px 28px",fontSize:14}}>{saved?"‚úì Saved to Cloud!":"Save Test Results"}</Btn>
          </div>
        </>
      )}
    </div>
  );
}

// ‚îÄ‚îÄ CLASS PROGRESS ‚îÄ‚îÄ
function ClassProgress({user,testsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);
  const[subj,setSubj]=useState(aS[0]||"");
  useEffect(()=>{setSubj(aS[0]||"");setFilterSec("");},[cls]);
  const allStudents=studentsDB.data[safeId(cls)]?.list||[];
  const classSections=studentsDB.data[safeId(cls)]?.sections||{};
  const availSections=["A","B","C","D"];
  const[filterSec,setFilterSec]=useState("");
  const students=filterSec?allStudents.filter(s=>classSections[s]===filterSec):allStudents;
  const rTests=useMemo(()=>Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week),[testsDB.data,cls,subj]);
  const stats=useMemo(()=>students.map(s=>{const sc=rTests.filter(t=>t.rows?.[s]!==undefined&&t.rows?.[s]!=="").map(t=>({week:t.week,p:pct(Number(t.rows[s]),t.total),date:t.testDate}));const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:0;const roll=allStudents.indexOf(s)+1;const sec=classSections[s]||"-";return{name:s,sc,avg,trend,roll,sec};}),[students,rTests,allStudents,classSections]);
  const absentPerTest=useMemo(()=>rTests.map(test=>students.filter(s=>test.rows?.[s]===undefined||test.rows?.[s]==="").length),[rTests,students]);
  const classAvg=useMemo(()=>{const all=stats.flatMap(s=>s.sc.map(x=>x.p));return all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length):null;},[stats]);

    const map={};

            <StatCard label="Top Scorer" val={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.avg+"%"||"‚Äî"} icon="üèÜ" color="#d97706" sub={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.name?.split(" ")[0]}/>

// ‚îÄ‚îÄ STUDENT REPORT ‚îÄ‚îÄ
function StudentReport({user,testsDB,studentsDB}){
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const[cls,setCls]=useState(aC[0]);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const[student,setStudent]=useState(students[0]||"");
  const[search,setSearch]=useState("");
  useEffect(()=>setStudent((studentsDB.data[safeId(cls)]?.list||[])[0]||""),[cls,studentsDB.data]);
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[student]??0),t.total),topics:t.topics||[],date:t.testDate}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[cls,student,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  const rollNo=students.indexOf(student)+1;
  if(testsDB.loading||studentsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap"}}>

            <Lbl c="Student"/>
            {students.length===0?<div style={{padding:"9px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:13,color:"#94a3b8"}}>No students in {cls}</div>
            :<Sel value={student} onChange={setStudent} options={students}/>}
          </div>
          <Btn onClick={()=>{const w=window.open("","_blank");w.document.write(`<html><head><title>${student}</title><style>body{font-family:Arial;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px}th{background:#1a2e6c;color:#fff}h2{color:#1a2e6c}.good{color:#16a34a}.bad{color:#dc2626}</style></head><body><h2>Stepping Stone Inter College</h2><h3>${student} ‚Äî ${cls} (Roll No: ${rollNo})</h3><p>Overall Average: ${overall??'‚Äî'}%</p><table><tr><th>Subject</th><th>Tests</th><th>Average</th><th>Grade</th><th>Weak Topics</th></tr>${sd.map(s=>`<tr><td>${s.subj}</td><td>${s.sc.length}</td><td class="${s.avg>=60?"good":"bad"}">${s.avg??'‚Äî'}%</td><td>${s.avg?gradeOf(s.avg).l:"‚Äî"}</td><td>${s.weak.join(", ")||"None"}</td></tr>`).join("")}</table><p style="color:#94a3b8;font-size:11px;margin-top:20px">Generated by Rajvansh Gupta, Director ‚Äî Stepping Stone Inter College</p></body></html>`);w.document.close();w.print();}} v="ghost">üñ®Ô∏è Print</Btn>
        </div>
      </Card>

// ‚îÄ‚îÄ PARENT VIEW ‚îÄ‚îÄ
function ParentView({user,testsDB,studentsDB}){
  const{student,cls}=user;
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const rollNo=students.indexOf(student)+1;
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[student]??0),t.total),topics:t.topics||[],date:t.testDate}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[student,cls,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  if(testsDB.loading)return<Spinner/>;
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{background:"linear-gradient(135deg,#1a2e6c,#1d4ed8)",borderRadius:16,padding:"28px",color:"#fff"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Welcome</div>
        <div style={{fontSize:22,fontWeight:800,marginTop:4}}>{user.name}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:6}}>Report for <strong style={{color:"#fff"}}>{student}</strong> ¬∑ {cls}{rollNo>0?` ¬∑ Roll No: ${rollNo}`:""}</div>
        {overall!==null&&<div style={{marginTop:16,display:"inline-flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"10px 18px"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:1}}>Overall</div>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:gradeOf(overall).c}}>{overall}%</div>
          <div style={{fontSize:18,fontWeight:700}}>{gradeOf(overall).l}</div>
        </div>}
      </div>
      {sd.filter(s=>s.sc.length>0).length===0?<Empty icon="üìã" title="No results yet" sub="Results appear once teachers enter marks."/>:(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {sd.filter(s=>s.sc.length>0).map(s=>(
            <Card key={s.subj} style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div><div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{s.subj}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s.sc.length} test{s.sc.length>1?"s":""}</div></div>
                {s.avg!==null&&<GBadge p={s.avg}/>}
              </div>
              {s.avg!==null&&<div style={{marginBottom:12}}><Bar p={s.avg}/></div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{background:g.bg,borderRadius:8,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:g.c,fontWeight:700}}>Wk {sc.week}</div><div style={{fontSize:9,color:g.c,opacity:0.7}}>{fmtDate(sc.date)}</div><div style={{fontSize:14,fontWeight:800,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
              </div>
              {s.weak.length>0&&<div style={{marginTop:12,background:"#fff7ed",borderRadius:8,padding:"8px 12px"}}><div style={{fontSize:11,color:"#c2410c",fontWeight:600}}>Revise: {s.weak.join(", ")}</div></div>}

            </Card>
          ))}

      )}

  );
}

// ‚îÄ‚îÄ ACCOUNT SETTINGS ‚îÄ‚îÄ
function AccountSettings({user,usersDB,onUpdate}){
  const[name,setName]=useState(user.name);
  const[newPass,setNewPass]=useState("");
  const[confirmPass,setConfirmPass]=useState("");
  const[currentPass,setCurrentPass]=useState("");
  const[saved,setSaved]=useState(false);
  const[err,setErr]=useState("");
  const handleSave=async()=>{
    setErr("");
    if(!currentPass){setErr("Enter current password to confirm.");return;}
    const stored=usersDB.data[user.username]||DEFAULT_USERS[user.username];
    if(stored.password!==currentPass){setErr("Current password is incorrect.");return;}
    if(newPass&&newPass!==confirmPass){setErr("New passwords do not match.");return;}
    if(newPass&&newPass.length<6){setErr("Password must be 6+ characters.");return;}
    const updated={...stored,name:name||stored.name,password:newPass||stored.password};
    await usersDB.set(user.username,updated);
    onUpdate({...user,name:updated.name,password:updated.password});
    setSaved(true);setNewPass("");setConfirmPass("");setCurrentPass("");
    setTimeout(()=>setSaved(false),3000);
  };
  return(
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:24}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:4}}>üîê Account Settings</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>Update your name and password.</div>
        <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:"12px 16px",marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"#0369a1",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Your Account</div>
          <div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{user.username}</div>
          <div style={{fontSize:12,color:"#64748b",textTransform:"capitalize"}}>{user.role} ¬∑ {user.classes?.join(", ")||"All Classes"}</div>
        </div>
        <Inp label="Display Name" value={name} onChange={setName} placeholder="Your full name"/>
        <Inp label="New Password (leave blank to keep current)" value={newPass} onChange={setNewPass} type="password" placeholder="Min 6 characters"/>
        <Inp label="Confirm New Password" value={confirmPass} onChange={setConfirmPass} type="password" placeholder="Re-enter new password"/>
        <div style={{borderTop:"1.5px solid #f1f5f9",paddingTop:16,marginTop:4}}>
          <Inp label="Current Password (required to save)" value={currentPass} onChange={setCurrentPass} type="password" placeholder="Enter current password"/>
        </div>
        {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
        {saved&&<div style={{fontSize:12,color:"#16a34a",background:"#dcfce7",borderRadius:8,padding:"8px 12px",marginBottom:12}}>‚úì Changes saved!</div>}
        <Btn onClick={handleSave} style={{width:"100%",padding:12}}>Save Changes</Btn>
      </Card>
    </div>
  );
}
