const QB_CHAPTERS=["Acids, Bases and Salts","Agriculture","Areas Related to Circles","Arithmetic Progressions","Carbon and its Compounds","Chemical Reactions and Equations","Circles","Consumer Rights","Control and Coordination","Coordinate Geometry","Development","Electricity","Federalism","Forest and Wildlife Resources","Gender, Religion and Caste","Globalisation and the Indian Economy","Heights & Distances","Heredity and Evolution","How do Organisms Reproduce?","Human Eye and Colourful World","Life Processes","Lifelines of National Economy","Light ‚Äì Reflection and Refraction","Linear Equations","Magnetic Effects of Electric Current","Management of Natural Resources","Manufacturing Industries","Metals and Non-metals","Minerals and Energy Resources","Money and Credit","Nationalism in India","Our Environment","Outcomes of Democracy","Political Parties","Polynomials","Power Sharing","Print Culture and the Modern World","Probability","Quadratic Equations","Real Numbers","Resources and Development","Sectors of the Indian Economy","Sources of Energy","Statistics","Surface Areas & Volumes","The Age of Industrialisation","The Making of a Global World","The Rise of Nationalism in Europe","Triangles","Trigonometry","Water Resources"];
const QB_CBSE_WT={"Real Numbers":6,"Polynomials":5,"Linear Equations":5,"Quadratic Equations":5,"Arithmetic Progressions":5,"Triangles":10,"Coordinate Geometry":6,"Trigonometry":8,"Heights & Distances":4,"Circles":3,"Areas Related to Circles":4,"Surface Areas & Volumes":6,"Statistics":7,"Probability":4,"Light ‚Äì Reflection and Refraction":8,"Human Eye and Colourful World":5,"Electricity":9,"Magnetic Effects of Electric Current":6,"Sources of Energy":4,"Chemical Reactions and Equations":7,"Acids, Bases and Salts":7,"Metals and Non-metals":7,"Carbon and its Compounds":7,"Life Processes":8,"Control and Coordination":5,"How do Organisms Reproduce?":5,"Heredity and Evolution":6,"Our Environment":4,"Management of Natural Resources":4,"The Rise of Nationalism in Europe":8,"Nationalism in India":10,"The Making of a Global World":8,"The Age of Industrialisation":6,"Print Culture and the Modern World":6,"Resources and Development":6,"Forest and Wildlife Resources":5,"Water Resources":5,"Agriculture":6,"Minerals and Energy Resources":5,"Manufacturing Industries":6,"Lifelines of National Economy":6,"Power Sharing":6,"Federalism":8,"Gender, Religion and Caste":5,"Political Parties":6,"Outcomes of Democracy":5,"Development":8,"Sectors of the Indian Economy":8,"Money and Credit":8,"Globalisation and the Indian Economy":8,"Consumer Rights":5};
const QB_SEC_MARKS={A:1,B:2,C:3,D:5,E:4};
const QB_DIFF_LABEL={e:"Easy",m:"Medium",h:"Hard"};
const QB_DIFF_COLOR={e:"#16a34a",m:"#d97706",h:"#dc2626"};
const QB_SEC_COLOR={A:"#1d4ed8",B:"#16a34a",C:"#d97706",E:"#7c3aed",D:"#dc2626"};
function qbShuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}


function QuestionBank({user}){
  const isAdmin=user.role==="admin";
  const userClasses=user.classes||[];
  const userSubjects=user.subjects||[];

  const accessibleCombos=isAdmin
    ? Object.keys({...QB_READY,...QB_COMING}).map(k=>{const[c,...rest]=k.split("|");return{cls:c,subj:rest.join("|")};})
    : userClasses.flatMap(cls=>userSubjects.map(subj=>({cls,subj})));

  const readyCombos=accessibleCombos.filter(({cls,subj})=>QB_READY[cls+"|"+subj]);
  const comingSoonCombos=accessibleCombos.filter(({cls,subj})=>!QB_READY[cls+"|"+subj]&&QB_COMING[cls+"|"+subj]);

  const[activeCombo,setActiveCombo]=useState(readyCombos[0]||null);
  const[lvl,setLvl]=useState("std");
  const[sciSub,setSciSub]=useState("");
  const[filterCh,setFilterCh]=useState("");
  const[filterSec,setFilterSec]=useState("");
  const[filterDiff,setFilterDiff]=useState("");
  const[search,setSearch]=useState("");
  const[testItems,setTestItems]=useState([]);
  const[chMarkTarget,setChMarkTarget]=useState(20);
  const[revealedAnswers,setRevealedAnswers]=useState({});
  const[pickedOpts,setPickedOpts]=useState({});
  const[testName,setTestName]=useState("");
  const[testCls,setTestCls]=useState("10");

  const data=useMemo(()=>{const raw=QB_DATA[lvl]||[];if(lvl==="sci"&&sciSub) return raw.filter(q=>q.subj===sciSub);return raw;},[lvl,sciSub]);
  const filtered=useMemo(()=>data.filter(q=>{
    if(filterCh&&q.c!==filterCh)return false;
    if(filterSec&&q.s!==filterSec)return false;
    if(filterDiff&&q.d!==filterDiff)return false;
    if(search&&!q.q.toLowerCase().includes(search.toLowerCase())&&!q.c.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[data,filterCh,filterSec,filterDiff,search]);

  const totalTestMarks=testItems.reduce((s,ti)=>s+ti.q.m,0);
  const isInTest=(q)=>testItems.some(ti=>ti.idx===data.indexOf(q)&&ti.lvl===lvl);

  function toggleInTest(q){
    const idx=data.indexOf(q);
    setTestItems(prev=>{
      const exists=prev.findIndex(ti=>ti.idx===idx&&ti.lvl===lvl);
      if(exists>=0){const n=[...prev];n.splice(exists,1);return n;}
      return [...prev,{lvl,idx,q}];
    });
  }

  function buildByMarks(target){
    const d=QB_DATA[lvl];
    const bp={
      20:{mcq:6,ar:0,vsa:2,sa:2,la:0,cs:0},
      30:{mcq:8,ar:2,vsa:2,sa:2,la:1,cs:0},
      40:{mcq:10,ar:2,vsa:3,sa:3,la:1,cs:1},
      80:{mcq:18,ar:2,vsa:5,sa:6,la:4,cs:3}
    }[target]||{mcq:18,ar:2,vsa:5,sa:6,la:4,cs:3};
    const used=new Set();
    const items=[];
    function pick(pool,count){
      qbShuffle([...pool]).slice(0,count).forEach(q=>{
        const idx=d.indexOf(q);
        if(!used.has(idx)){items.push({lvl,idx,q});used.add(idx);}
      });
    }
    pick(d.filter(q=>q.s==="A"&&q.t==="mcq"),bp.mcq);
    pick(d.filter(q=>q.t==="ar"),bp.ar);
    pick(d.filter(q=>q.s==="B"),bp.vsa);
    pick(d.filter(q=>q.s==="C"),bp.sa);
    pick(d.filter(q=>q.s==="D"),bp.la);
    pick(d.filter(q=>q.s==="E"),bp.cs);
    setTestItems(items);
    const names={20:"Weekly Test (20m)",30:"Unit Test (30m)",40:"Half-Term Test (40m)",80:"Board Practice Paper (80m)"};
    setTestName(names[target]||"Test");
    setTestCls("10");
  }

  function buildByChapter(ch){
    const d=QB_DATA[lvl];
    const pool=d.filter(q=>q.c===ch);
    let budget=chMarkTarget;
    const items=[];
    const used=new Set();
    function tryAdd(q,cost){
      if(budget>=cost&&!used.has(d.indexOf(q))){
        items.push({lvl,idx:d.indexOf(q),q});
        used.add(d.indexOf(q));
        budget-=cost;
      }
    }
    qbShuffle(pool.filter(q=>q.s==="E")).slice(0,1).forEach(q=>tryAdd(q,4));
    qbShuffle(pool.filter(q=>q.s==="A"&&q.t==="mcq")).slice(0,Math.floor(budget/3)).forEach(q=>tryAdd(q,1));
    qbShuffle(pool.filter(q=>q.t==="ar")).slice(0,1).forEach(q=>tryAdd(q,1));
    qbShuffle(pool.filter(q=>q.s==="B")).forEach(q=>tryAdd(q,2));
    qbShuffle(pool.filter(q=>q.s==="C")).forEach(q=>tryAdd(q,3));
    qbShuffle(pool.filter(q=>q.s==="D")).forEach(q=>tryAdd(q,5));
    setTestItems(items);
    setTestName(ch+" Test");
  }

  function generatePaper(){
    if(!testItems.length)return;
    const name=testName||"Weekly Test";
    const cls=testCls||"10";
    const bySection={};
    testItems.forEach(ti=>{if(!bySection[ti.q.s])bySection[ti.q.s]=[];bySection[ti.q.s].push(ti);});
    let html=`<html><head><title>${name}</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a2e;max-width:900px;margin:0 auto}h1{color:#1a2e6c;font-size:20px;margin-bottom:4px}.meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;margin:8px 0 14px;border-bottom:2px solid #1a2e6c;padding-bottom:10px}.sec-hdr{background:#f0f4ff;border-left:4px solid #1a2e6c;padding:8px 14px;font-weight:700;font-size:14px;color:#1a2e6c;margin:18px 0 10px}.q{margin-bottom:14px;padding-bottom:10px;border-bottom:1px dashed #ddd;font-size:13px;line-height:1.7}.opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px;padding-left:20px;font-size:12px}@media print{body{padding:10px}.no-print{display:none}}</style></head><body>`;
    html+=`<div style="text-align:center;border-bottom:2px solid #1a2e6c;padding-bottom:12px;margin-bottom:14px"><h1>STEPPING STONE INTER COLLEGE</h1><div style="font-size:12px;color:#666">Gorakhpur, Uttar Pradesh ¬∑ CBSE Affiliated</div></div>`;
    html+=`<div class="meta"><span><b>${name}</b> ‚Äî Class ${cls}</span><span>Subject: Mathematics</span><span>Total Marks: ${totalTestMarks}</span><span>Time: ${Math.round(totalTestMarks*1.5)} minutes</span></div>`;
    html+=`<div style="font-size:12px;font-style:italic;color:#555;margin-bottom:14px">General Instructions: All questions are compulsory. Read each question carefully.</div>`;
    let qn=1;
    ["A","B","C","D","E"].forEach(sec=>{
      if(!bySection[sec])return;
      html+=`<div class="sec-hdr">${QB_SNAMES[sec]}</div>`;
      bySection[sec].forEach(ti=>{
        const q=ti.q;
        html+=`<div class="q"><b>Q${qn}.</b> ${q.q.replace(/<div[^>]*>|<\/div>/g,"").replace(/<b>/g,"<b>").replace(/<[^>]+>/g,s=>["<b>","</b>","<br>","<br/>"].includes(s)?s:"")} <span style="float:right;color:#666">[${q.m} Mark${q.m>1?"s":""}]</span>`;
        if(q.o&&q.o.length)html+=`<div class="opts">${q.o.map(o=>`<div>${o}</div>`).join("")}</div>`;
        html+=`</div>`;
        qn++;
      });
    });
    html+=`<div style="margin-top:30px;font-size:11px;color:#94a3b8;text-align:center">Generated by Stepping Stone Inter College ¬∑ Test Tracker</div></body></html>`;
    const w=window.open("","_blank");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}
  }

  // ‚îÄ‚îÄ Empty/locked states ‚îÄ‚îÄ
  if(accessibleCombos.length===0){
    return(
      <div style={{textAlign:"center",padding:"60px 20px"}}>
        <div style={{fontSize:48,marginBottom:16}}>üîí</div>
        <div style={{fontWeight:700,fontSize:18,color:"#1a2e6c",marginBottom:8}}>Question Bank Access</div>
        <div style={{color:"#64748b",fontSize:14,maxWidth:360,margin:"0 auto"}}>The Question Bank is available to subject teachers. Contact your administrator for access.</div>
      </div>
    );
  }

  if(readyCombos.length===0){
    return(
      <div>
        <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",overflow:"hidden"}}>
          <div style={{background:"#1a2e6c",padding:"16px 20px",color:"#fff"}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700}}>üìö Question Bank</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginTop:3}}>CBSE 2025-26</div>
          </div>
          <div style={{padding:24}}>
            <div style={{background:"#fef3c7",border:"1.5px solid #fcd34d",borderRadius:10,padding:"14px 18px",marginBottom:20,fontSize:13,color:"#92400e"}}>
              <b>üöß Coming Soon for your subjects</b> ‚Äî Class 10 Mathematics is currently live. More subjects are being added this session.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {accessibleCombos.map(({cls,subj})=>{
                const info=QB_COMING[cls+"|"+subj]||{eta:"2025-26",icon:"üìò"};
                return(
                  <div key={cls+subj} style={{border:"1.5px solid #e2e8f0",borderRadius:12,padding:"18px 16px",textAlign:"center",background:"#f8fafc"}}>
                    <div style={{fontSize:32,marginBottom:8}}>{info.icon}</div>
                    <div style={{fontWeight:700,color:"#1a2e6c",fontSize:14}}>{cls}</div>
                    <div style={{color:"#64748b",fontSize:12,marginTop:2}}>{subj}</div>
                    <div style={{marginTop:10,background:"#fef3c7",color:"#92400e",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,display:"inline-block"}}>Coming {info.eta}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ‚îÄ‚îÄ Full QB UI ‚îÄ‚îÄ
  const bySec={};
  ["A","B","C","D","E"].forEach(s=>{bySec[s]=filtered.filter(q=>q.s===s);});

  return(
    <div style={{paddingBottom:60}}>
      {/* Header bar */}
      <div style={{background:"#1a2e6c",borderRadius:14,padding:"16px 20px",marginBottom:14,color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700}}>üìö Question Bank</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:2}}>
            {activeCombo?`${activeCombo.cls} ¬∑ ${activeCombo.subj} ¬∑ CBSE 2025-26`:"Class 10 ¬∑ Mathematics ¬∑ CBSE 2025-26"}
          </div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          {readyCombos.length>1&&readyCombos.map(({cls,subj})=>(
            <button key={cls+subj} onClick={()=>setActiveCombo({cls,subj})} style={{padding:"5px 13px",borderRadius:20,border:"1.5px solid "+(activeCombo&&activeCombo.cls===cls?"rgba(255,255,255,.6)":"rgba(255,255,255,.25)"),background:activeCombo&&activeCombo.cls===cls?"rgba(255,255,255,.2)":"transparent",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {cls.replace("Class ","")} {subj.split(" ")[0]}
            </button>
          ))}
          {comingSoonCombos.slice(0,3).map(({cls,subj})=>(
            <span key={cls+subj} style={{padding:"4px 11px",borderRadius:20,background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.35)",fontSize:10,border:"1px dashed rgba(255,255,255,.18)"}}>
              {cls.replace("Class ","")} {subj.split(" ")[0]} ¬∑ Soon
            </span>
          ))}
          <span style={{background:"#B8860B",color:"#fff",borderRadius:20,padding:"5px 13px",fontSize:12,fontWeight:700}}>{QB_DATA[lvl].length} Q's</span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 310px",gap:14,alignItems:"start"}}>
        <div>
          {/* Quick Build card */}
          <Card style={{padding:"16px 18px",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c",marginBottom:12}}>‚ö° Quick Build</div>

            {/* Level */}
            <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Level:</span>
              {[
                {id:"std",label:"üìò Maths Std"},
                {id:"bas",label:"üìó Maths Basic"},
                {id:"sci",label:"üî¨ Science"},
                {id:"sst",label:"üó∫Ô∏è SST"},
              ].map(({id:l,label})=>(
                <button key={l} onClick={()=>{setLvl(l);setSciSub("");setFilterCh("");setFilterSec("");setFilterDiff("");setSearch("");}} style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(lvl===l?"#1a2e6c":"#e2e8f0"),background:lvl===l?"#1a2e6c":"#fff",color:lvl===l?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {label}
                </button>
          ))}
            </div>

            {lvl==="sci"&&<div style={{marginBottom:12,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginRight:4}}>Branch:</span>
              {[{id:"",label:"üî¨ All"},{id:"phy",label:"‚ö° Physics"},{id:"chem",label:"üß™ Chemistry"},{id:"bio",label:"üåø Biology"}]
                .map(({id:s,label})=>(
                  <button key={s||"all"} onClick={()=>{setSciSub(s);setFilterCh("");}}
                    style={{padding:"4px 12px",borderRadius:20,border:"1.5px solid "+(sciSub===s?"#1a2e6c":"#e2e8f0"),
                    background:sciSub===s?"#1a2e6c":"#fff",color:sciSub===s?"#fff":"#64748b",
                    fontSize:11,fontWeight:600,cursor:"pointer"}}>
                    {label}
                  </button>
              ))}
            </div>}

            {/* By Marks */}
            <div style={{marginBottom:14}}>
              <Lbl c="By Total Marks"/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[20,30,40,80].map(m=>(
                  <button key={m} onClick={()=>buildByMarks(m)}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",width:76,padding:"10px 6px",border:`2px solid ${m===80?"#B8860B":"#e2e8f0"}`,borderRadius:11,background:m===80?"#FDF9EE":"#fff",cursor:"pointer",gap:1,transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#1a2e6c";e.currentTarget.style.transform="translateY(-2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=m===80?"#B8860B":"#e2e8f0";e.currentTarget.style.transform="";}}>
                    <span style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:900,color:m===80?"#B8860B":"#1a2e6c",lineHeight:1}}>{m}</span>
                    <span style={{fontSize:8,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",color:"#94a3b8"}}>marks</span>
                    <span style={{fontSize:9,color:"#94a3b8",marginTop:1,textAlign:"center"}}>{m===20?"~30 min":m===30?"~45 min":m===40?"~60 min":"3 hrs"}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* By Chapter */}
            <div>
              <Lbl c="By Chapter"/>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                {[...new Set((QB_DATA[lvl]||[]).map(q=>q.c))].sort().map(ch=>(
                  <button key={ch} onClick={()=>buildByChapter(ch)}
                    style={{padding:"4px 11px",borderRadius:20,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:11,fontWeight:500,color:"#64748b",cursor:"pointer",whiteSpace:"nowrap",transition:"all .12s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#1a2e6c";e.currentTarget.style.color="#1a2e6c";e.currentTarget.style.background="#EEF2FF";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.color="#64748b";e.currentTarget.style.background="#fff";}}>
                    {ch}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"#64748b"}}>Chapter test size:</span>
                {[10,20,30,40].map(m=>(
                  <button key={m} onClick={()=>setChMarkTarget(m)} style={{padding:"3px 11px",borderRadius:7,border:`1.5px solid ${chMarkTarget===m?"#1a2e6c":"#e2e8f0"}`,background:chMarkTarget===m?"#1a2e6c":"#fff",color:chMarkTarget===m?"#fff":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>{m}m</button>
                ))}
                <span style={{fontSize:11,color:"#92400e",background:"#FDF9EE",border:"1px solid #B8860B",padding:"2px 9px",borderRadius:11}}>{chMarkTarget}m selected</span>
              </div>
            </div>
          </Card>

          {/* Filter row */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
            <Lbl c="Filter"/>
            <select value={filterCh} onChange={e=>setFilterCh(e.target.value)} style={{padding:"6px 28px 6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#64748b",background:"#fff",cursor:"pointer"}}>
              <option value="">All Chapters</option>
              {QB_CHAPTERS.map(c=><option key={c}>{c}</option>)}
            </select>
            <select value={filterSec} onChange={e=>setFilterSec(e.target.value)} style={{padding:"6px 28px 6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#64748b",background:"#fff",cursor:"pointer"}}>
              <option value="">All Sections</option>
              {["A","B","C","D","E"].map(s=><option key={s} value={s}>Section {s}</option>)}
            </select>
            <select value={filterDiff} onChange={e=>setFilterDiff(e.target.value)} style={{padding:"6px 28px 6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#64748b",background:"#fff",cursor:"pointer"}}>
              <option value="">Any Difficulty</option>
              <option value="e">Easy</option><option value="m">Medium</option><option value="h">Hard</option>
            </select>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="üîç Search questions‚Ä¶" style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",flex:1,minWidth:140}}/>
            <span style={{background:"#1a2e6c",color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,marginLeft:"auto",whiteSpace:"nowrap"}}>{filtered.length} questions</span>
          </div>

          {/* Questions */}
          {["A","B","C","D","E"].map(sec=>{
            const qs=bySec[sec];
            if(!qs||!qs.length)return null;
            return(
              <div key={sec} style={{marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0 8px",borderBottom:"2px solid #e2e8f0",marginBottom:10}}>
                  <span style={{background:QB_SEC_COLOR[sec]+"22",color:QB_SEC_COLOR[sec],borderRadius:20,padding:"2px 11px",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{sec}</span>
                  <span style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:"#1a2e6c"}}>{QB_SNAMES[sec]}</span>
                  <span style={{fontSize:10,color:"#64748b",background:"#f1f5f9",padding:"2px 8px",borderRadius:5,marginLeft:"auto"}}>{qs.length}q</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(420px,1fr))",gap:9,marginBottom:12}}>
                  {qs.map((q,qi)=>{

// ‚îÄ‚îÄ AI HELPER ‚îÄ‚îÄ
const AI_KEY = localStorage.getItem("ss_ai_key")||"";
async function askAI(prompt, maxTokens=800){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":AI_KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:maxTokens,
        messages:[{role:"user",content:prompt}]
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({error:{message:"Unknown error"}}));
      return "AI Error ("+res.status+"): "+(err?.error?.message||"Please try again.");
    }
    const data = await res.json();
    return data.content?.[0]?.text || "No response generated.";
  }catch(e){
    return "Connection error: "+e.message+". Check your internet connection.";
  }
}

// ‚îÄ‚îÄ AI PANEL ‚îÄ‚îÄ
function AIPanel({testsDB, studentsDB, topicsDB}){
  const[activeAI, setActiveAI]=useState("insights");
  // State for each feature
  const[cls, setCls]=useState(SCHOOL.classes[0]);
  const[subj, setSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[student, setStudent]=useState("");
  const[loading, setLoading]=useState(false);
  const[result, setResult]=useState("");
  const[qCls, setQCls]=useState(SCHOOL.classes[0]);
  const[qSubj, setQSubj]=useState(SCHOOL.subjects[SCHOOL.classes[0]][0]);
  const[qTopics, setQTopics]=useState([]);
  const[qDiff, setQDiff]=useState("Medium");
  const[qCount, setQCount]=useState(10);
  const[msgLang, setMsgLang]=useState("English");

  useEffect(()=>{setSubj(SCHOOL.subjects[cls][0]);setStudent("");},[cls]);
  useEffect(()=>{setQSubj(SCHOOL.subjects[qCls][0]);},[qCls]);

  const students = studentsDB.data[safeId(cls)]?.list||[];
  const qTopicList = topicsDB.data[safeId(`${qCls}__${qSubj}`)]?.list||[];

  // 1. CLASS INSIGHTS
  const genInsights = async()=>{
    setLoading(true);setResult("");
    const rTests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const studentList = studentsDB.data[safeId(cls)]?.list||[];
    if(!rTests.length){setResult("No test data available for this class and subject.");setLoading(false);return;}
    const summary = rTests.map(t=>{
      const scores = studentList.map(s=>({name:s,pct:pct(Number(t.rows?.[s]??0),t.total)}));
      const avg = Math.round(scores.reduce((a,b)=>a+b.pct,0)/scores.length);
      const failing = scores.filter(s=>s.pct<40).map(s=>s.name);
      return `Week ${t.week} (${t.testDate||"‚Äî"}): Class avg ${avg}%, Topics: ${t.topics?.join(", ")||"‚Äî"}, Failing: ${failing.join(", ")||"None"}`;
    }).join("\n");
    const prompt = `You are an educational analyst for Stepping Stone Inter College, Gorakhpur. Analyze this ${cls} ${subj} test data and give actionable insights for the teacher:\n\n${summary}\n\nProvide:\n1. Overall class performance trend\n2. Topics that need re-teaching\n3. Students who need extra attention (mention names)\n4. Specific recommendations for next week\n\nBe concise, practical and specific. Write in a professional tone suitable for a school teacher.`;
    const res = await askAI(prompt, 600);
    setResult(res);setLoading(false);
  };

  // 2. STUDY PLAN
  const genStudyPlan = async()=>{
    if(!student){setResult("Please select a student.");return;}
    setLoading(true);setResult("");
    const subjects = SCHOOL.subjects[cls]||[];
    const subjectData = subjects.map(subj=>{
      const tests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
      const scores = tests.map(t=>pct(Number(t.rows?.[student]??0),t.total));
      const avg = scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      const weakTopics = [...new Set(tests.filter(t=>pct(Number(t.rows?.[student]??0),t.total)<50).flatMap(t=>t.topics||[]))];
      return{subj,avg,weakTopics,tests:scores.length};
    }).filter(s=>s.tests>0);
    const prompt = `You are a personal academic coach for a student at Stepping Stone Inter College, Gorakhpur.\n\nStudent: ${student}, ${cls}\nPerformance data:\n${subjectData.map(s=>`${s.subj}: Average ${s.avg??0}%${s.weakTopics.length?" | Weak topics: "+s.weakTopics.join(", "):""}`).join("\n")}\n\nCreate a personalised 1-week study plan for this student. Include:\n1. Which subjects need most attention and why\n2. Specific topics to focus on each day (Mon-Sat)\n3. Time allocation suggestions\n4. Motivational note for the student\n\nBe encouraging, specific and realistic. Write directly to the student.`;
    const res = await askAI(prompt, 700);
    setResult(res);setLoading(false);
  };

  // 3. REPORT COMMENTS
  const genComments = async()=>{
    if(!student){setResult("Please select a student.");return;}
    setLoading(true);setResult("");
    const subjects = SCHOOL.subjects[cls]||[];
    const subjectData = subjects.map(subj=>{
      const tests = Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj);
      const scores = tests.map(t=>pct(Number(t.rows?.[student]??0),t.total));
      const avg = scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      return{subj,avg};
    }).filter(s=>s.avg!==null);
    const overall = subjectData.length?Math.round(subjectData.reduce((a,b)=>a+b.avg,0)/subjectData.length):0;
    const prompt = `Write a professional teacher's remark for a student's report card.\n\nStudent: ${student}, ${cls}\nOverall Average: ${overall}%\nSubject-wise: ${subjectData.map(s=>`${s.subj}: ${s.avg}%`).join(", ")}\n\nWrite:\n1. A formal 2-3 sentence teacher remark for the report card\n2. A separate 1-sentence principal remark\n\nTone: Professional, encouraging, CBSE style. Do not use the word "good" repeatedly.`;

  const data=useMemo(()=>{
    let d=QB_DATA[lvl]||[];
    if(lvl==="sci"&&sciSub) d=d.filter(q=>q.subj===sciSub);
    return d;
  },[lvl,sciSub]);

  const chapters=useMemo(()=>[...new Set(data.map(q=>q.c))].sort(),[data]);

  const filtered=useMemo(()=>data.filter(q=>{
    if(filterCh&&q.c!==filterCh) return false;
    if(filterSec&&q.s!==filterSec) return false;
    if(filterDiff&&q.d!==filterDiff) return false;
    if(search&&!q.q.toLowerCase().includes(search.toLowerCase())) return false;
    if(!showDone&&saved["done_"+lvl+"_"+data.indexOf(q)]) return false;
    return true;
  }),[data,filterCh,filterSec,filterDiff,search,showDone,saved]);

  const doneCount=data.filter((_,i)=>saved["done_"+lvl+"_"+i]).length;
  const subjLabels={std:"üìò Maths Std",bas:"üìó Maths Basic",sci:"üî¨ Science",sst:"üó∫Ô∏è SST"};
  const diffColors={e:"#10b981",m:"#f59e0b",h:"#ef4444"};
  const diffLabels={e:"Easy",m:"Medium",h:"Hard"};
  const secLabels={A:"1 mark",B:"2‚Äì4 marks",C:"3 marks",D:"5 marks",E:"4 marks"};

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      {/* Top bar */}
      <div style={{background:"#0f172a",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>‚Üê Back</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:15}}>Question Bank</span>
        <span style={{marginLeft:"auto",color:"#fbbf24",fontSize:12,fontWeight:600}}>{doneCount}/{data.length} done</span>
      </div>

      {/* Subject tabs */}
      <div style={{background:"#1e293b",display:"flex",flexWrap:"wrap",padding:"0 12px"}}>
        {Object.entries(subjLabels).map(([k,v])=>(
          <button key={k} onClick={()=>{setLvl(k);setSciSub("");setFilterCh("");}}
            style={{padding:"10px 16px",border:"none",borderBottom:"3px solid "+(lvl===k?"#b8860b":"transparent"),background:"transparent",color:lvl===k?"#fff":"rgba(255,255,255,0.45)",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            {v}
          </button>
        ))}
      </div>
      {lvl==="sci"&&(
        <div style={{background:"#1e293b",display:"flex",gap:6,padding:"6px 16px 10px"}}>
          {[{id:"",l:"All"},{id:"phy",l:"‚ö° Physics"},{id:"chem",l:"üß™ Chemistry"},{id:"bio",l:"üåø Biology"}].map(s=>(
            <button key={s.id} onClick={()=>{setSciSub(s.id);setFilterCh("");}}
              style={{padding:"4px 12px",borderRadius:20,border:"1.5px solid "+(sciSub===s.id?"#b8860b":"rgba(255,255,255,0.2)"),background:sciSub===s.id?"#b8860b":"transparent",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
              {s.l}
            </button>
          ))}
        </div>
      )}

      {/* Filters */}
      <div style={{background:"#fff",padding:"10px 20px",borderBottom:"2px solid #e2e8f0",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filterCh} onChange={e=>setFilterCh(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#475569",outline:"none"}}>
          <option value="">All Chapters</option>
          {chapters.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select value={filterSec} onChange={e=>setFilterSec(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#475569",outline:"none"}}>
          <option value="">All Sections</option>
          {["A","B","C","D","E"].map(s=><option key={s} value={s}>Section {s} ‚Äî {secLabels[s]}</option>)}
        </select>
        <select value={filterDiff} onChange={e=>setFilterDiff(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#475569",outline:"none"}}>
          <option value="">All Difficulties</option>
          <option value="e">üü¢ Easy</option>
          <option value="m">üü° Medium</option>
          <option value="h">üî¥ Hard</option>
        </select>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="üîç Search‚Ä¶" style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",minWidth:160}}/>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#475569",cursor:"pointer",marginLeft:"auto"}}>
          <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)}/>
          Show done
        </label>
        <span style={{background:"#1e293b",color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600}}>{filtered.length} questions</span>
      </div>

      {/* Questions */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"16px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(500px,1fr))",gap:12}}>
        {filtered.map((q,fi)=>{
          const realIdx=data.indexOf(q);
          const doneKey="done_"+lvl+"_"+realIdx;
          const isDone=saved[doneKey]||false;
          return <StudentQCard key={realIdx} q={q} isDone={isDone} onToggleDone={()=>saveDone(doneKey,!isDone)} diffColors={diffColors} diffLabels={diffLabels}/>;
        })}
        {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#94a3b8",fontSize:15}}>No questions match your filters.</div>}
      </div>
    </div>
  );
}

function StudentQCard({q,isDone,onToggleDone,diffColors,diffLabels}){
  const[showAns,setShowAns]=useState(false);
  const[picked,setPicked]=useState(null);
  const typeLabel={mcq:"MCQ",ar:"A/R",vsa:"VSA",sa:"Short",la:"Long",cs:"Case Study",sb:"Source"};
  return(
    <div style={{background:"#fff",borderRadius:14,border:`1.5px solid ${isDone?"#bbf7d0":"#e2e8f0"}`,overflow:"hidden",position:"relative",opacity:isDone?0.75:1}}>
      {isDone&&<div style={{position:"absolute",top:10,right:10,background:"#10b981",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>‚úì Done</div>}
      <div style={{padding:"14px 16px 8px"}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:10,fontWeight:700,color:"#64748b",background:"#f1f5f9",padding:"2px 8px",borderRadius:20}}>{q.c}</span>
          <span style={{fontSize:10,fontWeight:700,color:diffColors[q.d],background:diffColors[q.d]+"20",padding:"2px 8px",borderRadius:20}}>{diffLabels[q.d]}</span>
          <span style={{fontSize:10,fontWeight:600,color:"#94a3b8"}}>{typeLabel[q.t]||q.t} ¬∑ {q.m}M</span>
        </div>
        <div style={{fontSize:13,lineHeight:1.7,color:"#1e293b"}} dangerouslySetInnerHTML={{__html:q.q}}/>
      </div>
      {q.o&&q.o.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,padding:"0 16px 8px"}}>
          {q.o.map((opt,i)=>{
            const letter=opt.substring(0,1);
            const isCorrect=letter===q.r;
            const isChosen=picked===letter;
            let bg="#f8fafc",border="#e2e8f0",color="#475569";
            if(picked){
              if(isCorrect){bg="#dcfce7";border="#86efac";color="#15803d";}
              else if(isChosen){bg="#fee2e2";border="#fca5a5";color="#dc2626";}
            }
            return(
              <div key={i} onClick={()=>!picked&&setPicked(letter)}
                style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${border}`,background:bg,fontSize:12,color,cursor:picked?"default":"pointer",display:"flex",gap:6,alignItems:"flex-start",userSelect:"none"}}>
                <span style={{fontWeight:700,minWidth:14}}>{letter}</span>
                <span dangerouslySetInnerHTML={{__html:opt.substring(3)}}/>
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:"flex",gap:8,padding:"6px 16px 12px"}}>
        <button onClick={()=>{setShowAns(!showAns);}} style={{padding:"5px 14px",background:showAns?"#1e293b":"#f1f5f9",color:showAns?"#fff":"#475569",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>
          {showAns?"Hide Answer":"Show Answer"}
        </button>
        <button onClick={onToggleDone} style={{padding:"5px 14px",background:isDone?"#dcfce7":"#f0fdf4",color:isDone?"#15803d":"#16a34a",border:`1.5px solid ${isDone?"#86efac":"#bbf7d0"}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",marginLeft:"auto"}}>
          {isDone?"‚úì Done":"Mark Done"}
        </button>
      </div>
      {showAns&&<div style={{margin:"0 16px 14px",padding:"12px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,fontSize:12,color:"#15803d",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:"<b>Answer & Solution</b><br/>"+q.a}}/>}
    </div>
  );
}

// ‚îÄ‚îÄ PRACTICE TEST BUILDER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function PracticeTest({user,onBack,onFinish,saved,saveDone}){
  const[step,setStep]=useState("setup"); // setup | running
  const[lvl,setLvl]=useState("std");
  const[selChs,setSelChs]=useState([]);
  const[numQ,setNumQ]=useState(20);
  const[timeMin,setTimeMin]=useState(30);
  const[testQs,setTestQs]=useState([]);

  const chapters=useMemo(()=>[...new Set((QB_DATA[lvl]||[]).map(q=>q.c))].sort(),[lvl]);
  const toggleCh=ch=>setSelChs(s=>s.includes(ch)?s.filter(x=>x!==ch):[...s,ch]);
  const selectAll=()=>setSelChs([...chapters]);
  const clearAll=()=>setSelChs([]);

  const startTest=()=>{
    const pool=(QB_DATA[lvl]||[]).filter(q=>selChs.includes(q.c)&&q.o&&q.o.length>0&&q.r);
    if(pool.length<5){alert("Not enough MCQ questions for selected chapters. Please select more chapters.");return;}
    // Shuffle and pick
    const shuffled=[...pool].sort(()=>Math.random()-0.5);
    // Try to get balanced sections: prioritise A (MCQ), then spread
    const mcqs=shuffled.filter(q=>q.s==="A").slice(0,Math.min(numQ,shuffled.length));
    const final=mcqs.length>=numQ?mcqs.slice(0,numQ):shuffled.slice(0,numQ);
    setTestQs(final);
    setStep("running");
  };

  if(step==="running") return <RunningTest qs={testQs} timeMin={timeMin} lvl={lvl} selChs={selChs} onFinish={onFinish} saveDone={saveDone} user={user}/>;

  const subjLabels={std:"üìò Maths Std",bas:"üìó Maths Basic",sci:"üî¨ Science",sst:"üó∫Ô∏è SST"};

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <div style={{background:"#0f172a",padding:"12px 20px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>‚Üê Back</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:15}}>üéØ Practice Test Setup</span>
      </div>

      <div style={{maxWidth:800,margin:"28px auto",padding:"0 20px",display:"flex",flexDirection:"column",gap:16}}>

        {/* Step 1: Subject */}
        <div style={{background:"#fff",borderRadius:16,padding:"22px 24px",border:"1.5px solid #e2e8f0"}}>
          <div style={{fontWeight:700,fontSize:15,color:"#1e293b",marginBottom:14}}>1. Choose Subject</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {Object.entries(subjLabels).map(([k,v])=>(
              <button key={k} onClick={()=>{setLvl(k);setSelChs([]);}}
                style={{padding:"8px 18px",borderRadius:20,border:`2px solid ${lvl===k?"#1e3a8a":"#e2e8f0"}`,background:lvl===k?"#1e3a8a":"#fff",color:lvl===k?"#fff":"#475569",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {v}
              </button>
            ))}
          </div>
        </div>

        {/* Step 2: Chapters */}
        <div style={{background:"#fff",borderRadius:16,padding:"22px 24px",border:"1.5px solid #e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>2. Select Chapters <span style={{color:"#6366f1",fontSize:13}}>({selChs.length} selected)</span></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={selectAll} style={{padding:"5px 12px",borderRadius:8,border:"1.5px solid #6366f1",background:"#eff6ff",color:"#4338ca",fontSize:12,fontWeight:600,cursor:"pointer"}}>Select All</button>
              <button onClick={clearAll} style={{padding:"5px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>Clear</button>
            </div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {chapters.map(ch=>{
              const sel=selChs.includes(ch);
              const qCount=(QB_DATA[lvl]||[]).filter(q=>q.c===ch&&q.o&&q.o.length>0&&q.r).length;
              return(
                <div key={ch} onClick={()=>toggleCh(ch)}
                  style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${sel?"#6366f1":"#e2e8f0"}`,background:sel?"#6366f1":"#f8fafc",color:sel?"#fff":"#475569",fontSize:12,fontWeight:500,cursor:"pointer",userSelect:"none",display:"flex",gap:6,alignItems:"center"}}>
                  {ch}
                  <span style={{fontSize:10,opacity:0.7}}>({qCount}q)</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Step 3: Settings */}
        <div style={{background:"#fff",borderRadius:16,padding:"22px 24px",border:"1.5px solid #e2e8f0"}}>
          <div style={{fontWeight:700,fontSize:15,color:"#1e293b",marginBottom:14}}>3. Test Settings</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Number of Questions</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[10,15,20,25,30].map(n=>(
                  <button key={n} onClick={()=>setNumQ(n)}
                    style={{padding:"7px 16px",borderRadius:10,border:`2px solid ${numQ===n?"#1e3a8a":"#e2e8f0"}`,background:numQ===n?"#1e3a8a":"#fff",color:numQ===n?"#fff":"#475569",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    {n}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Time Limit</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[15,20,30,45,60].map(m=>(
                  <button key={m} onClick={()=>setTimeMin(m)}
                    style={{padding:"7px 16px",borderRadius:10,border:`2px solid ${timeMin===m?"#1e3a8a":"#e2e8f0"}`,background:timeMin===m?"#1e3a8a":"#fff",color:timeMin===m?"#fff":"#475569",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    {m}m
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Start button */}
        <button onClick={startTest} disabled={selChs.length===0}
          style={{padding:"16px",background:selChs.length>0?"linear-gradient(135deg,#1e3a8a,#6366f1)":"#e2e8f0",color:selChs.length>0?"#fff":"#94a3b8",border:"none",borderRadius:16,fontSize:16,fontWeight:800,cursor:selChs.length>0?"pointer":"not-allowed",letterSpacing:0.5}}>
          {selChs.length>0?`üöÄ Start Test ‚Äî ${numQ} Questions ¬∑ ${timeMin} Minutes`:"‚Üê Select at least one chapter to start"}
        </button>
      </div>
    </div>
  );
}

// ‚îÄ‚îÄ RUNNING TEST ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function RunningTest({qs,timeMin,lvl,selChs,onFinish,saveDone,user}){
  const[answers,setAnswers]=useState({});
  const[current,setCurrent]=useState(0);
  const[timeLeft,setTimeLeft]=useState(timeMin*60);
  const[submitted,setSubmitted]=useState(false);

  useEffect(()=>{
    if(submitted) return;
    const t=setInterval(()=>{
      setTimeLeft(s=>{
        if(s<=1){clearInterval(t);handleSubmit();return 0;}
        return s-1;
      });
    },1000);
    return()=>clearInterval(t);
  },[submitted]);

  const handleSubmit=()=>{
    if(submitted) return;
    setSubmitted(true);
    const score=qs.filter((q,i)=>answers[i]===q.r).length;
    const pct=Math.round(score/qs.length*100);
    const testKey="test_"+Date.now();
    const result={score,total:qs.length,pct,subject:lvl,chapters:selChs,date:new Date().toLocaleDateString("en-IN"),qs,answers};
    saveDone(testKey,result);
    onFinish(result);
  };

  const mm=String(Math.floor(timeLeft/60)).padStart(2,"0");
  const ss=String(timeLeft%60).padStart(2,"0");
  const urgent=timeLeft<300;
  const q=qs[current];
  const answered=Object.keys(answers).length;

  return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column"}}>
      {/* Timer bar */}
      <div style={{background:urgent?"#7f1d1d":"#1e293b",padding:"10px 20px",display:"flex",alignItems:"center",gap:16,position:"sticky",top:0,zIndex:100}}>
        <span style={{color:urgent?"#fca5a5":"#94a3b8",fontSize:12}}>Question {current+1}/{qs.length}</span>
        <div style={{flex:1,height:6,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}}>
          <div style={{width:(answered/qs.length*100)+"%",height:"100%",background:"#6366f1",borderRadius:3}}/>
        </div>
        <span style={{color:urgent?"#ef4444":"#fbbf24",fontWeight:800,fontSize:16,fontFamily:"monospace"}}>{mm}:{ss}</span>
        <button onClick={()=>{if(window.confirm("Submit test now?")) handleSubmit();}}
          style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,fontSize:12}}>
          Submit ({answered}/{qs.length})
        </button>
      </div>

      <div style={{flex:1,display:"flex",maxWidth:1000,margin:"0 auto",width:"100%",padding:"20px",gap:16}}>
        {/* Question panel */}
        <div style={{flex:1,background:"#1e293b",borderRadius:16,padding:"28px",border:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <span style={{background:"rgba(99,102,241,0.3)",color:"#a5b4fc",padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:700}}>{q.c}</span>
            <span style={{background:"rgba(255,255,255,0.08)",color:"#94a3b8",padding:"3px 10px",borderRadius:20,fontSize:11}}>{q.m} mark{q.m>1?"s":""}</span>
          </div>
          <div style={{fontSize:15,lineHeight:1.8,color:"#e2e8f0",marginBottom:24}} dangerouslySetInnerHTML={{__html:q.q}}/>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q.o.map((opt,i)=>{
              const letter=opt.substring(0,1);
              const sel=answers[current]===letter;
              return(
                <div key={i} onClick={()=>!submitted&&setAnswers(a=>({...a,[current]:letter}))}
                  style={{padding:"12px 16px",borderRadius:12,border:`2px solid ${sel?"#6366f1":"rgba(255,255,255,0.1)"}`,background:sel?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.04)",color:sel?"#a5b4fc":"#cbd5e1",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",transition:"all 0.15s"}}>
                  <span style={{fontWeight:800,fontSize:14,minWidth:20,color:sel?"#818cf8":"#64748b"}}>{letter}</span>
                  <span style={{fontSize:14,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:opt.substring(3)}}/>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
            <button onClick={()=>setCurrent(c=>Math.max(0,c-1))} disabled={current===0}
              style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"transparent",color:current===0?"#334155":"#94a3b8",cursor:current===0?"not-allowed":"pointer",fontSize:13,fontWeight:600}}>
              ‚Üê Prev
            </button>
            {current<qs.length-1?(
              <button onClick={()=>setCurrent(c=>c+1)}
                style={{padding:"8px 20px",borderRadius:10,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>
                Next ‚Üí
              </button>
            ):(
              <button onClick={()=>{if(window.confirm("Submit test?")) handleSubmit();}}
                style={{padding:"8px 20px",borderRadius:10,border:"none",background:"#10b981",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
                ‚úì Submit Test
              </button>
            )}
          </div>
        </div>

        {/* Question grid */}
        <div style={{width:200,background:"#1e293b",borderRadius:16,padding:"16px",border:"1px solid rgba(255,255,255,0.1)",alignSelf:"flex-start",position:"sticky",top:80}}>
          <div style={{color:"#94a3b8",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Questions</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
            {qs.map((_,i)=>(
              <button key={i} onClick={()=>setCurrent(i)}
                style={{width:28,height:28,borderRadius:7,border:`2px solid ${i===current?"#6366f1":answers[i]?"#10b981":"rgba(255,255,255,0.15)"}`,background:i===current?"#6366f1":answers[i]?"rgba(16,185,129,0.2)":"transparent",color:i===current?"#fff":answers[i]?"#6ee7b7":"#64748b",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                {i+1}
              </button>
            ))}
          </div>
          <div style={{marginTop:14,fontSize:11,color:"#475569"}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}><span style={{width:12,height:12,borderRadius:3,background:"rgba(16,185,129,0.4)",display:"inline-block"}}/> Answered ({answered})</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{width:12,height:12,borderRadius:3,background:"rgba(255,255,255,0.1)",display:"inline-block"}}/> Skipped ({qs.length-answered})</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ‚îÄ‚îÄ TEST RESULT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function TestResult({result,onBack,onRetry}){
  const{score,total,pct,qs,answers,subject,chapters}=result;
  const[showAll,setShowAll]=useState(false);
  const[filter,setFilter]=useState("all"); // all | correct | wrong
  const grade=pct>=80?"üèÜ Excellent":pct>=70?"‚≠ê Good":pct>=50?"üìà Average":"üìö Need Practice";
  const gradeColor=pct>=70?"#10b981":pct>=50?"#f59e0b":"#ef4444";
  const subjLabel={std:"Maths Std",bas:"Maths Basic",sci:"Science",sst:"SST"}[subject]||subject;

  const filtered=qs.filter((_,i)=>{
    if(filter==="correct") return answers[i]===qs[i].r;
    if(filter==="wrong")   return answers[i]!==qs[i].r;
    return true;
  });

  return(
    <div style={{minHeight:"100vh",background:"#0f172a"}}>
      {/* Header */}
      <div style={{background:"#1e293b",padding:"14px 24px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>‚Üê Home</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:15}}>Test Results</span>
        <button onClick={onRetry} style={{marginLeft:"auto",background:"#6366f1",border:"none",color:"#fff",padding:"6px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>üîÑ Retry</button>
      </div>

      <div style={{maxWidth:900,margin:"28px auto",padding:"0 20px"}}>
        {/* Score card */}
        <div style={{background:"linear-gradient(135deg,#1e293b,#0f172a)",borderRadius:24,padding:"36px",border:"1px solid rgba(255,255,255,0.1)",textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:56,fontWeight:900,color:gradeColor,lineHeight:1}}>{pct}%</div>
          <div style={{fontSize:22,color:"#fff",fontWeight:700,margin:"12px 0 6px"}}>{grade}</div>
          <div style={{color:"#94a3b8",fontSize:14}}>{score} correct out of {total} questions</div>
          <div style={{color:"#64748b",fontSize:12,marginTop:4}}>{subjLabel} ¬∑ {chapters.slice(0,3).join(", ")}{chapters.length>3?` +${chapters.length-3} more`:""}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginTop:28}}>
            {[
              {l:"Correct",v:score,c:"#10b981"},
              {l:"Wrong",v:total-score-(qs.filter((_,i)=>!answers[i]).length),c:"#ef4444"},
              {l:"Skipped",v:qs.filter((_,i)=>!answers[i]).length,c:"#f59e0b"},
            ].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,0.05)",borderRadius:14,padding:"14px"}}>
                <div style={{fontSize:28,fontWeight:800,color:s.c}}>{s.v}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Solutions */}
        <div style={{background:"#1e293b",borderRadius:16,padding:"20px",border:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:15}}>üìñ Review Solutions</div>
            <div style={{display:"flex",gap:8}}>
              {["all","correct","wrong"].map(f=>(
                <button key={f} onClick={()=>setFilter(f)}
                  style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${filter===f?"#6366f1":"rgba(255,255,255,0.15)"}`,background:filter===f?"#6366f1":"transparent",color:filter===f?"#fff":"#94a3b8",fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"capitalize"}}>
                  {f==="all"?"All":f==="correct"?"‚úì Correct":"‚úó Wrong"}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {(showAll?filtered:filtered.slice(0,10)).map((q,fi)=>{
              const realIdx=qs.indexOf(q);
              const chosen=answers[realIdx];
              const isCorrect=chosen===q.r;
              return(
                <div key={fi} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"16px",border:`1px solid ${isCorrect?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`}}>
                  <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
                    <span style={{fontSize:18}}>{isCorrect?"‚úÖ":"‚ùå"}</span>
                    <span style={{color:"#94a3b8",fontSize:11,background:"rgba(255,255,255,0.06)",padding:"2px 8px",borderRadius:20}}>{q.c}</span>
                    {!chosen&&<span style={{color:"#f59e0b",fontSize:11,fontWeight:600}}>Skipped</span>}
                  </div>
                  <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.7,marginBottom:12}} dangerouslySetInnerHTML={{__html:q.q}}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
                    {q.o.map((opt,i)=>{
                      const letter=opt.substring(0,1);
                      const isRight=letter===q.r;
                      const isChosen=letter===chosen;
                      let bg="rgba(255,255,255,0.04)",border="rgba(255,255,255,0.08)",color="#64748b";
                      if(isRight){bg="rgba(16,185,129,0.15)";border="#10b981";color="#6ee7b7";}
                      else if(isChosen&&!isRight){bg="rgba(239,68,68,0.15)";border="#ef4444";color="#fca5a5";}
                      return(
                        <div key={i} style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${border}`,background:bg,fontSize:12,color,display:"flex",gap:8}}>
                          <span style={{fontWeight:700}}>{letter}</span>
                          <span dangerouslySetInnerHTML={{__html:opt.substring(3)}}/>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#6ee7b7",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:"<b>Solution:</b> "+q.a}}/>
                </div>
              );
            })}
            {!showAll&&filtered.length>10&&(
              <button onClick={()=>setShowAll(true)} style={{padding:"10px",borderRadius:12,border:"1.5px solid rgba(99,102,241,0.4)",background:"rgba(99,102,241,0.1)",color:"#a5b4fc",cursor:"pointer",fontSize:13,fontWeight:600}}>
                Show all {filtered.length} questions ‚Üì
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
