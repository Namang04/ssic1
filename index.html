const pct = (m,t) => t ? Math.round((m/t)*100) : 0;
const gradeOf = p => {
  if(p>=90) return{l:"A+",c:"#16a34a",bg:"#dcfce7"};
  if(p>=80) return{l:"A", c:"#2563eb",bg:"#dbeafe"};
  if(p>=70) return{l:"B+",c:"#7c3aed",bg:"#ede9fe"};
  if(p>=60) return{l:"B", c:"#d97706",bg:"#fef3c7"};
  if(p>=40) return{l:"C", c:"#ea580c",bg:"#ffedd5"};
  return          {l:"D", c:"#dc2626",bg:"#fee2e2"};
};
const safeId = s => s.replace(/[^a-zA-Z0-9]/g,"_");

function useFirestore(collName) {
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);
  const unsubRef = useRef(null);
  useEffect(() => {
    const setup = () => {
      if(!window.__db) return;
      if(unsubRef.current) unsubRef.current();
      unsubRef.current = window.__fbOnSnapshot(window.__fbCollection(window.__db, collName), snap => {
        const d = {};
        snap.forEach(dc => { d[dc.id] = dc.data(); });
        setData(d);
        setLoading(false);
      });
    };
    if(window.__fbReady) setup();
    else window.addEventListener("fbready", setup, {once:true});
    return () => { if(unsubRef.current) unsubRef.current(); };
  }, [collName]);
  const set = useCallback(async (id, val) => {
    if(!window.__db) return;
    await window.__fbSetDoc(window.__fbDoc(window.__db, collName, safeId(id)), val);
  }, [collName]);
  const del = useCallback(async (id) => {
    if(!window.__db) return;
    await window.__fbDeleteDoc(window.__fbDoc(window.__db, collName, safeId(id)));
  }, [collName]);
  return { data, loading, set, del };
}

  <select value={value} onChange={e=>onChange(e.target.value)}

  </select>
);

const Card = ({children,style={}}) => <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",overflow:"hidden",...style}}>{children}</div>;
const GBadge = ({p}) => { const g=gradeOf(p); return <span style={{background:g.bg,color:g.c,borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,fontFamily:"JetBrains Mono,monospace"}}>{g.l} · {p}%</span>; };
const Bar = ({p}) => { const g=gradeOf(p); return <div style={{height:6,background:"#e2e8f0",borderRadius:99}}><div style={{width:`${p}%`,height:"100%",background:g.c,borderRadius:99,transition:"width .4s"}}/></div>; };
const Btn = ({children,onClick,v="pri",style={},disabled=false}) => {
  const s={pri:{background:"#1a2e6c",color:"#fff",border:"none"},ghost:{background:"#f8fafc",color:"#64748b",border:"1.5px solid #e2e8f0"},ok:{background:"#dcfce7",color:"#16a34a",border:"none"},del:{background:"#fee2e2",color:"#dc2626",border:"none"},warn:{background:"#fef3c7",color:"#d97706",border:"none"}};
  return <button onClick={onClick} disabled={disabled} style={{...s[v],padding:"9px 20px",borderRadius:9,fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}}>{children}</button>;

function Login({onLogin, usersDB}) {
  const [u,setU]=useState("");
  const [p,setP]=useState("");
  const [err,setErr]=useState("");

  const go = () => {
    const uKey = u.trim().toLowerCase();
    // Check Firebase users first, fall back to defaults
    const fbUser = usersDB.data[uKey];
    const defUser = DEFAULT_USERS[uKey];
    const userData = fbUser || defUser;
    if(userData && userData.password === p) {
      onLogin({username: uKey, ...userData});
    } else {
      setErr("Invalid username or password.");
    }
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#1a2e6c 0%,#1d4ed8 60%,#b8860b 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

          <img src={LOGO} alt="logo" style={{width:90,height:90,objectFit:"contain",marginBottom:10}}/>
          <div style={{fontSize:22,fontWeight:800,color:"#fff"}}>Stepping Stone Inter College</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginTop:4,letterSpacing:1.5}}>GORAKHPUR · WEEKLY TEST TRACKER</div>
        </div>
        <div style={{background:"#fff",borderRadius:20,padding:36,boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
          <div style={{fontSize:18,fontWeight:700,color:"#1a2e6c",marginBottom:4}}>Sign In</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:24}}>Enter your username and password</div>
          <Input label="Username" value={u} onChange={setU} placeholder="e.g. maths6"/>
          <Input label="Password" value={p} onChange={setP} type="password" placeholder="••••••••"/>
          {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}

  );
}

// ── CHANGE CREDENTIALS ──
function ChangeCredentials({user, usersDB, onUpdate}) {
  const [name, setName] = useState(user.name);
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [currentPassword, setCurrentPassword] = useState("");
  const [saved, setSaved] = useState(false);
  const [err, setErr] = useState("");

  const handleSave = async () => {
    setErr("");
    if(!currentPassword) { setErr("Enter your current password to confirm."); return; }
    const stored = usersDB.data[user.username] || DEFAULT_USERS[user.username];
    if(stored.password !== currentPassword) { setErr("Current password is incorrect."); return; }
    if(newPassword && newPassword !== confirmPassword) { setErr("New passwords do not match."); return; }
    if(newPassword && newPassword.length < 6) { setErr("Password must be at least 6 characters."); return; }
    const updated = {
      ...stored,
      name: name || stored.name,
      password: newPassword || stored.password,
    };
    await usersDB.set(user.username, updated);
    onUpdate({...user, name: updated.name, password: updated.password});
    setSaved(true);
    setNewPassword(""); setConfirmPassword(""); setCurrentPassword("");
    setTimeout(() => setSaved(false), 3000);
  };

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:24}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1a2e6c",marginBottom:4}}>🔐 Account Settings</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>Update your display name and password. Changes take effect immediately.</div>

        <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:"12px 16px",marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"#0369a1",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Your Account</div>
          <div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{user.username}</div>
          <div style={{fontSize:12,color:"#64748b",textTransform:"capitalize"}}>{user.role} · {user.classes?.join(", ")||"All Classes"}</div>
        </div>

        <Input label="Display Name" value={name} onChange={setName} placeholder="Your full name"/>
        <Input label="New Password (leave blank to keep current)" value={newPassword} onChange={setNewPassword} type="password" placeholder="Min 6 characters"/>
        <Input label="Confirm New Password" value={confirmPassword} onChange={setConfirmPassword} type="password" placeholder="Re-enter new password"/>

        <div style={{borderTop:"1.5px solid #f1f5f9",paddingTop:16,marginTop:4}}>
          <Input label="Current Password (required to save)" value={currentPassword} onChange={setCurrentPassword} type="password" placeholder="Enter current password to confirm"/>
        </div>

        {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fee2e2",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{err}</div>}
        {saved&&<div style={{fontSize:12,color:"#16a34a",background:"#dcfce7",borderRadius:8,padding:"8px 12px",marginBottom:12}}>✓ Changes saved successfully!</div>}
        <Btn onClick={handleSave} style={{width:"100%",padding:"12px"}}>Save Changes</Btn>
      </Card>
    </div>
  );
}

function EnterMarks({user,testsDB,topicsDB,studentsDB}) {
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const [cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);
  const [subj,setSubj]=useState(aS[0]||"");
  const [week,setWeek]=useState(1);
  const [total,setTotal]=useState(20);
  const [selTopics,setSelTopics]=useState([]);
  const [rows,setRows]=useState({});
  const [saved,setSaved]=useState(false);
  useEffect(()=>setSubj(aS[0]||""),[cls]);
  const testKey=`${cls}__${subj}__week${week}`;
  const existing=testsDB.data[safeId(testKey)];
  useEffect(()=>{if(existing){setTotal(existing.total);setSelTopics(existing.topics||[]);setRows(existing.rows||{});}else{setRows({});setSelTopics([]);}},[testKey,existing?.at]);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const availableTopics=topicsDB.data[safeId(`${cls}__${subj}`)]?.list||[];
  const toggleTopic=t=>setSelTopics(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const setMark=(s,v)=>setRows(p=>({...p,[s]:v}));
  const handleSave=async()=>{await testsDB.set(testKey,{cls,subj,week,total,topics:selTopics,rows,by:user.name,at:new Date().toISOString()});setSaved(true);setTimeout(()=>setSaved(false),2500);};
  const filled=students.filter(s=>rows[s]!==undefined&&rows[s]!=="").length;
  const avg=filled?Math.round(students.filter(s=>rows[s]!==undefined&&rows[s]!=="").reduce((a,s)=>a+pct(Number(rows[s]),total),0)/filled):0;
  if(testsDB.loading||studentsDB.loading||topicsDB.loading)return <Spinner/>;
  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
          {[{lbl:"Class",v:cls,opts:aC,fn:v=>setCls(v)},{lbl:"Subject",v:subj,opts:aS,fn:setSubj},
            {lbl:"Week",v:week,opts:Array.from({length:30},(_,i)=>({v:i+1,l:`Week ${i+1}`})),fn:v=>setWeek(Number(v))},
            {lbl:"Total Marks",v:total,opts:[10,15,20,25,30,40,50,100].map(v=>({v,l:`${v} marks`})),fn:v=>setTotal(Number(v))}
          ].map(f=><div key={f.lbl}><Lbl c={f.lbl}/><Sel value={f.v} onChange={f.fn} options={f.opts}/></div>)}
        </div>
      </Card>
      <Card style={{padding:20}}>
        <Lbl c="Topics Tested"/>
        {availableTopics.length===0?(
          <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:9,padding:"12px 16px",marginTop:8,fontSize:13,color:"#92400e"}}>⚠️ No topics set for <strong>{cls} — {subj}</strong>. Go to Manage Topics tab first.</div>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
              {availableTopics.map(t=><button key={t} onClick={()=>toggleTopic(t)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid",borderColor:selTopics.includes(t)?"#1a2e6c":"#e2e8f0",background:selTopics.includes(t)?"#1a2e6c":"#f8fafc",color:selTopics.includes(t)?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{t}</button>)}
            </div>
            {selTopics.length>0&&<div style={{marginTop:10,fontSize:12,color:"#64748b"}}>Selected: <strong style={{color:"#1a2e6c"}}>{selTopics.join(", ")}</strong></div>}
          </>
        )}
      </Card>
      {students.length===0?<Empty icon="👨‍🎓" title={`No students in ${cls} yet`} sub="Go to Manage Students tab first."/>:(
        <Card>
          <div style={{display:"grid",gridTemplateColumns:"1fr 160px 90px 70px",background:"#f8fafc",borderBottom:"1.5px solid #e2e8f0",padding:"10px 20px",gap:12}}>
            {["Student",`Marks (out of ${total})`,"Pct","Grade"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1.2}}>{h}</div>)}
          </div>
          {students.map((s,i)=>{
            const m=rows[s];const has=m!==undefined&&m!=="";const p=has?pct(Number(m),total):null;const g=p!==null?gradeOf(p):null;
            return(<div key={s} style={{display:"grid",gridTemplateColumns:"1fr 160px 90px 70px",padding:"10px 20px",alignItems:"center",gap:12,borderBottom:i<students.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
              <div style={{fontWeight:500,fontSize:13,color:"#1e293b"}}>{s}</div>
              <input type="number" min={0} max={total} value={m??""} placeholder="Enter" onChange={e=>setMark(s,e.target.value)} style={{width:120,padding:"7px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"monospace",outline:"none",background:"#f8fafc",textAlign:"center"}}/>
              <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:g?.c||"#cbd5e1"}}>{p!==null?p+"%":"—"}</div>
              <div>{g?<span style={{background:g.bg,color:g.c,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{g.l}</span>:<span style={{color:"#cbd5e1",fontSize:12}}>—</span>}</div>
            </div>);
          })}
        </Card>
      )}
      {students.length>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:12,color:"#64748b"}}>{filled}/{students.length} filled{filled>0&&<span style={{color:"#1a2e6c",fontWeight:600,marginLeft:8}}>· Avg: {avg}%</span>}</div>
          <Btn onClick={handleSave} v={saved?"ok":"pri"} style={{padding:"11px 28px",fontSize:14}}>{saved?"✓ Saved to Cloud!":"Save Test Results"}</Btn>
        </div>
      )}
    </div>
  );
}

function ClassProgress({user,testsDB,studentsDB}) {
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const [cls,setCls]=useState(aC[0]);
  const aS=useMemo(()=>{const all=SCHOOL.subjects[cls]||[];return user.role==="admin"?all:all.filter(s=>(user.subjects||[]).includes(s));},[cls,user]);

  const students=studentsDB.data[safeId(cls)]?.list||[];
  const rTests=useMemo(()=>Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week),[testsDB.data,cls,subj]);
  const stats=useMemo(()=>students.map(s=>{const sc=rTests.map(t=>({week:t.week,p:pct(Number(t.rows?.[s]??0),t.total)}));const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:0;return{name:s,sc,avg,trend};}),[students,rTests]);
  const classAvg=useMemo(()=>{const all=stats.flatMap(s=>s.sc.map(x=>x.p));return all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length):null;},[stats]);
  const problemTopics=useMemo(()=>{const m={};rTests.forEach(t=>{const fc=students.filter(s=>pct(Number(t.rows?.[s]??0),t.total)<50).length;if(fc>=students.length*.4)(t.topics||[]).forEach(tp=>{m[tp]=(m[tp]||0)+1;});});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[rTests,students]);
  if(testsDB.loading||studentsDB.loading)return <Spinner/>;
  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:14,alignItems:"flex-end"}}>
          <div style={{flex:1}}><Lbl c="Class"/><Sel value={cls} onChange={setCls} options={aC}/></div>
          <div style={{flex:1}}><Lbl c="Subject"/><Sel value={subj} onChange={setSubj} options={aS}/></div>
          <Btn onClick={()=>window.print()} v="ghost">🖨️ Print</Btn>
        </div>
      </Card>
      {rTests.length===0?<Empty icon="📝" title={`No data for ${cls} · ${subj}`} sub="Enter marks first."/>:(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
            <StatCard label="Tests Recorded" val={rTests.length} icon="📋" color="#1a2e6c" sub={`Latest: Week ${rTests[rTests.length-1]?.week}`}/>
            <StatCard label="Class Average" val={classAvg!==null?classAvg+"%":"—"} icon="📊" color={classAvg!==null?gradeOf(classAvg).c:"#64748b"} sub="Across all tests"/>
            <StatCard label="Top Scorer" val={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.avg+"%"||"—"} icon="🏆" color="#d97706" sub={[...stats].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.name?.split(" ")[0]}/>
            <StatCard label="Problem Topics" val={problemTopics.length} icon="⚠️" color={problemTopics.length>0?"#dc2626":"#16a34a"} sub={problemTopics.length>0?"Need revision":"All clear"}/>
          </div>
          <Card>
            <div style={{padding:"14px 20px",borderBottom:"1.5px solid #e2e8f0",background:"#f8fafc",display:"flex",justifyContent:"space-between"}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c"}}>Performance — {cls} · {subj}</div>
              <div style={{fontSize:11,color:"#64748b"}}>{rTests.length} weeks · {students.length} students</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#f8fafc"}}>
                  <th style={{padding:"10px 20px",textAlign:"left",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",whiteSpace:"nowrap"}}>Student</th>
                  {rTests.map(t=><th key={t.week} style={{padding:"10px 12px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>W{t.week}</th>)}
                  <th style={{padding:"10px 16px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Avg</th>
                  <th style={{padding:"10px 16px",textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Trend</th>
                </tr></thead>
                <tbody>
                  {[...stats].sort((a,b)=>(b.avg??-1)-(a.avg??-1)).map((ss,i)=>(
                    <tr key={ss.name} style={{borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafbfd"}}>
                      <td style={{padding:"10px 20px",fontWeight:500,fontSize:13,color:"#1e293b",whiteSpace:"nowrap"}}>{ss.name}</td>
                      {ss.sc.map((sc,idx)=>{const g=gradeOf(sc.p);return<td key={idx} style={{padding:"10px 12px",textAlign:"center"}}><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:g.c}}>{sc.p}%</span></td>;})}
                      <td style={{padding:"10px 16px",textAlign:"center"}}>{ss.avg!==null?<GBadge p={ss.avg}/>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
                      <td style={{padding:"10px 16px",textAlign:"center",fontSize:12,fontWeight:700,color:ss.trend>5?"#16a34a":ss.trend<-5?"#dc2626":"#64748b"}}>{ss.trend>5?`↑ +${ss.trend}%`:ss.trend<-5?`↓ ${ss.trend}%`:"→ Stable"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
          {problemTopics.length>0&&(
            <Card style={{padding:20}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c",marginBottom:14}}>⚠️ Problem Topics</div>
              {problemTopics.map(([tp,cnt])=>(
                <div key={tp} style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div><div style={{fontWeight:700,color:"#c2410c",fontSize:14}}>📚 {tp}</div><div style={{fontSize:12,color:"#9a3412",marginTop:2}}>Flagged in {cnt} test{cnt>1?"s":""}</div></div>
                  <span style={{background:"#c2410c",color:"#fff",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:700}}>REVIEW</span>
                </div>
              ))}
            </Card>
          )}
        </>
      )}
    </div>
  );
}

function StudentReport({user,testsDB,studentsDB}) {
  const aC=user.role==="admin"?SCHOOL.classes:(user.classes||SCHOOL.classes);
  const [cls,setCls]=useState(aC[0]);
  const students=studentsDB.data[safeId(cls)]?.list||[];
  const [student,setStudent]=useState(students[0]||"");
  useEffect(()=>setStudent((studentsDB.data[safeId(cls)]?.list||[])[0]||""),[cls,studentsDB.data]);
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[student]??0),t.total),topics:t.topics||[]}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[cls,student,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  if(testsDB.loading||studentsDB.loading)return <Spinner/>;
  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:14,alignItems:"flex-end"}}>
          <div style={{flex:1}}><Lbl c="Class"/><Sel value={cls} onChange={setCls} options={aC}/></div>
          <div style={{flex:2}}><Lbl c="Student"/>
            {students.length===0?<div style={{padding:"9px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:13,color:"#94a3b8"}}>No students in {cls}</div>
            :<Sel value={student} onChange={setStudent} options={students}/>}
          </div>
          <Btn onClick={()=>window.print()} v="ghost">🖨️ Print</Btn>
        </div>
      </Card>
      {overall!==null&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
          <StatCard label="Overall Average" val={overall+"%"} icon="📊" color={gradeOf(overall).c} sub={gradeOf(overall).l+" Grade"}/>
          <StatCard label="Best Subject" val={[...sd].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.subj.split(" ")[0]||"—"} icon="⭐" color="#d97706" sub={[...sd].filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg)[0]?.avg+"%"}/>
          <StatCard label="Needs Work" val={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.subj.split(" ")[0]||"—"} icon="📌" color="#dc2626" sub={[...sd].filter(s=>s.avg!==null).sort((a,b)=>a.avg-b.avg)[0]?.avg+"%"}/>
        </div>
      )}
      <Card>
        <div style={{padding:"14px 20px",borderBottom:"1.5px solid #e2e8f0",background:"#f8fafc"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#1a2e6c"}}>Subject Report — {student||"Select student"} · {cls}</div>
        </div>
        {sd.map((s,i)=>(
          <div key={s.subj} style={{padding:"16px 20px",borderBottom:i<sd.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:s.avg!==null?10:0}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{s.subj}</div>
                {s.weak.length>0&&<div style={{fontSize:11,color:"#dc2626",marginTop:3}}>⚠ Revise: {s.weak.join(", ")}</div>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8"}}>W{sc.week}</div><div style={{fontSize:12,fontWeight:700,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
                {s.avg!==null?<GBadge p={s.avg}/>:<span style={{fontSize:12,color:"#cbd5e1"}}>No data</span>}
                {s.trend!==null&&<span style={{fontSize:12,fontWeight:700,color:s.trend>0?"#16a34a":s.trend<-5?"#dc2626":"#64748b"}}>{s.trend>0?`↑+${s.trend}%`:s.trend<-5?`↓${s.trend}%`:"→"}</span>}
              </div>
            </div>
            {s.avg!==null&&<Bar p={s.avg}/>}
          </div>
        ))}
      </Card>
    </div>
  );
}

function ParentView({user,testsDB}) {
  const {student,cls}=user;
  const subjects=SCHOOL.subjects[cls]||[];
  const sd=useMemo(()=>subjects.map(subj=>{
    const rel=Object.values(testsDB.data).filter(t=>t.cls===cls&&t.subj===subj).sort((a,b)=>a.week-b.week);
    const sc=rel.map(t=>({week:t.week,p:pct(Number(t.rows?.[student]??0),t.total),topics:t.topics||[]}));
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b.p,0)/sc.length):null;
    const trend=sc.length>=2?sc[sc.length-1].p-sc[0].p:null;
    const weak=[...new Set(sc.filter(x=>x.p<50).flatMap(x=>x.topics))];
    return{subj,sc,avg,trend,weak};
  }),[student,cls,testsDB.data,subjects]);
  const overall=useMemo(()=>{const a=sd.filter(x=>x.avg!==null).map(x=>x.avg);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;},[sd]);
  if(testsDB.loading)return <Spinner/>;
  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{background:"linear-gradient(135deg,#1a2e6c,#1d4ed8)",borderRadius:16,padding:"28px",color:"#fff"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Welcome</div>
        <div style={{fontSize:22,fontWeight:800,marginTop:4}}>{user.name}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:6}}>Report for <strong style={{color:"#fff"}}>{student}</strong> · {cls}</div>
        {overall!==null&&<div style={{marginTop:16,display:"inline-flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"10px 18px"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:1}}>Overall</div>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:gradeOf(overall).c}}>{overall}%</div>
          <div style={{fontSize:18,fontWeight:700}}>{gradeOf(overall).l}</div>
        </div>}
      </div>
      {sd.filter(s=>s.sc.length>0).length===0?<Empty icon="📋" title="No results yet" sub="Results appear once teachers enter marks."/>:(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {sd.filter(s=>s.sc.length>0).map(s=>(
            <Card key={s.subj} style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div><div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{s.subj}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s.sc.length} test{s.sc.length>1?"s":""}</div></div>
                {s.avg!==null&&<GBadge p={s.avg}/>}
              </div>
              {s.avg!==null&&<div style={{marginBottom:12}}><Bar p={s.avg}/></div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {s.sc.map(sc=>{const g=gradeOf(sc.p);return<div key={sc.week} style={{background:g.bg,borderRadius:8,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:g.c,fontWeight:700}}>Wk {sc.week}</div><div style={{fontSize:14,fontWeight:800,color:g.c,fontFamily:"monospace"}}>{sc.p}%</div></div>;})}
              </div>
              {s.weak.length>0&&<div style={{marginTop:12,background:"#fff7ed",borderRadius:8,padding:"8px 12px"}}><div style={{fontSize:11,color:"#c2410c",fontWeight:600}}>Revise: {s.weak.join(", ")}</div></div>}
              {s.trend!==null&&<div style={{marginTop:8,fontSize:12,color:"#64748b"}}>Progress: <strong style={{color:s.trend>0?"#16a34a":s.trend<-5?"#dc2626":"#64748b"}}>{s.trend>0?`Improving ↑ +${s.trend}%`:s.trend<-5?`Declining ↓ ${s.trend}%`:"Stable →"}</strong></div>}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminPanel({testsDB,studentsDB,usersDB}) {
  const all=Object.entries(testsDB.data).sort((a,b)=>(b[1].at||"").localeCompare(a[1].at||""));
  const totalStudents=Object.values(studentsDB.data).reduce((a,b)=>a+(b?.list||[]).length,0);
  if(testsDB.loading)return <Spinner/>;
  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
        <StatCard label="Total Students" val={totalStudents} icon="👨‍🎓" color="#1a2e6c"/>
        <StatCard label="Tests Saved" val={all.length} icon="📋" color="#1d4ed8"/>
        <StatCard label="Classes Active" val={[...new Set(all.map(([,t])=>t.cls))].length} icon="🏫" color="#7c3aed"/>
        <StatCard label="Subjects Covered" val={[...new Set(all.map(([,t])=>t.subj))].length} icon="📚" color="#d97706"/>
      </div>
      <Card>
        <div style={{padding:"14px 20px",borderBottom:"1.5px solid #e2e8f0",background:"#f8fafc"}}><div style={{fontWeight:700,fontSize:14,color:"#1a2e6c"}}>All Saved Tests</div></div>
        {all.length===0?<div style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:13}}>No tests saved yet.</div>:
          all.map(([key,t],i)=>(
            <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 20px",borderBottom:i<all.length-1?"1px solid #f1f5f9":"none",background:i%2===0?"#fff":"#fafbfd"}}>
              <div>
                <div style={{fontWeight:600,fontSize:13,color:"#1e293b"}}>{t.cls} · {t.subj} · Week {t.week}</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:2}}>By {t.by||"—"} · {t.total} marks · {t.topics?.join(", ")||"No topics"}</div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{fontSize:11,color:"#64748b"}}>{Object.keys(t.rows||{}).length} students</div>
                <Btn onClick={()=>testsDB.del(key)} v="del" style={{padding:"6px 14px",fontSize:12}}>Delete</Btn>
              </div>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("students");
  const testsDB=useFirestore("tests");
  const topicsDB=useFirestore("topics");
  const studentsDB=useFirestore("students");
  const usersDB=useFirestore("users");

  const handleUpdateUser = (updated) => setUser(updated);

  if(!user) return <Login onLogin={u=>{setUser(u);setTab(u.role==="parent"?"parent":"students");}} usersDB={usersDB}/>;

  const isParent=user.role==="parent", isAdmin=user.role==="admin";
  const tabs=isParent?[{id:"parent",label:"My Child's Report",icon:"👨‍👩‍👦"},{id:"account",label:"Account",icon:"🔐"}]:[
    {id:"students",label:"Students",icon:"👨‍🎓"},
    {id:"topics",label:"Topics",icon:"📝"},
    {id:"enter",label:"Enter Marks",icon:"✏️"},
    {id:"class",label:"Class Progress",icon:"📊"},
    {id:"student",label:"Student Report",icon:"👤"},
    ...(isAdmin?[{id:"admin",label:"Admin",icon:"⚙️"}]:[]),
    {id:"account",label:"Account",icon:"🔐"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#eef1f6"}}>
      <div style={{background:"#1a2e6c",color:"#fff",padding:"0 28px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"3px solid #2563eb",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src={LOGO} alt="logo" style={{width:36,height:36,objectFit:"contain"}}/>
          <div><div style={{fontSize:13,fontWeight:800}}>Stepping Stone Inter College</div><div style={{fontSize:10,color:"rgba(255,255,255,.45)",letterSpacing:1}}>Weekly Test Tracker</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,.45)",textTransform:"capitalize"}}>{user.role}</div></div>
          <button onClick={()=>{setUser(null);setTab("students");}} style={{background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>Sign Out</button>
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1.5px solid #e2e8f0",display:"flex",padding:"0 28px",position:"sticky",top:58,zIndex:99,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"14px 18px",border:"none",background:"none",fontSize:13,fontWeight:600,color:tab===t.id?"#1a2e6c":"#64748b",borderBottom:tab===t.id?"2.5px solid #1a2e6c":"2.5px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all .15s",whiteSpace:"nowrap"}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
      <div style={{maxWidth:1040,margin:"24px auto",padding:"0 20px 60px"}}>
        {tab==="students"&&!isParent&&<ManageStudents studentsDB={studentsDB}/>}
        {tab==="topics"&&!isParent&&<ManageTopics topicsDB={topicsDB}/>}
        {tab==="enter"&&!isParent&&<EnterMarks user={user} testsDB={testsDB} topicsDB={topicsDB} studentsDB={studentsDB}/>}
        {tab==="class"&&!isParent&&<ClassProgress user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="student"&&!isParent&&<StudentReport user={user} testsDB={testsDB} studentsDB={studentsDB}/>}
        {tab==="admin"&&isAdmin&&<AdminPanel testsDB={testsDB} studentsDB={studentsDB} usersDB={usersDB}/>}
        {tab==="parent"&&isParent&&<ParentView user={user} testsDB={testsDB}/>}
        {tab==="account"&&<ChangeCredentials user={user} usersDB={usersDB} onUpdate={handleUpdateUser}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
